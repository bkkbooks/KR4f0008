body:
  text: 姚江黃宗羲著明驃騎將軍鎮守福建總兵官左軍都督府都督僉事瑞巖萬公墓表公諱邦孚字汝永别號瑞巖姓萬氏其先定遠人也以世官徙寧波公嗣為指揮僉事轉浙西督運把總山東都司僉書萬曆二十六年授遊擊將軍出海援朝鮮論功遷杭嘉湖參將改溫處移副總兵分守江北三十六年升左軍都督府都督僉事充總兵官鎮福建又明年豫告公以諸生襲職其督運以軍法部署漕卒歲漕數萬石如期而畢漕運都御史總兵官交薦之山東時踐更入衛三殿災公率五千人夜從大司馬救火上急承運庫以五鳳樓當火道命毀之公曰徹殿廡足以救庫火政徹小屋塗大屋五鳳樓國家之象魏也宜塗不宜徹五鳳樓由是得存征倭九師敗績朝議從海道援之於是以南京龍江營水師屬公守鴨緑江大兵屯朝鮮公轉餉遼陽給食不乏新敗之後走死者載道公既斂骨埋之設厲壇以祀夢十三人稱王將軍卒乞食明日稱將王元周至中道覆一舟其溺死如夢之數其在溫處閩人稱商入浙有殺人攫金揚帆而去者官司莫何問公曰第令閩舟不得入浙浙舟不得入閩往來者必從其地之舟苟遇姦人吾籍其舟而名捕之矣著為令甲其在江北任滿將去吏民欲為立祠會改築通州城隍下雜墳為鍬􅓩所及者棄骨交於道上公謂吏民曰吾不任邦人之祠誠以斂錢改收棄骨是吾邀惠於邦人也吏民感公之義從之福建故為戚南塘所守公一稟其舊有夷舶飄墮境內時曰本為國讐撫臣因以為功公爭曰奈何助陽侯為虐也遣之島夷皆感泣去公之武事其有儒風多類此始祖國珍從明高皇帝起兵賜名斌以管軍萬户守滁州從大將軍北征戰殁贈明威將軍子鐘遂世襲寧波衛指揮僉事遜國之難死之子武嗣從征交趾戰死檀江舍弟文嗣所稱射龍將軍也嘗夜哨鋸門見兩炬燭天以為賊舶射之炬滅風濤大作遂溺死傳七世南京中軍都督府都督同知諱表學者稱為鹿園先生是謂皇祖廣東督理海防參將諱達甫亦以文名是謂皇考母黃夫人自公十世以上以忠節顯者三世自公以上以儒術顯者又三世明州萬氏無愧為國家之世臣矣北都失守悠悠之口皆謂不任武力所致余獨謂不然尚古兵柄本出儒術思陵矯枉重武其所重者皆粗暴之徒君死社稷免胄入賊師者無一人焉荷戈衷甲反為賊用此專任武力之過也今觀萬氏有事則顯忠節無事則顯儒術皆卿相之才有卿相之才而為武亦猶威寧新建有將帥之才而為文也以武夫而謂之武無乃以場屋嵬瑣之士而謂之文乎嗟乎名實之亂久矣此世所以受魚爛之禍也公生嘉靖甲辰三月二十二日卒崇禎戊辰四月二十八日葬西臯去郡城五里公精隂陽家言所著有筮吉指南通書纂要曰家指掌行於世配張氏贈恭人繼陳氏封恭人子泰丙子舉人女五人壻范鴻陳宗憲傳錦董應稷聞世琛孫八人斯年斯程斯禎斯昌斯選斯大斯備斯同孫女一字謝為兆余嘗至西臯拜公之墓登其堂觀明威告身龍鳳十年高皇帝中書省手押及四忠三節像實録乃謂高皇不奉龍鳳豈足信哉有明大事如北征如遜國如征交趾如東南倭亂如救朝鮮皆牽連萬氏後之君子而有考故實者萬氏其不為𣏌宋乎巡撫天津右僉都御史留仙馮公神道碑銘甲午思陵身死社稷一洗懷愍徽欽之耻古今亡國而不失其正者此僅見也然余以為使思陵避之南都天下事尚未去也何至令荒君逆臣載胥及溺遂不能保有江左乎故唐玄宗幸蜀以避祿山之禍代宗幸陜以避吐番之難德宗幸奉天以避朱泚之亂皆再造唐祚史表曰諸侯王始封者必受土於天子之社歸立之為國社以歲時祠之死社稷者諸侯守土之職非天子事也恨其時小儒不能通知大道執李綱之一言不敢力爭乃使其出於此也當是時慈溪馮公留仙巡撫天津先是崇禎十六年冬十月公密陳南北機宜謂道路將梗當疏通海道防患於未然天子俞之公乃具海舟二百艘以備緩急明年三月使其子愷章入迎天子奏曰京師戎政久虛以戰以守無一可恃臣督徑旅五千馳赴通郊躬候聖駕航海行幸留都初七日愷章至京師見張公國維張公曰寇深矣是請也不可緩倪公元璐曰皇上有國君死社稷之言群臣無以難也方公嶽貢范公景文曰曩者津門餉匱公要蘇州之運以給之天子方怒疏上且死愷章傍徨七日不得要領歸報於公未四日而京師陷公陳師鞠旅以圖戰守其副使原育宗降奪公之兵公不得巳拔身而南欲得一當免胄以入賊軍值弘光帝即位言討賊者絀之公遂鬱鬱而死踰思陵之崩蓋五月也議公者曰公不當生出津門解者曰是時以李希沆代公公巳解任可以無死夫春秋之義君弒賊討則善而書其誅若莫之討則君不書葬不書葬以為無臣子也當是之時在廷之臣生則屈賊唯有一死公居外而亦與之徒死使思陵不得書葬公忍之乎是故議者解者與國君死社稷之言同出一喙者也公中崇禎戊辰進士授工部主事思陵誅逆閹魏忠賢凡宦因魏忠賢者定為逆案逆案之徒出奇計以邊事陷君子而閹人失勢者亦時以閭巷見聞入告於是思陵遂疑在廷諸臣皆朋黨不可保任一切干涉兵餉皆使閹人監之太監張􅉓憲欲以屬禮待戶工兩部尚書郎公奏曰張彜憲總理二部群臣爭之不得臣以為不必更爭唯請皇上禁兩部諸臣不許至內臣之門識內臣之面有違此者罪無赦內臣既别立公署亦不得造兩部之堂與部臣密邇部臣錢糧所關灼有弊端可指內臣即得紏參其循職奉公茍幸無過自關人臣分內內臣即不得薦舉庶幾於祖宗交結內侍之律不相妨也張彛憲聞之曰嘻是與罷總理之説朝四而暮三也公方監督長德二陵橋梁彛憲欲因以中公而公精心汰其浮費絲毫之積贏四萬有奇奏上之彛憲遂無所得公念彜憲數惡巳無巳時一日至長安街自擲身馬上佯為傷足請告而歸居三年起為尚書禮部郎出備兵蘇松道時溫唐在朝其鄉人為盜於太湖者從之囊橐有司不敢何問公發吏督盜賊事連兩家者必發覺之最後乃得其渠帥則唐之族子也豪富多為之免脫竟論死於吳市九年秋烽火達陵邑公即領吳卒入援浙兵方出而公巳渡淮矣至濟陽京師解嚴乃還轉福建道提學副使當是時黨事起吳中有數大獄未具巡撫張公國維曰賈偉節西行解禍今馮公在此可聽之去乎上疏留之思陵既心疑諸臣朋黨烏程以事訐錢侍郎謙益方得於上小吏張漢儒希烏程旨上書告錢侍郎謙益瞿給事式耜居鄉不法狀下撫按治之公平反坐張漢儒杖蘇李與鄉官張采張溥不相能已而御史巡按劾之蘇李疑其受意於二張也因書誣告溥等交結諸郡生徒共為部黨名曰復社而太倉人陸文聲欲附復社不得而怒亦走京師言東南大害必始復社於是天子震怒班下郡國按其事復社者東南諸生所刻私試經義之名也主自二張一時士子多慕之者二張亦與錢侍郎相得故烏程遂以復社嗣於東林為天子言之公仰天太息曰東漢之禍一牢修成之彼陸文聲者將踵其故事耶具疏爭之於上有旨降公而吳中黨禍亦解尋補鹽運司判官十一年大兵入略三輔而過大山左濟寧告急以公攝兵道事城守甚設時總督盧公象升閹人高起潛分任東西二路盧公主死戰高閹主活仗故郡縣高閹不許與爭十二月二十八日夜大兵攻濟寧公擊退之其明曰高閹之部丁志祥至以為公夜來所擊殺者其營兵也反戈相向公登埤而謂之曰吾以濟城為存亡但知攻吾城者耳志祥語塞而去公上疏請誅高閹以謝燕趙齊魯之冤民不聽升天津兵備道未幾巡撫天津兼理糧餉都察院右僉都御史十五年冬大兵復大入公與諸鎮掎角之巳又合宣大總督孫晉督師范志完山東巡撫王永吉之師從密雲趨墻子嶺邀其獲頗為前此未有論功賜銀幣廕一子錦衣衛上念公暴露良苦時公之弟元飈任本兵上謂之曰聞汝兄多病東望慨然大司馬叩頭對曰臣兄荷皇上知遇鞠躬盡瘁死而後巳不敢言病上曰近親何藥大司馬曰臣前令揭陽篋中尚餘牛黃臣兄苦煩眩以為宜此上曰牛黃豈可多服卿致書慎之大司馬謝而出上遣內使賜宮參八兩公發函而泣曰君臣之際乃如是耶公慷慨喜事三黨之中多藉以婚嫁火食其俸入緣手散盡居鄉遇歲歉則稱貸富人之粟三以收之二以出之邑是以不困舟泊黃河逆旅有馮尸而哭者公入視有書在乎側惻然買棺斂之巳乃知為萬戶侯之弟也公為經義有名經其指授皆有法度大司馬少而無師公既冠而學成太常命大司馬師焉人士將卷軸而求公知者相望于道既而周旋朋黨之間益為名士所歸楊嗣昌常字公而不姓有郎官問曰留仙誰也嗣昌默然久之曰不知馮留仙耶其為世所稱重如此然公未嘗修飾時譽故黃公道周曰我友天下未有真誠若留仙者也公諱元揚字言仲别號留仙東漢馮異之後南唐尚書延魯徙于慈溪至有明而盛曾祖諱某贈中憲大夫祖諱季兆鄉進士工部郎中贈光祿寺卿父諱若愚萬曆乙未進士太僕寺卿贈太常寺卿太常生三子長即公次元飈天啓壬戌進士兵部尚書次元飀癸未進士都察院右僉都御史公娶滄州守何宇藩女封恭人生一女字國子生錢玄暉副室徐太孺人生愷章監國賜進士授行人司行人劉孺人生某孫某某公生萬曆丙戌十二月九日卒甲申之九月朔曰為年五十九葬于邑之小漁山公與大司馬嘗過西寶石山拜先忠端公祠下及公上書解釋黨議余從公幕府甲申之變既為詩而哭之矣愷章復以麗牲之石見屬謹次其事而辨之使來者知亡國之日未嘗無人也銘曰當國危亡曰守曰避擇斯二者視其形勢唐避再興宋守不墜未嘗執一以為正義奈何小儒今古不備伯紀一言遂同成議南遷之論其時有二在外唯公在內唯李邦華舉朝不然至委神器當日陪京原有深意公言若行天威尚厲官守奔問山河位置幸災樂禍何所施計吁嗟馮公此願不遂蹈海南還一丘貉睡鍾鼓無靈灰釘見志漁山鬱鬱姚江濞濞公之所恨其何寄耶亡兒阿壽壙志丙申阿壽生於辛卯五月十六日是時豫巳有三子轉徙兵禍方以携挈為纍其生也不樂之巳而日慧目所未見之物見輒名之元微之哭女樊詩有懸知衆物名於兒信其不謬也豫嘗語人神理不昧若此貌者應不從他道中來嘗捕禽蟲遨戲余謂譬如兒出外遊為人劫去我念兒否兒作是觀勿捕禽蟲兒聞言雖甚不能割有頃舍之未有戕其生者豫注律呂象數周髀歷算勾股開方地理之書頗得前人所未發顧視兒曹無可授之者慨然興嘆兒見我布算􅉡􅉡便謂無庸使兄等學之兒長自能是也三歲時見圖書余語之曰圓者河圖之數方者洛書之文是後雜試之即無差者每曰挽兄臂使説夷堅志一過之後即能知其首尾隨資談説以丐餅餌遇有遺忘輒信口補之豫闔扉凝坐不欲聞步履聲而堂淺塗徑雜賔租吏苦其闌入兒聞剝啄即迎問有欲徑入者率遮道止之五年以來豫衰索無復四方之志食與兒同盤寢與兒連牀出與兒携手間一遊城市未暮而返兒已迎門笑語矣豫之困苦牢落何一事足以自解此所藉於兒者多也十二月十八日兒病吐後六日豫入城兒數步以待曰某刻爺至某所曰某刻爺返某所薄暮戒左右勿喧曰爺之足音近矣我欲聽之也是後厥逆數令傳語太夫人時以天雨遲之黎明兒曰太夫人至否趣之太夫人至兒昏憒中起坐悉出果餌於盤操小刀割餐以啖太夫人太夫人含淚為嘗一二兒死經一晝夜豫呼之兒即大聲回睛視豫嗚呼兒於生死不亂如此兒聲若洪鍾目睛漆黑於相無夭法或曰兒之所以夭者用早慧也其叔父澤望曰慧而夭者資或近於刻薄兒之慧在愛親敬長亦壽者相也黎州曰噫豫知之矣豫之孑孑而不可竟行於世也天下知豫者二人陸符文乕劉應期瑞當文乕死於荒山瑞當死於非類之困折豫始退而與閭里遊有魏思澄者以落莫而親我未幾病瘵死乃戶內之寒暖笑口又若有物奪之而去者則信乎豫之賦分單薄招殃致凶天既不遺餘力以窮我而遂皆為所延及乎兒卒於乙未之除夕長歌當哭遂以哭兒者為之銘銘曰春風不轉鬢毛衰老大生憎物候移更堪殘燭無光熖元旦親書哭子詩其一些小曾埋宿世因人前嘗説是文人讀書自擇三春日兒自擇丙申三月初五入學豈料流年無丙申其二五歲相隨入影堂明年豫喜與蒸嘗春蘭風雨無能待忍寫小名在下殤其三推築何煩造化歟我生事事受次且未必斯兒當短折只緣無故我憐渠其四破屋頽垣風雨齊艱難識我是卑棲食料只知餘斗米曬場猶出護鄰雞其五相伴窮愁與亂離開懷憑仗有嬌兒屋角關情留瑣事䰐鬖猶道在東西其六余若水周唯一兩先生墓志銘丁巳嗟乎名節之談孰肯多讓而身非道開難吞白石體類王微常須藥裹許邁雖逝猶勤定省伯鸞雖簡尚存室家生此天地之間不能不與之相干涉有干涉則有往來陶靖節不肯屈身異代而江州之酒始安之錢不能拒也然靖節所處之時葛巾籃輿無鉗市之恐較之日似為差易活埋土室長往深山吾於會稽余若水甬上周唯一兩先生有深悲焉若水名增遠字謙貞曾祖古愚祖相肇慶府通判父幼美封兵部尚書尚書五子長煌字武貞天啓乙丑進士第一人季增雍太平知縣若水其中子也登崇禎癸未進士第除寶應知縣劉澤淸開府淮南欲以公禮格郡縣若水投版棄官而去畫江之役補禮部儀制司主事升郎中唯一名齊曾字思沂高祖薇工部員外郎曾祖柔祖焬父臺唯一登癸未進士第除廣東順德知縣邑中多盜以為此飢寒所致古人社倉之法意非不美然而其利易盡於是變社倉為義田而以社倉之法行之可以久遠又倣弓箭社之法行于西北者行之東南修飾僕區沈命之術盜一發即得攝香山縣香山與黎人相望一海土官欲渡海入葬直指許之唯一不可乃止閩中立國其首輔香山人下教有不便于民者唯一即解職歸兩先生之出俱當兵戈旁午之曰若水無以自見唯一之所見者亦小小及民之事不足以盡其長也桑海之交武貞投水死若水逃山中不出郡縣逼之入見若水乃輿疾城南以待齋斧久之而事解聚村童五六人授以三字經晨則秉耒而出與老農雜作較量勤惰未嘗因其貴人而讓畔也同年生王天錫為泉道欲與話舊若水辭以疾天錫披帷直入若水擁衾不起曰主臣不幸有狗馬疾不得與故人為禮天錫執手勞苦未出門數步則巳與一婢子擔糞灌園矣天錫遙矚嘆息而返冬夏一皂帽雖至昵者不見其科頭巳酉歲十月十三日卒年六十五蓋二十有四年不離城南一步也唯一遁入剡源盡去其髮而為髮塜曰惟松有聲可以無哭惟􅝳有露可以無泪唯鳥石依依可無吊客架險立瓢榜曰囊雲自稱無髮居士剡源饒水石與山僧樵子出沒瀑聲虹影之間軍持不借時挂於萬仞叢林遂欲以法付之一笑而巳王天錫求見唯一止之曰煙裡程途朝不知暮宿所故人咫尺舉目有山河之異辛亥歲三月二十日卒年六十九夫斷之令屈以威武惟死足以拒斷若水拒斷而不死非幸也其心固拚乎一死也唯一盡斷其餘不能拒也然斷其餘非令之有則猶之乎拒也其時為僧者多矣而嗣僧之法則無與于此也所謂威武不能屈者兩先生庶幾近之若水草屋三間不蔽風雨以鱉甲承漏臥榻之下牛宮雞桀無下足處生人之趣都盡唯一山林標致一器之微亦極其工巧嘗拾燒餘為爐拂拭過于金玉又得懸崖奇木製為養和坐臥其間兩先生之不同如此若水慨世路之逼亥遂疑荀卿性惡百王無弊著論以非孟唯一機鋒曳電汪洋自恣寓言十九然清苦自立胸中兀然有所不可不以牛迹之安途避亂羣之近憂者是則同若水出自崑山朱相國震靑之門唯一出鹽官吳太常磊齋之門相國則先忠端公之門人也其淵源有自若水疾革余造其榻前命兒子正誼為之切脈若水曰某祈死二十年之前反祈生二十年之後乎余泫然而别唯一則未嘗一面也若水配姚宜人子三金體金和金繩唯一配袁孺人子四天行時行攸行中行庚戌歲金體介陳天若求銘余未及為後七年天行介李杲堂求銘余倣葉水心併志陳同父王道父之例以志兩先生同父道父猶有顯晦之别若兩先生則屈賈李杜之同傳兩家子弟刻於墓以信德之不孤也銘曰不有死者無以見道之界不有生者無以見道之大賢生賢死返之心而無害
