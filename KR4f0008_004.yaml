body:
  text: 姚江黃宗羲著答錢牧齋先生流變三疊問問長水注楞嚴九變三疊所謂進動算位一橫二𥪡一𥪡二橫者未知其義又徐嶽所謂橫板為九道五道及𥪡以為柱為位者與長水橫𥪡進動都相合否幸為剖析源流詳明示之楞嚴經曰四數必明與世相涉三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百疏云三變之義古今多解今所解者不加别法以變其義只將今文過現未來進動算位便成千二百功德如第一位三世四方宛轉十二便成一疊算位即是一橫二𥪡已成過去第二即變過去一世以為現在進動算位一𥪡二橫成百二十為第二疊又即變現在世以為未來進動算位一橫二𥪡成一千二百為第三疊能變之法既唯三世所變之法亦止千二百故無增減臥算為年立算為日臥算者長水之所謂橫也立算者長水之所謂監也第一疊三世四方乘之得十二若依算家乘法則第二疊當得一百四十四第三疊當得二萬七百三十六今不肰者則經文流變以第一疊為凖第二疊變一為十變十為百第三疊變十為百變百為千而巳故曰變不曰乘也答劉伯繩問律呂癸卯漢志曰黃鐘為宮則太簇姑洗林鐘南呂皆以正聲應無有忽微不復與他律為役者同心一統之義也非黃鐘而它律雖當其月自宮者則其應和之律有空積忽微不得其正此黃鐘至家諱無與並也問朱子著此條在變律下蔡元定著此條在八十四聲圖下有異同否十二律旋相為宮其下所應之聲即謂之役凡受役者其律必短於主律主律即為宮之律也黃鐘長九寸長之至也故當其為宮之時所應六律皆短於黃鐘故用正聲而不用半聲及㽔賔大呂夷則夾鐘無射仲呂六者為宮之時七聲不備則黃鐘不得不受役而黃鍾實長於諸律故不得不有變律變律又長故不得不用變律之半所謂不與他律為役也朱子著在變律者以明律不得不變之故蔡元定著在八十四聲者以明十一月黃鐘宮下無他律之聲其義一也然班孟堅之意則不然黃鐘正律雖長其半律甚短則㽔賔以下獨不可用乎安見黃鐘之不為他律役也蓋十二律之實其零分皆偶獨黃鐘十七萬七千一百四十七為竒半之則八萬八千五百七十三餘一餘一不可半也是黃鐘有正聲而無半聲既無半聲可用此黃鐘之不役於他律也若止以管長不受役為言於義有所未盡矣問空積忽微蔡元定謂黃鐘為宮所用七聲皆正律無空積忽微自林鐘而下則有半聲自㽔賔而下則有變律皆有空積忽微不得其正蓋以半聲變律竒零不齊便謂之忽微也肰亦非班氏之意所謂空積者空圍所容之積實也管長一分圍容九分故每寸八十一分班氏謂黃鐘為宮則太簇姑洗林鐘南呂無有忽微蓋班氏十二宮止五聲而厺變宮變徴黃鐘長九寸積七百二十九分新書積八百一十分蓋分九為十其實一也太族長八寸積六百四十八分姑洗長七寸一分積五百七十六分林鐘長六寸積四百八十六分南呂長五寸三分積四百三十二分故空積無忽微也至應鐘長四寸六分六釐其四寸六分之積三百七十八分其六釐之積便竒零而為忽微矣以下皆然故他律為宮皆有忽微也若加二變為七聲則黃鐘之用及於應鐘㽔賔雖黃鐘為宮其空積亦未嘗無忽微也蔡氏未之審而妄引班氏以證巳説非也問史記生鐘術曰上九商八羽七角六宮五徵九置一而九三之以為法實如法得一凡得九寸命曰黃鐘之宮故曰音始於宮窮於角數始於一終於十成於三氣始於冬至周而復生按索隱以商八羽七角六宮五徴九為數錯邢雲路云即是上文聲律數太族八寸為商姑洗七寸為羽林鐘六寸為角南呂五寸為徵黃鐘九寸為宮其曰宮五徴九誤字也愚意以為羽一徵二角三商四宮五者其大小之序而商八羽七角六宮五徴九者其相生之序也角宜生徵五徵宜生宮九雲路謂誤字者是也置一而九三之者置子一而三之為丑再三之為卯二十七如是者九為酉之一萬九千六百八十三乃寸法也實者十二律之實在新書第四滿寸法得一寸黃鐘之實十七萬七千一百四十七凡為一萬九千六百八十三者九故得九寸他律不滿寸法之實則以分法釐法毫法絲法收之問上下相生以仲呂謂變律耶正律耶通典相生為十二變律變律又為十二半律合之於正凡四十八聲也蔡氏以旋宮至仲呂而止仲呂之七聲既備則其下無所用故變律止於應鐘雖日應鐘之實以三分之又不盡一算數不可行此就蔡氏自立之法言之其實應鐘以下皆有變律也問五聲二變與變律先後次序蔡氏五聲二變次變律之後朱子則先七聲而後變律愚意以變即正之參差不齊者正變一時俱有非借變以通正之窮若變律居七聲之後非自然之法象矣問新書日律當變者有六置一而六三之得七百二十九置一而六三之者置子一而三之為丑又三之為寅九如是以至於午得七百二十九其為三之者凡六此史遷置一而九三之之例變聲章置一而兩三之得九亦同也其言律當變者有六故三之凡六則未必肰蓋蔡氏之用變律雖止於六其實變律有十二也肰置一六三之法亦所不必仍照正律之法四其實以生黃鐘變律倍其實以生林鐘乃為當耳問應鐘變律之實九萬二千五十六何以又云六千七百一十萬八千八百六十四也未曾以七百二十九歸之則為下數置下數以七百二十九為一算則得上數也所餘四十為小分問變律變聲之説見於國語變律則京房以仲呂生執始演為六十律公孫崇則上役黃鐘其説皆未甚協惟杜佑為當肰杜佑之變十二蔡元定之變六變律之中又有二説也其實古之旋宮止於五聲自夷則而下為宮者即用正律之半禮運之疏更無變律答張爾公論茅鹿門批評八家書鹿門八家之選其旨大略本之荆川道思然其圈點勾抹多不得要領故有腠理脈絡處不標出而圈點漫施之字句之間者與世俗差強不遠至其批評謬處姑舉一二如昌黎張中丞傳後序云不載雷萬春事首尾與南霽雲乞救賀蘭兩不相蒙而鹿門以為雷萬春疑當作南霽雲若乞救之事照應此句以補李翰之不載則非矣曹成王碑以其穿鑿生割為昌黎之務去陳言豈昌黎之文從字順者猶有陳言之未去乎蓋不知昌黎之所謂陳言者庸俗之議論也豈在字句哉羅池廟碑謂其不載柳州德政載其死而為神一節似狎而少莊按碑中所載民業有經以下德政可謂至矣豈必如俗文之件繫毛舉然後謂之莊耶孔司勛志前夫人從葬舅姑兆次卜人曰今兹歲未可以袝從卜人言不袝鹿門云按附志前夫人所以不及袝葬舅姑兆次之故而不詳與司勛合葬處不可曉志言前夫人巳袝葬舅姑兆次今欲遷葬與司勛合而卜人不可故不合葬本自明曉不知鹿門如何讀也孟貞曜志愈走位哭且召張籍會哭諸嘗與往來者咸來哭弔韓氏按檀弓伯高之赴孔子曰夫由賜也見我吾哭諸賜氏遂命子貢為之主故東野之喪昌黎立位於家其嘗與往來者哭弔於韓氏也鹿門云韓氏不知何人豈不知此禮耶柳州眨後諸書鹿門謂蘇子瞻安置海外時詩文殊自曠逹蓋由子瞻深悟禪宗故獨超脫較子厚相隔數倍蓋子瞻之謪為姦邪所忌而子厚之謫人且目之為姦邪心事不白出語悽愴其所處與子瞻異也若論禪宗子厚未必讓於子瞻耳與顧十郎書子厚為顧少連所取士十郎乃少連子也於座主之門故稱門生書中顯贈策諡揚于天官敷于天下巳明言少連之死而鹿門云其書似非對座主之言是尚疑十郎為座主也歐公謂正統有時而絶此是確論鹿門特以為統之在天下未嘗絶也如此必增多少附會正統之説所以愈不明也鹿門謂江鄰幾文不傳當非其文之至者而歐陽公序之只道其故舊凋落之意隱肰可見按序中言其學問通博文辭雅正深粹而論議多所發明詩尤淸淡間肆可喜許之亦云至矣如尹師魯之文歐公只稱簡而有法亦可云非其文之至者乎薛簡肅初舉進士為州第一讓其里人王嚴而居其次鹿門云宋制舉進士何以得讓宋制解試雖有主文考校然尚有鄉舉里選之意故得自相推讓凡舉子皆謂之進士其中殿試者謂之及第出身鹿門不知宋制而以今制賜進士者當之故有此疑蘇子美志其妻於文集則曰吾夫屈於生猶可伸於死於葬則曰吾夫屈於人間猶可伸於地下皆有著落句同而意異鹿門云迭此二句歐公稚筆而少遒處不如仍前二句且綴之日死而非歐君者銘其墓則無以慰其生之交也信如此則俗筆套語矣張谷墓表歷官河南主簿蘇州觀察推官開封府士曹參軍遷著作佐郎知陽武縣通判眉州纍遷屯田員外郎復知陽武縣鹿門云宋制以觀察推官徙參軍而知陽武縣又以通判眉州人為員外郎而復知陽武可見當時重令職如此按宋制未改京朝官謂之縣令巳改京朝官方謂之知其縣張谷初知陽武其京朝官是著作佐郎再知陽武其京朝官是屯田員外郎知縣雖同而京朝官之崇畢則異俱未嘗入朝也鹿門不明宋制耳孫之翰志初舉進士天聖五年得同學究出身八年再舉進士及第鹿門云宋舉進士者再按之翰初舉進士不及第再舉方得及第未嘗再也學究出身非進士之第耳荆公伯夷論以不食周粟為誣識力非流俗可及鹿門云論伯夷處未是千年隻眼彼之雷同子長者豈皆隻眼乎至其去取之間大文當入小文可去者尚不勝數也觀荆川與鹿門論文書底藴巳自和盤托出而鹿門一生僅得其轉折波瀾而巳所謂精神不可磨滅者未之有得緣鹿門但學文章於經史之功甚疏故只小小結果其批評又何足道乎不知者遂與荆州道思並稱非其本色矣答陳士業論孔子生卒書宋景濂作孔子生卒歲月辨其生主公羊榖梁氏在襄公二十一年巳酉十月庚子即今十月二十一日也其卒主左氏在哀公十六年壬戌四月乙丑即今四月十八日也以為三家厺孔子甚近漢以後之儒無後焉言甚核而辨肰以某考之則又不能無疑者左氏哀公十有六年夏四月巳丑孔丘卒此出於門弟子所書歲月無可復疑矣由是而上推至襄公二十二年庚戌為七十三歲孔子之年七十三不特見於史記家語之終記日寢疾七日而終時年七十三矣杜預左注亦云七十三孔子家譜祖庭記無不皆然使七十三之年而信則孔子之生年其在庚戌亦可無疑也公榖二家之説豈能盡抹諸家乎公穀之謂二十一年者安知非周靈王二十一年誤書為襄乎蓋襄二十二年即周靈王之二十一年也至於生之月日左傳無文榖梁氏則書冬十月庚子孔子生公羊氏則書十有一月庚子孔子生陸德明釋公羊云庚子孔子生傳文上有十月庚辰此亦十月也一本作十一月庚子又本無此句蓋經文庚辰朔則庚子在二十一日若十一月則巳酉朔其距庚子五十有二日十一月無庚子則知有此句者之為誤本也某以曆法推之襄二十一年中積六十六萬九千一百二十七日五十五刻冬至四十七日五二四閏餘二十五日七三四六其年有閏故子月甲寅朔丑月甲申朔寅月癸丑朔卯月癸未朔辰月壬子朔巳月壬午朔午月辛亥朔未月辛巳朔申月庚戌朔酉月庚辰朔戌月巳酉朔亥月巳卯朔襄二十二年中積六十六萬八千七百六十二日三十一刻冬至五十二日七四四九閏餘七日七一子月巳酉朔丑月戊寅朔寅月戊申朔卯月丁丑朔長月丁未朔巳月丙子朔午月丙午朔未月乙亥朔申月乙巳朔酉月甲戌朔戌月甲辰朔亥月癸酉朔若不從公榖以家語史記為凖則孔子之生在二十二年酉月自甲戌推至庚子為二十七日故羅泌以為八月二十七日是也景濓謂三代雖異建而月未嘗改其按襄二十一年經文九月庚戌朔日有食之冬十月庚辰朔日有食之夫九月庚戌朔者建申之月也十月庚辰朔者建酉之月也若周不改月則九月為巳酉朔十月為巳卯朔而庚戌庚長為七月八月之朔是與經文大悖矣景濓能不信諸經乎家語史記載孔子弟子年歲皆以孔子為的若孔子不生庚戌則弟子之年無一足慿矣如顔子少孔子三十歲二十九而髮白三十二而死是顔子死時孔子年六十二也哀公六年吳伐陳楚救陳孔子絶糧猶有顔子問答計顔子即卒於是年蓋自襄二十二年至哀六年孔子六十二歲也若生於襄二十一年則孔子六十三矣顔子少三十歲及三十二而死皆不可信也故景濓欲伸公榖則必盡廢諸家無乃過歟答劉伯宗問朱子壺説書投壼經言壼頸修七寸腹修五寸口徑二寸半容斗五升鄭注腹容斗五升三分益一則為二斗積三百二十四寸算法方一寸高十六寸二分為一升方一寸高一百六十二寸為一斗故二斗得積三百二十四寸以腹修五寸約之所得五寸約之者於五寸之中截其一寸取三百二十四寸之積五分之其一分得積六十四寸八分求其圜周得二尺七寸有竒是為腹徑九寸有餘也以圜求方須三分加一六十四寸八分分為三分每一分有二十一寸六分加一分于六十四寸八分之中共八十六寸四分是一寸方積之數以方積開之九九八十一則一面有九寸強四面凡有三十六寸強又以方求圓四分去一是為圜周二尺七寸有竒圍三則徑一故腹徑九寸有餘也按鄭氏此説皆整數二斗之積也肰以二斗之積四分去一則與經文斗五升合矣故朱子欲去二斗虛加之數是也其實斗五升之積為二百四十三寸以腹修五寸約之五取一焉得四十八寸六分即圜積也圜積求徑三歸四因開方之是為腹徑八寸四釐有竒圓積求周十二因開方之是為圜周二尺四寸一分四釐有竒若鄭氏三分益一以為二斗方積六十四寸八分既有虛加之數則當用圓田法即以六十四寸八分者開方之徑得八寸四釐竒三因於徑周得二尺四寸一四亦如前法朱子以積求徑之法謂廣六十四寸八分此六十四寸者自為正方又取其八分者割裂而加於正方之外則四面各得二釐五毫之數徑為八寸五釐此則朱子不明算法而不自知其誤也夫正方六十四寸則一面得八寸試割二分加之每寸得二釐五毫四靣皆然則八分者無餘矣而四角各缺方二釐五毫將何以補之哉故開方之術中間正方謂之方法正方之外割裂而答汪魏美問濟洞兩宗爭端書大鑑之後為南嶽靑原南嶽傳馬祖馬祖傳百丈百丈傳溈山此溈仰宗所由起也百丈又傳黃檗黃檗傳臨濟此臨濟宗所由起也靑原傳石頭石頭傳藥山藥山傳雲巖雲巖傳洞山此曹洞宗所由起也石頭又傳天皇天皇傳龍潭龍潭傳德山德山傳雪峰雪峰傳雲門此雲門宗所由起也雪峰又傳玄沙玄沙傳羅漢羅漢傳法眼此法眼宗所由起也故五家宗派出自南嶽者二出自靑原者三今溈仰雲門法眼三宗俱絶存者惟臨濟曹洞耳近濟宗依五燈會元附注謂有兩天皇道悟石頭所傳者之天皇不再傳而絶其出為雲門法眼之天皇則馬祖所傳者於是南嶽得四宗靑原僅一宗以此而分優劣至兩家聚訟不已弟常謂昔之學佛者自立門戶者也今之學佛者倚傍門戶者也自立門戶者如子孫不藉先人之業赤手可以起家倚傍門戶者如奴僕占風望氣必較量主者之炎涼雲門法眼其宗既絶猶過去之高門巨族也吹已冷之𦦨為掃室布席之光則郭崇韜哭子儀之墓又何怪乎故兩家是非不必為之辨苐兩家辨詞可為嗢噱會元附注以丘玄素天王碑證雲法二宗出於南嶽以符載天皇碑證靑原之天皇一傳而絶洞家指為偽碑以為玄素使相何得姓名不見唐史疑為烏有按歐陽公集古録跋尾神女廟詩李吉甫丘玄素李貽孫敬騫作佛者空疏之腹豈可妄談載籍符載碑文載在贊寧高僧傳中其末云比丘慧真文賁等禪子幽間皆入室得悟之者或繼坐道場或分枝化導所謂禪子幽間者即指慧真文賁等而言言其情性幽間也附注改為法嗣三人曰慧真曰文賁曰幽間以贊辭扭作人名何不將原本一讀耶權文公馬祖道一塔銘見文苑英華中後列沙門慧海智藏鎬英志賢智通道悟懷睴惟寬智廣崇泰惠雲等洞家疑附注引此為虛誕之辭信如此言不知在唐還有權德輿否黃元公因丘碑所載節使拋水事與南泉下曇照雷同疑碑為好事者所撰然碑文詳而會元首尾脫落是會元襲碑文非碑文襲會元也總之釋氏譸張為幻火發火息碑文又寧足信乎答朱康流論歷代甲子書按歷代甲子自魯隱公元年己未以下載籍皆可考據無有異同乃自隱公以上其説不能歸一然凖之曆算如武王克商周公營洛成王顧命三者得其時日則是非不難辨矣故授時伐紂以至春秋一從漢志漢志魯世家魯公伯禽四十六年考公四年煬公六十年幽公十四年微史記作魏公五十年厲公三十七年獻公五十年慎公三十年武公二年懿公九年柏御十一年孝公二十七年惠公四十六年凡伯禽至惠公三百八十六年伯禽以成王元年癸巳歲即位至康王十六年戊寅歲薨惠公以平王三年癸酉歲即位至平王四十八年戊午歲薨中間所歷甲子自第二十八而上羸三十一歲自第三十三而下縮五歲由成王上推周公攝政七年武王克殷後七年而崩故伐紂之歲斷以為巳卯也而史記魯世家伯禽四十六年考公四年煬公六年幽公十四年魏公五十年厲公三十七年獻公三十二年真公三十年武公九年懿公九年伯御十一年孝公二十七年惠公四十六年凡三百二十一年較漢志差六十五年以惠公末年戊午上推戊午當平王四十八年則伯禽元年在第二十八甲子下戊戌歲也戊戌為成王元年由成王上推周公攝政七年封禪書曰武王克殷二年天下未寧而崩崩在庚寅歲故伐紂之年為戊子也如此則銷􅮖一甲子第二十八即第二十七矣竹書紀年成王丁酉歲即位在位三十七年康王二十六年昭王十九年穆王五十五年共王十二年懿王二十五年孝王九年夷王八年厲王二十六年宣王四十六年幽王十一年平王四十八年惠公卒凡三百二十二年與史記魯世家先一年以伐紂在庚寅較史記後二年此記事稍有參差其甲子大略相同也黃石亝先生主張史記以為武王克殷戊子歲用授時四分校之戊子歲周正月癸卯合朔甲寅冬至以某按之又未必然武成惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商既戊午師逾孟津癸亥陳于商郊甲子昧爽會于牧野泰誓又曰一月戊午師渡孟津左氏外傳曰王以二月癸亥夜陳未畢而雨據石亝以癸卯為正月朔則壬辰癸巳為前月十九二十日矣經何以言一月也癸卯朔則癸亥為月內之二十一日矣外傳何以言二月也信漢志不如信史記信史記又不如信經文也石亝又以月旁死魄在望後生魄在望前謂壬辰是十六日非朔二日夫經言壬辰是一月又言戊午亦一月壬辰與戊午相距二十七日若旁死魄在望後是月寧復有戊午哉又武成厥四月哉生明王來自商至于豐丁未祀于周廟越三日庚戌柴望大告武成既生魄庶邦冡君暨百工受命于周觀其序生魄于生明之後則生魄之為望後明矣生魄既在望後則死魄之為望前亦明矣若以授時步戊子歲距至元辛巳二千三百三十三年中積八十五萬二千一百一十四日八千五百二十四分冬至甲子經朔癸丑與石亝所言無一合者則武王伐紂之必非戊子也當從班氏以巳卯為凖而後春秋以上之時日始可得耳第一甲子黃帝元年第二甲子黃帝六十一年第三甲子少昊二十一年第四甲子少昊八十一年第五甲子顓頊五十七年第六甲子帝嚳二十九年第七甲子帝堯二十一年第八甲子帝舜九年第九甲子夏禹八年第十甲子仲康三年第十一甲子寒浞十五年第十二甲子帝槐四年第十三甲子帝不降四年第十四甲子帝扃五年第十五甲子孔甲二十三年第十六甲子桀二十二年第十七甲子太甲十七年第十八甲子太庚十五年第十九甲子太戊二十一年第二十甲子仲丁六年第二十一甲子祖辛十年第二十二甲子祖丁二十九年第二十三甲子盤庚二十五年第二十四甲子武丁八年第二十五甲子祖甲二年第二十六甲子武乙二年第二十七甲子紂十八年第二十八甲子康王二年第二十九甲子昭王三十六年第三十甲子穆王四十五年第三十一甲子孝王十三年第三十二甲子共王五年第三十三甲子幽王五年第三十四甲子桓王三年第三十五甲子惠王二十年第三十六甲子定王十年第三十七甲子景王八年第三十八甲子敬王四十三年第三十九甲子威烈王九年第四十甲子顯王十二年第四十一甲子赧王十八年第四十二甲子秦始皇十年第四十三甲子漢文帝三年第四十四甲子武帝元狩六年第四十五甲子宣帝五鳳元年第四十六甲子平帝元始四年第四十七甲子明帝永平七年第四十八甲子安帝延光三年第四十九甲子靈帝中平元年第五十甲子蜀后主延熙七年第五十一甲子晉惠帝永興元年第五十二甲子哀帝興寧二年第五十三甲子宋文帝元嘉元年第五十四甲子齊武帝永明二年第五十五甲子梁武帝大同十年第五十六甲子隨文帝仁壽四年第五十七甲子唐高宗麟德元年第五十八甲子玄宗開元十二年第五十九甲子德宗興元元年第六十甲子武宗會昌四年第六十一甲子昭宗天祐元年第六十二甲子宋太祖乾德二年第六十三甲子仁宗天聖二年第六十四甲子神宗元豐七年第六十五甲子高宗紹興十四年第六十六甲子寧宗嘉泰四年第六十七甲子理宗景定五年授時以元至元十七年庚辰歲冬至為曆元若上考自曆元至此甲子積一十七年第六十八甲子元泰定元年下驗自曆元至此甲子積四十四年第六十九甲子明洪武十七年第七十甲子正統九年第七十一甲子弘治十七年第七十二甲子嘉靖四十三年第七十三甲子天啓四年答范國雯問喻春山律曆戊午示楚郴喻春山書其言誇大自來儒者無不譏彈而自以律曆為絶學謂帝王曆數真傳夫律曆固儒者之能事以司馬子長之學尚曰文史星曆近乎卜祝之間春山而茍能發前人所未發亦不必張皇如是皇甫持正言風教偷薄詩未有劉長卿一句巳呼阮籍為老兵矣筆語未有駱賔王一字巳罵宋玉為罪人矣至於近日妄子以罵相高廟庭諳子直叱姓名等之僕隸阮籍宋玉何敢望罵春山不幸而類是夫既而反覆其書則不免為東告東方朔西告西方朔之談矣按復臨泰大壯夬乾姤遁否觀剝坤十二卦名為辟卦以配十二月始於漢之京房然未嘗以之言律呂也明李文利主黃鐘三寸九分之説其十二月律呂卦氣圖始用辟卦配之然未嘗用其陽九陰六之數以為律管之長短春山見十一月復卦其陰陽之數偶與三寸九分相合遂將各卦陰陽之數一例配去以為律管之長短出于是姑無論其他如十一月復卦與九月剝卦同長一陽五陰則黃鐘無射同是三寸九分十二月臨卦與八月觀卦同是二陽四陰則大呂南呂同是四寸二分正月泰卦與七月否卦同是三陰三陽則太簇夷則同是四寸五分二月大壯與六月遁卦同是二陰四陽則夾鐘林鐘同是四寸八分三月夬卦與五月姤卦同是一陰五陽則姑洗𬎼賔同是五寸一分合四月乾之仲呂五寸四分十月坤之應鐘三寸六分只有七律更無十二律且同是三寸九分何以知其為黃鐘為無射耶同是四寸二分何以知其為大呂為南呂耶同是四寸五分何以知其為太簇為夷則耶同是四寸八分何以知其為夾鐘為林鐘耶同是五寸一分何以知其為姑洗為𬎼賔耶豈律呂之長短只佐𥿄上間談無與於聲音之用耶此等即村伶知其不可而欲與蔡元定爭是非乎春山又以十二辟卦分晝夜之長短晝十二卦夜十二卦建子晝復夜姤建丑晝臨夜遁建寅晝泰夜否建卯晝壯夜觀建辰晝夬夜剝建巳畫乾夜坤建午晝姤夜復建未晝遁夜臨建申晝否夜泰建酉晝觀夜壯建戌晝剝夜夬建亥晝坤夜乾以一晝為一時晝夜綳定各六時陽畫一時得九刻陰畫一時得六刻以為刻有長短時無遷移也夫晝夜之分分於日之出入也日行天上在寅位為寅時在卯位為卯時在辰在巳在午在未在申在酉皆然信如春山之説將日遇陽畫而行遲遇陰畫而行疾乎抑行無遲疾陽畫則在未亦可謂之午陰畫則在午亦可謂之未乎午者晝之中也子者夜之中也春川以寅至未六時為晝申至丑六時為夜則晝之中在辰巳之交夜之中在戌亥之交而午當桑榆之影子當雞鳴之候矣晝之上半下半夜之上半下半必相等也值泰卦則上半二十七刻下半一十八刻值否卦則上半一十八刻下半二十七刻相去三分之一果天行而如此孰不驚駭乎且日之短夜之長極於子月子月晝三十九刻夜五十一刻亥月晝三十六刻夜五十四刻日之永夜之短極於午月午月晝五十一刻夜三十九刻巳月晝五十四刻夜三十六刻是日之長至短至無不倒置也以卦畫定晝夜長短必不可通矣堯之建寅於堯典見之經文彰明不比他書可以附會於仲春曰日中其為春分無疑也於仲夏曰日永其為長至無疑也於仲秋曰宵中其為秋分無疑也於仲冬曰日短其為南至無疑也春山假妄之談謂堯建丑仲春是寅月仲秋是申月日中宵中非晝夜分寅之辟卦為泰申之辟卦為否其陰陽分於上下也仲夏是巳月日永非夏至日長巳之辟卦為乾律管長也仲冬是亥月日短非冬至日短亥之辟卦為坤律管短也舍明明可據之天象附會漢儒所不敢附會者亦心勞而術拙矣鳥火虗昴四星之昏見南方者此是曆家測天要術後來歲差皆驗於此春山未嘗學曆遂言為寅申巳亥月望所次之舍彼妄言之以為數千年之上無人可以對會不知明曆者把算歷然堯時春分日躔在昴入於酉地則星宿當午夏至日躔在星入於酉地則房心當午秋分日躔在房入於酉地則虗宿當午冬至日躔在虗入於酉地則昴宿當午堯典之分四仲纖毫不爽自堯至今巳退將五十度分至之日躔既變中星亦從而變春分日在壁昏之當午者為井矣夏至日在參昏之當午者為角矣秋分日在翼昏之當午者為斗矣冬至日在箕昏之當午者為室矣是故有歲差而後見天地之變化若萬古如斯田僮街卒俱可談天矣春山謂寅巳申亥之月望夜觀月實次鳥火虗昴四星故於堯典卯午酉子月之中星與之相符不難改中星為月度四仲為四孟以譏歲差不知堯時寅月望夜日在奎月離於角未嘗次鳥也巳月望夜日在井月離於斗未嘗次火也申月望夜日在軫月離於壁未嘗次虗也亥月望夜日在箕月離於參未嘗次昴也就如其言改中星為月度四仲為四孟亦無一合也月令者呂氏春秋十二紀之首後人刪合為之鄭氏云其中官名時事多不合周法故以為秦曆也以寅為歲首觀其下文自明不容更生别解而春山妄為周公建子之書其奈七十二候不可抹摋則改置仲冬之候於孟春之下季冬之候於仲春之下次第改盡遷就巳意以張公之帽冒李公之首至以春夏秋冬之月解作星月之月日在某宿為上弦昏中為望旦中為下弦矯強不顧文理未有甚於此者也蓋中星以日躔為主日在酉地某宿則中星隔三宮而東日在卯位某宿則中星隔三宮而西漢三統曆與秦曆相近三統建寅云正月中日在室十四度二月節日在奎五度三月節日在胃七度四月節日在畢上二度五月五日在井十六度六月節日在柳九度七月中日在翼十五度八月中日在角十度九月中日在房五度十月節日在尾十度大雪日在斗十二度小寒日在婺女八度此與秦曆無毫髮之異豈三統亦建子乎漢冬至日在牛初度今冬至日在箕三度日躔巳退三十餘度則中星亦退三十餘度矣姑就春山之言以周桓王三年甲子丑月算之上弦日躔婺女二度是時月距日九十度應離於胃望日躔婺女九度是時月距日一百八十度應離於張下弦日躔虗五度是時月距日二百七十度應離於氐則春山謂丑月上弦月在奎望在井下弦在斗者無一合也舉此一月餘月可類推其謬矣月每日平行十三度三十六分八十七秒半弦䇿七日三十八刻二十六分四十八秒以平行乘弦䇿得九十八度六十九分六十八秒故自上弦至望自望至下弦月之行度皆以九十八度零為凖是三宮有餘也姑以孟春首條言之營室至參不及三宮參至尾五宮有餘同一弦䇿其行度安得相懸如此亦舉此月以類餘月春山之妄直不滿明者之一笑也答萬充宗質疑書壬子讀質疑二篇吾兄經術繭絲牛毛用心如此不僅當今無與絶塵即在先儒亦豈易得誠不意欵學寡聞之夫得相抵掌聊述所聞以廣來意兄疑今之二十四氣以配周正則相戾而不合此二十四名者古之所無是也蓋今之二十四氣所以綳定七十二候故每氣三候然就而論之自二至二分四立之外十有六氣之名義固無殊於七十二候是以比肩者而加乎其上也不可明矣左氏曰凡分至啓閉必書雲物使十六者與分至啓閉同列則必書十六者之雲物矣不應左氏獨遺之也此古者無二十四名之一證也即古之啓閉亦只以朔日為斷不更於朔日之外别有四立之名何以明之左氏外傳曰先時九日太史告稷曰自今至於初吉陽氣俱蒸土膏其動弗震弗渝脈其滿青穀乃不殖按先時注云先立春日也初吉朔日也自今至於初吉自先時至於立春也則初吉之為立春明矣以上文農祥晨正日月底於天廟言之則是寅月之朔日皆謂之立春也若另有立春之日則當言自今至於立春矣不應竟以初吉言也舉春而夏秋冬一例也是時各國皆有私曆其法不一管子三卯三暑三寒之令齊曆也呂氏春秋月令未行之秦曆也汲冡周書時訓解魏曆也雜然見於傳記不知者遂以為周時所通行耳兄言周之分至未嘗繫之以時獨大司樂有冬日至夏日至之名而疑周官之為偽書是也偽周官者先儒多有之林孝存以為未世瀆亂不驗之書何休以為六國陰謀之書然未有得其左證明顯如兄所言者即如古文尚書人多疑其偽吳草廬歸震川駁之不遺餘力然終鶻突定案向講尚書至湯誥凡我造邦無從匪彝無即幍淫各守爾典以承天休而見於國語文武之教凡我造國無從匪彝無即幍淫各守爾典以承天休始知其誤襲周制以為湯誥也今因推日食於昭十七年六月祝史請幣季平子曰唯正月朔慝未作日有食之於是乎伐鼓用幣禮也其餘則否太史日在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書日辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月謂之孟夏杜注夏書為逸書古文尚書㣧征有曰乃季秋月朔辰弗集於房瞽奏鼓晉夫馳庶人走羲和尸厥官罔聞知夫季秋夏之九月也而太史以之證夏四月之日食可見夏書本文不同孔書左氏而非偽也則不能不致疑於古文矣此二證恨不使草廬震川見之兄之疑周禮者亦恨不使林孝存何休見之也春秋失閏之論弟有日食曆明之俟晤時請正此不更具也答鄭禹梅修家譜雜問丁巳兵部主事刑部主事是宋世職名否按宋官制六部自尚書以下止有侍郎郎中員外郎三項其有主事之名與録事今史書令史守當官皆吏也而非官凡三省樞密皆有之不特六部也元朝官制有揚州知府杭州知府等名否元官制諸路設總管府逹魯花赤之下為總管總管之下為同知治中判官散府則逹魯花赤之下置知府或府尹揚州杭州皆為上路則有總管而無知府今紹興杭州多有總管廟皆是昔守郡者之生祠也若於二府稱知府則是後人妄加給事章僑學士曾彥祭酒羅璟員外夏寶知州萬韞輝教諭江振甘燧賈進主事張庠郎中王應奎修撰習嘉言大理寺少卿李奎譜中皆有文章其人可考否據所知者章僑字處仁蘭溪人正德丁丑進士官至布政使曾彥字士美泰和人成化戊戌進士第一歷侍讀羅璟字明仲南城人憲孝間名臣習嘉言名經以字行新喻人成祖初選庶吉士嘉言其一也官至詹事亦名臣李奎弋陽人永樂辛卯鄉舉正統間至大理少卿餘俟再考浙東四明之鄭其著姓始於何時何人四眀鄭氏見於宋史者唯鄭覃為靖康間人死節於金兵入忠義傳淸之其孫也其始則不可考凡東浙人物在唐書為甚略不知何故也灌浦之鄭云出自􅌘縣鄭侍郎幼倫之後不知宋史神宗時有其人否鄭幼倫不見宋史或其人無關史事不能以一侍郎附見然在嵊縣志中不宜見遺今亦無有而唐宰相世系表序鄭氏有南北祖鄭曄為北祖曄生茂茂生七子號七房鄭氏其季名鄭幼麟後魏時人得無作譜之人因其源流出此而誤為宋誤為􅌘耶南雷文案卷四終吾悔集卷之四南雷續文案孫男千頃千卷千子千門較李杲堂先生墓志銘文章不特與時高下亦有地氣限之明越兩郡其地密邇同一風氣明初楊鐡崖戴九靈戴寓明州為文學宗老唐丹崖謝元功趙謙比肩而作宋無逸鄭千子皆楊門弟子其時師友講習炳然阡陌一時號為極盛凌夷正嘉而後競起邪宗孫文恪輸心於槐野余君房瓣香於子威赤水月峯踈密不同而文勝理消謂論語為孔子之文選耳苟肆狂狷無所取裁陳後岡徐文長雖畢趨時風衆勢無以發伏鱉之雄氣即如陽明之文韓歐不足多者而謂文與道二溝而出諸文苑是故兩郡作者敝精神乎蹇淺由來矣先生初亦不避輕華其後每得余作往往嗟悒因相與校覆雅鄭洗其偷薄之説推原道藝之一先生不以余空隙一介之知而忽之也自此轉手大放厥辭同里稍稍響應翻然於不迪於是東浙始得古文正路而由之四境之內凡有事於文章者非先生無以訖意轉相求請充牣昔席方外詩人得先生一言便可坐高聲價欵門雲水疲於應接里中有鑑湖社倣場屋之例糊名易書以先生為主考甲乙樓上少長畢集樓下候之一聯被賞門士臚傳其人拊掌大喜如加十賫明州自東沙好文下士主張藝林士無不捧珠盤而至者然其氣力足以鼓動不盡關著作先生以布衣幾與之頡頏而肺疾為梗流放家門海內知之者尚未滿其量也先生諱文胤字鄴嗣今以字行别號杲堂宋忠襄李顯忠之後世居淸澗忠襄曾孫守真始遷於鄞其下六世是為先生之高祖循義嘉靖癸未進士御史出守衡州曾祖生威舉於鄉官鳳陽府推官其孫即守貴州之巡撫橒也因贈兵部尚書祖德升永平衛經歷父棡崇禎丁丑進士禮部儀制司主事先生風骨不恆年十二三能詩即有秀句十六為諸生侍儀部官嶺外通人張孟奇深所歎異歸而時名方起直兵革之際睚眥觸死儀部下省獄先生亦驅至定海縳馬廄中七十日事得解儀部之喪從省至放聲一哭遂絶意人世穿竄草石與失職之徒萬悔菴徐霜臯高辰四諸君緣情綺靡音調凄涼先生雖不逃禪而酒痕墨迹多在僧寮野廟木陳悟留山曉天嶽皆結忘年之契四方勝流之至甬上者先生即匿迹甚深亦必停車披帷詩酒流連否則似垂槖而歸矣先生愍郡中文獻零落倣遺山中州集例以詩為經以傳為緯集甬上耆舊詩搜尋殘帙心力俱枯其布衣孤賤尤所惋結宛轉屬人則頓首丁寧使其感動奪之鼠塵績筐餳笛之下以發其光彩若片𥿄未出先生自比長吉之中表凜乎有不祥之懼焉書成立詩人之位祀以少牢聞者為之軒渠張司馬死故國先生葬其兩世楊侍御文瓚亦以連染死淺土十棺語溪曹廣葬之先生為歌詩記其事凡見聞所及美事先生不肯讓人先生尤長於麗語使當詞頭之任真足華國而以廟堂金石散為竹枝禪頌之音豈不可惜然宋景濂謂謝翶方鳳吳思齊皆工詩客浦陽浦陽之詩為之一變向若先生草率青雲苟非勞謙厄亦豈能一變甬東之風氣如三子哉生於天啓壬戌四月二日卒於康熙庚申十一月八日年五十九娶某氏子一人暾女六人長適萬斯備次適丘瑜次適沈紹雯次適林獬錦餘未行暾將以某年月日葬先生於某原與斯備來速銘銘曰文之美惡視道合離文以載道猶為二之聚之以學經史子集行之以法章句呼吸無情之辭外強中乾其神不傳優孟衣冠五者不備不可為文野人議璧稱好隨群此言余發以告先生先生曰然但苦三彭匠石郢人霜鍾應律先生之死吾無為質憲副鄭平子先生七十壽序辛亥鄭平子先生六十余為文壽之羡其蕭然自得隱居之樂今又十年令子禹梅書來復欲余言念此十年間先生既閟其聲光輕滅喧俗禹梅三入長安公車流冗灌浦書帶靜然四屋當世得氣之家方且文號儒宗武稱將表風騰波涌更相駘藉以先生之才亦何難請託郡邑借寵時賢陳同父所云有才之人則索手之徒踏一片間田地便可以飽食暖衣而長雄於一方一所先生不其然者蓋必有所甚痛於心寧懷琬琰以就煨塵不欲猖狂無妄之福以取矍相揚觶之辱余見今之亡國大夫大略三等或齷齪治生或丐貸諸侯或法乳濟洞要皆胸中擾擾不勝富貴利逹之想分牀同夢此曹豈復有性情先生視之如糞土也昔文山入燕王炎午作生祭文丞相文驛途水步山墻店壁所在粘之恐丞相之不死也宋室遺民此為最著然觀其吾汶稿再上參政姚牧菴書唯恐其不相容接是時牧菴分政江省而炎午纍形干請則是當路之交際炎午未常絶也豈其嚴於論人而恕於論巳哉士之報國各有分限炎午未便為失而先生絶匿名迹當路投分無所可不謂過乎馬碧梧七十汪復為賦十月之交碧梧曰某偷生而不願生祈死而未得死者也今之為壽夫豈先生所欲君子以為不然先生之年與常人不同淵明元嘉晉亡巳九年朱子猶書晉處士是典午一星之火寄之淵明之一身也年來汐杜諸君子汪魏美余若水萬履安沈睂生巢端明徐昭法閻古古皆確然免於疑論者相次絶算江湖憔悴星火之寄殆將無人非先生而誰乎灌浦故四明山之翠竭也梅子真嘗避地焉相傳至今猶在子真亦西漢之遺民耳先生採藥弄水之睱得無遇之而與之吊古傷今歟則先生之年正未可知也雖然先生終不得與臯羽韶父諸人比文章未墜必有英絶領袖之者禹梅傳其家學以氣節發為文章吐言天拔出於自然照爛卷軸砥藝苑之橫流余且苦其軒車不容巷門庭無子真之迹矣翁元鎧禪師語録序庚子征海之師望屋而食澤望於三溪口買潭上一園為太夫人避地之所余往來定省因得遊其左近山水去潭上二三里為向家同有菴半草半瓦土人呼為草菴時克歸住之風景幽間余與澤望數過之題詩壁間有墻下梅花五六樹庭前積雪兩三峯之句未幾澤望下世潭上園屬之他姓余之不至三溪蓋二十二年矣然自三溪來者莫不言正定菴有禪師説法緇素翕集甲於姚江辛酉余謝吊入四明重過草菴即所謂正定也四衆和悅威儀肅然禪師出而酬對冷汰於物不強聒以佛法出其語録讀之絶去枝蔓獨露真常視諸方東剽西剠拈綴成篇以就其聲價者方斯蔑如矣師之得此正非易易師參養拙稍有入處於是離楚行腳至金陵參覺浪至龍池參萬如至會稽參木陳至雪竇參石奇至大雄參玉林凡海內大宗師道價深重者無不咨決心要而後併當於嶾公途畏峯澀惡聲毒棒其井如薺方得有此成就古德於囚山苦竹之中得悟然後擔䔲褁糧遠訪師資以求印可近日宗門其悟從爐鞲中棑迮而出夫獨悟則無途轍從師則有門庭雖難易較然而根柢在志苟立志不堅自證者易忘排迮者助長均之有敝師求師之志堅忍如此宜其無所不可也嗟乎儒者好自標榜而足不出於百里目不接一勝友抱毛頭場屋之時文胸馳臆斷轉側於煙火血肉之間田兒竈婦且測其底裏聞師之風亦可以愧矣熊公雨殷行狀熊公諱汝霖字雨殷世居餘姚之天花街祖某父某公登崇禎辛未進士第授同安知縣為政不避強禦直行已意紅毛入寇公渡海敗之於下門考選戶科給事中辛巳江南荒疫人死且半米價四兩有餘轉運不至命給事中七人催督漕糧公當江南上江黽勉從事不使病民遼練正耗二百四十一萬石如期而集沿途見聞無不入告上以朝臣不足任使所用文武踰繩越契而左官外附之徒兢張空虛以邀榮路公以為破格不如循常聽聲不如採實武臣只用甲科行伍凡敘功御覽名色一切報罷會推大將亦須保舉事敗連坐舉主庶杜債帥之門又言時值艱難安危省括懸於督撫以臣裁量多不可以備倉卒也關督范志完事口舌而習調欺順撫潘永圖何所優長况當軍旅宣督江禹緒陽和兵譟風裁掃地宣撫李鑑忸􅏸小利不持士節保督侯恂凡偶近器鳳督馬士英嫗􅯭名勢秦撫蔡官治威恩淺薄襄藩陷而楚撫晏然南陽破而隕撫無恙𤾂撫黃配玄僅百里之才保撫楊進非鎖鑰之選臣非敢薄待天下士謂方今督撫盡皆非人大聲疾呼欲仗其內手捫心量力自陳耳力言孫傳庭不宜急戰不聽而敗京師戒嚴公分守齊化門隨時條陳四月之間三十餘疏皆切中機宜多所彈治上亦佳其敢言召對咨諏公言行間諸臣去彼數百里而軍不敢一望顔行大約南去則我隨其後北返則我出其前如厮隸之於貴官負弩前驅望塵靡及耳兵士一聞督戰便洶洶欲叛如此則將不能御兵何名為將督師不能用將何名督師興言及此督將之肉其足食乎巡按陳昌言奏淄川鄉官孫之獬夢關壯繆語之爾等安心城守我以神兵出戰遲明瞻像汗下如雨公言山東州縣十去七八而獨效靈一淄川壯繆正神而獨降夢一之獬此何為者乎之獬逆案中人士論棄之豈神偏鑒之乎為此言者不過欲借神異之説逹其姓名於御前以為異日然灰之地縣官從而和之奇矣按臣不加駁正而據以入告何異夢中説夢也竊謂淄川之夢琢城之守同一機關遠法王欽若之閉門誦經近類揚嗣昌之華嚴退蝗可怪也公於朝廷舉動失當知無不言言無不痛熊開元薑埰兩給事之獄蕺山全椒之去斷斷廷諍不肯但巳當時號為能諫者亦必揣摩宛轉以納其説而公之發言粗梗有敵以下所不堪受者有犯無隱蓋其天性然也止以降謫而去烈皇可謂之能容諫臣矣公言楊嗣昌負國尚未處分誰為嗣昌畫練餉之策驅中原百姓為盜者沈迅也誰為嗣昌運籌以三千守襄而賊以十七騎入城遂出逃者余爵也誰為嗣昌援引乙榜開府受事即敗者宋一鶴也情面賄賂斷送封疆二祖列宗之靈能無飮泣地下乎執政既苦其誚讓上以飮泣一語致怒降福建按察司照磨南渡起補原官轉吏科公言諸臣爭誇定策罔計復讐處堂未巳且為鬬穴始之武與文爭繼而文與文爭殿廷之上無人臣禮其言起阮大鋮也陰陽消長間不容髮寧博採廣搜求奇材於草澤胡執私違衆翻鐵案於丹書閣臣此舉無乃負先帝負皇上乎其言四鎮也一鎮之餉至六十萬勢必不供即倣古藩鎮法亦當在大河以北開屯設府永此帶礪曾堂奧之內而遽亦藩籬視之其言復厰衛也厰衛之害橫者借以樹威黠者因而牟利人人可為叛逆事事可作營求縉紳慘禍所不必言小民雞犬亦無寧日先帝十七年憂勤曾無失德止有厰衛一節未免府怨臣民新建每事持正其待同官嘗乏溫潤之色馬士英恨之使其門客朱統􅠳造作飛條跳梁大呌公言么髍小臣為誰驅除聽誰指使上章不由通政內外交通神叢互借飛章告密墨勑斜封端自此始可不嚴行詰究用杜將來又言先帝篤念宗藩而聞寇先逃誰死社稷先帝隆重武臣而叛降跋扈肩背相踵先帝委任勳臣而京營鋭卒徒為寇藉先帝旁寄內臣而開門延敵反在禁旅先帝不次用人而邉材督撫首施兩端超遷宰執羅拜賊庭思先朝之何以失即知今日之何以得九月出差陛辭言朝端之上議論日新宮府之間揣摩日熟自少宰樞二悉廢庭推四品監司竟晉詹端之席追贓定罪無煩司寇之章雖然睿斷之無私未免群情之共駭况乎蹊徑疊出謠諑繁興一人未用便目滿朝為黨人一官外遷輒訾當事為可殺市井狡獪耽耽得官呈身應募以備推創上變之用者環伺而待發逐客之令時聞翩翩之鄰未巳假然而隻手足戡禍亂群小可致太平即使驅除異巳别用同心吾輩自然退聽其奈緦緦報復切切更張置國恤於罔聞逞私圖而得志黃白充庭靑紫塞路打成一片富貴世界六朝佳麗復見今時昧郤晉宋梁陳後來一假公案也其時黃耳鼎陸朗方以例轉傾側孽臣歡嘵冡宰朗出餞公適邸抄傳至朗讀公疏一字一擊節及至一官外遷二語聲忽中止相對默然會稽之守畫江而營公之意欲令諸師畢渡沉舟破釡為不返之計如其不濟則亦八千子弟豈復東還五百島人不脫劒鋩而巳身提孤旅不滿千人從小舋渡江北喬司率群帥而皆契需觀望無一應者公進至海寧集其父老豪傑激揚忠義辭酸淚血聞者莫不感動旅拜轅門者且萬人别營伍分汛地以本邑進士俞元良司餉指揮薑國臣主兵浙西塵起沿海烽燃一時號之為熊兵公大小數十戰親臨矢石纍經覆沒志氣不為之少衰加兵部右侍郎兼左副都御史總督義師亡何而閩使劉中藻至欲以江上之師受其約束行朝洶洶且議開讀之禮監國亦將退就藩服獨公持不可言主上原無利天下之意唐藩亦無坐登大寶之理有功者王定論不磨若我兵能復杭城便是中興一半根腳此時主上早正大號巳是有名較之閩中乘時擁戴奄有閩越者規局更難例論千秋萬世公道猶存若其不能而使閩兵克復武林直趨建業功之所在誰當與爭此時方議迎詔亦未為晚自公此議出人心始定閩使始返丙戌六月朔浙河兵潰公扈監國由海道至閩而隆武走死郡縣巳皆降附上以公為東閣大學士會兵於長垣分道攻取先後得三府一州二十七縣戊子上在閩安鎮時國事皆專於鄭彩彩暴橫公每折之以禮彩與定遠伯周瑞交惡公票擬恆右瑞彩積恨之既而彩與義興伯鄭遵謙爭啇舶嘗恐謙之襲巳公自閩安至琅琦休沐守琅琦者彩之裨將李茂也與公奴子爭口元夕熊鄭兩家同郡相問遺茂即以合謀告彩公遂為彩所害并其幼子投海中公報國之心九裂不恨然吳鉤枉矢飛火狂濤皆鑒公之忠全軀橫海之鯨而受制於螻蟻謂之何哉夫神器流離草創未有成緒公何不引閩師為助而分唐分魯自開􅡉隙議者以公為暗昔梁元帝以簡文制於賊臣太寶改元卒不遵用逮侯景授首而後焚柴頒瑞隆武之制於鄭氏猶侯景也公而奉詔亦豈能轉其斗粟發其一甲乎徒使江上離心行間之精神徙為福京之媚悅耳此舉固與元帝無異也然則公何不勸監國即真以繫波蕩之人心議者以公為迂昔光武既二更始遲之一年河北既平而後受命事之無成天也天若假其始願焉知即非白水嗟乎踵百王之末當陽九之會帝是帝昺何益於運數監國不稱位號涉川龕暴力絶而亡留此無利天下之心皎然千古其視受終如敝屣也公之所慮不亦遠乎公子茂鼎介余族叔應蛟求序公事公魄不返公魂無廟幽銘陽碣無地可施爰撰行狀一通移之史官以為列傳之張本也王義士傳萬公擇范國雯自淮上返得王義士事甚奇曰非先生之文不足發之作王義士傳王台輔字贊化别號象山下邳人也家世農台輔始入太學為諸生烈皇誅逆奄未幾復用奄人觀軍籌食探湯敗事之後遂使五嶽三途並淪寇竊台輔草書萬言誓墓入京欲上之而都城巳陷痛哭南還搆一利刃自隨曰吾以此揕賊之胸耳聞者笑為何等腐生史公可法韙其志造廬訪之時台輔臥病起而為公設食蔥湯麥飯泰然無有不足公太息而去御史王燮東平侯劉澤淸會於睢寧具食與樂台輔斬衰直入慷慨語曰海內版蕩宗廟播遷此公等嘗膽斷指食不下咽時也而置酒高會乎左右欲鞭之􅝂曰此狂生也扶而去之大兵南下台輔遮之於辛安欲叩親王之馬為前驅所阻有降將問所欲言台輔曰大國為明報讐恩至渥也江南一塊土不過千里捐此撮爾留為杞宋於大國無秋毫之損千秋萬歲誦義無窮計不出此無乃為德不卒乎降將掩耳疾走軍旅劻勷亦不通其為何語台輔計無復之南都既覆台輔泫然流涕曰吾誰氏之民也而可使食有他粟起視其廪尚有餘粟曰此吾之所樹也畢此而死亦未為晚丁亥某日粟盡集其鄰里鄉黨濯衣幅巾大呼烈皇北靣再拜自罄於象山之樹聚觀者無不慟哭失聲是時有僧過之持鞭而指台輔曰丈夫死宜也惡用是彌街絶里眩矅於人乎後數月渡河來者言石屋寺一僧僵立而死有鞭在其側始知僧言不妄發也台輔為人重然諾家貧而喜周人之急淮隂李杜若應試不能辦裝台輔心許之而未結言杜若死往赴叩喪改以為賻芥之善咨嗟不置於口一言不及義移坐靣壁以是不為人所親太史公謂伯夷義不食周粟者蓋伯夷先時歸周祿以養老隱于首陽始不受祿故謂之不食周粟也若以率土之粟即為周粟則薇與粟何擇焉台輔之法伯夷無乃誤乎近聞一事亦相類溫州有徐氏者丙戌間約其徒侶數十人農鎖塵需苟完粗備躋雁山之頂架屋數十塞斷道路以擬桃源去今三十餘年無人知其生死如何也夫桃源亦淵明之寓言耳今武陵之桃源無人不可到而云漁人復往迷不得路豈其祕於昔而顯於今與其説既窮則以黃道真實漁人與劉阮無異非人間世所有是徐氏之擬桃源亦誤也雖然血性流行新陳百變古之所無不妨有之古之所虛不妨實之王徐二子之事不恨今人不見古人而恨古人不見今人也抑亦可謂善學古人者矣淸化唯岑嶾禪師塔銘湛然澄公博山來公中興曹洞之宗來公之道傳於江廣天然淡歸為最著澄公之道則吳越為盛余生也晚不及見澄公其門弟子多得而㕛之如瑞白雪公戒珠欵對爾密澓公東山信宿三宜盂公則西湖月舫葛嶺韻腳往往同之且從容約誓火浴之後楊灰湖水居士當為我波上之銘石雨方公不道人日每歎其奇險其能中興曹洞者豈偶然哉師為澓公法嗣諱淨嶾字唯岑荆洲松滋張氏父松鄖母李氏夢靑蓮生於階下覺而馥郁滿庭七日不散師始生七歲而孤稍長即欲出家年十三依邑中靈湖寺僧恆覺祝髮未幾慨然有尋師求道之志抵金陵謁博山師方入戶山問如何大地無寸土師惘然山即喝出疑情愈熾寢食俱廢相依二載乃去而之金粟參密雲悟公雲嚴冷孤硬機鋒不可觸師胸中憤悱不能自抑直前咨叩纍遭痛棒一夕夢中聞開門聲泚然汗下起而通悟雲復打師云打即任打要且瞞某甲不得雲連棒打出與同學避暑龍居為不語關脅不沾席如臨鋒鏑自誓大事不明終身杜口逼塞之際聞堂外碎碗爭詈胸中豁然乃為偈曰打破常住碗還從常住討相逢不相識空自生懊惱從此機如掣電語愈朗烈遍走諸方以求印可雪庭信磬山修辨山雪無不以作家目之始進龍須習靜禪子自外來問如何是住山事師云爐燒榾柮火問客來如何祗待師云鐺煮野芹湯僧云不虛住山師打云者裏無你插腳處僧禮拜便去師聞爾密道價傾東南所止即成法窟渡江從之密問石傘峯前一溪水有時波浪滔天有時涓滴全無汝作麼生會師云情知和尚有此機要密打云前山猶自可後嶺更崚􅜤師云白雲來碧岫明月下遙天密云武林禪客多弄虛頭師云不逢别者終不開拳密便打師禮拜遂依止座下密以從前公案一一勘詰謂即今事作麼生師云木上座通身是眼密云總沒交涉師云南山園裏曾刈茅密云莫道無事好打出方丈於是一往悟迹潦盡潭淸又數年始付衣版密入滅遂繼席東山上堂云天寒古木暮無鴉風重霜嚴事更加石女夜來情未歇隔山舒指弄琵琶叢林傳之以為洞宗本色繼住會稽普濟江隂芙蓉復返東山值兵火括地師以智力綢繆魚螺無恙一時失職儒紳藉為虎落移住梅市之彌陀席未暖而天樂鄉人夜聞妙樂之音發自空山故老曰此古淸化寺址也其重興之兆乎相與迎師開山四方雲集響應金榖之施與瓜果之供養反有過承平之時數百年鹿場虎穴幻為賓坊雲門顯聖寺湛然之祖庭也三宜退院繼之者難其人僉以非師不可師領衆設法淸規嚴整五年之內不失尺寸退居峽山築慧華精舍棲笠以老康熙甲辰又六月六日示寂世壽七十僧夏四十五奉全身塔於淸化寺之後記莂弟子二十四人戊戌巳亥間師至化安山來見真率自然有山林枯稿之色初不似從纍坐道場來也去今二十餘年其嗣法弟子翁元鎧出所著行狀乞銘今日五家宗派存者唯臨濟曹洞皆起自中衰而近世禪者雨相訾謷然其分濟分洞不過從源流而言之耳問其如何而為濟如何而為洞摘索悟由刻畫淄澠恐當身亦未辨也有問泗州大聖為什麼向楊州出現燈頭聰曰君子愛財取之有道祥菴主聞之大驚曰雲門兒孫猶在覺範亦言石霜父子兄弟語言行履如形著影出聲呼谷應由此言之各家自有家常茶飯嫡骨受用也昔蕭穎士有同舟訝其狀貌類鄱陽王王乃穎士七世祖同舟曾盜發其墓故識之夫祖孫相似盜且知之况其門內乎余是以疑當世之門戶也翁元之序漏泄家風余是以銘之銘曰宗風之盛建立五宗天上人間海藏龍宮今亡其三留者洞濟初不因此佛法衰替中興洞宗實惟湛然於爍禪師是為再傳六坐道場鐘板浹洽林花水鳥亦皆説法不觀淸化誰名天樂宮商久啞忽動鼓角刪除蓬梗化為廣蔭數百餘年師來應讖上長松柏下長髮爪突兀寒山不淪空窅鄭玄子先生述君諱鉉字玄子鄭氏浙之錢塘人孔肩先生之子也祟禎間武林有讀書社以文章風節相期許如張秀初岐然之力學江道暗浩之潔淨虞大赤宗玫仲皓宗瑤之孝友馮儼公悰之深沉鄭玄子之卓犖而前此小築社之聞子將啓祥嚴印持調御亦合併其間是時四方社事最盛然其人物固未之或先也癸酉秋冬余至杭沈崑銅沈睂生至自江上皆寓湖頭社中諸子皆來相就每日薄暮共集湖舫隨所自得步入深林久而不返則相與大呌尋求以為嗢􅛐月下泛小舟偶豎一義論一事各持意見不相下閧聲沸水蕩舟霑服則又閧然而笑三峰開堂淨慈一默為首座君機鋒相觸奪其竹箆欲打擬議不果余曰鴨子早巳過新羅也君為之一笑明年余過湖上崑銅又在江右劉進卿秋浦吳次尾亦至夕陽在山余與崑銅尾舫觀劇君過余不得則聽管絃所至往往得之相視莞爾一日崑銅詆分宜於座進卿爭之至於揎拳惡口余與君解去其夏余自太倉返與君宿於仲皓水閣談至夜分水鳥驚起戞然長鳴丙子余寓表忠觀前與南屏相近儼公秀初二虞皆住南屏君亦日日過從余弟澤望豪爽不羈夜半掉船湖中高吟長嘯沿湖群犬齊吠若豹僧西吾牧齋客也凡社中之人無不網羅以去戊寅君與儼公渡江訪余村路泥滑同來沈長生不能插腳君笑言黃竹浦固難於登龍門也乙酉五月邂逅秀初道暗及君於熊魚山座上從此讀書社之緣絶矣湖山如故其猶足樂耶子將印持儼公二虞巳前死秀初改名濟義道暗改名濟月逃之釋氏君亦變姓名不知去於何所有疑其慷慨致命死於鐘鼓者夫安仁之敗疊山有強場之責尚未即死君以朝不坐宴不與而強參烏合之事乎有疑其不食周粟而死者夫夷齊之所以為夷齊只在窮餓節如是止矣豈以沾沾一死為快也有疑其亡命為僧隱而不出者夫敬業賔王刋章名捕君非有是也何因而亡命就使為僧撾鼓白椎不能不受叢林之牽挽矣君本靑雲豪士志在用世一擊不中飄然遠去豈復又縈於塵網以取挨肩疊足之辱乎謝臯父以子粗達時務委而出遊終臯父之世未嘗與子相聞也君之子淵業成名士灑掃庭內復何可慮君之不返流俗以為怪君子以為非巳甚也淵之子薦述父之言曰聞汝祖在上柏山中有人遇之究不可迹余邑人韓貞武久於上柏余以薦言告之貞武曰疇昔周旋初無鄭某意者其變姓名乎薦既不敢釘魂於棺閉神於槨用委巷之禮以施表志來請家傳余因倣李文公陸歙州述例既以慰薦且粗見讀書社首尾始知先友之風流非今人所有也唐氏家譜序沈約魏收為史自敘其先世附合乖謬人以謂誣其祖也故序家譜者未有不以此為戒是故誣祖之罪甚於忘祖然今日譜之為弊不在作譜者之矯誣而在偽譜之流傳萬姓藝藝莫不家有偽譜歐陽文忠曰渤海之後獨見於今然中間失其世次者再蘇文公曰自益州長史味道至吾之高祖其間世次再不可紀夫歐蘇二氏其源流歷然者尚有不可紀之世次而偽譜不問其地之南北不考其年之上下一概牽合某世以至某世繩聯珠貫至使祖孫倒置蛇首人身其有名公墨迹內府璽書者尤市兒之狡獪無識之世寶也嘗見一巨子搆得偽譜視為信貨據之以改舊本不亦冤乎夫世之為巨子者多矣然亦不始於近世也六朝碑版實為濫觴如庾信銘張則原張仲張談碑辛則援辛有辛寥徐陵言侯氏則美夷門序歐陽則引渤海斯乃眩詞滅質徒驅煙墨又何怪凡偶之不能質確乎武林唐殿宣聖賡廷陳從余遊出其家譜請序唐氏為直臣子方之裔其世次不可紀其可紀者殿宣以上九世耳吳興固有唐氏譜自陶唐而下凡百世其世次縷覼古今唐姓之顯者燦然一貫殿宣以為偽故不從而别自成之殿宣之識可謂加人一等矣或曰唐氏九世始遷之祖也祀可止於是譜不可止於是也曰歐陽氏之譜亦九世蘇氏之譜止五世何謂其不可也或又曰唐氏九世以上其顯者如林胡僅存其隱約者乎曰余觀李空同之譜其傳四世之事不越農瑣彼以門第相高者豈能及之二惠兢爽是在殿宣兄弟而巳矣二欠詩昔住雙瀑院煙火無交涉眼自空中放耳被水聲壓春米聽寒鴉水碓無輪者名鴉碓闌更任野鴨終朝不破口天然自妥帖秋雲墮鳥背土竈封溪摺山鼠小兒長共我燒落葉我意淸如許僧笑藏書篋擾擾盡陳人何不憚應接高揖謝聖賢單丁上􅏭嶫丈夫足與目豈為城市設𬗟懷五嶽遊四十常切切擬將一笠去鶴影橫江瞥日計三十里一年萬里閲浸假得三年我事巳可闋歸來再讀書眼界自然别此願不能果吾母年巳耋日月非吾有亦焉敢私竊不幸母棄養老矣吾蹩􅍷奈此赤稍鯉甕中耐屈折
