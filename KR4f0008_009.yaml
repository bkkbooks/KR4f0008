front:
  text: 南雷文案卷九
  hash: sha256:b98e63b4e6d5dd959fe141e4030fda463b3f17bebb70aada77f1610328ffa458
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0008_SBCK_009-1a}
body:
  text: 姚江黃宗羲著林三教傳已酉林兆恩字𢡟勛别號龍江福之莆田人也祖兵部侍郎富父萬仞年十八為諸生從二氏遊得其大旨遂倡為合一之説挽二氏以歸儒而婚娶之率吾儒以宗孔而性命之以坐禪之病釋也運氣之病道也支離之病儒也為説非之棄諸生不就督學朱衡召而詰焉對曰堯舜在上下有巢由衡曰汝做不得巢由兆恩曰周召聽命于天不可必得巢由之做不做在已何不得之有衡終不許命之就學為諸生都講兆恩曰兆恩隱處六年學宮不削其籍是以諸生之隱隱於山林也今使列於諸生而不責以科舉是以山人之隱隱於學校也當道請見者抗禮不屈自任為孔孟家風嘉靖末流倭入閩兆恩著防倭管見謂不宜淸野不宜閉城不宜遏糴不宜惜費濵海以至城邑鄉人各自團練首尾救應則無地非城池無人非官兵矣不然聚處孤城適以自困耳當時不能用其言以至於敗兵後積尸盈野兆恩出家財收瘞至於數萬耿定向督學閩中以山林隱逸薦於朝不報嘗於靜坐中聞唱靑陽洞口弄煙霞之句以語門人有言武當有靑陽洞者買舟遂往至延平障湖坂雷雨翻空孤舟掀舞蓋丹成而出浴也明日登岸石上有靑陽洞三字融然而悟即日回棹兆恩以艮背法為人却病行之多驗又别有竒術能濟人於危急之時故從之者愈衆自士人及於僧道著籍為弟子者不下數千入皆分地倡教所過往觀投拜者傾城單里有司約束之亦不能止也遠近傳疑巡按楊四知將劾治之朝官多為之解者焚其書板而止巳又為林蕃所告知縣孫繼有名捕兆恩以囚服往弟子不欲兆恩曰今之不以囚服為辱者即昔之不以分庭為抗也二三子從吾久尚不識禮分二字乎繼有卒白其事而謝之萬曆二十六年卒年八十二所著書數十萬言兆恩之教儒為立本道為入門釋為極則然觀其所得結丹出神則於道家之旁門為庶幾焉閩人謝肇浙謂其發狂而死其弟子亦言晚年胸中有物隔礙不措一辭即朝夕隨侍之人不能識其姓名則又金丹之為禍也一時勝流袁宗道蕭雲舉王圖吳應賔皆北面稱弟子鄒元標極言其所學之正有爭之者元標曰講學隨人意見何事力爭袁黃曰早歲讀書多有未解處每於三教集中閲之豁然甚矣諸公之好竒也近曰程雲章倡教吳鄣之間以一四篇言佛二三篇言道參兩篇言儒朱方旦則好言禍福皆修飾兆恩之餘術而抹摋兆恩自出頭地余患惑於其説者不知所由起為作林三教傳論曰觀兆恩行事亦非苟矣夫周程以後必欲自立一説未有不為邪者兆恩本二氏之學恐人之議其邪也而合之於儒卒之驢非驢馬非馬龜茲王所謂騾也哀哉周雲淵先生傳辛亥周述學字繼志别號雲淵越之山隂人好深湛之思凡經濟之學必探原極委尤邃於易曆古之言曆者以郭守敬為最而守敬所作曆經載於元史者言理而不傳其法其法之傳於曆官者有通軌通經諸書則死數也顧其作法根本所謂弧矢割圜曆官棄而不理亦無傳之外人者當是時毗陵唐順之吳興顧應祥皆留心曆學求其書而不可得述學竭其心思遂通弧矢之術從來曆家所步者二曜交蝕五星順逆而已自西域經緯曆入中國始聞經緯凌犯之説然其立法度數與中曆不合名度亦異順之慨然欲創緯法以會通中西卒官不果述學乃撰中經用中國之算測西域之占以畢順之之志曰行黃道月行九道而古來無所謂星道者述學推究五緯細行為星道五圖於是七曜皆有道可求與順之論曆取歷代史志之議正其訛舛刪其繁蕪然於西域之理未能通也又撰大統萬年二曆通議以補歷代之所未備自曆以外圖書皇極律呂山經水志分野算法太乙壬遁演禽風角鳥占兵符陳法卦影祿命建除埋術五運六氣海道針經莫不各有成書發前人所未發凡千餘卷總名曰神道大編蓋博而能精上下千餘年唯述學一人而已嘉靖間錦衣陸炳訪士于沈錬錬以述學言禮聘至京炳服其英偉薦之於趙司馬司馬就訪邊事述學曰今歲主有邊兵其應在乾艮艮為靑州遼東乾為宣大二鎮京師可無虞也巳如其言司馬將具題大用會總兵仇鸞聞其名欲致之述學識鸞必敗先幾還􅚼總督胡宗憲征倭私述學於幕中咨以祕計述學亦不憚出入於狂濤毒矢之間卒成海上之功武林兵變述學諭以國運安平不可妄動動則竒禍立至其魁亦信述學之言多驗謀遂寢述學在南北兵間多所擘畫其功歸之主者未嘗引為已有故人亦莫得而知也庚午余在南中閩人陳元齡以所著思問初編相示其言太乙六壬多本於雲淵斯時亦未知雲淵之為何如人也甲戌余邂逅其諸孫周仲訪之於木蓮巷架上堆雲淵神道大編數十册其册皆方廣二尺餘仲言遺書散失此不能十之一二也又見其地理圖縱八尺橫二丈畫方以界遠近每方百里唐呂溫所序未必能過也余欲盡抄其所有會仲遊楚不果丙戌亂後於故書鋪中得中經測圖地理數種丙午見其曆宗通議而後知邢雲路律曆考所載皆述學之説掩之為已有也庚戌九月坐證人書院有帥其弟子四五人升階再拜者門狀為周允華問之則仲之諸子也問以遺書所存者惟算學耳余讀嘉靖間諸老先生文集鮮有及述學者唯湯顯祖有與周雲淵長者書謂卦圖乃是渾儀曆書止是算法必欲極神明之用亦須達虛無之氣觀其言要非能知述學者唐順之與之同學其與人論曆皆得之述學而亦未嘗言其所得之自豈身任絶學不欲使人參之耶天下承平久矣士人以科名祿位相高多不説學述學以布衣遊公卿間宜其卜祝戲弄為所輕也雖然學如述學固千年若旦暮奚藉乎一曰之知哉張景嶽傳辛亥二十年來醫家之書盛行於世者張景嶽類經趙養葵醫貫然醫貫一知半解耳類經明岐黃之學有王冰之所未盡者即學士大夫亦必纍月而後能通之昔在戊寅曽於張平子座上識景嶽蓋交臂而失之已酉寓證人書院有蔣一玖者年八十矣欲為其舅作傳則景嶽也景嶽名介賔别號通一子越之山隂人也其父為定西侯客介賔年十四即從遊於京師天下承平竒才異士集於侯門介賔幼而濬齊遂遍交其長者是時金夢石工醫術介賔從之學盡得其傳以為凡人隂陽但以血氣藏腑寒熱為言此特後天之有形者非先天之無形者也病者多以後天戕及先天治病者但知有形邪氣不顧無形元氣自劉河間以暑火立論專用寒涼其害已甚賴東垣論脾胃之火必務溫養救正實多丹溪出立隂虛火動之論寒涼之弊又復盛行故其注本草獨詳參附之用又慨世之醫者茫無定見勉為雜應之術假兼備以幸中借和平以藏拙虛而補之又恐補之為害復制之以消實而消之又恐消之為害復制之以補若此者以藥治藥尚未遑又安望其及於病耶幸而偶愈亦不知其補之之力攻之之力耶及其不愈亦不知其補之為害消之為害耶是以為人治病沈思病原單方重劑莫不應手霍然一時謁病者輻輳其門沿邊大帥皆遣金幣致之其所著類經綜核百家剖析微義凡數十萬言歷四十年而後成西安葉秉敬謂之海內竒書斑孟堅贊孝宣之治政事文學法理之士咸精其能至於技巧工匠器械自元成間鮮能及之介賔此書若非遭遇神宗之盛亦莫能有也又以應病如應敵作古方八陳為八略以破之惜其書晚出尚藏於家介賔博學於醫之外象數星緯堪輿律呂皆能究其底藴在遼陽道中聞御馬者歌聲聒耳介賔曰此惡聲也不出五年遼其亡矣已而言驗所親問以近事介賔曰我夜觀乾象宮車殆將晏駕天下從此亦亂矣未幾神宗崩介賔遂返越其年五十八又二十年始卒卒之日自題其像召三子而誨之其門人曰先生乃死耶吾先生故有不死者介賔莞爾而逝自太史公傳倉公件繫其事後之儒者每倣是體以作名醫之傳戴九靈宋景濓其著也而名醫亦復自列其事存為醫案以待後人遇有病之相同者則倣而治之亦盛心也世風不古以醫負販其術無異於里間俗師也而不肯以里間俗師自居雖復殺人如草亦點綴醫案以欺人介賔醫案散在景嶽全書余不敘於篇惡夫蹈襲者之衆也趙養葵名獻可寧波人與介賔同時未嘗相見而議論往往有合者黎眉郭公傳丁已郭公正中字大來别號黎眉初名凝之其先自太原徙鹽官八世祖太乙精天官之學受業於郭伯玉伯玉者劉靑田之高第弟子也祖臬父文範有孝行公生而竒崛不凡叩心法於雲棲學舉業於寓庸屺曕巳又追原家學講求天文曆數壬遁竒門兵機韜略之術思得一當於世萬曆乙卯以副榜入太學天啓甲子舉於順天時高忠憲公為御史大夫公受業其門始知學問有所歸宿而於無欲故靜之旨曰事體貼有困學記以記所聞一時學者魏忠節黃漳海何黃如辛復元皆心契之崇禎丁丑銓選公得四川廣安州滇人馬乾得山西代州乾親老不能遠離公曰古人以柳易播之事寧不可再見乎且我固欲以巖疆自效者也遂力請相易未赴推舉纂修曆法時言曆者四家原設大統回回而外别立西洋為西局布衣魏文魁為東局彼此排擊言人人殊其年十一月庚辰夜望月食十二月乙未朔曰食靈臺測驗月食則公法與西法相去止七十餘秒日食則公法與西法相去止六十餘秒各局之法相去至一二分者曆法之驗尤在日之食甚食甚合天合朔始真西法猶後天一刻五十分唯公獨合公以諸法有所短亦有所長有時離亦有時合會通四家而後可以求無差之定法西人欲主西法而以中法為佐公欲主中曆而以西洋諸曆為佐因言自堯舜以迄今日歷歲四千二百七十四年其間修改七十餘次創法十有四家未有專從外國而毀棄者故西人之崇禎曆書雖成而頒朔仍行大統者公力持之也然西人有寵於上遂賜公金幣出就原官公雖在曆局而慷慨論列皆天下大計不屑以文史星曆自處卜祝之間其言有從職分之所及者有不從職分之所及者大抵人所不敢言而後言之以為日月頻食京師地震此冤獄所致宜因熱審之例廣為寒審淸貴人之獄先及罪宗上惻然感動為之允行此職分之所及者也一言天下之亂由於貪吏欲懲貪吏莫若顯淸望之名臣令其表帥百僚風勵有位如劉宗周李日宣黃道周華允誠其人也上曰可一言先儒吳與弼陳真晟章懋蔡淸王艮羅洪先羅汝芳高攀龍鄒元標九人應祀兩廡上曰從祀大典不得輕議一言銓政之弊官吏皆出頂首此直貪之根也上問欲革頂首其何道之從公言故事吏部始進其月旦在同鄉其衣鉢在前任以餽遺為頂首今使方正之大臣保舉可為銓司者不問知推科道各部俱得改用亦不定畿省人數則銓司之頂首可革矣胥吏甲乙相傳官不為政以項首為資産今使郡縣官保舉小心任事之吏員充賦到部考定名次分役各衙門則胥吏之頂首可革矣上命往復久之然而終不能革也又言衛所之軍宜隸有司民壯之設非供役使此皆非職分之所及者也戊寅六月抵代聞京師戒嚴請提兵入衛督撫壯而未之許也代當兵燹之後流民未集公不欲擾之相與休息期年之間所決罰者二十六事而已公鬱鬱無所見其長喟然曰垂髫讀書錯綜今古嘗懷濟世匡時之略運會不偶沉頓下僚登埤四顧蕞爾四十里之州疆一望俱盡此龐士元所以沉酣欲臥而呂望為之投綸長逝也於是自疏九短一長謂短於干祿短於理繁短於養安短於催科短於馭下短於徇勢短於交際短於營薦短於營升若夫兩軍相當劍戟相摩決勝敗存亡於俄項則差有一日之長巳矣願挂冠東門而去遂歸尋以邊才起山東沂州兵備道副使南都建公封事皆四鎮所不便東平伯劉澤淸上疏劾公下部部亦不敢直公遜位公亦入閩公之請赦罪宗也思文時在高墻為吏所困苦因公言而得小挺由此德公恨相見之晚以潛邸故人待之官在六卿然公於喪亂之中變姓名絶音塵獨身往來雖家人亦莫得而詳也閩事既壞不知所終公生於萬曆辛卯二月十七日于今不過八十六歲耳梅子真上書報罷一朝棄妻子去九江至今傳以為仙姚平仲斫營不遂乘靑騾亡命一晝夜馳七百五十里朝廷物色之不可得後有見於蜀中者神龍見首而不見尾若公者焉知其不猶在耶
