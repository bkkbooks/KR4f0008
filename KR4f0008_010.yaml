body:
  text: 所謂開府南服也是歲臯父年二十八張丁曰稱唐魯公而不姓者猶韓愈稱董晉為隴西公之類徐贅民曰先子手鈔謝臯羽詩文一編其慟哭記稱宰相信公不稱故人唐宰相魯公明年别公漳水湄景炎二年正月公移屯漳州龍巖縣三月至梅州臯父别公在是歲之春後明年公以事過張睢陽及顔杲卿所嘗往來處悲歌慷慨卒不負其言而從之遊今其詩具在可考也祥興元年巳卯臯父别公後二年也公巳被執九月北行有弔顔杲卿詩云常山義旗奮范陽哽喉咽一狼狽六飛入西川哥舒降且拜公舌膏戈鋋人世誰不死公死千萬年睢陽詩云起師哭玄元義氣震天地百戰奮雄姿臠妾士揮淚睢陽水東流雙廟垂百世當時令狐潮乃為賊遊説公被執而為以事者忌諱之辭危素曰過張睢陽所嘗往來處此蓋題信之永豐睢陽廟非嘗所往來處也羲按鉛山縣南二十里有睢陽廟蓋當時名永豐也危意以公所過者在此然記言别公後明年則是執後之過非平日之過明矣其詩在指南後録發建康以後又豈永豐之廟哉危為以事二字所誤余恨死無以藉手見公而獨記别時語每一動念即于夢中尋之或山水池榭雲嵐草木與所别之處及其時適相類則徘徊顧盻悲不敢泣又後三年過姑蘇姑蘇公初開府舊治也又後五年及今而哭於子陵之臺是歲庚寅臯父年四十二先是一日與友人甲乙若丙諱其名故稱甲乙甲為吳思齊字子善子善流寓桐廬故下文云别甲於江宋濓子善傳云思齊與方鳳謝翺無月不遊遊輒連日夜或酒酣氣鬱時每扶携望天末慟哭至失聲而後返乙為嚴侶字君友君友奉祖祠家在江岸故下文云登岸宿乙家楊維禎高節先生墓志云宋相文山氏客謝翶竒士也雪夜與之登西臺絶頂祭酒慟哭以鐵如意擊石復作楚客歌聲振林木人莫能測其意也丙為馮桂芳下文云與丙獨歸馮城曰鄧康莊撰曾大父處士桂芳墓志有云閩人謝翺竒士也嘗與處士雪夜放舟登子陵西臺擊石作楚歌聲振林木意悲憤人莫識張丁曰甲乙若丙者意為吳思齊馮桂芳翁衡也今雖不知其然唯三人同登時詩可考見也按此既無實證吳寓桐廬縣馮翁皆睦人無有江干住者記言登岸宿乙家何也丁又曰别甲别思齊也與丙歸者桂芳也桂芳衡同家于睦歲云暮矣不應一歸一不歸也衡為臯父之門人以乙為衡則序門人于老友之上矣故知乙為嚴侶非僅墓志可證也約越宿而集午雨未止十二月初九日文公之諱也買榜江涘登岸謁子陵祠憩祠旁僧舍毀垣枯甃如入墟墓祠在臺下還與榜人治祭具須臾雨止登西臺富春山在桐廬縣西三十五里有東西二臺各高數百丈以子陵故名釣臺設主於荒亭隅再拜跪伏祝畢號而慟者三復再拜起又念余弱冠時往來必謁拜祠下其始至也侍先君焉始至時臯父年十七今余且老江山人物眷焉若失復東望泣拜不巳有雲從南來淹浥浡鬱氣薄林木若相助以悲者乃以竹如意擊石作楚歌招之曰魂朝往兮何極暮來歸兮關水黑化為朱鳥兮有咮焉食杜子美夢李白詩魂來楓林靑魂返關塞黑白生故魂來則靑魂返則黑文公巳死故魂來則黑此其異也三統上元至是歲辛卯積年十四萬四千五百二十一歲在星紀相􅍟南方為鶉首故雲從南來化朱鳥而有咮也方韶卿過臯父墓詩朱鳥食何向記此事也歌闋竹石俱碎於是相向感唶復登東臺撫蒼石還憩于榜中榜人始驚余哭云適有邏舟之過也盍移諸遂移榜中流徐贅民曰先子鈔本無榜人始驚以下至移榜中流數語舉酒相屬各為詩以寄所思臯父詩云殘年哭知巳白日下荒臺淚落吳江水隨潮到海迥故衣猶染碧后士不橉才末老山中客唯應賦八哀又云總戎臨百粵花鳥瘴江村落日失滄海寒風上薊門雨靑餘化血林黑見歸魂欲哭山陽笛鄰人亦不存子善有擬古詩云平原一遺老九重未知名臨危觀徑節相視膽為驚折陊猶舉手籲天閔無成九隕期報國千古猶光晶亦有布衣人烈烈死彌貞回風惜往日輝映豈獨淸淹淹肉食輩泚顙徒吞聲我聞同志士野祭激高情配享遺斯人憂心每如酲薄暮雪作風凛不可留登岸宿乙家夜復賦詩懷古明日益風雪别甲於江臯父江上别友詩云相看仍慟哭欲學晉諸賢戌近風鳴柝江空甫送船朔雲侵别色南雪憶歸年擬共鋤靑术無為俗事牽余與丙獨歸行三十里又越宿乃至行狀云遊倦輒憩婺睦之江源月泉故與馮桂芳歸睦其後甲以書及别詩來言是日風帆怒駛逾久而後濟既濟疑有神陰相以著兹遊之偉子善入桐廬故江行余曰嗚呼阮步兵死空山無哭聲且千年矣若神之助固不可知然兹遊亦良偉其為文詞因以逹意亦誠可悲巳余嘗欲倣太史公著季漢月表如秦楚之際今人不有知余心後之人必有知余者于此宜得書故紀之以附季漢事後太史公作秦楚之際月表一時戰爭諸國興廢條忽不可以年故表之以月宋亡之時義師迭起皆不能久故臯父欲著月表以詳獨行全節之事不曰季宋而曰季漢者亦猶唐宰相之託于前代也時先君登臺後二十六年也先君諱某字某諱鑰登臺之歲在乙丑云咸淳元年矣元祐既載其詩乃不深惟其義何其粗也九日靈禽居上枝冬靑之上有鳥來巢以記異也知者唐玉潛詩遙遙翠蓋萬年枝上有鳳巢下龍穴其記事同也謂之鳳謂之靈禽不敢以凡鳥斥言之九日者臯羽過越臺而哭之之時也知君種年星在尾尾在析木之次謂葬年是戊寅也發陵之年羅靈卿云戊寅十二月十二日孟兼亦同之而貝瓊穆陵行以為至元二十一年周密以為二十二年八月則是甲申乙酉也陶九成謂元下江南丙子至乙酉立國十載法制已明安得有發陵事雖辨其非乙酉然無確據何不以是詩為證也况臯羽作此在丙戌若是乙酉則相厺不及一年其事方新不如此為追憶之詞矣根到九泉護龍髓龍髓即六陵之骨也王修竹造石函六刻紀年一字為號高孝兩陵則霽山所收餘四陵玉潛與諸人分任之章祖程曰餘骸棄草莾中霽山以草囊拾取又聞理宗顱骨為北軍投湖水中購之漁者而得之盛以二函則是霽山所云雙匣猶傳竺國經者一匣為諸陵棄骨一匣為理宗之顱與鄭元祐云高孝兩朝骨者相背觀後穆陵之骼得自北平則祖程之説為謬恆星晝隕夜不見七度山南與鬼戰此言收骨之艱難也恆星晝隕言發陵在晝夜不見者諸人夜往覔骨不能即得七度鬼戰者凡經七夜或七歷險事也願君此心無所移此樹終有開花時開花時猶鄭思肖望陳宜中從占城至也山南金粟見離離蘭亭山後葬處其地多桂知者霽山詩有金粟堆前幾吠鴉可證九日桂猶未謝故云見離離杜詩金粟堆前松柏裏謂明皇泰陵在金粟山也故即以金粟堆為陵寢之名白衣人拜樹下起靈禽啄粟枝上飛此臯羽自敘與玉潛同拜陵下之景拜起而靈禽飛也宋陵收骨事山隂王修竹英孫所為而唐玉潛林霽山為之先後蓋修竹富而好客玉潛霽山皆在其門張孟兼所為享諸少年造六石函皆修竹事也鄭元祐所謂背竹籮為丐者章祖程所謂草囊采藥則玉潛霽山事也其後知玉潛者以其事實之玉潛知霽山者以其事實之霽山因時忌諱故私記有異同耳若原其本末則修竹在霽山玉潛之上其時同事不止二人霽山集中有鄭村翁而楊維禎云楊璉真伽發陵事翺有陰移冥轉之功則臯羽亦在其中也四明山九題考甲寅唐陸魯望皮襲美有四明山唱和分為九題後之言四明名勝者莫不淵源於是顧四明非九題所得盡而尋九題者又往往不得其處故宋施宿云謝遺塵所稱及陸皮諸詩世雖競傳之顧今四明山中居人乃不知異境果安所在蓋與華山之華陽武陵之桃源皆神仙境可聞而不可即者也嘉靖間餘姚岑原道求遺塵九題止得所謂石窗者鄞人沈明臣以大蘭山為過雲奉化戴洵以仗錫為石窗皆以意相卜度宜乎其失之遠也余創四明山志與山君木客爭道於二百八十峰之間而知所謂九題者陸皮未嘗身至止慿遺塵之言鑿空擬議故在陸皮巳不得九題之實後人慿陸皮之詩以求九題其不得遺塵之實又隔矣五曰鹿亭在大蘭山南史孔祐至行通神隱於四明山有鹿中箭來投祐祐為之養創愈然後去故于祠宇觀側建鹿亭陸皮不原故事泛稽物態引麛穿竹又何當也皮詩為在石􅑵下失其地矣六曰樊榭元曾堅云劉樊從大蘭飛升建祠其所祠側為樊榭皮詩石洞聞人笑大蘭未嘗有石洞也七曰潺湲洞餘姚之白水宮是也天寶間從大蘭移祠宇觀於此始劉樊居潺湲洞側師事白君因其故居也八曰靑櫺子今亦無識之者所謂味極甘而堅不可卒破者按以求之更無一物相似豈草木之種類亦有絶歟陸詩環岡次第生徒虗語耳九曰鞠侯雪竇西十五里為徐鳬山有鞠侯巖以其象形鑿字名之櫕峰割日哀瀑崩雲誠竒地也皮陸以連臂斷腸當之何山無猿而以此私一四明哉有以知其不然矣是故文生於情匕生於身之所歷文章變衰徒恃其聲采經緯恍惚而江淹之雜體作矣承虗接響寧獨此九題哉遺塵發之而余考之千年旦暮同是南雷之人相與言南雷之事而巳石窗高閣雲中見四窗一靣連梯空尋地穴錬石舉危天寶鏡開霜曉朱簾捲暮煙自從劉阮後康樂亦遙傳過雲不雜炊煙色非關雨氣揚神龍眠雪窖山鬼樂幽篁曳杖兜羅重沾衣勃鬱香相將過嶺去二十里雲長雲南南行雲過盡始見有人家名里今如故遺風昔不差僧留人外偈桃發自然花盤谷無嫌小山將出路遮地名小盤谷雲北北行雲過盡籬落傍僧筵竹筧分猿飲霜鐘起象田磨崖留漢隸鋤石得唐年聞説巖棲者終身昧市􅒡鹿亭鹿亭何自置千古仰仁名久矣忘機械蠢然托死生朝飢開藥院秋冷侍茶鐺總使歸山去長來月下鳴樊榭大蘭有故榭昔是夫人居石有藏雲竅溪遊禁術魚猶疑停綘節時或得仙書此地逢樵獵相親且莫疏其地名孔石石中皆有竅潺湲洞其下為洗藥溪聞説潺湲洞當年隱白君守爐同弟子洗藥委紅裙中積子年雪平分萬壑雲自來聲未絶曾和步虗文靑􅎉子何物靑櫺子空傳上世名野人俱不識山鳥或相爭王樹空垂賦瓊花不别生環岡笑魯望詩何豈真誠鞠侯曾到徐鳬境巖形像鞠侯瀑飛聲自苦月影臂如鈎不答山禽喚空回過客眸前人工賦物遺誤在林丘七怪王孫滿之螭魅罔兩莫能逢之言川澤山林也嵇叔夜羞與魑魅爭光言昏夜也今通都大邑靑天白日怪物公行而人不以為怪是為大怪余欲數之而不勝其多漫條七端亦以枚乘七體數限於是也近年以來士之志節者多逃之釋氏蓋強者銷其耿匕弱者泥水自蔽而巳有如李燮避仇變姓名為傭保非慕傭保之業也亡何而棒箆以為儀仗魚螺以為鼓吹寺院以為衙門語録以為簿書撾鼓上堂拈香祝聖不欲為異姓之臣者且甘心為異姓之子矣忘其逃禪之始願也是避仇之人而誇鼓刀履狶之技也盍觀之古人乎徐敬業駱賔王為僧以後音塵不接龎勛復出而為常通黃巢再現過以勦襲之字句飾時文之音節耳王李云不讀唐以後書若人亦曾讀唐以前書耶歐曾謂學文之要在志道窮經者若人亦知經之與歐曾其相似在何等乎故其持論雖異其下筆則唯之與諾也有如假潘水為鼎實别器而薦之曰此殽蒸也曰此折爼也吟唱雖異其為潘水則同也文章豈可假人我不怪其文而怪其以一十分二五也神仙之有無不可知即有之亦山林隱逸之徒於朝市無與也故其涕唾塵世之事猶塵世之不得不隔絶山林矣彼挾術而干涉朝市者文成五利之流皆妖人耳今之所謂神仙者好言人間禍福作為隱語皆持兩可應之而福也則人以言福者為其驗應之而禍也則人以言禍者為其驗由是傾動朝野押闔乾沒子産曰竈焉知天道是亦多言矣豈不或信彼欺今世之無子産也有所謂神童者寫字作詩周旋應對於逹官之前曾無震懾逄人即誇某官以我為門人某官以我為義子僕從數八為之磨墨伸𥿄套數間熟纍月而致千金原其教法唯令學書大字詩以通套零句排韻而授之東移西換不出此數十句而巳問以四書則茫然不識為何物也古之童子科限年而讀五經至有夭閼其天年者君子猶然咎其父兄今以教胡孫禽蟲之法教其童子使之作偽將奚事而不偽葬地之説君子所不道就其説而論之今凡三變每變而愈下周官之法亡言形法者巳為變矣再變而為方位形法理之顯者也方位理之晦者也三變而為三元白法方位一定不易者也三元白法隨時改換者也其法即曆書所載一白二黑三碧四緑五黃六白七赤八白九紫六十年為一元三元凡一百八十年上元起一白中元起四緑下元起七赤逆布以求直年直年移入中宮順飛八方此即太一家釣宫直事也然太一百二十年為一元三元計三百六十年今三元兩周太一之三元方一周其吉凶何所適從乎太一言天星今以言地理天星周流不息地理融結有常不可同也且年白改換則吉凶亦改換充彼之説以求吉地必一年一改葬而後可是故方位者地理中之邪説也三元白法者又邪説中之邪説矣醫之難者以其辨經絡也故傷寒之書蔬十二經絡以胍辨之又以見症辨之而後投藥不敢不愼也鄞人趙養葵著醫貫謂江南傷寒之直中三陰者間或有之間如五百年其間之間言絶無也其説巳謬甚然傳遍各經亦不敢自執其説也今之學醫者喜其説之可以便巳更從而附會之以為天下之病止有陽明一經而巳公然號於人人以掩其不辨經絡之愚夫不言巳之不識十二經絡而言十一經之無病猶之天下有九州不言巳之足迹未曾歷九州而言天下無九州也化安寺緣起己酉化安寺在餘姚通德鄉之剡湖廢於弘治正德間碑碣無存縣志云化安講寺後唐清泰元年建宋大中祥符元年改賜普圓院宋會稽志云普圓院在餘姚縣南三十五里後唐淸泰元年建號化安院大中祥符元年改賜今額然則稱化安講寺者元以後事也其見於他傳記者宋史陳橐列傳橐字德應餘姚人以權刑部侍郎謝事歸剡中僑寓僧寺日糴以食處之泰然初讀宋史以剡中為剩縣及考城塜則云宋侍郎陳槖墓在化安山廬舍遺址猶有存者所謂陳園老梅殭仆尚是數百年以上物始知剡中之即為剡湖僑寓僧寺之即為化安寺也元虞集狀餘姚州判黃茂云附近有化安永樂二寺府君皆捨田山於僧永為子孫藏修遊息之資州判者吳草廬高第弟子豫之九世族祖也宋玄僖詩集五月十四日過應平仲書孰其夜至明日雨不止有懷藍溪許月山化安真淨源天晴獨跨蹇驢來準擬書堂一宿回野色幾年違白首雨聲半夜落黃梅南山樹對高僧立東浦花隨處士開親舊有懷難晤語出門流水沒蒼苔南洲洽雨軒集有送坦逹中住姚江化安詩云深居亦矯俗用世非我期徘徊越壠坂所重遭明時商飈薄江渚蘭蕙幸未衰為言采芳者何以遺所思宋玄僖召修元史博洽為建文皇帝矱髮皆明初宗匠而真淨源坦逹中與之相友其非聊爾人可知由此推之其前其後此寺必多名流勝士不以負販一拂子為重輕者其姓名徒付之山高水清而巳可不惜哉自先忠端公賜葬化安山子每遇諸家文集于涉此山者即抄之以為故事其所得於寺者僅如此寺廢雖久把茅而處者不絶具德禮江月某氷懷某皆出而有聞於世豫以吾母姚太夫人之命割地數十畒展其員幅於是佛殿粗具崑山歸莊爰書寺額山門法堂一切未備然可由是而踵事也夫先州判捨田山於方盛之日吾母捨地於巳廢之後何黃氏與茲寺有夙契也嗟乎世之言久遠者無如於佛而盛極之寺院數百年巳不能必其如故然猶可諉之成壞之理獨怪自後唐至於有明歷年不為不久名流勝士不為不多不能以鐘鼓之力延其餘響反若因陳侍郎而有此寺因陳侍郎之寺而有此真淨源坦逹中區區之名氏不然姚江如此寺者何限又孰為之推尋哉佛氏所謂久遠者果安在耶陳德應倘佯其先忠端公旁薄於後兹山當與天壤俱敝自此雲水遘止易以垂名幸矣辨野史當阮大鋮之初發難也內外合謀借中書汪文言以興大獄苟文言之獄不解則楊左魏三公之逮不在明年矣故魏忠節書片𥿄求救於先忠端公云事急矣勿殺義士斯時某年十五接此𥿄入呈於先公先公即至金吾劉僑所密計不竟其獄於諸公得無連染末幾金吾以寬文言削籍金吾亦遂委過於先公羣小意忌諸君子中惟先公智勇深沉必為吾儕患其後惠公元孺爰書詭行頗僻之劉宗周狠心辣手之黃某意指此一事也乙丑冬訛言繁興謂三吳諸君子謀翻局先公用李實為張永以誅逆奄逆奄聞之大懼刺事至江南四輩漫無影響刑部侍郎沈演欲自以為功奏記逆奄曰事有迹矣逆奄使人日譙訶李實取其印信空本填七君子姓名云俱係吳地縉紳盡是東林邪黨蓋因訛言起於吳地而不知先公實越人也先公三疏劾奄雖為其所恨然非訛言則禍亦不若是之酷非解文言之獄以救楊左魏三公為羣小所喪膽則亦無此訛言也近見王嶽清流摘鏡謂李實睚眥於逆奄先公實欲收邃菴之功而不避形迹則是呆人説夢矣此時宮府惟知一逆奄以王安之植根深固不能保其腰領區區疏遠之李實虔奉其意指且不暇而使之别生事端愚者所不出矣逆奄與羣小朝夕所計慮者翻局二字終逆奄之世無人敢萌此意而羣小自為風鶴者則有二節其一甲子十一月孫高陽行邊至薊欲入覲羣小奔告於逆奄曰此晉陽之舉戶部侍郎李邦華召之也其一則訛言先公用李實事也近日孫徴君鍾元墓志言楊左下獄高陽欲興晉陽之甲以救之楊左已故而止移甲子十一月之事於乙丑七月謂高陽實有其事猶王嶽謂先公實有其事也逆奄之亂去今五十餘年耳目相接其大者已抵牾如此向後欲憑𥿄上之語三寫成烏豈復有實事哉戊午端陽日男宗羲識庭誥昔劉復之求王魯齋先生為其母夫人行狀魯齋曰婦人不當有行狀故凡婦人附夫之志篆只書其夫之姓氏婦不别出其後有書某某同妻某氏合葬者非古法也即特志婦人書其婦德亦不過數言其後件繫其不踰閫之碎事亦非古法也葉安人之喪兒子百家書行實以呈余曰惡汝欲以是不死其母乎抑徇世俗而為之乎魯齋曰顯親之要在立身行道不在乎區區之文也文且不可况文非其文乎無巳則按古法而書之曰安人餘姚葉氏嘉靖戊戌進士工部郎選之曾孫嘉靖乙丑進士鄖陽知府逢春之孫萬曆巳末進士按察使憲祖之女黃忠端公之子婦梨州山人宗羲之婦也山人以職方兼御史徴例封安人生於萬曆巳酉卒年六十有八子三人百藥娶李氏柳氏次正誼娶孫司農之女繼虞氏次百家聘王司馬女娶孫氏子婦法不宜敘今援王元之例女三人長適諸生朱林大理守之子次適任子劉茂林子劉子之冡孫次適諸生朱沆孫男三人孫女四人以卒後中陰之盡權厝化安山禁塋之側安人年十七來歸時天啓五年十二月得奉事忠端公者三月忠端公就逮留家訓一章中言汝婦賢孝是安人生而得忠肅之諡也余亦不敢復加優劣汝曹即極力模寫有能增益此二字乎後世即不信今人之文章其有不信忠端公之言乎不須妄為蛇足余友鄭禹梅新有文聲持此往告之其必不以世俗之文誑汝也其為忠臣家屬也今開贖例得四十金則兩人可出矣世路悠悠無可告語書之以識吾願耳余曰此吾輩事也奈何纍子時錢虞山亦寓武林余弟晦木往告之以五十金俾淡齋過三日之子來告得贖勸之他往遷延不決復見收捕然淡齋之心盡矣淡齋貌朴野嘗言靈隱具德上堂某出衆問話具德棒之某􅮖棒不得打具德大怒鞭朴交下死棄山門外待夜下火有菜傭過而識之負去得活淡齋雖怨具德其稱之必曰老和尚余面謾之曰子真不識造化者耶至是而始敬之然從此以後亦遂不相記憶今歲丙辰偶見范文園談叢林事余曰僧中人物未必盡在叢林文園曰某所交如悟玄之拾字淡齋之飯囚皆以一事終其身亦異人也余曰所謂淡齋者得非大佛頭寺僧乎曰然余問近作何狀文園曰噫死矣淡齋自湖上遷城內小菴厺年鼓樓火淡齋與焉又遷而卒塔臨平山又曰先生既識其人盍一言不朽其人俾某刻之塔上余遂諾之為説者曰令曰獄屋時當完固厚其草蓐家人餉饋獄卒為溫暖傳致去家遠無餉饋者悉給廪獄卒作食寒者與衣疾者與醫藥夫圜土之設聖人之所不得巳也不得已而救之於未流亦且詳愼哀矜如此故淡齋之所為皆有司之事也此不為而彼為之可嘆哉至其救忠義行任狹吾不得以浮屠目之矣作文三戒山林臺閣其文各體嘔擾酸腸以諾鳳毛組織華蟲以酬飢鼠二者交譏失夫故技古亦有言踰垣掃軌縳腰札腳而工軟語可令竈兒見其底裏南雷松桂剡溪煙水一墮塵滓恐不可洗右戒當道之文文字之衰降為代言齊梁霸唐宋雄藩各選上佐亦命王臣爰及今世尺牘寒溫亦有著撰求銜謁文割裂王李咄嗟數翻儒生胥史雜充下陳嚬笑為榮風雅寧論此手一辱不可復伸右戒代筆之文文章之事豈可假人蚓竅蠅鳴孰不自珍一笑而置卷軸徒塵奈何作者與之共陳銘必應法壽必相親誄視可哀序視可存乞言徴啓投遞沿門無與文字買菜積薪凡彼應酬僕不敢聞右戒應酬之文續師説嗟乎師道之不傳也豈特弟子之過哉亦為師者有以致之耳師者所以傳道受業解惑者也道之未聞業之未精有惑而不能解則非師矣本無可師強聚道路交臂之人曰師曰弟子云者曾不如童子之師習其句讀巫醫樂師百工之人授以藝術者之有其實也傳道受業解惑既無所藉於師則生不為之憐死不為之喪亦非過也遂以為古之師弟子者皆然而使師之為道出於童子巫醫樂師百工之下則是為師者之罪也今世以無忌憚相高代筆門客張口輒罵歐魯兔園蒙師搖筆即毁朱陸古人姓氏道聽末審議論其學術文章巳纍幅見於坊書矣乳兒粉子輕儇淺躁動欲越過前人抗然自命世無孔子不當在弟子之列蓋不特耻為弟子相率而耻不為師吁其可怪也若是則師之為道人心之蟊賊也吾惟恐其傳也矣昔者孫明復之為師也以石守道為之弟子執杖屨侍左右明復坐則立升降拜則扶之師弟子之禮若是其重也故何北山之於來學未嘗受其北面北山之意以為茍無其德寧虛其位以待後之學者不可使師道自我而壞也北山可以為師避師名而不為其愼重如此羲老而失學欲求為弟子者也諸君子徒以其久侍劉夫子而過情推奬羲其敢冒今世之無耻哉反昌黎之意作續師説以謝之祭萬悔菴文嗟乎十年以來余之風波禍患苦無巳時然一歲之間非先生過我則我過先生必且再三一雪其心之所甚痛竹燈木榻即啖野葛之味亦足樂也自先生出門余死一兒一孫兩媳刋章名捕幾陷穴胸焚妻之禍我謂旦中悔菴粵中將至必有名香佳硯出而相玩吾二三年間所歷之苦縷覼於前泫然絫欷相􅍟庶幾可以忘矣豈知風波之民即此一日之絫欷相􅍟者天亦不欲以假之乎余之交先生與文虎蓋在壬申之歲也當是時東林復社爭相依附豫所居僻遠城市亦不乏四方之客喪亂之后其迹如掃瑞當嘗曰文虎云亡百里之內自履安而外誰復窺黃氏之藩籬者晚潮落日孤蓬入港雖里媪蕘兒亦知其為先生訪余兄弟之舟也吾老母癸酉四旬癸未五旬先生與文虎皆如期而至癸巳六旬先生揭揭度阡陌間坐定出所作正氣堂壽宴序讀之傷文虎之不偕不覺失聲而哭先生又去三十年登堂拜母之客一朝盡矣先生以乙未十一月二十日别我聞訃亦在是日余之别文虎也乙酉十月十日其聞訃也丙戌十月十日豈數之偶合與抑吾二三兄弟至情之所感召乎去年四月夢先生與文虎躋仲過我因作詩紀之遂為懸讖則不可不謂感召之所至也嗟乎先生名思陵孝亷二十又二年飢寒流落關係晦明夫復何憾而先生曾謂人曰吾一入長安則竹橋剡中之路豈可復過先生之不以竹橋剡中易長安者則欲與吾兄弟共此飢寒流落斯言歷然寧可銷磨皇天后土既屬無情後死之痛顧影彌深先生其必悽愴於我詞也夫張待軒先生哀辭丙辰待軒先生諱次仲字元岵浙之海寧人也年十八為諸生訪周新之希昌於五泄尋胡玉呂廷試於螺山玉呂故王弇州上客一見為忘年交讀書黃鶴山房危簷敗壁旁風上雨窮寒暑不輟天啓辛酉舉鄉試座主錢牧齋天下宗工以得先生為喜而先生持論每落落不與之苟合至京師四方爭欲識靣一日集山東宋華之寓不下三十許人皆知名之士先生疏略無所瞻顧雲間潘殿虎謂其倨傲欲歐之江右朱子強彭城萬年少解之使去以安先生先生兩不知也先生好直言刺人過失無所隱避然主於忠厚以古道望人意不出於詆訶也魏里陳幾亭月旦人物謂先生不好名不妄言蓋陽城之流也性至孝父有怨兮得登堂而將命星欲墜而芒寒兮松將摧而韻徑云求死而不得兮何吐辭之悲硬六經在天地而常新兮先生亦不以一死為究竟所以慰心吾黨兮當與冥漠相輝映嗚呼哀哉避地賦嗟我生之不辰兮逢家難於髫年蘭芽之方茁兮霜雪從而萎焉覆巢無完卵兮羌變姓於傭保之間幸先皇之御曆兮大憝授首而鯨鯢之維時哭祭於闕下兮醢姦骨以為犧先皇登萬歲山而見之兮曰此忠死之孤兒也雖紅曰之昭融兮實魑魅之繁徒宦奄人而歸來兮孰不注東林以僕姑鳥聲慘為車載板兮獸幻而為山都余反首茇舍兮念門户之榛蕪啓藝苑之春花兮收儒林之秋實竊自比於管樂兮寧窶籔乎蓬蓽夫名教之利刃兮固不便乎腐朽者之風逸遂狺狺詈為黨人兮禍復叢夫駿及彼兩京之顚覆兮曾不償孔壬之恩讐我亦何罪何辜兮竊獨罹此橫流朝不坐宴不與兮私天下為一家之憂榜朝堂而名捕兮圍門閭以戈矛待變熊蹯之熟兮寄命日影之留令無伏牀之泣兮友鮮復壁之收而乃避地於兮觀日月之出沒經亂礁之岝崿兮想文山之竭蹶草木無所附麗兮但見飢鷹千羣之倐忽泊牡蠣之灘頭兮昔光堯於是乎至止數百年若旦暮兮誠流涕而不能已彼琴墮有還時兮今庶幾其復爾儼佛像於田兮遙千里而見之歷以中士之耳目兮祇嵬瑣而自疑鳬雁唼呷於鴻波兮島嶼之逶迤也熠耀明滅於紅忩兮星宿之推移也何馬蘭之弱草兮數十尺而扶疏行者往來其下兮每墮蕊之紛如瑞香亦五色兮與荼蘼而間諸凡島中之花鳥兮視人世而竟殊當夫百妖露天水同群魚飛霧海市當空帆俄頃而千里兮浪百仞而萬重縱一瀉之所如兮何地天之不通越長岐與薩師瑪兮乃夫方銷兵而忘戰兮粉飾乎隆平招商人以書舶兮七緑燁於東京金石古竒器兮比户能辨其真􅎓華堂膈以綾幔兮月夜而筝琶笙管之齊鳴余既惡其侈忲兮曰者亦言帝殺夫靑龍甲乙帝殺靑龍不可東行見墨子返余斾而西行兮胡為乎中而那避地於萬山兮目視夫霄漢絶村落之煙火兮支土銼于巖畔接十尋之瀑布兮使受役於城旦查梨瑣碎於秋林兮丹合嫵媚於春澗與猿鳥而爭食兮偕樵蘇而相亂當夫寒食之時靑松散粉兮黃霧彌天杜鵑環岡兮紅霞匝地復有苦烏鳴夜兮林花莫不為之憔悴處處哭聲朝朝喪槥抱膝而歌蒿里兮墓林𥿄錢又乘飈而突戾嚴霜倒飛白髮孤燈不轉水樂但聞鳥更將放筆而就寢兮開户視夫中星斯時高岡之麂下兮似老人且咳而且行旋繼之以猛虎兮風颯颯而屋瓦不寧習既久而不怪兮反有以助余之凄淸而其雪合空山兮黃獨無苗梅花有骨木客之迹無數兮樵人之徑皆沒誰謂莫往莫來兮亦有糜鹿之搪揬甘露降於寒松兮映初日之明熒茲馨烈之鬯達兮豈等級於醁􅙩限之以一垣兮凝至和於中庭亦有高人訪道至我廬邊古松流水算子鏗然悲屠龍之技兮僅世外之可傳蓋將埋名與草腐兮不虞為野火之所妒以淵明之苦節兮天亦不憐其遲暮陶有遇火詩况余之瑣瑣兮又焉能免夫孤露悲藥圃之就荒兮聽流水之侵路倣依齋之易卦兮聊避地於市門里求昔時之屠狗兮遊酒人以亡年釋亡命之疑兮因避地於城郭守不見諸侯之介兮齊咎譽之寂寞最此二十年兮無年不避避不一地念遷播之未定兮老冉冉其巳至於是返故居揵六枳蓬蒿滿琴書肆苟歌哭之有常兮豈怨風雨之不蔽尋松陽湖之迹兮按黃竹浦之記放翁稱夫蜀山兮九靈發其藍水二蘭絶江可望兮雙瀑舉足可企何墜簡之紛如兮留久湮之祕圈雞牧豕其間兮不辭為鄉里之所鄙詎料龍蛇起陸兮百毒一時而滙蚍蜉直欲撼大樹兮蜂蠆亦結而成隊僕區之法亡兮桑梓滌而無類未十年而又避地兮奉老母而竄於海隅纍故書之千篋兮歉家具之一車襁女孫之三孩兮因世亂而憐渠一室分為庖湢井臼兮盈丈而共雞犬圖書談文正之遺事兮猶倣佛乎牛屯九亭石屋之延連兮昔汝湖之所園也羌獨不得際於斯時兮寧功名之足論遊東山之古寺兮悵亡宋之哭聲宋亡邑之士人衰衣聚哭此寺歷千載而不散兮悲天運之復丁東觀兮曾中流而擊楫挽墜日於虞淵兮恨此志之未捷雖同舟之已盡兮而老兵退卒或留於灰劫相與指點殘陽之下兮無異尋乎夢中之蝶蓋聞承平之父老兮終身不見夫兵革獨喪亂之於余兮前未往而後復迫疲曳而不免避地兮尚遑遑其何適亂曰採野葛以為糧飮之以鵠血兮結蓼花以為佩美人復貽豫以苦蘖兮彼桃李之艷陽阻風波而莫適兮苟前修之不爽又何庸厭射兮雁來紅賦溽暑初謝秋聲在樹寸寸寒煙山山靈雨水潺湲而無極天寥泬而如暮嘹亮兮聲滿長空參差兮景留古渡蕙蘭心死芙蓉腸斷草則螢去情亡葉乃根離恨絆爰有弱草生於階畔根老無花條孤不蔓埋菭蘚所不辭招莧陸以為伴於斯時也忽然露奇遂爾目換黃疑曉鶯坐樹紅若春鵑哭旦蜀錦出濯霞光方亂幾登群卉之目豈特百草之冠兒子百家進曰天下之物無大小未有不得一暢發其精華者也彼草木之甚微或花或葉必蒙一時之咨嗟况夫魁梧長者而有終身于虱沙奈何不能安靜待時急流俗之喧譁余乃喟然嘆曰汝以其妖光奪目冶色欺人乃精華之得發耶方其雲慘慘而欲凝月黯黯而將壓莫欣霜叨誰憐雨劫粉染于凄露酸心幻為媚葉秋風宛轉原是哀魂夕陽陸離但有啼頰相對吟蟲時來病蝶豈知其所不得巳者人反賞之以目睫乎小子識之君子聞道而膄心空得第奚羡榮枯于外境達人苦富貴之桎梏世方以為慶修士傷聲名之頓撼世方以為盛又何殊于茲草之萎浥將敗女方以為得遂其性乎故曰木有癭石有暈犀有通以取妍于人皆物之病也海市賦余登達蓬山望海山僧四五人皆言春夏之交此地特多海市各舉所見與圖畫傳聞者絶異蓋傳聞者多言蜃氣燭天影象見於空中豈知附麗水面以呈譎詭言者不出雲氣髣佛豈知五采歷落刻露秋毫東坡在登州以歲晚得見為竒然霜曉霧後往往遇之亦不必拘拘於春夏也信耳信目自有差等山僧約明年三四月來宿其舍海神當不余棄先次第其言而賦之己酉之冬觀海達蓬山僧四五指點空濛曰濵海之地不一兹獨當夫神宫也光怪發作亦何人而不逢但稱登州之海市者蓋不免於瞽聾余曰各言其狀本源曰其為城也雉堞崔嵬麗譙暐曄三里七里勾股可攝於焉戎馬乘城蹀躞照白竊驪雨鬃風鬛儼烽火之告嚴危黑雲之將壓其為樓也蹇産百尺成以鬼巧綺窗朱瑣明星縈繞神妃雜遝憑闌渺渺其語可聞若在粧曉有時而現為黃幄深簷婀娜繡帶悠揚何采旄桂旗之盡屏兹特疊出以為章汪道者曰亦有單門聚落忽然而來屋瓦參差門戶洞開嗟朝煙之不起豈井曰之生埃固職方所不紀亦戰爭所不災續宗曰當旭日之初高有霜鐘之寓質制宏萬石音諧七律藏寂寞之元聲雖滿盈而不出少焉變為城郭中引長橋值刺史之行部或中丞之入朝鳴笳列騶夾轂喧囂何珠宫貝闕而以鹵薄宣驕其後幻為染肆緑沈紅淺羅綺􅌭紛借霞天以為色蒸香草而成文彼蜀江之濯錦信天人之攸分補陀僧曰橘柚初黃颯然風葉覽觀大洋湧起寶塔四面勾欄七重鞺鞳華矚風濤光交目睫遇其變現狀若鸚螺瑣碎末品大越丘坡閃尸之下湛然水波若夫海路壯濶一山千里雖人迹所不交亦針經之能指爾乃帆席未挂僧窗宴啓忽焉叢島逼塞孤峯魁峙疑異國之飛來豈靈居之遷徙當其電絶不煩蝣晷名曰浮山海人習此或曰此何理也余曰夫積塊之間紅塵機巧菁華銷鑠猶且羣羊飛鳥野馬磅礡彼大海空靈神明郛廓百色妖露豈能牢落故其軒豁呈露者窮竒極變而無有齦齶此固蛟龍之所不得專天吳蝄像之所不能作况蜃之為物甚微吐氣更薄乎南海謂之浮山東海謂之海市是乃方言之託也南雷文案卷十終
