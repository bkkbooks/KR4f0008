body:
  text: 棃洲先生世譜姚江黄氏漢穎川之後靖康之亂遷於婺源有仕爲慶元通判者金人破慶元不屈死之子三人分地避兵一居定海東發之始祖一居慈谿吳嶴一居鳯凰山竹墩居竹墩者諱萬河字時通號鶴山居三十年又徙餘姚之竹橋柳道傳詩連延黃竹浦是也則棃洲先生之始祖也當是時離亂之餘力田給食不遑詩書之業故以下四世皆失名諱第七世文茂字茂卿始登㤗定甲子進士第授餘姚州判從學吳草廬歸而主教於鄉毎令學者靜坐數日然後得親函丈子三人德彰至順庚午進士任浙江宣司德順以制舉授鄞縣教諭德澤武舉以都元帥鎭定海又一世均保號菊源洪武庚午貢士北平道御史墀與同邑陳子方當遜國之難賦詩爲臣眞欲效全忠豈料翻成與叛同北狩緣藏靑史筆南還猶是白頭公赴水死失其世次第十世韶字九成成化己丑進士仕至江西提學僉事翊字九霄書畵皆入能品而菊花尤傳於世九成有道南八景詩其和者華亭張東海常熟桑民懌也伯川字德洪號蜇菴舉天順壬午除建寧府教授主考陜西有竹橋十咏同邑倪小野稱其蕭散閒遠超於塵外珣字廷璽成化辛邜鄕試榜首登辛丑進士第二歷官南冡宰逆瑾勒令致仕卒謚文僖第十一世堂字勉敬號南浦弘治壬戌進士擬第一甲未臚傳而卒鄉人至今稱爲探花也嘉愛字懋仁號鶴溪正德戊辰進士從王文成講學卒官欽州嘉㑹字懋禮號履齋舉弘治辛酉知金溪縣嘉仁號半山其詩清新不加雕繪有自然之色第十二世䕫字子韶嘉靖乙邜貢元從文成於稽山書院第十三世尙質號醒泉舉嘉靖己酉守景州致仕詩與山人楊珂齊名第十五世琜字鳯署萬曆庚戌進士譜繁不能盡書書其著者棃洲之世自州判叔父世堂而名諱始可得詳世堂生文貴文貴生子尹子尹生安祥安祥生廷杲廷杲生璽字廷璽兄伯震出啇於外踰十年不歸璽徃求之裂𥿄數百張繕冩兄之年貌籍貫爲零下榜之寺觀街市經行萬里卒無所遇不懈益䖍流轉襄漢間至道州入厠置傘路旁伯震適過之見傘而心動曰此吾鄉之傘也循其柄而視之有字一行曰姚江黄小雷記小雷者璽之别號伯震方疑駭璽出而相視若夣寐慟哭失聲道路觀者亦嘆息泣下遂奉兄而歸廷璽生諒號素菴舉義倉之法於里中年八十素菴生稔號東河娶章氏撫其孤子孤子入城市必向其所之而立待其歸始食未嘗先一飯也守節數十年東河生大綬號對川爲人精敏十五歲官役爲庫子老吏不能欺之知其孫忠端公必貴嘗問之曰孫之推封其祖父何品及之對曰三品忠端公以七品死節故老言其不騐未幾贈官三品追封對川爲太僕寺卿對川生曰中號鯤溟以易爲大師諸生應試以文先定其次第無不奇中五經左氏內外傳國䇿莊騷隨舉一句應口誦其全文與人言亦必原本經傳忠端公之䘮蔣令弔之於途公曰此郊弔也明府以春秋起家豈冝有此一邑利害他人不敢言者公獨言之有伍伯倚令勢魚肉小民公投以治生帖伍百叩頭請死吏亦從此不敢近伍伯之逆案尙書某使其僮客越境追人公呼僮客杖之曰吾非杖汝聊以此寄汝主耳其疾惡如此鯤溟生忠端公諱尊素字眞長號白安天啟間官御史劾魏忠賢客氏削籍三吳訛言翻局以公爲主逆奄忌而害之贈官賜祭塟謚忠端棃洲先生名宗羲字太冲號棃洲忠端公之長子也忠端公五子著者三人宗炎字晦木宗㑹字澤望自鶴山至先生爲世凡十七云南雷里唐謝遺塵之故居在焉距竹橋數里而近先生因以名集大述黃氏世譜冠於集端倣胡助述宋氏世譜以冠潛溪集之例也門人萬斯大述南雷文案序吾師黃先生非欲以文見者也然梁竊聞孔子之言曰文不在兹乎是文卽道也孟子旣殁文與道裂而為二趙宋以來間有合之者然或以道兼文或以文兼道求其卓卓皆可名世者指亦不屢屈也而先生起於文衰道䘮之餘能使二者煥然復歸于一則雖謂先生竟以文見可也歲戊午梁謀刻先生之文以惠當世嘗出一言募之同人而先生之門多貧士越二年始有應者乃相率而請諸先生先生手選其所作十之二三曰南雷文案授萬子斯大爲之校讐斯大謂梁曰集例有序斯序恐當屬子矣梁念侯芭李漢尚賴子雲退之以傳而不足以傳子雲退之小子何人乃能荷兹大任乎固讓不敢巳又念三百年來作者林立先生實集其大成而淺見小夫自坐井底挾冊兎園者不知其文章之醇肆蜚聲藝苑者不知其理學之淵源使斯集出而天下指先生爲一時之文士則吾軰弟子之罪大矣因與斯大舉有明一代之文與先生之文而私論之曰金華之學有其愽贍而無其精深寧海之氣有其浩蕩而無其沉摯姚江之識有其高超而無其典實吉水之養有其藴藉而無其風華玉峯之神有其簡潔而無其雄厚毘陵之才有其快利而無其堅凝而要之原本于六經取材于百氏浩浩乎其胸中而落落乎其筆端固濂洛韓歐所不能兼也斯大曰如子言毌乃徒以文見先生乎梁曰非也昔者子貢之于夫子有文章可聞言性與天道不可聞之說先儒謂其悟後始有斯語而愚獨以爲是終多識之見夫三代而下或有不言性道之文章矣寧夫子之文章而有不言性與天道者乎不知文卽爲道而謂道在文章之外者非鄙陋之儒欲自掩其短則浮華之士未能一窺其奧也善讀先生之文者寧如是乎斯大曰然則子盍書之以告天下之讀南雷文案者梁唯唯遂書之康熈庚申孟秋之月門人鄭梁百拜謹序南雷文案目錄卷一高元發三藁類存序稱心寺志序惲仲昇文集序明州香山寺志序後葦碧軒詩序庚戌集自序姚江逸詩序縮齋文集序半山先生詩序景州詩集序丹山圖咏序明文案序上明文案序下朱岷左近詩題辭卷二畱别海昌同學序樂府廣序序學禮質疑序霍丘名宦錄序李杲堂文鈔序陳子文燕中詩序陳䕫獻偶刻序黄孚先詩序過雲木冰記阿育王寺舍利記鷹窠頂日月並升記念祖堂記天一閣藏書記姚江至省路程沿革記卷三答董吳仲論學書與友人論學書與陳乾初論學書與李杲堂陳介眉書辭張郡侯請修郡志書再辭書辭祝年書謝陳介眉代辭博學宏儒書卷四答錢牧齋流變三叠問答劉伯繩問律呂答張爾公論八家批評答陳士業論孔子生卒答劉伯宗問朱子壺說答汪魏美問濟洞爭端答朱康流論歷代甲子答范國雯問喻春山律曆答萬充宗質疑書答鄭禹梅家譜雜問卷五都督僉事瑞巖萬公墓表天津廵撫畱仙馮公神道碑銘壽兒壙志馮中丞墓誌銘張司馬墓誌銘余若水周唯一先生合誌卷六萬履安先生墓誌銘鄕進士黃澤望墓誌銘陸周明墓誌銘李佩于墓誌銘董次公先生墓誌銘三峯禪師塔銘劉伯繩先生墓誌銘叔父季眞先生墓銘孫女阿迎墓磚王征南墓誌銘王仲撝御史墓表卷七高旦中墓誌銘中丞玄若高公墓誌銘陳母沈孺人墓誌銘劉瑞當先生墓誌銘施忠介墓碑銘旌表馮母鄭安人墓誌銘魯季㮚先生墓誌銘唐烈婦墓誌銘王孝女碑卷八陸文虎先生墓誌銘錢淸溪先生墓誌銘談孺木墓表朱康流先生墓誌銘陳乾初先生墓誌銘黃復仲墓表陳潮生節母墓誌銘查逸遠墓誌銘張旦復節母墓誌銘徵君沈眉生先生墓誌銘李叔範墓誌銘卷九林三敎傳周雲淵傳張景岳傳郭黎眉傳錢忠介傳卷十西臺慟哭記註冬靑引註四明山九題考七怪化安寺縁起辯野史庭誥書淡齋事作文三戒續師說祭萬履安文張元岵哀辭避地賦雁來紅賦海市賦外卷錢屺軒七十壽序張奠夫八十壽序李杲堂五十壽序陸汝和七十壽序徐蘭生七十壽序陳夔獻五十壽序仇公路先生八十壽序陳伯美先生七十壽序張母李夫人六十壽序范母李夫人七十壽序施恭人六十壽序南雷文案目錄終彼其主化家爲國而君臣之分有可議者非今日比也吾願太冲勉之社盟弟艾南英序黃太冲勾餘才士故侍御贈太僕卿白安公之嗣子也太僕公負中正之節攖逆黨之燄抗疏直言殞身北寺天下莫之敢明太冲以弱冠伏闕訟冤義動當世咸曰忠臣之有子也如是太冲雖才何暇以文采自見與才人韻士争尺寸之席哉壬申冬崑山朱浮石先生以太僕公門人手太冲所爲詩一册示予因傷太僕公事聲淚俱至汝南郭亮之風千載再見然予讀太冲詩感憤寓物之言十之一詠事十之三贈答十之五閨語十之一未嘗自譜其年月以其詞繹其志葢發憤於太僕之所爲作多矣此浮石先生所以悲也古人忠孝之語哀激所次有脊有倫况出之䧺文博學之輩衝之日而被之音天地鬼神感通之至數該焉葢不求爲韻語而不能不爲韻語所謂長言之不足又從而詠歎之是也何足怪哉三百篇之亡乃有離騷遂接風雅爲後詞賦之祖夫屈子義兼親賢使不遘上官子蘭之徒騷亦不作騷之爲言憂也故屈原特以其憂傳而千餘年之後宋遺民謝翺者復以其哭不朽晞髮諸詩先儒以爲直遡盛唐以上夫臯羽世經義之學應進士之科使不罹宋季之難感文信之死詩亦不作故臯羽之詩乃與其哭俱由此言之情不絕語必不至文字皆然而况詩之道乎太冲英才磊落挾以少年之氣今具詩幽折陟㧞而忳悒多思與老成積於世故者相類其鐵琴死戰馬老狐行諸篇命事稱名亦頗與原之山鬼國殤翺之鐡如意玉麈尾同至其紅閨麗事諸詩豈所謂托情男女亦宓妃佚女洗藍曲楚女謠之致類乎何其情之峭以深也哀心感才無言不疾故曰發憤於太僕之所爲作多矣夫道彌往而風彌厲古今皆然文字之槩亦觀世之理也惟太冲負忠孝之極思佚按衍於心者旣甚而後溢之爲詩故不獨有詩而詩復鏗急絕人風氣逼古此予所以例之屈原之憂與臯羽之哭而爲言耳不然太冲遭遇明聖忠臣之魂巳雪黨人之碑旣踣以彼其才進用於世非二子之所可同日而語也社盟弟羅萬藻序余属李昭武先生門下士得接侍言論因備知黃白安先生之品與先生之子太冲之才當天啓之季逆奄煽𦦨禍難隂流海水羣飛蔽于天沆舉朝戒於㐫威藏頭過身先生獨與李仲達先生奮起而擊之矯手不屈志凌雲日卒以倡忠臣之氣而寒逆賊之心使創慮難圖者知國有人焉猶不敢速動於惡以遂其今將之心事隔于人存而機啓於身後則先生之以爾先生以一身而易天下則莫不利易也當先生擊之之時使天子覺悟此時天下之禍未深不過執退之使奉祀陪京而巳又使逆璫狂僣稍革薄先生之罰謫止一官如此禍有所止無以激發天下之人之心以是爲先生之功先生之功僅也今皆翩然反之璫之禍天下與璫之禍先生至於如此之極而後璫之深禍隨之然則先生雖一瞑而萬世不視其爲視也多矣太冲之文猶先生之節也方先生之不受誅盗有寵未可得也太冲如將磒焉尸行者漏命頃刻太冲無所爲者臣子一例爲死而仇生君奚可設逆璫有所出事而以黄氏一塊肉飽于方斧是再殺其父也太冲痛難在身亦焉忍之寄血誠于悲響哀鳴嗷嗷而巳夫先生死而後逆璫生逆璫生而後天下之毒甚與天下之憤深天下之毒甚天下之憤深然後逆璫之誅確而先生之功高此理之自然無可疑者然雖理之自然未必事之决然也理然而事不必然則先生之目瞑乎未平是未可知也國創一日不除則先生之志一日不快先生之志一日不快則爲先生之子者枕戈待旦思一决以衝仇人之胸者無時而釋事也事不得出而徒寄之言以瀉之雖欲持平奉吉其可得乎今也竊國之奸先帝欲誅而未遑與先生欲誅而不得者天子聖神獨奮乾㫁而誅之日月清夷風塵不動思其國福者拊乎感其家禍者愜心迄情盡意無復遺憾先生以爲可以瞑目而無憂矣先生不難殺身凡以求此也求遂欲得而又何恨焉先生而在方變昔日𥪡髮裂眥之封事爲今日呼嵩告廟之聲歌典午成而王生廢業逆璫敗而黃子行歌此固忠臣孝子之行也孔門服闋予之琴有成聲者先生制禮太冲其敢過之也夫社盟弟陳際㤗序三序皆少時舊稿今無一存者有此以識知已之感南雷詩曆目錄卷一禜旱蚤發東明聞杜鵑將進酒四明山古祠哭外舅葉六桐鷗鳥寓黄巖村居四明山家臨海度歲長夏天台家書東湖樵者祠㝛雁蕩靈巖天台思歸贈二存飮酒陌上桑貞女引百官渡寒夜月亂礁洋過東明寺臥病二首感舊十四首四十初度九日元夕悼侍者二首偶書㝛積慶寺大雪魏巳任故居三首塟壽兒二首夢壽兒二首向家衕草菴憶化安山塟子婦孫氏二首悲運孫二首夢壽兒又夢初度夢壽兒書年譜上上壽兒墓思壽兒二首㝛石井二首登蘿壁山哭壽兒墓二首讀上蔡語錄夢亡友洋溪暮歸鳳鳴洞金罍觀虞邑賽神得沈睂生信山居雜咏六首哭沈崑銅三首梅花製新茶種百合西瓜初熟七夕夢梅花釣臺河口家書五老峯頂二首東林寺圓通寺歸宗寺贈智瑞三疊泉玉川門銅陵憶沈崑銅荅旦中書侍者墓下二首觀雙瀑二首王仲撝過草堂二首麂鳴智果寺松次何伯興韻出龍虎山二首荅何令元夕至郭姥廟女孫阿迎二首二月遇火五月遇火元夕遲萬貞一水生草堂病瘧二首寄友老母七十二首卷二待祝兒與熊魚山贈以靈集靈巖與徐昭法簡石騎虎圖雪中牡丹過故友墓下集水生草堂夢汪魏美輔潜菴墓三乞三首鮑螺八哀八首舒文靖遺書接家書二首孫子度殯宮偶成萬貞一近文㝛天章寺雲門紀遊㝛雲門達蓬紀遊索圖書㝛石井贈仇滄柱寓吳山遊西湖南山得沈睂生書二首次管乾山韻次林君言韻新菴不寐弔虞鑑清茶條贈屠宗輿老母八旬四首洮石硯避亂二首返故居二首遊永樂寺飲洋溪聞人老者二首慈湖先生墓三首史嵩之墓懷亾友五首贈錢子璧集道遊堂海上圖二首後貧交行日觀圖二首陳青田話舊哭沈睂生丙辰九日寄陳介睂郊外觀菊雲岫山觀合朔次祝獻虞韻海鹽觀海胡孝轅藏書楚石衣鉢贈章淡如次葉訒菴韻族兄七十三首哀章淡如二首舅氏見過贈陸汝和徐虞求墓下申山人墓周公謹硯四首送萬季野貞一三首張司馬墓唐殿宣書屋芝兒上府次山曉韻卷三次張晴峰韻雜咏四首懐陳令升過法相寺書事三首校書乞詩三首送校書還天台二首題獅林壁二首乙丑詩曆題辭余少學南中一時詩人如粤韓孟郁上桂閩林茂之度黃明立居中吳林若撫雲鳳皆授以作詩之法漢魏如何盛唐抑揚聲調之間規模不似無以御其學力裁其議論便流入爲中晩爲宋元矣余時頗領崖畧妄相唱和稍長經歷變故毎視其前作脩辭琢句非無與古人一二相合者然嚼蠟了無餘味明知久久學之必無進益故於風雅意緒濶畧其間驢背篷底茅店客位酒醒夢餘不容讀書之處間括韻語以銷永漏以破寂寥則時有㑹心然後知詩非學之而致葢多讀書則詩不期工而自工若學詩以求其工則必不可得讀經史百家則雖不見一詩而詩在其中若只從大家之詩章叅句鍊而不通經史百家吾悔集序巳未冬吾師棃洲先生以及門之請出南雷文案授斯大斯大敬受手較付梓踰月先生有太夫人之變哀號孺慕幾不欲生四方人士乞銘問序質疑考道者踵接于門先生泣血辭曰吾何以文爲哉來者惘惘若失斯大曰此非求文時也姑待之旣先生治塟畢求者益來先生泣辭曰吾何以文爲哉斯大間進曰居䘮不文誠是也雖然先生於太夫人之卒也含歛之事無不親之其塟也窀穸之事無不親之禮所稱必誠必信弗之有悔者先生其是矣今兆域巳封桑主旣袝禮著居䘮之節七十惟衰麻在身飮酒食肉處于內太夫人年九十先生巳七十有一凖之於禮先生亦得自寛又禮三年之䘮對而不問今諸君求而先生應之凖之於禮與荅問等也且觀諸求文者非昔之忠臣義士卽今之老成賢哲也非經義之討論卽理學之辯難也先生于後先人物臧否素定經義理學夙有成書此不過隨意拈毫便已因物肖形人人飽德非如他人之待于研索也若是則爲文亦無妨于哀慕先生而固辭之將使忠義之激烈老成之典型埋没于庸妄之俗筆而質疑考道者亦無由頓啓其迷其于世道人心沉屈何可勝道先生爲身計獨不爲世道人心計耶于是先生意少解乃于練後次苐書之得如干首斯大請刻爲南雷續文案先生吁然曰吾悔之吾母而不得吾情惡乎用其情樂正子之言也吾于此有同悲矣遂以吾悔名其集康熈壬戍冬十月門人萬斯大百拜謹書吾悔集目錄南雷續文案卷第一先妣姚太夫人事畧靑詞萬里尋兄記山菴詩葉公六桐改塟誌汪魏美墓誌銘陳定生墓誌銘答萬季野䘮禮雜問謝臯羽年譜序輪菴語錄序卷第二叙陳言揚句股述汪氏三子詩序題張子遊卷題海昌六老圖卓母錢孺人墓銘雪中卽事詩歸途雜憶詩靈隱詩大雪野祭詩張仁菴大學說序馮畱仙詩義序過黄孚先小樓詩過諸九徴書舍詩張心友墓誌銘答萬充宗論格物書黃醒菴府君傳陳叔大四書述序章格菴先生行狀卷第二張元岵墓誌銘卓子孟墓誌銘吳處士墓碣諸敬槐墓誌銘脚氣詩徐忠襄神道碑高古處墓表卷第四李杲堂墓誌銘鄭平子壽序翁元語錄序熊雨殷行狀王義士傳唯岑塔銘鄭玄子述唐氏家譜序二欠詩吾悔集題辭吾母五子唯不孝親乳先忠端公殉節之後室如懸磬不孝支撑外侮鞅掌家塾吾母課瓏畝省廩窖府有無棺槨重複無一日之暇壬午冬吾弟皆以受室食指繁多遂别晨舂然夏稅秋糧猶不孝一人辦之際此䘮亂藐是流離身挽鹿車投足無所由是家道䘮失吾弟復去其三霜露晨昏兼并一人魚菽取備鮮適莫搆吾母猶然憐余之辛勤也凡居憂者以䘮服爲之文以不飮酒食肉處内爲之實不孝行之半年而一病支牀氣血中稿親友遂引禮經有疾七十二條來相勸勉不孝姑息從之惶恐無地自念養生送死多少不盡分處未嘗不痛自勉强而悔其有所不能也樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾惡乎用吾情疏謂禮三日不食吾悔之者悔其不以實情勉强而至五日也夫子春之悔悔其過乎禮也余之悔悔其不及乎禮也同一勉强也若似乎余之情實子春之情僞然其僞者一悔而卽實而余之實者葢終身悔焉而未有巳也學箕初稿偶錄目百家生遭家難流離播徙年踰二十始親翰墨帖括之餘間學爲古文詞時過而學終多扞格偶錄數篇非敢自衒亦欲就正有道資以請業以爲失晨之補云爾卷一起康熈戊申至丙辰續鈔堂藏書目序送董在中遊河南序贈諸子宐序陳介眉制藝稿序范國雯制藝稿序仇滄柱制義稿序人譜𥙷圖序種茯苓記哺記鐵鐙檠記王征南先生傳書葦碧軒詩稿後哀張梅先辭觧或神燈賦田草賦紅茉莉賦水蠟燭賦卷二起康熈丁巳贈陳子文北上序送定菴姜先生赴任盛京奉天府序贈吳子升序上顧寧人先生書上徐果亭先生書唐烈婦傳張待軒先生詩記跋書王孝女碑銘後雞冠花記送查夏重遊燕京序復陳言揚論句股書宋安化王祠碑又解或殱虎記冐雨看桂記天花仁術序撰杖集目錄南雷文案三刻魏子一墓誌銘荅萬充宗雜問再荅萬季野䘮禮雜問陳葦庵詩序張南垣傳桞敬亭傳李因傳萬履安詩序張心友詩序姜紫垣墓表張澹若傳續葬書問對論明史理學傳書蔣氏三世傳萬充宗哀辭復秦燈巖書與顧梁汾書書仁宗皇后事萬充宗墓誌銘
