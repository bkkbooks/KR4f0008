  text: 南雷文案卷八
  hash: sha256:23185862beffe727a7db1cb80060ae7f279d6002ef5eb5cab521a23fd02a4372
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0008_SBCK_008-1a}
body:
  text: 姚江黃宗羲著陸文虎先生墓志銘丁巳陸文虎先生卒三十有二年其喪尚在淺土未亡友黃某泫然而嘆曰是余之罪也夫乃告干世之為郭元振者而使契家子萬斯大董其事某月某日葬于城西之外憶其平生崖略而志之先生諱符字文虎陸氏世為寧波望族曾祖州丞湳祖相龍父俱庠生母王氏夏氏生母朱氏四歲時大父引置膝上口授以楊忠愍草疏傳竒先生對客輒抗聲高唱意若深慨慕之者幼多羸疾因讀參同悟真閉關齋禱以為神仙可學而至久之不效復泛監于釋氏為學使周斗垣所知拔置第一授徒海昌祝耳劉心契之有談星命者耳劉謂文章心力結集可望而卜人之冨貴福澤文虎之文避冨貴而不可得者也烏用以星命知之已讀書甫里與許孟宏王聞修兄弟交時聞修選古文三編先生與之上下其議多所禆益孫子長督學浙中以林憲濩自輔憲濩得一卷奇之聞修時為水利道子長以此卷訊之聞修曰此吾故人陸文虎不意君摸索而得之也先生風貌甚偉胸貯千卷謦咳為洪鐘響一時士大夫聽其談論皆以為陳同甫辛幼安復出吳楚名士方招羣植黨互相題拂急先生者愈甚先生謂兵心見于文事鬭氣長于同人亂亡之兆也凡遇刻文結社求先生為序者循環此意雷霆破柱冀使人聞之而覺悟也崇禎辛巳復保舉之制副使許平遠以先生應詔詣京入國學上圭學先生充班首進退從容上過而目之舉壬午順天鄉試監國時賜進士出身授行人司行人奉使閩中不果行清查衛所錢糧千戶馮如斗乾沒獨多恐發覺刺先生于廳事不殊歸而養病結雪瓢于白岩山丙戌十月初十日卒年五十配陳氏范氏陳氏子一人某先生卒後亦夭女三人全某葛某沈某其壻也先生初為舉子業誦習先民時取古文緣飾章句厭而棄去旁涉語録釋典為沉深刻厲之文又改而為恢博奧賾至于其所談易者則取近代理明義精之學用漢儒博物考古之功加之湛思直欲另為傳注不墮制舉方域也其古文詞鵬騫海怒意之所極穿天心月脅而出之苦于才多使天假之年自見涯涘耳詩皆志意所寄媚勢佞生市交遊而作聲色者未嘗以片語汗其筆端也胸懷洞達熱心世患視天下事以為數著可了斷頭穴胸是吾人分內事丙寅聞先忠端公七人之禍希風臯羽作楚漁父二首傳之吳中許孟宏見而滅其𥿄相體仁動以告訐摧拉異巳先生上書王司馬九重禁禦之地九列大臣之重一落魄妄男子得以隻手障天狂言作鱷在朝在野誰無目攝之讎莫必擠阱之命從此凡百有位相效為負墻鞠躬以事四方屋邑失業亡命作姦犯科之流日亦不足矣聖明在上未有信臣鈎索姦隱指陳極弊痛切入告者閣下據職言事轉圜納牖直俄頃間事耳乙亥上以祖陵震驚下詔罪巳開釋罪廢召山隂毗陵相吳縣諸君子皆有翹然自喜之心先生以為此消長之會也語錢虞山曰古人歎神農虞夏之不可作某謂何必黃虞當今目中欲再見隆萬之際士庶風物已不可得然則士大夫胸中斷不可仍作當時縉紳受用之想服御僕從減省斂敕凡懷貪射利乘間抵隙及故為大言聳聽巧售傾險者預行杜絶積誠刻意盡瘁協恭以結主知折讒口則明盛可致不然彼方以佌匕快心此復以夬匕意得正如痎瘧一寒一熱出反彌甚元氣隨之果未幾而烏程排吳縣磔陽矣先生之料事如此海寇披倡鎮撫閉關斷旅瞪視無䇿宣城沈睂生訪余與其客蔡三䇿俱三䇿故降盜也精于水戰先生遇之與之談海上事其船式柁工火器白棓皆內地所未有故能縱橫如意三䇿嘆曰誠能假某戰三十隻勇士千餘人當使鯨無縱鱗波有恬目先生即大聲疾呼于當事給以所言之半稍匕見功而鄉士大夫以門庭養虎咎始事之人為謀不卒而罷即淸查衛所亦是一時名目而先生以實心行之故人驟見之而駭遂及于難雖才堪濟世翛然常有世外之致辨書畫識金石古竒器焚香掃地與名僧聨床對語嘗作誓告紫柏文手書一册寄南康推官錢沃心焚歸宗寺古松下古松為紫柏所呪活者也余束髮出遊吳來之謂子鄉陸文虎志行士也歸而納交于先生從此左提右挈發明大體擊去庛雜念終身偲偲之力使余稍有所知者睂生與先生二人而巳在武林兩京余晨出循通衢委巷搜鬻故書薄暮一僮肩負而返先生邀之要路信宿還書必向余述其梗槩如此盛事于今那復可得乙酉十月十日先生過我草堂嘆息天下事明年訃音亦值是日何其相感之神也銘曰甬東衣鉢玄黃自始凡偶兼混布霧十里於唯先生暨友萬子分别氣類澗石在水後來淸流未喪南指嗟我越中尚如月死危言之功曷其可巳朝議大夫奉勑提督山東學政布政司右參議兼按察司僉事淸溪錢先生墓志銘昔明道泛濫諸家出入于老釋者幾十年而後返求諸六經考亭于釋老之學亦必究其歸趣訂其是非自來求道之士未有不然者蓋道非一家之私聖賢之血路散殊于百家求之愈艱則得之愈真雖其得之有至有不至要不可謂無與于道者也崇禎間士大夫之言學者尚廣大多以宗門為入處蔡雲怡黃海岸林可任錢淸溪其尤也雲怡海岸終為綱常人物可任白椎秉拂一往不返淸溪未見其止四先生者所至各異其求道之心則一也淸溪先生諱啓忠字沃心錢氏為鄞中望族方伯奂而下五世為若賡若選若賡守臨江生三子靖忠舉人益忠訓導敬忠知寧國府益忠之子肅樂即忠介若選生二子長為先生次孚忠先生登崇禎戊辰進士第時承逆奄之後天下書院皆經拆毁先生上言臣觀崔魏亂政奄祠遍于天下乾兒義子人頭畜鳴斯孔孟學術一大厄也三尺童子猶知笑之而中朝誦功勸進轉相效尤者正以諸臣平日理學不明不識節義為何物但知有身家不知有君父但知迎合流俗不知反照良心良心泯而道術晦道術晦而治術隳矣是故生祠書院相為貞勝者也應將巳毁書院盡行修復此聖政之急務也疏出廷臣皆韙之除南康府推官興利除害如不及案無留牘國土之中飢者與食寒者與衣疾者與醫藥民是以不冤郡固有白鹿書院為司李職掌司李多未嘗學間徒稽其田稅出入而巳先生集士子講學隨機指點當其得意忘言三三兩兩便覺沂水春風不遠歸宗寺為紫柏重興先生刻其集于寺中憨山葬五孔峯下其地不吉先生為之重卜有明自楚石以後佛法中衰得紫柏憨山而再振先生之為佛氏金湯如此改理撫州尋遷刑部主事江夏郭昭封以草厰事論死先生念其為文毅子末減得戍粵中陳秋濤臨川湯伯開先後建言下獄抗疏救之皆得出丁憂服闋轉禮部員外郎山左兵荒餓殍載道疏請漕糧十萬石賑之活者無算已而提督山東學政至李家莊流寇猝至先生諭之皆放兵羅拜則先生昔日所活之飢民也以詿誤歸未幾得白崇禎癸未八月十一日卒距生萬曆甲午十二月二十三日年五十娶戎氏李氏高氏贈封皆安人子三人肅鏘肅鍠俱早卒在者惟廉女一適諸生許曰瑚孫一中盛孫女一適諸生萬經先生師事鄒忠介故其學問源流多在江右如顔山農何心隱皆嶔﨑豪傑乃弇洲改爰書以為傳世遂抹摋先生理其緒言刻而傳之吾觀先生當日朱震靑易理隱僻金伯玉苦身持力金正希體認靜虛動直相與水火醯醢鹽梅未嘗封域自守也天假之年豈復如可任之不反乎凡先生師友後來簸蕩橫流多歸節義然先生當服闋入都流氛漸迫寓書高安人曰寇至我必死汝等不必來是先生不幸而不值橫流不得以節義顯也歲壬午余在京師與震靑論學當其險絶處震靑每曰吾友淸溪曾為是言矣海岸司李寧波余嘗與之同舟入省可任有知巳之言伯玉門巷蕭然曾數過之先生亦欲過余而不果先生卒後三十三年高安人方卒廉以某年某月日卜葬凰下溪山麓手為行狀再拜求銘于時中原之師友盡矣廉生也晚不及見此盛時聊以所憶者語之當世守其家學也銘曰科名祿位蝣晷螢光臯某未復姓氏巳忘先生之殁一世之長學舍馬廄師友劒鋩嘉言善行散落四方亦有後死掇拾其旁以慰哲嗣上下倣惶此心此理未嘗滅亡談孺木墓表丁巳君談氏名遷字孺木海寧縣人初為諸生不屑場屋之僻固狹陋而好觀古今之治亂其尤所注心者在明朝之典故以為史之所憑者實録耳實録見其表其在裏者已不可見况革除之事楊文貞未免失實泰陵之盛焦泌陽又多醜正神熹之載筆者皆宦逆奄之舍人至於思陵十七年之憂勤惕勵而太史遁荒皇窚烈熖國滅而史亦隨滅普天心痛於是汰十五朝之實録正其是非訪崇禎十七年之邸報補其缺文成書名曰國榷當是時人士身經喪亂多欲追敘緣因以顯來世而見聞窄狹無所憑藉聞吾之有是書也思欲竊之以為己有君家徒四壁立不見可欲者夜有盜入其室盡發藏稿以去君喟然曰吾手尚在寧遂已乎從嘉善錢相國借書復成之陽城張太宰膠州高相國皆以君為竒士折節下之其在南都欲以史館處君不果亡何太宰相國相繼野死君亦棄諸生北走昌平哭思陵西走陽城欲哭太宰未至而卒丙申歲冬十一月也蓋君於君臣朋友之間實有至性故其著書亦非徒為盜名之祕經而已余觀當世不論何人皆好言作史豈真有三長足掩前哲亦不過此因彼襲攘袂公行苟書足以記名姓輒不難辦榷而論之史之體有三年經而人與事緯之者編年也以人經之者列傳也以事經之者紀事也其間自有次第編年之法春秋以來未之有改也有編年而後有列傳故本紀以為列傳之綱有編年而後有紀事故紀事為通鑑之目奈何今之作者矢口遷固而不屑於悅宏夫作者無乘傳之求州郡鮮上計之集不能通知一代盛衰之始終徒據殘書數本諛墓單辭便思抑揚人物是猶兩造不備而定爰書也以余所見近日之為者其人皆無與乎文章之事而公然長篇纍牘行世藏家輒欲與五經方駕三志競爽豈以後世都可欺乎君乃按實編年不衒文彩未嘗以作者自居異日有正明世之事者知在此而不在彼也君之子祺求余表墓余美無溢辭亦史法也朱康流先坐墓志銘丁巳漳海之學如武庫無所不備而尤邃於易曆三乘易卦為二十六萬二千百四十四以授時配之交會閏積嬴縮無不吻合詩與春秋遞為爻象屯蒙而下兩濟而上二千一百二十五年之治亂燎若觀火其時及門者遍天下隨其質之所近止啼落草至於易曆諸子無復著坐之處相與探天根月窟者則康流先生一人而已康成善算馬融許以登樓季通精數文公謂之老友古人授受之嚴大扺不能泛及也漳海致命先生博稽六藝各有論著其言象數不主邵子之説别為先天後天八卦圖以為諸儒之言易者詳於所變而不詳於所未嘗變變者象也未嘗變者太極也時惟適變道必會通不察其適變則微彰剛柔有拘墟之患不觀其會通則屈伸往來有臨歧之泣求諸物而格之反諸身而體之究其大要不越乎知幾精義二者而已其言小序觀亡詩六篇僅存首句則首句作於未亡之前其下作於既亡之後明矣子由獨取初辭頗為得之又謂鄭詩不特詞不淫聲亦不淫也詞正則聲正詞淫則聲淫非相離之物又謂作詩有賦比興用詩亦有賦比興射義天子以騶虞為節樂官備也諸侯以貍首為節樂會時也其指事也切其取義也直如作詩者之賦體是也大夫以采蘋為節樂循法也士以采蘩為節樂不失職也以婦女之事喻士大夫非比乎以蘋蘩藴藻之菜筐筥錡釡之器感大夫士明信之將非興乎辨古文尚書之非偽謂伏生之書如堯典臯謨洪範無逸何嘗不文從字順至於甘誓湯誓牧誓文侯之命詞旨淸夷風格溫雅雜之二十五篇之中無以辨其為今文為古文也謂春秋闕文錯簡不特郭公夏五觀於日食之先時後時可知矣論樂者謂調以此始者必以此終首尾何聲即屬何調先生言誠如是則宮調之中商多於宮可得仍為宮商調之中宮多於商可得仍為商乎蓋調也者韻也古人雅淡不為繁聲慢詞太抵一句之終曵其音以永之而已先生之折衷諸家如此要不盡同於漳海漳海嘗謂先生曰康流沉靜淵鬱所目經史洞見一方苟覃精三數年雖羲文閫奧舍皆取其宮中何必窶人之室乎自漳海懸記先生之覃精者近三十年又何以測其所至乎先生諱朝瑛字美之姓朱氏康流其别號也晚又號罍菴海寧之花園里人曾祖侍御某祖紹臯父完初母查孺人登崇禎庚辰進士第知旌德縣期年而以外艱歸旋遭喪亂遂不復仕門户綢繆期功縈繞先生屈其經世之業以支吾八口泊然不見喜愠之色酬對甚簡相索於經術之內者惟張子待軒所著罍菴雜述金陵遊草行世五經略記文集皆藏於家生於某年乙己九月卒於某年庚戌三月年六十有六以弟之子翰思為後女三人查蕙沈研周煒其壻也孫二人協徵協紀孫女二人將葬於葑涇之原翰思介吾友陸氷修求志其墓余丙午歲十一月同氷修訪先生於家劇談徹夜綿聯不休盡發所記五經讀之出入諸家如觀王會之圖計平生大觀在金陵嘗入何玄子署中討論五經至此而二耳踰年先生以各經略記首卷見寄荏苒數年欲以一得之愚取證而先生不可作矣千年之役固所願也銘曰六經之道昭如日星科舉之學力能亡經某題某説主媚有司變風變雅學詩不知喪吊哭祭學禮所諱崩薨卒葬春秋不載演為説書蒙存淺達棄置神理助語激聒所以儒者别開天地漢注唐疏宋語明義百年漳海破荒而出象數理學會歸於一罍菴老人入室弟子削筆洗硯俗儒心死漳海之學不得其傳葑涇之原留此一線陳乾初先生墓志銘先師蕺山曰豫一生讀書不無種種疑團至此終不釋然不覺信手拈出大抵於儒先注疏無不一一抵牾者誠自知獲戾斯文亦姑存此疑團以俟後之君子倘千載而下有諒豫心者乎不肖羲蒙先師收之孤苦之中而未之有得環視劉門知其學者亦絶少徒以牽挽於口耳積習不能當下決擇淺識所錮血心充塞大抵然矣近讀陳乾初所著於先師之學十得之四五恨交臂而失之也其言性曰性善之説本於孔子得孟子而益明孔孟之心迄諸儒而轉晦盡其心者知其性也之一言是孟子道性善本旨蓋人性無不善於擴充盡才後見之也如五榖之性不藝植不耘耔何以知其種之美邪故諄諄教人存心求放心充無欲害人之心無穿窬之心有所不忍達之於其所忍所不為達之於其所為老老幼幼以及人之老幼不一言而足學者果若此其盡心則性善復何疑哉易繼善成性皆體道之全功正對仁智之偏而言道不離陰陽智不能離仁仁不能離智中焉而巳故曰一陰一陽之謂道即中庸中節之和天下之達道也繼之即須臾不離戒懼愼獨之事成之即中和位育之能在孟子則居仁由義有事勿忘者繼之之功反身而誠萬物咸備者成之之候繼之者繼此一陰一陽之道則剛柔不偏而粹然至善矣如曰惻隱之心仁之端也雖然未可以為善也從而繼之有惻隱隨有羞惡有辭讓有是非之心焉且無念非惻隱無念非羞惡辭讓是非之心而時出靡窮焉斯善矣成之者成此繼之之功向非成之則無以見天付之全而所性或幾乎滅矣故曰成之謂性由是觀之則仁者見之謂之仁即不可謂仁智者見之謂之智即不可謂智猶中庸賢智之過即不得為賢智也從來解者昧此至所謂繼善成性則幾求之父母未生之前幾何不胥天下而禪乎故性一也孟子實言之而諸家皆虛言之言其實則本天而責人言其虛則離人而尊天離人尊天不惟誣人并誣天矣蓋非人而天亦無由見也是故藨衮勤而後嘉榖之性全怠勤異獲而曰牟麥之性有美惡必不然矣涵養熟而後君子之性全敬肆殊功而曰生民之性有善惡必不然矣又曰資始流行天之生物也各正性命天之成物也物成然後性正人成然後性全物之成以氣人之成以學人物之性豈可同哉大彖何不言萬物資始各正性命而必係之乾道變化之下又何不曰元亨者性情也而必係之利貞之下乎非元始時無性而收藏時方有性也謂性至是始足耳今老農收種必待受霜之後以為非經霜則穀性不全此物理也可以推人理矣是故資始流行之時性非不具也而必於各正保合見生物之性之全孩提少長之時性非不良也而必於仁至義盡見生人之性之全或曰人之氣稟淸濁果有仕百千萬者性有不善焉可盡誣曰氣之淸濁誠有不同然無乖於性善之義也氣淸者無不善氣濁者亦無不善有不善者乃是習耳觀於聖門參魯柴愚當由氣濁遊夏多文端木屢中當由氣淸可謂遊夏性善參柴性惡耶又曰一性也推本言之曰天命推廣言之曰氣情才豈有二哉由性之流露而言謂之情由性之運用而言謂之才由性之克周而言謂之氣性之善不可見分見於氣情才情才與氣皆性之良能也天命有善而無惡故人性亦有善而無惡人性有善而無惡故氣情才皆有善而無惡中庸以喜怒哀樂明性之中和孟子以惻隱羞惡辭讓是非明性之善皆就氣情才言之後儒曰既發謂之情曰才出於氣故皆有善有不善不知舍情才之善又何以明性之善耶才情氣有不善則性之不善不待言矣是隂為邪説者立幟也而可乎又曰本體二字不見經傳此宋儒從佛氏脫胎來者故以為商書維皇降衷中庸天命之性皆指本體言此誣之甚也皇降天命特推本言之猶言人身則必本之親生云耳其實孕育時此親生之身而少而壯而老亦莫非親生之身何嘗指此為本體而過此以往即屬氣質非本體乎宋儒惟誤以此為言本體故曰人生而靜以上不容説才説性便巳不是性則所謂是性而容説者恰好在何處耶樂記人生而靜天之性也二語本是禪宗其書大半在荀子不意遂為性學淵源可怪也後儒口口説本體而無一是本體孔孟絶口不言本體而無非言本體子曰性相近則近是性之本體孟子道性善則善是性之本體而此本體固無時不在不止於人生而靜之時也如曰人皆有不忍之心乍見孺子之心以至四端人皆有之心皆指本體言也曰平旦之氣則雖牿亡之後而吾性之本體亦未嘗不在也曰乞人不屑行道之人勿受則雖下流行乞之徒而吾性之本體亦無時不在也則亦何時何處而非天命皇降之體乎學者惟時時存養此心即時時是本體用事工夫始有著落今不思切實反求而欲懸空想箇人生而靜之時所謂天命皇降之體段愈求而愈遠矣無論人生而靜之時黝然穆然吾心之靈明毫未開發未可言性即所謂赤子之心孩提之愛稍長之敬亦萌而未達偏而未全未可語性之全體必自知學後實以吾心密體之曰用極擴充盡才之功仁無不仁義無不義而後可語性之全體故曰成之者性也曰盡其心者知其性也佛氏喜言未生之前既死之後的道理儒者只曉得有生之後未死之前的工夫佛氏言雖夸大却無把捉儒者言極平實却可持循將何去而何從乎又曰周子無欲之教不禪而禪吾儒只言寡欲不言無欲聖人之心無異常人之心常人之所欲亦即聖人之所欲也人心本無所謂天理天理正從人欲中見人欲恰好處即天理也向無人欲則亦並無天理之可言矣乾初之言大抵如此其於聖學巳見頭腦故深中諸儒之病者有之或主張太過不善會諸儒之意者亦有之夫性之善在孩提少長之時巳自彌綸天地不待後來後來之仁至義盡亦只還得孩提少長分量故後來之盡不盡在人不在性也乾初必欲以擴充到底言性善此如言黃鍾者或言三寸九分或言八十一分夫三寸九分非少八十一分非多原始要終互見相宣皆黃鍾之本色也先生諱確字乾初陳氏為海寧望族曾祖鳴梧祖理川父覺菴皆世其學母葉氏乾初讀書卓犖不喜理學家言嘗受一編讀之心弗善也輒棄去遂四十年不閲其後與同邑祝淵讀書淵議論不守章句乾初每鐫之巳同問學於山陰先師深痛末學之友離見於辭色乾初括磨舊習一隅三反逮先師夢奠得其遺書而盡讀之憬然而喻取其四十年所不閲者重閲之則又格格不能相入遂見之論著同輩為之一閧不顧也乾初議禮尤精從其心之所安者變通古禮而於凶禮尤痛地理惑人為天下異端之禍其於友朋一事稍乖必正色相告不為姑息屠爌陸圻徴文壽母乾初謂世俗之事非所當行社集講會人情之常乾初謂衎衎醉飽無益身心再會之後亦不復赴甲申以後士之好名者強與國事死者先後相望乾初曰非義之義大人弗為人之賢不肖生平具在故孔子謂未知生焉知死今人動稱末後一著遂使姦盜優倡同登節義濁亂無紀死節一案真可痛也乾初之論未有不補名教者晚而病廢不出門者十五年卒之曰為丁巳七月二十四日年七十四葬於沈家石橋之西娶王氏先卒二十七年子二人長翼次禾夭女一人孫二人克鬯克爽余於丙午訪之病中猶危坐劇談又十年丙辰致書約以明歲再見而不可得矣翼以志銘見屬其時未讀乾初之書但以翼所作事實稍節成文今詳玩遺稿方識指歸有負良友多矣因理其緒言以讖前過銘曰有明學術宗旨紛如或泥成言或創新渠導水入海而反填淤惟我蕺山集夫大成諸儒之弊削其畦町下士聞之以為雷霆豈無及門世智限心如以太牢飫彼書蟫欲抹微言與時浮沉龍山之下乃有傑士從遊雖晚冥契心查逸遠墓志銘戊午自余束髮出遊所交於杭郡之諸子凡三換焉始聞子將嚴印持主持聲氣其所謂讀書社者余皆得而友之於中獨知之契馮儼公江道暗張秀初其最也繼讀書而起者為登樓余時就學於兩京不能遍交於中則親陸鯤庭麗京於外則交朱近修逮桑海之後十有餘年余復至杭則子將印持儼公道暗鯤庭巳登鬼録秀初去為浮屠麗京隱於醫肆近修出而索遊其餘亦零落略盡一時被綺繡戴朱纓寶飾之帽燁然若神人之少年蔑視老生不容託末契於其間邂逅而得汪魏美徐蘭生陸氷修查逸遠湖山慘淡天似傷我之孤另也乃未幾而魏美近修又逝麗京不知所往余頻年過海昌猶幸與氷修逸遠登雲岫山觀日出步海堤指點夏蓋石鼓在蒼茫間歲丁巳氷修入燕明年而又喪逸遠余聞之過時而哭夫余於逸遠之交情未必過於前者所卒之諸子而獨有深悲於逸遠者蓋自是而余衰年未死武林之交遊弗復有義熙以前人物矣逸遠初名嵩繼字柱靑後改遺以逸遠為字號學圃世為海寧園花里人查氏海寧望族高祖秉􅉓順天府尹曾祖志文郡丞祖允揆贈兵部主事父大緯崇禎庚辰選貢仕行朝為武庫主事妣董氏贈安人逸遠總角為諸生即慷慨有大志武庫側足焦原逸遠左右其間羈旅騁辭常諧要領往來四渡灘海長風巨浪視之若枕席上過也未幾而武庫捐館草搖風動百毒齊起逸遠弘濟艱難摧剛為柔前掩而後覆補敗而扶傷重立門戶宿艾駭服然外雖縕藉而胸中耿耿者終未下臍時一發見思得所謂奇材劍客者而友之厄屯之歌鉛築之聲雜然出於四壁趨死不顧利害去就也喜讀史得其大意以經濟自期許故凡天下之事他人數百言不能了者逸遠數言其利病纖悉畢見雖鬱鬱無所施為而溝渠保甲社倉諸法講求通變未嘗不行之一方也家産無百金朋友急難窘助不以在亡為辭泖上申生避仇亡命臥病僧舍逸遠身親湯藥死則具棺而葬之申生固義士也天下尤高此舉逸遠短小精悍久處囊中人亦謂其英鋭之氣當伸之於歲月不得於彼者之必得於此也乃一旦中暑卒於舟中屈伸之數有不可解生某年丙寅十一月十五日卒某年戊午三月一日年五十三娶鍾氏先七年卒子四人嗣璉嗣瑮嗣􅓨季子謹出後其仲弟女三人壻王旭庠生董湉朱某孫二人克建克承嗣璉即氷修之壻也嗣璉嗣瑮從余遊皆有俊才逸遠不令為科舉干祿之學而讀書為詩古文士林望風推服天之伸逸遠者庶其在茲乎將以某年某月某日葬於某原二子謁銘於余銘曰龜山有言才智之士非有學力不肯但巳局天踳地時乎不遇縛虎之急能免一怒嗟夫逸遠有才無時北窗述酒西臺竹枝鐵崖老婦鶴年席帽有此數子以為前導張節母葉孺人墓志銘戊午豫友張旦復篤行士也請豫銘其所後母葉孺人蓋數年矣而怠緩未作每見輒以為語間讀其狀而悲之其忍不銘按狀節母姓葉氏元公之女刑部郎中瑜之五世孫也年十八歸同邑張君楩家以孝友聞甬人所謂雍睦堂張氏也歸七年而君中寒疾死節母時年二十有四所生止一女君之同産三人亦止一子議者欲以三從子為後節母曰吾伯叔年少字育未艾吾不妨待之母以吾故乖親疏之序也未幾而女亦夭乃携女姪以共晨夕凡二十一年而次姒始生一子即旦復也從蓐草之中納之於懷而後喜可知也旦復又多病故鞠子之哀倍於常母旦復稍長女紅句讀每夜一燈熒然雞初號而起不復吹燈暗中櫛髮取宿水頮面然後蹴旦復起之隙中殆有光射發册而讀蓋日以為常也一日旦復自外傅歸節母問所讀書對曰大學節母啓笥取一束授之曰此大學也昔汝祖母為汝父聘吾汝外祖以此書為報冀汝父讀之汝父死以為此書無用不料猶見汝讀之也旦復視之為大學衍義補相對泣下當旦復未舉時晨炊夜作煩媷之事不肯讓人人以為癡曰枉此辛苦不知欲為何人節母聞之嘆曰吾依伯叔存活家計淸貧豈容一人間食重其纍耶其後旦復見節母鼻孔有癭粟許問故曰往時夜織欲睡觸以燈草久之失血而成節母即甚愛旦復然相勉以淸苦蒸一雞卯箸畫為三每飯不得越界荒年伯叔將鬻公産而難於節母節母即令旦復押劵曰諸父之意童子當順承也外家為旦復議姻節母曰兒年幼未可以此迫促諸父其不為姑息如此從來碑志之法類取一二大事書之其瑣細尋常皆略而不論而女婦之事未有不瑣細者然則竟無可書者矣就如節婦只加節之一字而足其餘亦皆瑣細也如是而何以為文乎豫讀震川文之為女婦者一往深情每以一二細事見之使人欲涕蓋古今來事無巨細唯此可歌可涕之精神長留天壤豫書節母之事而喟然於其故也君生某年甲戌某月某日卒某年壬寅十月初一日年二十九節婦生某年巳卯十二月二十二日卒某年戊子正月二十八日年七十合葬於某原子汝翼太學生旦復其字也孫奉璋銘曰墓木已拱奉祀未寫二十一年以待來者唯其心之金石豈能限以孤寡徵君沈耕巖先生墓志銘有明之輔臣以奪情見劾者三人曰李賢張居正楊嗣昌然劾賢之羅一峰劾居正之趙吳艾沈鄒皆有祿位於朝唯劾嗣昌之沈耕巖則諸生也賢與居正當天下無事之日所失不過一身嗣昌當危急存亡之秋所關乃在社稷耕巖之言拯溺救焚縣記後來不爽纍黍又非一峰諸公所言僅在一時也崇禎丙子復保舉之制應天巡撫張國維以耕巖應詔時中原流寇決裂特起嗣昌於苫塊倚以辦賊而嗣昌以熊文燦之招撫為嘗試逍遙司馬堂中敗問日至掩飾徒工耕巖慨然國事至此朝端尚無一人言之者乃草綱常正而後可以正世風一疏謂金革無避漢儒之曲説君子必不出此即嗣昌迫於君命亦宜躬歷戎行袵革荷戈而乃支吾旦夕安枕京畿外飾勤勞中懷規避將來誤國嗣昌之肉其足食乎繼又草樞臣籌國已誤一疏謂嗣昌既不能循先朝大臣起復故事軍旅之寄一付文燦使其聲罪除凶徐持降議亦豈為後以一十二萬方張之師不為不武以二百八十餘萬咸集之餉不為不充整旅以往何凶弗摧即使面縛輿櫬猶應宣布皇威而後愍其歸死以宥之詎有漫無剪治招之不來強而後可援賊之認帖以為金石講盟結約猶同與國天下有不能殺人而能生人者乎有授柄於敵而可懾敵者乎臣不知其所終矣通政司張紹先以疏字逾額存案不上耕巖上書通政言無使獲罪執事幸甚紹先始請上裁嗣昌亦惶恐待罪請進劾已之章有旨這本既違式卿不必更請封進耕巖乃櫽括兩疏以就格上之留中不報黃漳海嘆曰此何等事在朝者不言而草野言之乎吾輩真愧死矣臺省何楷錢增林蘭友詞林劉同升趙士春相繼劾嗣昌最後而漳海有廷辨之事則皆發端于耕巖也向若耕巖之説行斯時易置嗣昌文燦流寇之禍豈至若是哉故識者以為此番保舉得耕巖一人可以謂之不虛矣耕巖姓沈氏諱壽民字眉生别號耕巖世為宣州人曾祖寵官至參政學者所稱古林失生是也祖𢡟敬蒲州丞封德慶知州叔祖懋學翰林修撰父有恆太學生耕巖孤峭不妄言笑為文深入理窟而出之淸真江右艾干子至宛上評許在盛名之上人駭其言而卒莫之能易焉故其選時文耕巖之文多入文定不敢輕置於文待一時聲名之盛吳中二張與江上二沈相配二張謂天如受先二沈謂崑銅耕巖不以名位相甲乙也上書報罷不復厝意經生之業與周鹿溪掩關茅曲俱理佐王之學無何而黨禍作阮大鋮之在留都也以新聲高會招來天下之士利天下有事行其捭闔耕巖劾楊疏尾有大鋮妄畫條陳鼓煽豐芭於是顧杲吳應箕推耕巖之意出南都防亂揭合天下名士以攻之大鋮恨甚以為主之者鹿溪也及大鋮得志曲殺鹿溪按揭中姓氏次第欲誅之而以耕巖為首余亦與焉且聞溧陽亡命投止耕巖矯詔將下溧陽返北耕巖遂變姓名入金華山中南都亡而事解耕巖遂不返故園東遷西徙入山惟恐不深瓶粟既罄採藜藿以續食有知而餉之悉行謝絶曰士不窮無以見義不竒窮無以明操郡守朱元錫曾寄十金耕巖意不欲受庋置壁中三年塵甑未嘗一發視也溧陽既相將特疏薦之專使寓書耕巖不開封對使焚之溧陽意猶未己耕巖寄書謂之曰龔勝謝枋得其智非不若臯羽所南也而卒以隕厥軀者緣多此物色故耳故凡今之欲徵僕薦僕者直欲死僕者也溧陽嘆曰先生所謂名可聞身不可得見者也乙未始返故廬松菊無存田園半割或請直諸曰身既隱矣焉用直之然避人愈深其名愈著當事或邀之半道則望望而去比之元亮人以為隘焉乙卯五月屬疾門人吳肅公侍耕巖命其載筆曰以此心還天地以此身還父母以此學還孔孟語畢而卒是月之三日也年六十九遺集若干卷間道録若干卷配徐孺人先十九年卒子六人洙燮棆鑑埏逢將以某年葬於某所耕巖重然諾一切皆有至性友人周梅骨死海外其子幼耕巖渡海葬其骨鹿溪之殁也家業零落藐諸孤為逋負所逼耕巖鬻田以償之不足貸諸人又不足屬諸門人鹿溪始有完卵故白言才疏意廣甲申以前貸金至六百以上皆急朋友之急也余少遭患難輟業者久之庚午邂逅耕巖於南中偲偲之力何日忘之癸酉耕巖訪余至姚江戊寅余訪耕巖至宛上而不遇改革以後兩番寄詩亦不知其達不達也甲辰在姑蘇與鄒文江約將以秋冬之際同訪耕巖日復一日文江不來而老母年登九旬余遂不可遠行矣茫茫禹迹余之不可以告人者欲向耕巖盡之豈料竟無相見之期耶乙卯八月接耕巖永訣一書乃是年四月二十日所寄去易簀十有三日耳以數年不通尺一忽得之易簀之際不可謂非吾兩人之冥契也先生之子逢不遠千里求志幽石余泫然和淚而銘曰吳門之卒即攻王氏之人西臺之哭即劾似道之臣嗚呼耕巖千載同論李叔範墓志銘巳未君諱士模號叔範始祖育自靑州徙鄞世為望族父坤元字公簡以諸生有聲場屋君少有至性十歲失母哀痛如成人事父以孝稱稍長同諸兄為科舉之學諸兄皆列庠序而君家數世同居人衆事繁推君司家事內外斬斬雖家庭中凛如公府晨起群從皆衣冠肅揖始退而肄業婦女亦分頭飪織無有怠者冠婚喪祭一以家禮從事其子弟皆循循雅飭言談舉止人見之不問可知為社南李氏社南者君所居地也君尤篤于恩義故人老而無子捐金為之取妾踰年而有子族弟垂殁以身後囑之君經理得宜撫其子以立家室卒為文士嘗為賀客遇有墮珥索其主還之而後退君處里巷間其所得為不過如是而君亦無不為也娶某氏子五人如玉明經博士如金如圭恱皆諸生廷玉孫男八人開壬子副榜太學生朝陛闡聞闕朝宗朝鯨朝尚孫女七人曾孫三人余友李杲堂為甬上耆舊傳言弘正間有南塘翁其行真摯卜宅社南以孝友世其家公簡即其孫也事父母疾不緩帶居喪哀毀盡禮兄弟六人友愛備至今君之所行一如其父所謂孝友世其家者益信矣余觀張東沙寧波志别出新意立純德一門大約以處夫士之窮而不遇者故南塘與君皆在純德傳昔浦江朱氏縣志有名德傳宋景濓不以為然其於浦陽人物記先之以忠義孝友次之以政事文學貞節生人之美備矣若君者宜列孝友蓋景濂之孝友僅四人何千齡之四世同居李氏有焉鄭太和之化行一家君實似之若以君之行無竒未必應銘法然則景濓不足法歟君之葬也開來請銘銘曰世眼齷齪崇公卿人物以此差重輕臯某未諾隕厥聲松耶柏耶走鼯鼪詩書門戶人不驚雍雍穆穆和氣生長為斯世守天經史官上下書法明萬鍾千駟不敢爭社南李氏孝友稱弘正以來過百齡有如不信視斯銘南雷文案卷八終
