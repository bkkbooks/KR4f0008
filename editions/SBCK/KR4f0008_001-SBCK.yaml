  text: 南雷文案卷一
  hash: sha256:f191d5d20641a12a90a92cdc9ef65a3a6067e674aaa49503719d6d8ddc12b3fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0008_SBCK_001-1a}
body:
  text: 姚江黄宗羲著高元發三藁􅀋存序甬上古文詞自余君房屠長􅀸而學者之論亡矣君房瓣香劉子威􅀡欲抹昌黎以下至謂詩書二經卽吾夫子一部文選此其中更何所有長􅀸稍變其節奏出之曼衍而謂文至昌黎大壞歐蘓曾王之文讀之不欲終篇所以歸美六經者僅僅在無纖穠佻巧之態其本領與君房未嘗不同也後進晚生語流注嘗見其讀大家文字未畢首尾輒妄置評論曰其筆弱其氣薄余應之曰子姑尋其意之所在葢時風衆􅀔自難以片言洗滌故不與之深論何者爲健弱厚薄也古人以辭之淸濁爲健弱意之深淺爲厚薄勦襲陳言可謂之健乎遊談無根可謂之厚乎數十年甬上之風大抵如此吾嘗與萬悔菴極論作者之指是時不以爲非者有高子元發卽取有明十數家手選而鈔之大意多本於余遇余有所論著亦必手鈔之當極重難返之勢余又無祿位容貌如震川所云巨子者足爲人所和附嗟乎余何以得此于元發哉今去其時曾不二十年而甬上諸君子皆原本經術出爲文章彬彬然有作者之風者不下六七人余屠雲霧忽焉開霽以視元發􅀌另獨往之時爲何如􅁘以此見文章如日月之在天光芒終古其有晦明更食之不同則偏方下土之自爲通塞也元發自次其壬寅以後三年在獄中者爲蓼圃稿乙巳出獄者爲知生閣稿丙午後三年寓閩者爲屏山集合之爲三稿􅀋存求余序之嗟乎元發學文二十年而身困獄吏寄食他人茫然於世故之江河反不如塲屋架綴經義之士取寵譁世將無古文一道徒爲觀美之具無裨寔用如是則與余屠相去唯之與阿何所較其優劣余與元發夙昔所談仍是俗儒故態耳雖然詩書所載何莫非文也伊傅周召孔孟豈眞虚費心力如昭明􅁘元發當患難貧賤之中亦思平生誦讀無一足恃可以知文之所在矣盍與六七君子者求而得之其幸以語我一人之數耳事有不可知曾不一二十年而數十人者天下已莫能舉其姓氏吾黨知之者亦曰某也迫於飢寒某也轉於流俗生前身後葢巳爲狐狸貒貉㗖盡而禹功擎拳撐脚抗塵決網得有其耳目口鼻於城郭阡陌之間望而知爲有道者不與數十人者同其陸沉殘破則若向之數十人爲禹功一二人而設也丁未之秋出其所著稱心寺志命余序之夫禹功以燕許廟堂之筆掎摭於窮村絕滿不以爲枉夭而沾沾卷石之菁華一花之開落與桑經酈注爭長黃池則是獅象搏兎皆用全力爾吾聞禹功之在寺也因於內衡法師朝則撾鼓聚衆衡師上堂講相宗暮則撾鼓聚衆禹功上堂講四書周易一時龍象帖帖坐位下恐不卒得聞昔趙大洲以内翰爲諸生談聖學於東壁鄧豁渠以諸生爲諸生講舉業於西序朝夕聲相聞學宮傳爲奇事夫儒書內典習者各樹城柵兩不相下非如舉業之於聖學同出一先生之言也有傳衡師禹功之事不更爲奇􅁘雖然禹功固所稱儒門數十人中之一二人也又爲釋氏强分其半余其能無􅁣也夫惲仲升文集序名日初常州人戊申舉業盛而聖學亡舉業之士亦知其非聖學也第以仕宦之途寄跡焉爾而世之庸妄者遂執其成說以裁量古今之學術有一語不與之相合者愕眙而視曰此離經也此背訓也於是六經之傳註歷代之治亂人物之臧否莫不各有一定之說此一定之說者皆膚論瞽言未嘗深求其故取證於心其書數卷可盡也其學終朝可畢也雖然其所假托者朱子也盍將朱子之書一一讀之乎夫朱子之敎欲人深思而自得之也故曰若能讀書就中却有商量又曰且敎學者看文字撞來撞去將來自有撞着處亦思其所謂商量者何物也撞着者何物也要知非膚論􅮊言可以當之矣數百年來儒者各以所長暴於當世奈何假托朱子者取其得朱子之商量撞着者槩指之爲異學而抹殺之乎余學于子劉子其時志在舉業不能有得聊備蕺山門人之一數耳天移地轉殭餓深山盡發藏書而讀之近二十年胸中窒礙解剝始知曩日之􅀌負爲不可贖也方欲求同門之友呈露血􅎃環顧宇下存者無幾突如而發一言離經背訓之譏蹄尾紛然然吾心之所是証之朱子而合也證之數百年來之儒者而亦合也嗟乎但不合于此世之庸妄者耳武進惲仲升同門友也壬午見之於京師甲申見之于武林通朗靜默固知蕺山之學者未之或先也而年來方袍圓項叢林急欲得之以張皇其敎人皆目之爲禪學余不見二十年未嘗不以仲升去吾門墻而爲斯人之歸也今年渡江弔劉伯繩余與之劇談晝夜盡出其著􅁧格物之解多先儒所未發葢仲升之學務得于巳不求合於人故其言與先儒或同或異不以庸妄者之是非爲是非也余謂之曰子之學非禪學也此世之中而有吾兩人相合可無自傷其􅀌另矣或者曰仲升旣非禪學彼禪者何急之也余曰今之禪者其庸妄亦猶夫今之舉業之士也惡能爲毫釐之辨哉其貌是則是之而巳然則仲升之貌其貌何也余弗答因書以爲仲升文集序明州香山寺志序己酉儒者專意經綸其運動開闔之所不得不歸之朝市而山洞崇幽風烟迅遠勢相濶絕於是學仙者私據之而别生事端便復傲朝市以所無有洞天福地之說出猿鳥亦受驅役矣釋氏莊嚴宮室遍於域中又復以泉石􅂕響佐其螺鈸凡寺有志此近來之一變也然而庸俗驅烏無與於文章之事而使名蹟銷沉淸言漏奪大抵以時人所作充賦畱穢簡牘耳紙上姓名一一已爲蟲魚㗖盡昔忞公以天童儲公以靈岩屬余發凡念士旣不得志於時便當十岳之上畱其足跡而乃俯循儒墨於文網之內瑣瑣一方此心未折以故力辭而止己酉十一月來遊達蓬續宗上座出其所著香山寺志求余爲序詮次不煩與前年所序趙禹功稱心寺志皆名筆也燈下展閲鏗然橡栗墮瓦不異李五峯宿石梁時又念頭顱如雪遠遊志願何可必遂不如一丘一壑光景絕可憐愛耳此山東臨滄海多海市秦始皇嘗駐驆於此以其可達蓬萊故謂之達蓬山封禪書言三神山去人不遠諸仙人及不死之藥皆在焉而黄金銀爲宮闕未至望之如雲及至三神山反居水下臨之風輒引去終莫能至云頗怪此等妄談不可以欺愚者以始皇之明察方士焉能以鑿空烏有之事令其聽信吾至此山而所謂黄金銀之宮闕居人無不見之然後知方士之言未嘗無所據也始皇卽欲不信得乎葢登州海市掩映遠山望之如雲而此山臨視咫尺闌楯之底其謂反居水下是也嗟乎此山培塿以始皇之力終不能有而二三寂子黃金銀宫闕且收之爲籬落間物其亦可􅁣也夫後葦碧軒詩序己酉後葦碧軒詩者余舅氏翁祖石先生之所作也南宋詩人四靈其一翁卷以葦碧軒名集先生慕四靈之詩而與卷同姓又濵江四山各象一靈先生居江上故以卷之所名者自名也先生名月倩字元美後改名逸字祖石大司馬見海之後少從先忠端公宦遊京師授余弟晦木澤望句讀是時巳能詩忠端公舟中雜咏所謂共坐得詞人者指先生也忠端公歸里先生相從如故至丁卯而去去十有三年而復來遂移家住予之旁舍至丙申又移家而去亡何妻死子夭子婦去幃孩孫二人寄食外家又殤其一傷哉先生老苦至於此極也先生與余家相依二十餘年凡余家盛衰變故患難之事嬉遊酒食一一見之於詩顯顯焉無有忘棄者余詩所謂却恨一編葦碧稿十年閒夢不銷除者此也先生之詩於牢籠今古排比諷諭非其所長而雕刻雲烟搜抉花鳥時以一聯半句奪人目色故流連於杯酒片景終身以之古來論詩有二有文人之詩有詩人之詩文人由學力所成詩人從煆煉而得大篇麗句矜奇闘險使僻固而狹陋者茫然張口至若空梁春草意所不停正復讀書萬卷豈能採拾此先生之詩所以可貴也先生嘗以底草囑其子曰我之魂魄落此死後能守則守之無俟桑主靈􅇃苟卷軸在案麥飯寒漿神具醉飽不能守則納之棺中霜淒月苦定聞􅀑唱愼母爲賣醬家所得也今子姓凋落此願不可心遂乃執余手而泣曰吾子不惜一言張諸好事則平生心血不爲徒嘔余悲其言爲汰其意之重出者辭之陳故者二千餘首之中得一百二十四首可以傳矣念文長之集得中郞激揚發越而後傳世余氣力不若中郞先生之學亦遜文長此例姑止吾友林茂之得陳白雲之詩相與流涕而讀白雲因是亦傳余觀白雲之詩陳言戾句刋落未盡豈能敵先生之一百二十四首哉文章如金玉不以好惡親疏增損其價空堂油盞懸筆敘此葢余與先生相對流涕之時也南雷庚戌集自序庚戌余觀古文自唐以後爲一大變唐以前字華唐以後字質唐以前句短唐以後句長唐以前如高山深谷唐以後如平原曠野葢畫然若界限矣然而文之美惡不與焉其所變者詞而巳其所不可變者雖千古如一日也得其所不可變者唐以前可也唐以後亦可也不得其所不可變而以唐之前後較其優劣則終於憒憒耳有明一代之文論之者有二以謂其初沿宋元之餘習北地一變而始復於古以謂明文盛於前自北地至王李而法始亡其有爲之調人者則以爲兩派不妨並存嗟乎此皆以唐之前後較其優劣者也夫明文自宋方以後􅀡致而少曲折奄奄無氣日流膚淺葢巳不容不變使其時而變之者以深湛之思一唱三嘆而出之無論沿其詞與不沿其詞皆可以救弊乃北地欲以一二奇崛之語自任起衰仍不能脫膚淺之習吾不知所起何衰也若以修詞爲起衰盍思昌黎以上之八代除俳偶之文之舛詞何嘗不修非有如唐以後之格調也而昌黎所用之詞亦卽八代來相習之調也然則後世以起衰之功歸昌黎者何故是故以有明而論餘姚崑山毘陵晉江其詞沿唐以後者也大洲浚谷其詞追唐以前者也皆各有至處顧未可以其詞之異同而有優劣其間自此意不明末學無智之徒入者主之出者奴之入者附之出者汙之不求古文原本之所在相與爲膚淺之歸而巳矣庚戌冬盡雨雪餘十日而不止四野凶荒景象􅃤澹聊取平日之文自娱因爲選定以序事議論者編於甲考索者編於乙古今詩編於丙昔元白編次其集於穆宗朝題曰長慶集郝伯常集其文於甲子命曰甲子集今余編次於庚戌遂題曰南雷庚戌集又余生於庚戌其支干爲再遇也念六十年來所成何事區區無用之空言卽能得千古之所不變者巳非始願吾聞先聖以庚戌生其後朱子亦以庚戌生論者因謂朱子發明先聖之道似非偶然余獨何人以此名集所以誌吾愧也姚江逸詩序壬子孟子曰詩亡然後春秋作是詩之與史相爲表裏者也故元遺山中州集竊取此意以史爲綱以詩爲目而一代之人物賴以不墜錢牧齋倣之爲明詩選處士纖芥之長單聯之工亦必震而矜之齊蓬戸於金閨風雅袞􅃏葢兼之矣然天下之大四海之衆欲以一人之耳目江湖臺閣使無遺照必不可得是故不勝其逸者之多也卽以姚江而論陳隋而上止存虞氏一家之詩有唐一代見之唐詩紀事者雖下邑偏方皆有詩人點綴而姚江獨缺宋之詩人高菊磵孫常州皆爲眉目其集皆不傳元之鄭山輝楊元度其時諸老集中多見其唱和姓名今求一篇亦不可得數百年以來海內文集列屋兼􅰅而姚江獨少卽有成刻者問之子孫間供茶鐺藥竈之用亦有誦咏巳落四方之口邑中反無知之者葢科舉抄撮之學陷溺人心誰復以此不急之務交相勸勉由是言之前此之逸者寧有旣乎余少時讀宋文憲浦陽人物記而好之以爲世人好言作史而於鄕邑聞見尙且未備誇誣之誚容詎免諸此後見諸家文集凡關涉姚江者必爲記别其有盛名於前者亦必就其後裔而求之如是者數十年矣以其久故篋中之積多有其子孫所不識者然而兵塵遷徙蹇篷下擔時有墜落如柴廣敬金蘭錄魏嘗齋文集之􅀋正不復少及今不爲流通使之再逸自此以往皆余之罪也歐陽子言文章言語之在人無異草木榮華之飄風鳥獸好音之過耳不可爲恃雖然此爲作之者言之也士生後世慿虚而觀盛衰之故彼富貴利達蠅翔螢腐沒於晷刻之間復令其性情深淺無所附麗文責誰歸是爲忍人故余與靜岳先生爲此選也名之逸詩葢有二義前乎此者是編爲所逸之餘也後乎此者庶幾因是編而不逸也半山先生詩集序甲寅唐多詩人飇扇波委卽偏方下邑么絃􅀌韻亦瞥入簡牘而吾姚江自虞永興以外寂寥無聞焉且永興又隋氏之遺也以唐詩人之多姚江人物之衆而單聯隻句不能分有唐之一數豈其風雅道衰地土使然􅁘抑窮山海島傳之不能廣􅁘不然在當時未嘗不繕寫模勒流傳人口久而遂至失落􅁘余讀家集至半山先生詩而有感焉先生余六世族祖也諱嘉仁父翊字九霄九霄善近體詩書法趙松雪畵竹石菊花尤入神品今其詩失落而先生之詩尚存十之一緣情綺靡之功聲勢物景能感動人使其載之唐詩紀事中故亦嫣然秀出者也而屈抑於諸生以死其時中原少年逓相倣效競作新詞自謂何李詩體一經品題姓名便不寂寞先生與一二窮退無力之徒唱之而未必能和和之而竟亦莫能解也安望其傳之之廣乎余閱有明文集唯正德間模勒最工卷軸繁多此皆有力者所爲先生有作脫口之後書之故紙題之敗壁其繕寫亦一過再過而巳在當時巳如此又何待久而失落乎由先生父子言之百年之間父老見聞猶在巳同榮飄音過歸於磨滅况有唐千年之遠􅁘則姚江無一詩人之傳者非其風雅道衰亦可知矣今先生所傳之一二亦豈能必其傳遠但自先生以來姚江之爲富貴者何限卽有子孫守其遺集裝潢投贈偶揭一二板便嘔噦棄去以充糊壁覆瓿之用者不少矣曾有如先生見之殘編欣賞而讀之讀之而唯恐其盡否也景州詩集序甲寅公諱尚質别號醒泉吾始祖鶴山公之十三世孫也嘉靖己酉舉於鄕知息縣陞景州守修董仲舒書院改周亞夫祠皆自爲文記之隆慶元年致仕所著有靑園錄詩近千首余存其十之一以官名之曰景州詩集序曰若景州公者乃可謂之詩人矣夫詩以道性情自高廷禮以來主張聲調而人之性情亡矣然使其說之足以勝天下者亦由天下之性情汨沒於紛華汙惑之往來浮而易動聲調者浮物也故能挾之而去是非無性情也其性情不過如是而止若是者不可謂之詩人周伯弜之註三體詩也以景爲實以意爲虚此可論常人之詩而不可以論詩人之詩詩人萃天地之淸氣以月露風雲花鳥爲其性情其景與意不可分也月露風雲花鳥之在天地間俄頃滅沒而詩人能結之不散常人未嘗不有月露風雲花鳥之咏非其性情極雕繪而不能親也景州之詩咽噱於冷汰􅆞綿於綺靡江濵山畔至今性情恍然猶在其斯謂之詩人之詩乎余嘗輯姚江逸詩千年以來稱詩者無慮百人而其爲詩人者三人而巳宋高菊磵明宋無逸及景州是也菊磵之詩僅見之詩話武林舊事者不過十餘首無逸詩集久堙余從其後人鈔之以傳景州當時詩畵與揚秘圖齊名秘圖詩散失而景州亦無有明其能詩者異時諸老先生論姚江之詩盛稱陳太常贄馮雪湖蘭兩人太常之和唐音未免一時習氣雪湖與謝文正唱和險韻相伯仲擬古樂府去西涯遠甚雖各有長處要俱不可謂之詩人也顧他年有定姚江詩派者菊磵爲詩祖景州則又爲吾黃氏之詩祖當不舍吾言而取定於前人矣丹山圖咏序甲寅道藏中有丹山圖咏以四明山名勝製爲法曲而托之木􅀇虛􅁧賀知章註其圖爲祠宇觀所刻與元道士毛永貞石田山房詩合爲一卷則此咏此註亦永貞之徒所爲按木華字􅀇虚在晉爲楊駿府主簿而咏中所稱宋應則鄭宏齊謝眺何昕梁范顏初未嘗自掩覆其年代之不倫也四面七十峯疆域因是圖咏而齦割就理然亦不免淆亂如以小溪接梨洲以翠岩屬西面以紫溪附大小晦以抱子山置大小皎皆疎略之甚永貞住山中四十年與掘藥採薪者相習何難於考校眞實而乃有此失􅁘至其攀援故事大槩子虚烏有不可以記傳勘之固鹵莾道士之常不足怪也原圖不傳在餘姚縣志者復多謬誤余旣爲别作其咏註之失亦稍正之憶歲辛巳在金陵從朝天宮緡道藏自易學以外干涉山川者皆手鈔之矻矻窮日此卷亦在其中歲壬午至自燕京便與晦木澤望月下走蜜岩探石質藏書處宿雪竇觀隱潭冰柱大雪登芙蓉峯歷鞠侯岩至過雲識所謂木介歸而晦木爲賦澤望爲遊錄余則爲四明山志其分四面各七十峯因夫圖咏之例也亡友陸文虎欲刻之而未遂海內兵起徐忠襄公問浙東可以避地者余以四明山對旣而忠襄來書謂吾舉足西向則言與陳臥子興晉陽之甲舉足東向則言擁立潞王朝議如此四明之緣絕矣吳霞舟先生流離海外余亦欲以此山處之道阻不果薛諧孟作先生傳有嗚咽而赴四明山中之招者此也山寨纂嚴此山遂爲戰地血瀑魂風嶔岑變色猶幸二公之不來耳當余手鈔道藏之時方欲遍遊天下名山四明不過從此發迹卽不然而自絕於世亦泥封洞口猿鳥以爲百姓藥草以當糧糒山原石道别有往來豈意三十年來芒屩槲笠未沾岳雨兹山亦遭勞攘高棲之志尚無寄托執筆圖此有涕滂然明文案序上乙卯某自戊申以來卽爲明文之􅃟中間作輟不一然於諸家文集蒐擇亦巳過半至乙卯七月文案成得二百七卷而嘆有明之文莫盛於國初再盛於嘉靖三盛於崇禎國初之盛當大亂之後士皆無意於功名埋身讀書而光芒卒不可掩嘉靖之盛二三君子振起於時風衆勢之中而巨子嘵嘵之口舌適足以爲其華陰之赤土崇禎之盛王李之珠盤巳墜邾莒不朝士之通經學古者耳目無所障蔽反得以理旣往之緒言此三盛之由也某嘗標其中十人爲甲案然較之唐之韓杜宋之歐蘇金之遺山元之牧菴道園尚有所未逮葢以一章一體論之則有明未嘗無韓杜歐蘓遺山牧菴道園之文若成就以名一家則如韓杜古之情無盡而一人之情有至有不至凡情之至者其文未有不至者也則天地間街談巷語邪許呻吟無一非文而遊女田夫波臣戍客無一非文人也試觀三百年來集之行世藏家者不下千家每家少者數卷多者至於百卷其間豈無一二情至之語而埋沒於應酬訛雜之內堆積几案何人發視卽視之而陳言一律旋復棄去向使滌其雷同至情􅀌露不异援溺人而出之也有某兹􅃟彼千家之文集厖然無物卽盡投之水火不爲過矣由是而念古人之文其受溺者何限能不爲之􅁣然明文案序下有明文章正宗蓋未嘗一日而亡也自宋方以後東里春雨繼之一時廟堂之上皆質有其文景泰天順稍衰成弘之際西涯雄長於北匏菴震澤發明於南從之者多有師承正德間餘姚之醇正南城之精錬掩絕前作至嘉靖而崑山毘陵晉江者起講究不遺餘力大洲浚谷相與犄角號爲極盛萬曆以後又稍衰然江夏福淸秣陵荆石未嘗失先民之矩矱也崇禎時崑山之遺澤未泯婁子柔唐叔達錢牧齋顧仲恭張元長皆能拾其墜緒江右艾千子徐巨源閩中曾弗人李元仲亦卓犖一方石齋以理數潤澤其間計一代之製作有所至不至要以學力爲淺深其大㫖罔有不同顧無俟於更絃易轍也自空同出突如以起衰救弊爲巳任汝南何大復友而應之其說大行夫唐承徐庾之汨沒故昌黎以六經之文變之宋承西崑之陷溺故廬陵以昌黎之文變之當空同之時韓歐之道如日中天人方企仰之不暇而空同矯爲秦漢之說慿陵韓歐是以旁出唐子竄居正統適以衰之弊之也其後王李嗣興持論益甚招徠天下靡然而爲黃茅白葦之習曰古文之法亡於韓又曰不讀唐以後書則古今之書去其三之二矣又曰視古修辭寧失諸理六經所言唯理抑亦可以盡去乎百年人士染公超之霧而死者大㮣便其不學耳雖然今之言四子者目爲一途其實不然空同沿襲左史襲史者斷續傷氣襲左者方板傷格弇洲之襲史似有分􅀋套括逢題塡寫大復習氣最寡惜乎未竟其學滄溟􅀌行則孫樵劉蛻之輿臺耳四子所造不同途其好爲議論則一姑借大言以弔詭奈何世之耳目易欺也鄮人君房緯眞學四子之學者也君房之學成其文遂無一首可觀緯眞自歉無深湛之思學之不成而緯眞之文汎濫中尙有可裁由是言之四子枉天下之才亦巳多矣嗟乎唐宋之文自晦而明明代之文自明而晦宋因王氏而壞猶可言也明因何李而壞不可言也朱岷左先生近詩題辭丙辰岷左先生示余出蜀歸田之詩命題數語余唯山川文章相藉而成然非至性人固未易領略嘗讀陸務觀入蜀記攬結窈㝠卷石枯枝談之俱若嗜欲故劒南之詩遂爲南渡之巨子蜀在西南天表非左思之賦少陵之詩亦不能移其觀於中土豈非相藉哉百年以來自曹能始而後蜀竟陸沉再經喪亂其名蹟之幽邃者固不必論卽工部草堂古今屬目去萬里橋不數里先生往尋之蜀人無知其處者徘徊於荒烟蔓草之間得浣花殘碣尺寸推按故地始出先生如遇故人於萬里外歡呌欲絕此等情懷與務觀何異詩那得不佳故先生之詩沖雅而刻畫字句之外一往流連眞能與山川和會者也先生爲余述其入蜀從潼關過嵩華磅礴空翠之中車馬都爲碧色棧道之上高峯入天停午始漏日影恍如夜行漢高祖所謂燒絕棧道者註云險絕之處傍鑿山岩而施版梁爲閣是人從棧上過耳不知路鑿於山腹棧增其濶以收目眩燒絕者壞其鑿路一處則百里皆廢矣不是單燒棧亦不是處處皆燒絕也江行出峽巫山巴水六書像形陽臺十二峯沿亘數百里突兀霄漢一一辨其嘉名以正前人之誤古木窮猿寒岩怪鳥空響相答淒入心脾先生相對言時僧樓茗碗几席亦爲浮動嗟乎山水於人此生亦有緣分余甲午之歲發願名山拚十年爲頭陀行脚咽噱冷汰滌濯滓窳歸來讀書方有進益持志不堅倐忽而髪容難待便作一塵網俗人淸泉白石爲我懊恨讀先生之詩不禁惘惘卷一南雷詩曆卷一同門董陽無休批􅀧門人施敬勝吉較刻禜旱以下舊稿亢屯逾十旬挿秧未過五一漑得餘生彌望亦割午醎汐漱籬根寒火􅀋吹蠱炎風盪羣和及時穗不吐飜車懸牛宮膚寸傒甘乳鸛井豕渡河田家說多瞽間者殷其雷電笑粲於黼謂當導天潢皎月掛簷宇老農鳩族言雨界各有主山中多龍洞眞官治水府龍神喜嫵􅆺陳哀須盛伍大姓誇旌旗單門裂裳組盆盎釡洗噐叅震於金鼔鏳鋐臨深淵神聽似難杜窮谷狡獪兒䧏神婆娑舞刻期恣􅅝戲所饕在酒脯羣農更潔詞終不言嫚侮精誠達明神庻幾憫愚魯致旱或有由殺農又何補蚤發東明禪院同芝兒鐘聲破山靄繩牀卷餘夢霧交猿路逈泉亂魚心縱斷虹方鬬日春禽有剰弄􅁅暖梯水田樹廣貧居棟世亂纔息心何免泉石諷三月十九日聞杜鵑江村漠漠竹枝雨杜鵑上下聲音苦此鳥年年向寒食何獨今聞摧肺腑昔人云是古帝魂再拜不敢忘舊主前年三月十九日山岳崩頺哀下土雜花生樹鶯又飛逆首猶然逋膏斧燕山模糊吹蒿薤江表熈怡臥鐘鼓太王畜意及聖昌奧窔通誠各追數金馬封事石渠書怨毒猶然在門戸静聽嗚咽若有謂懦夫亦難安窶藪何不疾呼自廟堂徒令涕泣沾艸莾將進酒中坐胡爲君奠觶談忠說孝含風刺君不見秦繆醜和議陳書全孝弟又不見賈似道易簀青詞鍳忠義飛章諂冀誣李固忠經煌煌懸書肆是非黒白何由定誰言葢棺有成議聖賢箋注忠孝不甚明何妨勸進之手索考異對酒寧與時人争淵意頓涸徒憔悴堯舜千鐘孔百壺周公酒誥又非􅁼牽經引禮總亂􅁝放駕朝歌且莫避四明山古祠相傳其神王翦余按秦王命王鄞驅山塞海百靈勞役奔入此地因名鬼藏山是由王鄞而譌傳也告之耆舊正其祝板亂溪老木鎻遺祠蕭條門榜漏碑題巫覡迎神稱王翦肅然像設如熊羆吾聞秦王觀滄海巨浸稽天塡塞之鄞也笞撻役鬼神狡猶脫籍來藏兹塼埴偶人鎭空山至今尚足戢蛟螭按據姓名補神絃事雖荒唐庻有稽斯民方苦阽危亾深林滌地寡安居豈能托鬼與共藏奉薦祠下胡勝悲金陵哭外舅葉六桐先生泥􅂗身事苦行止自難持春雨迷台路秋聲􅆡燕磯音塵三月㫁傳說數番疑夙昔風期在青燈或見之人傳星隕日正是月虧時聞訃時方月蝕流水秦淮咽黃花籬落衰編文後􅂮責稅服禮經疑淚入三泉下寒風莫浪吹遲明百官江候渡鷗鳥蔽天而過上人言其出海就食退㝛深巖人迹偶及必遷他所鷗鳥􅁯機者也知機亦孰能過之此來數十里更去百重濤朝吞沙石樂暮聚霧烟高欲托安危外寧辭踪跡勞土人習往返三歎謂吾曹古渡遲舟久野鷗陣陣高羽聲亂木葉寒影散空臯猶帶巖花雨相衝㝠海濤何須希有羡得意在朋曹寓黃巖臨海饒風物旅情亦漸移朱欒山客餉方石野儈遺村酒成紅麯山肴脯柿狸明朝􅈂令節社鼓賽王維縣有王維廟村居好景惟初夏藤花絡蓽門雨後鵑聲亮雷前蟹火繁新茶採謝嶺姚江茶產自謝公嶺者第一小說較南村世亂安泥水心期漫過論㝛四明山家四明週地廣好事亦艱難山舍偶然㝛風流不可刋縣城八十里鳥道百餘盤粗野同麋鹿眞誠愧佩冠謌謠成誦讀花鳥滿牕欄畏吏忿争少延賓禮數繁鷄鳴隔嶺店杼響入雲垣縳屋連高柘採蔬雜射干㛰姻燈火望冬夏谷隂寒農噐傳之祖輸糧不自官半年􅁞急備五日市求餐水涸魚筌宻年荒鴉碓閒數村同社學三郡合峯巒埜廟巫神降深湫罔象安楓龍震雨夕怪鴟􅂘更䦨婦􅆕粉鉛惡樵肩芝􅌲丹青䖝篆柿葉文雉啄幽蘭市果小童詫藥名本艸刪嵐深日少至洞古雹常丸驅鹿溪增柝防彪壁畵團松篁夾徑覆橡槲染衣瘢禾長帶烟雨巖移起蟄湍愛奇㝷怪僻卽事何忻懽拾級皆堪賦臥遊不假莞繞行羣翠下使我發三歎臨海石佛寺度歲􅁓牕漱漱暮光凝凄㫁江城畵角興啄雪饑烏驚折竹送年孤旅眷居僧巖崖多有天生屋雲水甞聞自在朋吾亦好奇曾夙昔奚爲勇往未全能長夏終日荒途隔往還荷風娬􅆺漑心顏硯因蠅集更番滌筆爲蜂巢次第閒精騎羞爲安性拙狂歌中㫁憶時艱誰言艸木難甘腐尚以成螢恨欠頑天台家書山城古寺歲將除猶問鄊人度嶺無欲歸欲畱未成計惆悵寒􅈧難下書東湖樵者祠東湖樵者之神位下拜寒梅花影邉姓氏官名當世艶一無慿據足千年夜㝛雁蕩靈巖千峯瀑底掛殘燈霧障雲封不計層呪讚糢糊昬課畢亂敲銅鉢迓歸僧天台思歸歸計漫漶對短檠千巖不㫁夜來聲春霖未必皆芳艸枕上偏多白髮生贈周二存先生以下丙戌至辛􅆗我有老蒙師別去三十年避亂轉山谷邂逅覩蒼顏牽臂入茅屋敗壁無泥􅆞故帷幾甲子㫁縷蛛􅁝牽窮老底如此猶日賴聖賢乹土蔬蝟毛酷日􅀲兒拳呼婦爲炊黍抱甕綆寒泉我擕三子行一一使安眠在難感眞意及用爲凄然論交滿天下徘徊此日間飮酒托處南山下傭丁代畊播六月正翻車一閧走國破歸來省舊業狠茅覆芒糯吾方艱壺漿拾秉營醖和醴酒一㝛成雨牕慰日暮所愧中道捐垂實見收荷陌上桑爲馬晝初作日岀東南隅照我秦氏樓秦氏有好女自名爲羅敷􅁞月倉庚鳴桃花映城隅羅敷採桑至容華花不如約束寒女心辛苦事區區使君從南來五馬立踟蹰遣吏謝賢女豈可同行車羅敷前致辭使君莫睢旴使君自有婦羅敷自有夫使君復羅敷羅敷一何愚東鄰有艷婦莊蹻殺其夫艷婦婦莊蹻曼靡專房居粉澤靚腦臆金翠綴足跗宛轉欲邀人嫋嫋風中蕖艷婦有娣姪葑菲棄泥􅂗不得主人憐妖態換須􅁷西鄰有處女學舞邯鄲初蕙蘭想精神瓊瑤琢肌膚同儕媒妁盡鬬艸春風孤誰能守空房落月聞夜烏渙渙桃花水溱洧多狂且金夫不有躬燕婉求筵篨使君有車馬車馬如龍驅白玉裝前楹黃金餙椒圖嫁夫滿天下寧有使君殊朝朝行採桑不能成羅襦曷爲恒憂苦羅敷一何愚羅敷重致辭誠哉羅敷愚人生各有志一一不同途東鄰與西女賢者豈拘拘貞女引贈萬履安吁嗟乎覆水不可收落花難上枝未聞女嫁爲婦婦還可以女爲一解三爲皇后七爲夫人古來夏姫雖淫未嘗諱言二解有女來婦三酳燭出良人一去空房苦蕭瑟三解世人女重婦輕女重如朝華婦輕同落英四解了頭低面自稱日女以告媒氏媒氏亦齟齬五解次室處女悲吟㫁續鄰人謂卿昏車相属云何困苦徬徨所欲六解處女聞之援琴自傷悲忠而被謗信而見疑則莫予之知七解下有交頸獸仰見􅀟禽飛人懷禽獸心又何難乎知音八解促促人間豈與我同夢終身不嫁吾心豈偏反乎春風九解人亦有言人之相去如九牛尾吁嗟乎貞女十解辛􅆗中秋與晦木候渡百官江觀潮夜半津船不可呼朦朧月色立泥􅂗闐闐殷殷高以麄細聽尚在百里迂倐忽浪花約束齊三山浮來海之隅岸脅迫厄容區區鷺飛屋捲爲前驅地軸動搖觀者瞿無風亦有飄墮虞吾聞其神伍公魄國亡不救遑身惜至今杳渺見靈旗怒氣千年畱新迹古來􅁈憤豈一事後之視今今視昔􅈂待萬物得其平朝不爲潮夕不汐人間尚有弄潮兒樂哀不知鬼神謫寒夜月倣孟東野體霜輝濯寒魄景象恒過清止于枕上看不可立中庭枕上一尺光中庭千里橫千里多傷悲一尺巳峥嶸貧病賞明月更無􅁝竹聲但言此夜好巳完看月情始知天有月不爲貧病明亂礁洋亂礁浮海國千年雨度臻大空畱寒翠世外發奇文草木柔弱姿不得麗雲根中原佳麗地墮爲耳目塵上帝命巫咸設此招沉魂礁聲寄古􅂘古􅂘尚殷殷誰謂孤蓬間新恨高氤氲過東明寺獨對干峯側心原與境訛吾身巳再世古寺恰三過歲月塵蒙壁牛羊夕下坡好風四􅆕至吹淚壓藤蘿臥病旬日未巳間書所憶此地那堪再度年此身慚愧在燈前夢中失哭兒呼我天末招䰟鳥䧏筵好友多從忠節傳人情不盡絶交篇於今屈指幾囘􅂮未􅂮猶然被病眠刦火燒餘此病身更無思慮染秋塵打鍾掃地今行者阮􅂘嵇狂僕恨人風浪滿庭閉暮日鶯花極目坐芳辰静中探得眞消息只覺於今萬物親感舊高談不見陸文虎深識難忘劉瑞當豈料一時俱奪去浙東清氣遂銷亾抄書結社自劉城余與金閶許孟宏好事於今仍舊否烟雲過眼亦傷情敬亭二沈最交親一别於今十二春巳脫從前鈎黨禍如何猶作不歸人義月兩公昔舊游一生一􅂮巳分頭我亦同叅竹箆子裵􅏆未敢接源流張岐然改名濟義江浩改名濟月寒江纔把一書開耿耿此心不易􅁅落日歌聲明月罵不堪重到聖湖來崑銅在西湖毎日與余􅀚劇月夜扼腕旹事罵不絕口劉門弟子祝王稱亦謂捐生似近名今日風波無畔岸自慚不値一錢輕祝淵王毓著南都防亂急鴟梟余亦連章禍自邀可恠江南營帝業只爲阮氏殺周鑣維斗危身自丙寅人中此日效靈均於今名士皆生色此是吾儕復社人維斗丙寅擊緹騎幾與五人同禍甬上風流盡雁行履安今日魯靈光兩年貧病存形骨一夕西牕截瘧方履安病瘧余至不發麻子妄將一木支朗三祖武宛陵詩郵筒寂莫人憔悴疊足挨肩向市兒麻三衡字孟璿梅朗中字朗三與余倡和甚多桒間隱跡懷孫爽藥籠偷生憶陸圻浙西人物眞難得屈指猶云某在斯史禍之後䴡京自貶三等以此詩封還請改月旦鍾山夕照暮秋時窮巷長過林茂之兩目今盲需藥物那能復度此流離荗之名古度昔年贈余詩有與君同有終天恨之句邂逅詩文重二韓當時倡和在長干上桂談兵終不試如璜藏血未曾乾上桂字孟郁如璜字姬命虞淵事業巳難慿此意沉埋􅁍未曾夢哭蘆花寒月上誰人更復唱平陵孫嘉績字碩膚四十初度恰値秋光一半輪池塘又見蓼花新先公殉國餘三載先公殉節在四十三歲今子只隔三載孔子懸弧易一辰予祿命與先聖只換一字欹枕夜簷走甕雨腰䥥雲頂墮巢薪悲凉滿目都成淚何處西臺􅂘故人九月一秋多病臥匡牀豈謂登高欲㫁腸菊圃無花經亂後惟有風􅀨似重陽甲午元夕悼侍者甲午元夜風光好如何竟隕生遙聞十里鼓送汝九泉行假髮侵書帙􅆪梅􅀏膽瓶猶疑侍左畔相顧一燈檠雀啄庭梅盡誰知是不祥桺間橫白板古寺斵楓香啓篋還明鏡臨行起靚粧欲畱身後話不􅃹㫁人腸偶書酒醒床頭月未斜生憎怨鳥逼牕紗只將苦字啼宛轉落盡荒村寒食花同澤望芝兒㝛積慶寺遇獨朗定空亂山草葢三間屋曾有先朝御筆排故物至今畱贔屭流年只好抹皮鞵松濤欲汎禪床去寒葉巳將佛跡埋􅁍爲一番多話舊反來牽課道人懷十一月二十八日大雪爲說他年􅀨雪時數番眞足繫追思長安貂㡌旗亭酒樊榭􅉭鞋古寺詩氷柱干尋逢洞口桃花萬樹壓湖􅎠如今垂老荒村裏布被蒙頭不岀􅎝五是雁蕩六是臨海東湖從化安山至魏巳任故居乙未人日登高罷沿溪亂石園主人巳㝛艸春酒復開盆負此相親意凄然去後言不堪歸路裏斜日嶺頭猿高㳟不失禮巢谷見前聞自昔知音少於今世難殷長宵螢岀樹苦雨鹿離羣望我凄凉盡凄凉更失君兩歲荒山道維持賴子多驅猪同望舍引水下高阿寒夜燈相照雨天屐數過憑誰舉舊事一一不能磨至化安山送壽兒塟以下丙申五年吾閉戸賴汝得殷勤朔雪􅃒新土荒山岀小墳天昬吾自去月暗汝誰羣臨老無多淚溪流總不分今年行哭路去歲此登高倐忽兩人日􅂮生一馬凥梅花薫飯碗石骨冷方袍去汝墳三步幽堂自卜牢夢壽兒正月十二夜兒棺三尺弱吾夢入周旋絮冷交春雨􅁓吹送别錢精靈渾不隔長短信徒然芥子須彌理於斯不復箋自從兒殯後無日不寒霖天意猶憐汝老夫何復心看書皆壽字入夢契中隂一半黃鬚在還畱白自今正月晦日同澤望至草庵與克歸話舊風篁窈窕樵人路初闢叢林洞下宗墻角梅花五六樹牕前積雪兩三峯弁山諸老吾親見畵壁蒼顏喜再逢慚愧廿年塵土老始聞嗣法有渠儂克歸供粹白離言像憶化安山昔以兵亂不得上壽兒墓招魂何自不歸家火冷春深艸欲􅃒可奈一杯寒食飯難澆三月杜鵑花青青亂筍穿墳出汩汩溪流傍晩譁惟有子規啼向汝老夫洒淚隔烟霞再入化安山送子婦孫氏􅌾四月二十二日可憐膓㫁小墳邉又向楓根築墓田昔日嫂曾㧧短髮今來兒不怯啼鵑紅花都是啼痕染明月難隨恨地圓只道出門還偶爾誰知竟不到門前魂幡前路指䘮車鋒鏑雙城買道賖生旣漂搖從海外􅂮胡刺蹙在人家時以避亂寓外氏桐棺三寸非明儉白鷺成羣亦當麻縱有歸魂歸未得一庭空閉未開花子婦客􅂮一孫又以痘殤五月八日朅來四月疊三䘮咄咄書空恠欲狂八日旅人將去半十年亂世尚無央不知負行緣何事如此憂心得不傷白日獨行城郭內莾然􅇕墓覺凄凉滑滑聲來古渡邉兩僮舁櫝下江船干戈尚阻離人哭風雨不飛買路錢􅃒骨蓬蒿憐一尺驚心花鳥怨于年雖知聚散徒爲爾臨水登高總泫然夢壽兒持兩杯盤置燭臺上杯盤燭䟦舞筵㫳竹馬喜從天外臻久不夢兒今夜夢醒來憶是汝生辰閏五月十六日夢壽兒兒亾巳是半年期排豁悽愴未有時似應憐我思兒甚故使生辰一閏之初度夢兒去年此日此庭邊短髮鬖鬖拜我前衣染霜花從柏葉餅憐月影畵嬋娟肯將絶句兩三首兒常誦絶句换取新詞甲乙篇賈似道生辰亦八月八日四方獻新詞者以數千計悉俾翹館謄攷以甲乙第今日嬌兒來拜我夢中蕭索五更天書年譜上等閒四十七於今風絮雨萍何處尋八尺血光開鬼路三商本音滴叶商日影破琴心雞推噩夢歸殘角自比古人庻藝林珍重他年書下卷􅉭鞋藤杖記登臨上壽兒墓阿壽亾來三百日更無一日不凄然春風方阻啼鵑哭清明以兵亂不上墳秋色巳歸楓樹邉陳飯燒錢當此日採花弄水憶前年數聲小字空山裏總隔幽明亦貫穿思壽兒世路相看眞兩厭閉門匡坐只寒􅁅去年記得嬌兒在一日相呼有百囘紅林半月好追攀因過剡中第一灣只恐骨寒眠不得老夫清淚浸南山花朝前㝛石井以下丁酉戊戌繩穿憶得去年事慚愧高樓聽落湍紅燭猶嫌寒話短竹鷄亦道路行難相看白髩經三世耐得青松此兩山感􅁣便成孤負􅁍銅丸錢汁是常餐去年爲山兵縳至此地廿年曾㝛溪山路抌上仍前徹夜風清氣不容塵外慮好詩多在月明中花前聞鳥聲偏亂兵後持杯淚易濃珍重西牕書甲子續遊何日剪燈紅登蘿壁山碧霞元君祠城南于尺蘿山頂士女傾城賽碧霞香火聚從新亂後人情欲趂上春華衣聲綷􆈎山風至粉雨淋漓樹影斜老我狂游眞値得慿闌一働望天涯寒食􅂘壽兒墓小墳兩度逢寒食始得􅁓錢掛樹􅅖􅁍爲恨深愁緒重從他風起不飛揚旣設松花寒食飯旋燒黃􅁓䧏眞香兒年纔五婦十七嫂叔同盤也不妨讀上蔡語錄上蔡家極有好玩後盡舍之一好硯亦與人􅁣然賦此有宋上蔡謝先生一硯不畱磨破瓦要使胸中自廓然世間何物更難捨而吾平生玩物心擾擾無殊于野馬忽然北風捲土去不名一錢在屋下突兀三硯眞奇物天將史筆委之野一硯龍尾從西士傳之朗三宣城梅朗中傳之我燕臺澒洞風塵中畱之文虎甬上陸符亦姑且十年流轉歸雪交余書室名雪交亭治亂存殁淚堪把一硯活眼暈九重秋水時向明牕瀉丁子王作合玉硯千祀古文岀亾社三硯縱橫傍短檠雪屋無烟亦瀟􅎈昔年送女入甬東穴壁偷兒不相假吾時聞之在中途欲行不前柰兩踝嬌兒阿壽恐吾傷乞得滑硯强吾寫吾爲阿壽勉强笑握筆終然多牽惹開卷今見上蔡事使我愧汗如盛夏丈夫力不能自割偷兒眞爲益我者兒亾三載硯四年有賊不向貧家打三月十四夜夢萬履安及亡友陸文虎馮躋仲月落楓林飛鬼車音容忽見是非􅁘簟溪有骨隨流水環堵無人泣稗花剛得寒松畱歲暮又驅饑火逐天涯存亡此夜來相聚病榻蕭然兩髩華簟溪躋仲尸抛江上環堵文虎一妾已􅂮寒松􅂂安則在嶺南從洋溪暮歸薔薇籬落香于屋粉黛舟航艷一泓村社春深隨杜宇人情亂後仗神宮挨肩我伴兒童去一笑人歸明月中不是老來疏檢束憂多藥石總無功范裒生詩集有庚寅同余游鳳鳴洞之作未嘗寄余越八載始見之古虞十里城南路桺綻梅開到鳳鳴洞瀉流雲河漢遠山藏古廟雪霜清幾年掘藥凌峯意還愧挨肩疊足行今日讀君詩卷罷此身恍已隔三生至金罍觀謁魏伯陽先生像康節先生學雲牙伯陽字實啓途卽今攀故宅還似玩河圖金罍觀四􅆕山五行奠値世遠丹泉竭兵餘老木枯凄凉一像設寄位在東隅觀虞邑賽神十月農功畢迎神舉國狂綵輿邀女冠鳳鳴眞人乘馬看桑王桑王水神乗馬而迎野祭當街設優歌徹夜長不將城郭視只道是豐穰喜鄒文江至得沈睂生消息二十四年相隔絕風霜吹老别時身君從樵獵埋名姓吾奪頭顱向劍脣落月夢中曾痛哭山嵐類處自逡廵驟聞消息反垂淚兩地猶然未􅂮人君今巳向家山住㛰嫁俱完自在身書到老來方可著交從亂後不多人紅林曾記斜陽路秋水遙憐書屋貧珍重文江煩寄語明年可得話艱辛山居雜咏以下巳亥鋒鏑牢因取次過依然不廢我絃歌􅂮猶未肻輸心去貧亦其能柰我何廿兩棉花裝破被三根松木煮空鍋一冬也是堂堂地豈信人間勝著多誰說山中事事勝山中静夜忒能憎老人欬笑尋羣麂寡婦呻吟吼虎鷹斜月蕭條干白髮亂墳圍繞一青燈不知身世今何夕生􅂮緣來無兩層五十年中逐覆車邇來慚喜似山家風天去拾松柎火霜後來尋野菊茶一兩皮鞵穿石路三間矮屋葢蘆花誰云勉强差排得隨分風光吾欲誇殘年畱得事畊耘不遣聲光使外聞興廢化安唐代寺化安講寺後唐清秦間所建風流德應宋時墳有陳侍郞德應墓青松數樹曾甘露丁亥予居此甘露䧏山鼠多年亦白紋後日視今今視昔讀書臺畔有碑文重來剡曲結茅茨去舍原無一頓時兩崦農人俱餉菜八旬老子亦投詩始知天地騫崩甚還仗山村朴魯持劉伯繩言今日人心㓕甚天地所以不崩墮者是山野中人牽補架漏耳而我不容今世路此情慚愧又何辭數間茅屋儘從容一半書齋一半農左手犂鋤三四件右方翰墨百干通牛宮豕圈親僮僕藥竈茶鐺坐老翁十口蕭然皆自得年來經濟不無功􅂘沈崑銅傳􅂮傳生經二載果然烈火燎黃琮胸中畢竟難安帖此世終於不可容千里寒江負一􅁓甲午崑銅有書招予因循未赴百年隴上想孤松其身首未知得收否舊時日月湖邉路崑銅家有在湖上詩酒于焉不再逢高天厚地一蘧廬君亦其間何所需此日黨人宜正法彼云華士又加誅盛名自古爲身累大厦眞思一木扶月表有人畱季漢應知俗論不能糊君才自是如江海上下吾曾與議論紅葉湖頭流畵舫春風白下叩名園荆溪莫掩殘杯口司馬難銷亾國䰟崑銅有遙􅀕阮大鉞文此後是非誰􅃹得街談巷說任掀飜崑銅與劉孝則論周荆溪至于攘臂余解之方已梅花以下庚子行來林下參差立吟到溪頭宛轉逢旣可斜陽無寂莫偏於苦雨得從容五更醒夢香封屋千里懷人月在峯不似他年情思薄搜尋帷仗一枝笻製新茶簷溜松風方掃盡輕隂正是採茶天相邀􅈂上孤峯頂岀市俱争􅂖雨前兩筥東西分梗葉一燈兒女共團圓炒青巳到更闌後猶試新瀑布泉種百合磽确山田另一謄初移百合影層層採來瀑布山邉種送自頭陀寺裏僧􅁍信佳詩可治病從今清淚不沽膺王維詩言百合止淚太平猶記圖花蕚倡和流傳我亦曾庚午南都報恩寺有百合十三花吳人林若撫圖之率諸名士爲詩西􅀲初熟餉諸叔父收拾經綸付艸萊便同田叟計功來寒藤卧隴剛三尺碧實登筐各數枚駈豕齊聲如呌屈引泉數丈便鳴雷須知不是街頭味應向區區一笑開七夕夢梅花詩梅花獨立正愁絶氷􅆞霧􅂮卧天闕孤香牢落䕶􅋊枝不隨飄墮四更月新詩句句逼空濛嫣然一笑隔林樾有如高士白雲表牛矢烟消山雪合一生寒瘦長鑱命仲頭窺天亦半缺誰寄山瓢落葉中瀉向梅花同傲兀巳上六韻夢中作􅀲舎驅豬方矻矻床頭摸衣境過清不謂三伏猶未卒始知此夜梅花詩未與炎景相唐突釣臺曾注西臺慟􅂘記摩娑老眼見崔嵬當時朱鳥魂間返今日誰人雪後來江上愁心􅁝百尺平生奇險浪千堆欲脩故事如臯羽同志方吳安在哉泊河口家書三尺孤篷亂石灘巳隨鷗鷺泊更殘聞得鄊音驚起坐漁燈分火寫平安五老峯頂萬松坪同閻古古夜話限韻身濱十􅂮不言危天下名山尚好奇相遇青蓮飛瀑地正當黃葉寄風時閒雲野寉常無定箭鏃刀痕尚在肌同是天涯流落客不須重與說分離峯頭一一置身危峯底行人詑太奇話到三更清氣逼呼來五老月明時試尋古洞烟霞合定有幽人氷雪肌塵世應知無一事與君相約聽黄離附閻爾梅詩一峯層上一峯危峯到無層歎絶奇白氎非常難避世青山依舊不逢時三花寶樹頭陀掌五老星精處女肌菊夜相憐題樂府漢家鐃吹有翁離橫空五宿見虗危燈火茅簷話數奇海內謳吟如望歲山中歸去是何時朱絃冷落陶公指青漆凋殘豫子肌曉起約君江上酒相逢原不是流離東林寺東林紅葉三天雨度嶺青鞋兩日眠佛影唐碑昬院落僧衣銅鈸赴齋筵壁間姓氏噉狐貉人世聰明仗井泉發願名山分芋栗社中久巳散羣賢寺有聰明泉圓通寺夢壽兒五歲生魂十歲骸夢中依舊在親懷啼痕千里紅霜路􅂮月三更白浪來禪板無聲諸義墮瓣香初㫁峽猿哀圓通亦有重來塔此意明明不肻灰歸宗寺右軍捨宅爲禪寺池水相傳墨尙凝大字深劖年紹聖殘松再記寺中興霜林幾欲迷晴晝飛瀑時來濺佛燈景物依然原不惡何須孔墨話無徵妄言周先生與眞浄元結社贈僧智瑞繞門黃葉雨層層又作歸宗旦過僧鐘板鹽韲銷罪過香燈書卷話霜氷孤峯七載君贏得波路千重我只曾不是此番眞劫數世間那得見崚嶒三疊泉五老新瀑近方出朱子聞之爽然失濺雷噴雪發夢􅄰恨未一往起衰疾黃陳二子圖新泉摩娑坐起張一室黄商伯陳和成巳上皆朱子書中語嗟余末學又何宜先生未見得見之初疊懸注大盤石二疊迸散紛紜􅂷三疊復㑹爲洪流巖腹突兀增新奇高者鈞天卑龍宮坐來世界忽更移烟塵鴻洞方戎馬巳忘雙眼經亂離須􅁷谷風滿落葉此景過清凄心脾我思泉石生無始尋眞未仙白未􅂮屏風疊中一呌路江右土語以相望間爲一呌路烟火豈能覆斯美太白巳􅂮尋眞仙神龍據之荆棘裏或開或閉應有時表章乃賴子朱子但恐氷車雪柱句勦說雷同欺碎􅁓清泉白石苟相聞能保大壑不遷徙玉川門與雁山夜話兼寄方宻之從來艷說玉川門眞個披雲卧石垠鐵壁飛泉多奪路好山明月亦尋人狂言不怕山精漏一慟堪爲知巳伸若遇無公宻之改名無可煩寄語故交猶未染紅塵銅陵飛流艸屋一青燈已作山中無事僧猶有未完行脚債白頭浪裏下銅陵過蕪湖憶沈崑銅尋常有約在蕪湖再上高樓一醉呼及到蕪湖君巳􅂮伸頭艙底望浮圖次韻答旦中以下辛丑一生甜苦歷中邉治亂循環豈偶然曾向曉山推卦運時從拾得哭蒼天摩娑黃獨長鑱手抖擻花牛落日肩人物中原憔悴盡豈容吾軰只安眠胡翰言十二運得之秦曉山書侍者墓下八載枯骸古寺邉杉棺巳朽石頭穿誰知日暮無人到一樹藤花尚自妍怨鳥聲聲不􅃘聽長疑汝魄伴寒星欲知此日愁煩意折取藤花挿膽瓶與鄧起西晦木芝連祝三兒觀雙瀑次韻剡中自古記名山奇地窮捜􅀟瀑間萱艸溪邊香碓急明珠影裏墨池間風來少女寒松立虹字美人落月還道士丹丘今過此悔教波路十年艱瀑布下爲噴珠池元嘉李信架茅亭圖志於今墨尚青甕裏名花皆是藥經中道藏只言星鞠猴長嘯歸烟霧木客深秋話廢興閣道三間成道院與􅀂長夜枕流聽王仲撝侍御過龍虎山艸堂十年有五驚彈指又復煩君入剡中斜日蜂喧蕎麥路㫁雲犬吠瀑花東相看鬚髩都成雪豈料乾坤尙在籠應是未還車馬債枉教南北徧游蹤丁亥歲仲撝過剡中剡湖豈是乏茅蓬那得君來住此中百卷緯書眞絶學干秋國史附江東古松流水宵移算紅藥青􅎉曉負籠方伎儒林慿值置誰知世外有行蹤緯書三史皆余所著仲撝欲居剡共學麂鳴吾處荒山間數里無鄰舍二更風雨起高岡麂來下初聞老人欬再聞新鬼罵艸堂四五人搖手戒言語寂然萬籟中鳴聲愈悲咜倀鬼與䘮􅉭人言此物借行嘗似人立首或穿瓶罅我未嘗見之不敢明其假蕭騷無與娱此聲固閒睱人間多忌諱兒女易驚怕愼勿出山去與我庚長夜智果寺松天下之松何處奇上虞智果寺第一十里望之已嵳峩一片黒雲􅃒白日伸手爲股屈手勾勾三股四圍數七老􅆬突兀撑晴空羣枝葢藏不聽出枝不成枝太古藤枝枝垂地餘百尺何年龍蛇來􅃲􅂮豈有好手相盤結雷疲風休雲雨寂小者笙簧大者瑟游人姓氏鑿頑皮百年巳上猶未失吾昔兒時曾來此此時見聞只篷篳寧謂􅃼􅃼禹跡間便無奇材與此匹邇來出入多名山頗向寒巖畱甲乙紛紛匠石枉􅂮餘霧絡氷􅅶野火嫉托身木客數百年夜月流光巳欲漆千年只有育王松不隨典午國運畢大休猶有曇洗樹簡寂曾煩子由筆扳條吾亦摩娑久較之于此眞弟姪數年以來數度看恨無徤筆能稱述可怪多少齷齪徒天目黃山誇異質瓦盆堆放艸花伍眼孔不殊於蟣蝨此松落落固難合試攷圖經尙遺佚何伯興雨中至龍虎山見贈次韻凄風苦雨郭門東何事煩君入剡中歲晚梅花方爛熳老年詩句墮空濛不知誰啓雙烏石剡中有烏石門亦有橫飛兩白龍東坡廬山開元寺詩飛出兩白龍言瀑布也敝山亦有雙瀑只算尋山來到此豈辭一夜寄鵝籠歲盡出龍虎山辛辛苦苦一茅堂誰料遷移又不常虀甕鯉魚稍數尺熬盤螻蟻脚千忙梅花送我斜陽下瀑布畱人道路􅅖滿目凄凉風景處三年賴此不凄凉亂石圍墻亂艸紛一庵只當一孤墳焦芽生意人間世漆火光明太古文日下老狐來乞食天寒怪鳥哭離羣安居亦謂應偷得豈意猶煩别暮雲答何令見訊以下壬寅五十棲遲一老生殘書破硯日縱橫深山雪合無人跡終夜風來只虎聲賣藥脩琴纔入市談僧算客與同盟豈期好事如明府累向人前舉姓名壬寅元夕同澤望道傳萬貞一芝源二兒至郭姥廟次去年韻元宵又巳歷茲辰寂莫村居及市塵􅊃向村伶陳口號共隨古廟看遊人兩京舊事三生夢一鉢空山再世身猶喜年年同萬子瓦盆濁酒歷田唇書貽孫女迎鸎舌初調學話新牽衣索抱喚頻頻七年阿壽無踪跡見汝睂頭又一伸睂清目秀齒排匀掌上明珠價自珍老子寄身爲道士女孫端合魏夫人元遺山貽第三女詩有他年眞作魏夫人句壬寅二月中遇火次陶韻長松縳茅宇亂石開南軒夜半有明燭停午無烟燔三載钁頭滑花藥滿春前坎止復流行心跡異方圓年荒避盗賊舊居姑且還春風吹野火紅􅆋漲遙天新詩焦泥壁老樹天長年頺垣寒瀑響土銼月中閒遂令長往計牢落難貞堅故書岀燄中葉葉如荷田惜此復幸此不廢食與眠吾嘗訾遺山賣書乃買園五月復遇火局促返舊居鷄犬共一軒縮頭床下雨眯眼竈中燔南風恠事發正當子夜前排墻得生命再拜告九圓臣年巳五十否極不終還發言多冐人舉足輙違天半生濱十􅂮兩火際一年莫言茅屋陋賓客非等閒鬼目不相瞷而遜華堂堅其理不可解辨說空田田昨者劉伯繩爲我不安眠僕本方外人豈終􅍖丘園癸􅆗元夕遲萬貞一不至次去年韻以下癸􅆗兩年萬子共燈辰辛丑壬寅兩元夕貞一皆在余舍今日遙瞻陌上塵不惜繁華委逝水偏憐突兀有斯人小兒街鼓時千􅀧三女山名雲鬟或半身總使凄凉也記取殆畱佳話與閒唇自梅花閣遷水生艸堂次韻稽山鏡水未埋身又聚清江藕葉新水郭鐘聲嘗數􅀧夜牕燈火話三人生憎阮籍何多哭不與寒猿共耐貧莫恠放言驚世俗把茅萬壑久無鄰病瘧焦原雪窖間更飜遂晝夜試問病緣起龍風牽屋架㝠行觸風雨寒水滴營罅憶昔巳􅆗歲此病經冬夏長生周廷􅍈厦屋中隂氣拂杯􅕌再發拂水堂錢牧齋三發奔牛􅄵剪燭仲馭周鑣齋四發忽放赦國門盛文酒尫然閉僧舍朗三梅朗中及睂生沈壽民浸晨必慰藉宻之方以智診尺脉好奇從肘下子遠吳道凝截瘧丸痿頓增吐瀉文虎陸符黃雞方骨鯁終難化我容周鎔美羊肉崑銅沈士柱言甘蔗霍起會有時初不因針灸今者病重來廿年等箭射殷勤念好友一一見凋謝八月初八日我生是半夜長大從塲屋時文相牽架槐花逐隊􅋉何異蟻行罅金陵及易水發轅當初夏所以遇是日未嘗覆一􅕌廿年烹牛車遂不歷堰􅄵弄水亂石溪是日始天赦今年計是日瘧鬼當浸舍亦謂白版床羊裘足慿藉豈意五更初驚䰟久乃下澤望竟辭世雞聲千里瀉是日吾之生是日子之化便欲􅄷是日老景無味蔗海內稱三黃遡風亦親炙掘强汙險中時人避彈射碩果繫不食誰謂望秋謝寄友人書來相訂讀書期不是吾儕太好奇三代之治眞可復七篇以外豈無爲雖然鼠穴車輪礙肻放高簷帽樣卑一個乾坤􅀟着脚風風雨雨不能吹老母七十壽辰霜雪消磨四十年眼前無物不凄然盛衰變故更千輩城市山林亦累遷白首有兒仍向學浙河此母尚安全去年魏忠節公夫人巳逝人間餘事空無有一卷金剛文字禪應知氣運關天下不在衰宗門戸邉爲痛名儒離膝下八月方有澤望之變且憐賀客减當年錦屏玉軸書官爵紫綬金魚列象賢共識前朝老母在無煩餘事亦流傳吾悔集卷之一南雷續文案男百藥較先妣姚太夫人事畧先妣姚太夫人生于萬曆甲午十二月初二日卒于康熙庚申正月初十日享年八十有七十六歲而歸吾忠端公天啓元年敕封孺人四年以御史覃恩再封孺人崇禎元年誥封淑人十七年進封太夫人生五子長卽不孝宗羲次宗炎次宗㑹次宗轅次宗􅂜太夫人姓姚氏太僕寺􅀸翔鳳之從孫女父諱克俊字順宇鄕飮大賔母徐氏世居上虞之渣湖來歸時曾王父贈公曾王母章太淑人皆在堂三世同居內外數十人而太夫人長羣婦承巾奉箒羣婦皆視一十六歲女子爲進退贈公治家嚴肅羣婦時有譙讓而獨賢太夫人曰新婦大家氣度無儒酸農瑣之態他日定爲貴人顧我不及見矣丁巳先公授寧國府推官太夫人在寧國五年署中落然不聞人聲始入後出中間不識司李􅆹屏癸亥入京師是時逆奄竊政黨論方興楊左諸公多夜過邸寓議論時事燭累見跋僮婢頭觸屏風而太夫人管勾茶鐺酒罍無失候魏忠節見過尤數毎過必以小人隂謀相告形之歎息忠節去太夫人迎謂曰得無又有歎息事􅁘乙丑出都門明年而難作先公􅀍逮太夫人毎夜向北辰而拜祈聲酸苦丙漏將盡聞者無不欲泣先公遺命五子撫之群妾嫁之苟風波麤定不失爲黃竹農家太夫人不忍嫁群妾皆聽其母家迎去毎哭先公至于暈絕不孝苦相勸解太夫人曰汝欲解我第無忘大父拈壁書耳葢大父以羲頑鈍於羲岀入之處大書爾忘勾踐殺爾父乎八字楬之於壁羲受敎痛哭太夫人哭乃止天子旣誅逆奄哀憐忠死之家副笄狄衣加換三品一時名公鉅􅀸皆就拜謁問起居步幛棖臬之間天下想望風烈太夫人初不以此自異奉事兩人寢門竈下煩辱之任加於娣姒一等王父病革太夫人不煩諸父命羲出營棺木得美櫝王父見之而喜謂太夫人曰吾有三子在而窀穸之事惟一婦是辦汝後必有達者王母之沒適舉債六十金太夫人盡出以供䘮事或言之急而舉債舉債而不以應急可乎太夫人曰更無有急於䘮事者也先公弟三人子五人王父以先公無私積將分財爲八各授之王父䘮後諸父爲政曰孫不得與子同盈縮也於是五人受四分之一太夫人訓諸子曰汝曹能讀父書先業有無不足計也崇禎末宗羲宗炎宗㑹頗有時譽宗轅亦習科舉顧功名可以戾契致太夫人憂思稍解乃未幾而黨禍復興阮大鋮招搖白下儀部周仲馭岀南都防亂揭集諸名士以攻之而以顧杲宗羲爲揭首次桐城左國棅宣城沈壽民大鋮得志修報復旣曲殺仲馭左沈皆變姓名去遂批徐署丞疏逮杲及羲弘光遜位不及於難驚魂未定而四方兵起乙酉奉太夫人徙中村丙戍徙化安山丙舍丁亥返故居巳丑山中亂徙邑城明年返故居丙申山中又亂徙半霖其秋返故居巳亥海上亂防海之師望門而食徙三溪口明年冬返故居甲寅群盗滿山徙海濵之第四門乙􅆗後五月始返三十年之中流離轉徙矻矻靡有定居其間與村郊之婦女持槖束縕而立塵起疾呼以遁須臾之命者又不知凡幾自乙􅆗以來風鶴稍息太夫人早起日誦金剛經一卷誦畢置曾孫小孩於膝口授唐詩絕句一二首暇則述閭閻碎事勾女孫輩一􅀏方謂此樂可常豈知安居數年亦爲造化之所吝􅁘古來章妻滂母受禍不過一時而太夫人始遭東林黨禍􅁇之以復社黨錮又􅁇之以亂亡捕獄則操兵到門避㓂則連繩貫掌覆巢之後復遇覆巢辛苦再立之戸牖頻經風雨一生與艱危終始卽古來之節婦賢母著名不過一節而太夫人上書代死似忠愍之夫人膝下皆爲名士舉觴賜子似伯仁之母執經講舍諸生先起居太母似忠介之母九十萱親養堂束帛又似依齋之母隨舉一節皆應史法太夫人兼之葢天不以尋常婦女之境遇處太夫人太夫人亦遂破荒於婦道母道之變局故五十稱壽祥光遍於帷帳一年廬墓􅅴露䧏於靑松豈非天也不孝宗羲娶葉氏陜西按察使憲祖之女宗炎娶徐氏叙州知府某之孫女􅁇馮氏宗㑹娶梁氏總戎某之女繼劉氏貢生應期之女宗轅娶宋氏連山知縣德洪之女宗􅉓娶姚氏孫男十四人百藥敎榖百行正誼敎起百祿百家百乘敎畱百儀百法百度百城百易孫女八人曾孫十七人毎當太夫人夀辰海內鉅公多有傑作以表徽音蕺山劉夫子徐忠襄施忠介相國瞿稼軒朱文肅孫碩膚中丞方孩未陳于庭儀部周仲馭徵君沈睂生蘇武子陳定生其著也數十年以來不特先友巳盡卽不孝知交亦且零落淪謝立言君子唯考信前言銘此幽石知羲說之不妄也靑詞人窮反本疾痛則必呼天情至無文􅄌悲自能救苦伏念先母太夫人二十三而爲命婦三十三而稱未亡五載宛陵不聞聲於衙舍兩年都下長啜泣於封章逮夫李固名掛飛章范滂身橫獄戸太夫人哀祈宛轉􅃤此夕之孤星行哭悽愴距黃泉之一線毀巢破邪之下女嫁男婚追賍沒產之餘養生送死心力俱盡淚痕未乾二十年黨錮之門庭風波無巳四十載流離於道路䘮亂孔多七婦皆亡五子維二皇天后土鍳此靑燈敝帷之心枯栢寒松兀然天崩地裂之日壽登九十上帝不錫以三齡年倍四三先公只得其一半相依母子永隔幽明痛割何言請求無路家禮不作佛事尙似未經痛癢之言吾母日誦金刚豈敢遽改萱親之道禱安螺鈸白沙禀之北堂常念光明和靖豈非儒者爰集勝侶用翻龍藏淸􅆊悠長儼􅄌音之在邇瑞容端好望鳩杖兮來臨固知散花之魂定行皎月之路生前荼苦已滅於電光至性霜寒不隨乎薪盡萬里尋兄記羲六世祖小雷府君諱璽字廷璽兄弟六人長伯震啇於外踰十年不歸府君䰟祈夢請􅁲之瓊茅蚌殻之間􅃼然不得影響作而曰吾兄不過在域內吾兄可至吾何獨不可至乎躡屩出門鄕黨阻之曰汝不知兄之所止東西南北從何處尋起府君曰吾兄啇也啇之所在必通都大邑吾盡歷通都大邑必得兄矣于是裂􅁓數千繕寫其兄里系年貌爲零丁所過之處輙榜之宮觀街市間冀兄或見之卽兄不見而知兄者或見之也經行萬里三山獠洞八角蠻陬踪跡殆徧卒無所遇府君禱之衡山夢有人誦沉綿盗賊際狼狽江漢行者覺而以爲不祥遇士人占之問君何所求府君曰吾爲尋兄至此士人曰此杜少陵舂陵行中句也舂陵今之道州君入道州定知消息府君遂至道州徬徨訪問音塵不接一日奏厠置傘路旁伯震過之見傘而心動曰此吾鄕之􅐸也循其柄而視之有字一行曰姚江黃廷璽伯震方驚駭未决府君出而相視若夢􅄰慟哭失聲道路觀者亦嘆息泣下時伯震巳有田園妻子於道州府君卒挽之而歸楚人高其義稱伯震爲黃來稱府君爲小來望其復來也府君因其聲轉之别號爲小雷云事在宣宗之世三楊當國朝廷人物固多光明俊偉而草野之中猶能敦朴愷悌識道理賤誇詐相􅆓成俗若府君者雖不可以時代爲限然非盛時風俗之美亦不能卓絕如此也獨怪爲人子而所遭不幸間􅀜踣頓求父求母者簡䇿不絕書爲人弟而求兄者無聞焉豈世無其事歟抑有其事而紀載者忽之歟江河日下兄弟之情日淺宴安茶粥茵草薰蒸以路人之愛惡愛惡其兄且不可心則夫棄捐頭髓不避驚濤峻坂之險者較之求父求母者不更難􅁘羲叙府君之事不禁涕泗之橫流葢傷時也至孫郞埠山菴輕雲和日閠中秋病起聊從山院遊板屋未名猶待我鼇峯有記至今畱山僧能辦蹲鴟飯老子且聽磨斧頭便與樵人争路下前村暮色巳橫兠磨斧頭鳥聲也外舅廣西按察使六桐葉公改􅁙墓誌銘公諱憲祖字美度別號六桐姓葉氏宋石林先生夢得之後也遷於餘姚明洪永間有原善者官刑科給事中以言事死數傳至嘉靖戊戍進士工部郞中諱選公之祖也嘉靖乙丑進士知廬州府諱逢春公之父也母吳氏贈㳟人公生而頴異未冠廬州卽使之入太學爲司成趙文毅鄧文潔所知毎試輒居老生先輩之右皆以年少歉之及視其文莫不䧏心舉萬曆甲午鄕試九偕計吏登巳未進士第授新㑹知縣爲治有聲考上上注擬臺省逆奄以公爲先忠端姻婭改大理寺評事遷工部虞衡司主事管寳源局時大工興用錢不貲公供應無缺乏叙殿工隨例加級公寓一條衚衕逆奄建祠適與之隣衆議屬公監工公徙寓避之巳又建祠臨長安街公􅀏謂同官曰此天子走辟雍道也土偶豈能起立乎逆奄聞之大怒吾乃爲郞所諧坐借大工銀市銅削籍崇禎庚午起補南京刑部主事出守順慶擢辰沅備兵副使轉四川叅政分守建昌公駈車九折駭浪洞庭浩然倦遊方請告而改廣西按察使葢銓部同官自相叅差以公有所去處其間議之夫士大夫辭位而去古之所歎息者也反以爲罪何古今人之不相及也公歸五年而卒辛巳八月六日也年七十六公爲人浩浩落落若無可否人世機智之事有生不識故其設施因任自然新㑹海盜出沒吏胥爲之耳目盜魁梁阿德名掛墻壁者十餘年矣公竟得之工部解餉寧遠同舍郞賣公避去然終踰絕險不廢國事是時錢局所交皆中人細士公於其間不爲翕翕􅀬亦不爲崖異和光同塵不損名節順慶放情山水與民休息然奸人挺險干戈所不能致者公以一􅁓束身圜土人服其信也湖南苗畔服不常公厲鎮筸之兵以待不虞終公之任苗三入犯皆有俘級最後古沖之㨗總督朱衡岳第其功上之公不用機智其成就亦卓卓如此公與孫月峯同爲古文詞月峯意在精鍊其師法者爲劉子威高文襄當國以古文挽震川入太僕挽廬州入郞官廬州意在謹嚴其師法者爲王槐野公承父友之習稍變之爲弇州大函議論不甚相遠余在公貳室數與公争論謂文章當法大家餘子無所取長公不以爲然姑取八家文集評之多施橫筆曰八家之文未便􅈂接秦漢及公赴蜀途中寄余二律猶是惓惓葢公不自以名家忽後進之言也公之至處自在塡詞一時玉茗太乙人所膾炙而粉筐黛器高張絕絃其佳者亦是捜牢元人成句公古淡本色街談巷語亦化神奇得元人之髓如鸞箆借賈島以發舒二十餘年公車之苦固有明第一手矣吳石渠袁令昭詞家名手石渠院本求公詆訶然後敢出令昭則槲園弟子也槲園公塡詞别號花晨月夕徵歌按拍一詞脫稿卽令伶人習之刻日呈伎使人猶見唐宋士大夫之風流也公歸心佛乘愽覽内典時師撰述拈卷卽辨其優劣而尤契湛然澄密雲悟東浙宗風之盛海門􅋚其源公吹波􅂇瀾不遺餘力密雲徘徊越中山水思興名刹公集宰官經營始得從事于天童其後公訪密雲登舟疾作密雲夢伽籃交代覺而曰六桐居士其來乎急使人止之中途公返而疾愈此余之所親見者也娶邵氏贈恭人僉事夢弼之女􅁇梁氏封㳟人叅將仲海之女子四人崧年岱華滋衡任皆諸生女三人黃某鄒光繩陳相周其婿也孫男五人汶渭晟志矩􅅒生旦貢生孫女幾人諸孤以公卒之年十一月塟邑西蟠龍山施忠介題主余祀后土逮庚寅遷塟邑東之西黃浦余送塟河滸而忠介巳死國難矣又三十年故老且盡公之孫存者止汶旦兩人言行殆將冺滅余旣以其詩選入姚江逸詩又憶其大畧而誌之旦有時名學古文庻幾可以不墜也銘曰姚江之文盛於明初庸菴攷古力學著書奮筆揚文岀其土苴科舉旣盛大雅不作天地英華歸之糟粕諸爕張元時所酙酌公與月峯抗志稽古各承家學重規􅑋矩公如長江孫如深塢自公云亡毎况愈下諸張時文啞鐘不打何况古文尙俟來者汪魏美先生墓誌銘汪魏美之卒徐蘭生屬余誌銘曰吾當先之以狀也荏苒十六年狀不可得頃見蘭生十哀詩畧具魏美事實又見金道􅀮汪孝廉傳因採兩家之言而誌之以覆蘭生使授其子魏美諱渢新安人徙于錢塘祖父某父某妣某氏魏美孤貧力學舉崇禎巳􅆗鄕薦乙酉兵亂奉母入天台海上師起群盜滿山始返錢塘僑寓北廓室如懸磬處之憺如當是時湖上有三高士之名皆孝廉之不赴公車者魏美其一焉當事亦甚重之􅁥司盧公尤下士一日値魏美於僧舍問汪孝廉何在魏美應曰適在此今巳去矣盧公然之不知應者之卽魏美也盧公遣人通殷勤於三高士者置酒湖􅂳以世外之禮相見其二人幅巾抗禮盧公相得甚歡唯魏美不至爲恨事巳知其在孤山放􅂳就之魏美終排墻遁去魏美不入城市不設伴侶始在孤山尋遷大􅄌菴又遷寶石院匡林布被之外殘書數卷鎖門而出或返或不返莫可踪跡相遇好友飮酒一斗不醉氣象蕭灑塵事了不􅀜懷然夜觀乾象晝習壬遁知其耿耿者猶未下也余丁酉遇之孤山頗􅊰龍溪調息之法各賦三詩契勘戊戍三宜盂設供同坐葛仙祠巳亥二月望􅀏魯菴中坐月至三更是夜寒甚菴中止有一被余與魏美兩背相摩得少煖氣明日余入雲居訪仁菴魏美矢不入城至淸波門別去從此不復相値有傳其在洞庭山者乙巳七月三十日終於寶石僧舍年四十八臨殁悉舉書卷焚之詩文無一存者妻某氏子㰈嘗思宋之遺民謝翶吳思齊方鳳龔開鄭思肖爲最著方吳皆有家室翶亦晚娶劉氏開至貧畵馬有子同居唯思肖孑然一身乞食僧廚魏美妻死不更娶有子托于弟行事往往與思肖相􅀋遺民之中又爲其所甚難者道􅀮言盡大地人未有死者七趣三世如旋火輪皆熾然而生求不生者了不可得君卽不壽何患不仙要以所苦不得無身則竢君仙後尙當與予求必死之道此言魏美調息長生之非也道􅀮之所謂熾然而生者卽輪廻之說所謂必死之道卽安身立命于死了燒了之說也而余之論生死正是相反天地生氣流行人以富貴利達愛惡攻取之心熾然而死之輪廻顚倒死氣所成魏美之志如食金剛終竟不銷此不銷者不可得死忠孝至性與天地無窮寧向尸居餘氣同受輪廻乎道􅀮視此與萬起萬滅之交感一類㫁絕其種子則乾坤或幾乎息矣銘曰學問之道在乎立志凡可奪者皆原於僞桑海之交士多標致撃竹西臺沉函古寺年書甲子手持應器物換星移不堪憔悴水落石出風節委地侃侃魏美之死靡二何意百鳥乃見孤騺死而不亡惟此生氣陳定生先生墓誌銘甚哉小人之愚也小人之仇君子必指之爲朋黨大書深刻列其姓名將使後世之人同心疾之也然蔡京立元祐姦黨碑而三百九人者後人各爲之列傳韓侂胄立慶曆黨人碑而劉後溪遂以慶曆黨人之名名游􅁥簿之墓黨人之家亦各以其名名其門第原小人之心固謂被是名者不勝其辱矣孰知適以榮之􅁘天啓間逆奄竊國是時有百官圖邪黨錄天鍳錄同志錄􅀧將錄依之以盡殺朝廷之士所謂東林黨人也其間侍從之臣楊左以外宜興少保陳公爲之魁崇禎末阮大鋮作蝗蝻錄以復社名士塡之謂是東林後勁欲依之以盡殺天下之淸流其間定生先生爲之魁按元祐黨人唯司馬光司馬康范純仁范正平呂公著呂希仁父子名在黨籍而先生之父子實似之訖今四十年貞元朝士無多劫塵泠落天子開明史局根括天下藏書於是東林黨籍稍稍復出而先生父子皎然與日月争光可不謂之榮􅁘先生諱貞慧字定生陳氏爲止齋之後由永嘉徙宜興遂爲望族曾祖諱憲章祖諱一經皆贈左都御史父諱于庭仕至左都御史贈少保母張氏贈夫人生母湯孺人少保四子長貞貽有文名而天次貞􅁉天啓甲子舉人次貞逹戸部主事左遷順天知事國變死節季卽先生也先生幼而奇傑少保䘮其才子居恒鬱鬱不樂顧先生在側曰賴有此耳弱冠補弟子員廪於學宮侍少保宦遊南北凡朝政之缺失君子小人之消長口談筆記皆出經生聞見之外居家孝謹庭闈之内無疾言遽色念長兄之才恐其遂至淪沒因梓行其書少保沒同邑故相以生前睚眦修怨其孤有取子毀室之虞先生搘定良苦故相知其不可以力屈也好言慰藉之先生落落如故時周仲馭沈睂生讀書勾曲先生與吳次尾讀書亳村皆好佐王之學獨持淸議裁量公􅀸天下望之如鏌鋣出匣當是時烏程執政八年以禁錮東林爲事淄川韓城承其衣鉢東林雖時出彈射有勝有不勝而終不能覆妖鳥之巢以得志于時漳海在獄利害尤急三吳君子間出奇計謂不如援彼黨一人以爲兩家騎郵庻放東林出一頭地僉諧故相而故相所最嫟者爲阮大鋮大鋮亦從吳中呫囁耳語曰苟使大鋮得改事諸君所謂生死而骨肉也溺灰陽熖置酒高㑹南中之士入其牢籠者强半吳中諸公恐仲馭未之許也邀之半道會于虎丘天如來之以謀告仲馭持論不下此仲馭親爲余言今人恐無知者㑹睂生保舉入京劾楊武陵并及大鋮妄畫條陳鼓煽豐􅉮大鉞始阻䘮先生與次尾因草畱都防亂揭顧子方曰大鋮者吾祖之罪人也吾當爲揭首其次則天啓忠臣之家故余與左魏􅁇之一時勝流咸列其姓名大鋮杜門咋舌欲死故相出山大鋮猶不忘援手故相曰南中議論與吳中駁異未便可動大鋮曰廢籍馬士英某之化身也其可乎故相諾之而去崇禎巳􅆗金陵解試先生次尾舉國門廣業之社大畧揭中人也岂山張爾公歸德侯朝宗宛上梅朗三蕪湖沈崑銅如臯冐辟疆及余數人無日不連輿接席酒酣耳􅀬多咀嚼大鋮以爲􅀏樂士英定策大鋮暴起國狗之瘈無不噬也遂廣揭中姓名以造蝗蝻錄思一􅃠殺之仲馭下獄死睂生次尾崑銅皆亡命余與子方從徐署丞疏逮問而先生亦爲校尉􅅞至鎭撫事雖解巳濵十死矣若是乎弘光南渡止結得畱都防亂揭一案也國亡之後殘山剰水無不戚戚可念埋身土室不入城市者十餘年先生卽甚貧乎而遺民故老時時猶向陽羨山中一問生死流連痛飮驚離吊往恍然如月泉吟社也所著有皇明語林山陽錄雪岑集交遊錄秋園雜佩八大家文選若干卷生于萬曆甲辰十二月九日卒于順治丙申五月十九日年五十三配湯孺人左都御史湯公兆京女子男五人長維崧翰林院檢討次維嵋庠生次維岳太學生次宗石􅀺城縣丞次維岡女二人吳璟吳全昌其婿也孫男四人履端履慶􅗉孫女十一人維崧以先生卒後六年十一月􅁙于亳村新阡又後十有八年從京師函幣寄余求銘幽石維崧以􅀶學宏儒徴入史局天下方藉以發潛德之幽光而况於其先公乎乃不憚數千里之遠下訊草野其亦司馬子長徵於夏無且之意歟銘曰嗚呼是爲弘光黨人之墓佞臣過之尙避其風雨答萬季野䘮禮雜問衰裳之制儀禮云衽二尺有五寸註疏以衽爲掩裳上際在腰兩旁後人俱因之惟王廷相始以衽爲衣襟今將從之夫子以爲何如鄭賈之說取布三尺五寸上下各畱一尺一尺之外上於左旁裁入六寸下於右旁裁入六寸便於盡處相望斜裁如是則用布三尺五寸得兩條衽各長二尺五寸廣頭向上狹頭向下綴於衣兩旁狀如燕尾以掩裳旁際此與深衣之曲裾制雖異而其義則同葢深衣之裳一旁連一旁不連故曲裾兩條重沓而掩於一旁䘮服前後不連故衽分綴于兩旁也夫旣同是一物不應在彼爲鉤邉在此爲衽知彼曲裾之非則知此衽之制未爲得矣且衣旣對衿則前綴之衰不能居中鄭所謂廣袤當心者亦自牴牾矣今用布二尺五寸交斜裁之爲二狹頭向上廣頭向下下辟領五寸綴于衣身之旁上以承領下與衣齊在左者爲外衽在右者爲內衽此定制也䘮服之制唯黃潤玉爲得之不始于王浚川耳宮室之制先儒謂諸侯以上房分東西􅀸士以下但有東無西唯陳用之謂東西俱有朱子心以爲然而未敢决言今將從陳說如何鄭康成謂天子諸侯有左右房大夫士惟有東房西室陳用之因鄕飮酒薦脯岀自左房鄕射􅇼豆出自東房以爲言左以有右言東以有西則大夫士之房室與天子諸侯同可知此不足以破鄭說所謂左房者安知其非對右室而言也所謂東房者安知其非對西室而言也如士􅃣禮􅃣者筵西拜受觶賔東靣答拜註筵西拜南靣拜也賔還答拜於西序之位此時筵在室戸西當扆之處無西房則西序與筵相近故容答拜有西房則西序在西房之盡其去筵也遠矣此猶相距耳若士昏禮舅席在阼西靣姑席在房戸外之西南靣姑席不設於房戸東者以阼當房戸之東若設於戸東則在舅之北相背不便醴婦之席在戸牖間當扆之殷婦東靣拜受贊西階上北靣拜送無西房則西階與牖相當不碍東靣有西房則贊與婦背靣焉有背靣不相見而可以爲禮者乎以此推之士未必有西房也且胤之舞衣大貝鼖鼓在西房兌之戈和之弓垂之竹矢在東房是天子諸侯之兩房經有明文士旣有西房何以空設無一事及之􅁘士虞禮其他如饋食註疏謂如特牲饋食之禮今將從之註疏如饋食單以牲體言尸爼用右胖主人爼用左胖敖􅁇公言其他謂陳設之位與事神事尸之儀及執事者也袝廟鄭註謂旣袝主復返于寢後人多因之而朱子主之尤力惟陳用之吳幼淸謂無復返寢之理今將從之何如左傳凡君薨卒哭而袝袝而作主特祀於主烝嘗禘於廟後儒總縁解此而誤夫言特祀于主似乎主不在廟故有袝巳復寢之文不知旣巳復寢則烝嘗禘于廟者爲新主乎爲祖廟乎爲新主新主在寢不當言于廟爲祖廟則四時常祀不當繫之于此葢袝者旣虞之後埋重于祖廟門外卽作新主以昭穆之班袝于皇祖廟中各主不動如故時此時之祭只皇祖新主所謂兩告之也更不及别祖自此以後小祥大祥禫祭之類皆于祖廟特祭新死者并皇祖亦不及也烝嘗禘于廟者烝嘗四時吉祭行于廟中亦不及新死者左氏言此者嫌新主在廟有碍于吉祭也三年䘮畢親過高祖者當祧于是易檐改塗羣主合食于廟以次而遷而新主遷居襧廟矣曾子問宗子爲殤而死庻子弗爲後也註謂族人以其倫序相當者後宗子之父愚謂庻子卽宗子之弟宗子死庻子卽爲父後不必爲宗子後嘗有論辨之䘮服傳曰大宗者收族者也不可以絕故族人以支子後大宗也此言宗子爲殤而死大宗不可以絕宜若當以族人支子後之然殤死無爲人父之道故族人支子卽後宗子之父而殤子不必後矣庻子卽支子也若宗子自有弟則代爲宗子更不必言䘮服記夫之所爲兄弟服妻降一等鄭賈皆不能解昔人有以此爲嫂叔服之證者亦頗有理此句費解由夫之兄弟未明也夫之兄弟服自本宗外有姊妺之大功有從父姊妹之小功有從祖姊妹之緦有舅之子緦從母之子緦妻降一等大功降爲小功小功降爲緦緦降爲無服若據之以爲嫂叔之服則是單有嫂之服叔而叔之服嫂何不見歟恐不然也春秋書仲嬰齊卒公羊謂弟爲兄後卽爲之子故不書公孫其于先禰後祖之義亦然此必當時原有其禮故公羊爲此說不然弟不可爲兄之子夫人知之而公羊敢剏爲此說乎仲嬰齊公子遂之子公孫歸父之弟歸父無後于魯以嬰齊爲後理之正也經書公孫嬰齊不一其不爲歸父之子明矣旣爲父子則不得並稱公孫也卒而書仲者孫以王父字爲氏故公羊疑之然臧孫問惠伯事諸大夫皆雜然曰仲氏也此時嬰齊未嘗後歸父巳得名公子遂爲仲氏可見公子之字卽宗之爲氏不必至孫而後稱也公羊無乃自相予盾歟謝臯羽年譜遊錄注序徐野公刻晞髮集且創爲臯羽年譜注其遊錄讀臯羽集者於是無遺憾矣寓書於余俾序之余於戊寅歲曾注西臺慟哭記冬靑引此時不過喜其文詞耳然無故而爲之豈知其遂爲身世之䜟􅁘今日之序野公書固昔日之書也而意非昔日之意矣夫文章天地之元氣也元氣之在平時昆侖旁薄和聲順氣發自廊廟而鬯浹于幽遐無所見奇逮夫厄運危時天地閉塞元氣鼓盪而出擁勇鬱遏坌憤激訐而後至文生焉故文章之盛莫盛于亡宋之日而臯羽其􅀹也然而世之知之者鮮矣故臯羽身後八十餘年而張丁始注其慟哭記又三百餘年而野公始爲之年譜數百年之中知之者不過數人信夫後世子雲之難也其間尙有疑義欲與野公討論者發陵之事羅雲溪以爲戊寅周公謹以爲乙酉陶南村巳不能辨其孰是宋景濂書穆陵遺骼與公謹說合景濓爲元史總裁其世祖本紀二十一年甲申九月以江南總攝楊輦眞加發宋陵冡所收金銀寶器修天衣寺此似發後之詔若乙酉方發不應以未發冡中之物懸空指用冬靑樹引知君種年星在尾郤與雲溪戊寅相合彭瑋主乙酉遷就以爲寅月公謹亦主乙酉然言八月發寧理度三陵十一月發徽欽高孝光五陵未嘗在正月也唯世宗本紀二十二年正月初桑哥言楊輦眞加云㑹稽有泰寧寺宋毁之以建寧宗等攅宮宜復爲寺以爲皇上東宮祈壽時寧宗等攅宮巳毀建寺詳末句似建寺巳成至此請舊額也其亦非正月明矣景濂之言尙相出入而况彭瑋之武㫁乎西臺慟哭記甲乙丙三人張以吳思齊馮桂芳翁衡實之思齊有野祭詩可據桂芳有墓誌可據衡不知何所據也楊鐵崖作嚴侶墓誌云宋相文山氏客謝翶奇士也雪夜與之登西臺絕頂祭酒慟哭以鐵如意擊石復作楚客歌聲振林木人莫能測其意也則其一人當是嚴侶侶住江干故記言登岸宿乙家思齊流寓桐廬故記言别甲于江桂芳家睦故記言與丙獨歸􅀂爲翁衡衡與桂芳俱爲睦人則乙丙皆當同歸矣以此知丁注背記未爲實也不知野公以爲然否年譜之學别爲一家李文簡著范韓富歐陽司馬三蘇六君子年譜後世嗟嘆其􅀶洽然文簡所著皆名位之赫然者今野公所著捃拾溝渠墻壁之間欲起酸䰟落􅅎支撑天地又非文簡之所及矣輪菴禪師語錄序輪菴禪師爲相國文公之從子中翰啓美先生之次子出世則爲靈巖退翁之法嗣歲庚申開法于越之能仁寺冬十月余相見話舊輪菴出其語錄求序余愴然者久之憶余少受知于文肅庚午與文肅同舟自京口至吳門見余塲中試卷嗟歎不置遂許以古文名世路有經由登堂信宿壬午余在都門徐忠襄爲司宼客余爰書急奏時或見及因得與聞啓美先生漳海獄事甲辰與孫符胥㑹僧寮慷􅁣往事相和而歌嗚嗚􅁇之以泣也余于輪菴家世之交情如此又憶癸酉三峯開堂于浄􅄌一時龍象之盛前此未有蜀人劉道貞新得法馮儼公張秀初江道闇邀余定交余與宣城沈眉生蕪湖沈崑銅江右劉孝則牽連而往入室講論語周易鑿空新義石破天驚其後三十有二年余上靈巖退翁集徐昭法周子潔文孫符鄒文江王􅀟白于天山堂縱談者七晝夜余詩誰知此日軍持下盡是前朝黨錮人記其事也退翁遂屬余作三峯第二碑此後語錄無不有寄余書札余或見或不及見而退翁惓惓之意不可忘也余于輪菴師友之交情如此今日追數夢幻相國中翰旣光芒箕尾孫符墓木亦拱二子負薪丙舍輪菴又出劉道貞問道續綠閱之所載浄􅄌同時七十二人自余以外存者不能二三其餘皆入􅀧􅀑簿中卽天山堂一㑹化爲異物者且半嗟乎無論世出世間一切不可把玩此吾夫子所以嘆逝者而波斯匿王所以感恒河水也余與輪菴遭逢患難以野葛爲肴饌輪菴從湯池鐡城中轉身扶搖而上余皓首龎眉叨叨於過去之間感􅁣係之無乃爲輪菴之所􅀏乎南雷文案外卷姚江黄宗羲著錢屺軒先生七十壽序巳酉錢漢臣學爲古文詞其初頃刻數百言無事不欲見之于文余懼其率也近頗矜愼而文亦波瀾推盪余喜其變也葢兩年之中而漢臣之學之進如此漢臣年始二十餘此後寧復可量耶漢臣每見必問作文之法余所批選漢臣手抄殆將數尺其用志不可謂不篤矣余亦何敢不以聞於先生長者者不盡之于漢臣然漢臣求之于予不若求之其家先生之爲愈也所謂古文者非辭翰之所得專也一規一矩一折一旋天下之至文生焉其又何假于辭翰乎且人非流俗之人而後其文非流俗之文使廬舎血肉之氣􅂶滿胸中徒以句字擬其形容􅁓墨有靈不受汝欺也今先生以貴公子而代父當室所以加禮于三黨者往往爲人所難非卽其温厚之文乎世人杯酒殷勤索報江湖先生羣從郡縣相望褁足不往三十年之貧老諸生奉身若處子非卽其小心之文乎忠介之難幾不能有其百口先生獨身當之無使滋蔓非卽其放膽之文乎漢臣欽承庭詔先河後海由是而發爲文章豈復影響勦說者所可幾及乎故曰不􅀂求之其家先生之爲愈也余甞定有明一代之文其眞正作家不滿十人將謂此十人之外更無一篇文字乎不可也故有平昔不以文名而偶見之一二篇者其文卽作家亦不能過葢其身之所閱歷心目之所開明各有所至焉而文遂不可掩也然則學文者亦學其所至而巳矣不能得其所至雖專心致志于作家亦終成其爲流俗之文耳錢虞山一生訾毀太倉誦法崑山身後論定余直謂其滿得太倉之分量而止以虞山學力識見所就非其所欲無他不得其所至者耳是余敎漢臣以學其家先生者乃學文之篤論也某月某日先生七十誕辰同人相率爲壽余卽書此言以上先生其有契焉否也壽張奠夫八十序辛亥子劉子講學於證人書院夢奠之後虚其席者將三十年丁未九月余與姜定庵復爲講會而余不能久住越城念奠夫從先生遊最久因請之共主敎事奠夫距城二十里而家每至講期必率先入坐書院以俟諸學人之至未甞以風雨寒暑衰老一日辭也於今葢五年矣八月十六日奠夫年登八十余爲同門之友不可以無言或謂五年之中時風衆􅀔不聞有所鼓動其故何也余曰此正奠夫之所不可及耳或疑之曰昔㤗州旴江皆能於立談酬答之頃使士子感悟涕泣轉其機軸五年汶汶所講何事余曰嗟乎彼一時也此一時也夫爲洪水猛獸之害者非佛氏乎自窮禪者有祖師如來之變昔也有體無用爲空寂枯槁今也有用無體爲機械變詐昔從事於昭昭靈靈謂不足以治天下國家今從事於閃閃鑠鑠且以之而亂天下國家故昔之爲佛者非􅀡以佛氏之說爲孔子之說則以佛在孔子之上是以佛攻儒今之爲佛者必先以闢佛之說號於天下而後彈駁儒者不遺餘力是假儒以攻儒魑魅罔兩接蹟駢肩而出没於白晝之下未有甚於斯時者也人心恒勝於怠先儒以持敬救之彼其言曰是有方所之學也人情日趨於動先儒以主靜救之彼其言曰此盤桓於腔子中者也彼以世之好夸也爲􅀡接孔孟先儒不足法之言以迎之彼以世之不說學也爲窮理之學猶釋氏敎典之言以迎之古之君子方矻矻挽之以所甚難鑿礦求金剖石取玉入矍相之圃揚觶而語葢㢙有存者使有人焉而導之以礦卽金也石卽玉也後生小子曰汨没於習染之中而忽加之以洙泗之名其爲說淺陋可以無假於學問奈之何不波蕩而從之故立談酬答之頃而鼔動者易爲力也奠夫守其師說不爲新奇可喜之論寧使聽之者嚼蠟無味旅進旅退於鼓動乎何有故曰此奠夫之所不可及也古今之人同是堯舜同非桀紂周程張朱象山陽明不可不謂堯舜之徒也世方起而議其學術是不難非堯舜而是桀紂矣吾欲以同是堯舜同非桀紂望之斯人且有不可嗟乎張子能以先儒之說鼓動之乎劉伯繩甞謂余曰士生斯世不求以吾身利天下苟吾身不爲天下之害斯巳矣三復良友之言余願與奠夫終身誦之壽李杲堂五十序辛亥余束髪出遊徧交當世之士是時承平日久賢豪侁侁滿盈江湖莫不危舉藝文共矜華藻塲屋時文之外别有詩古文修飾卷軸以􅂶羔雁往返皆不寂寞其間爲世所指名者不下百餘又有鉅公元夫以主盟斯道朝纔脫筆莫熟人口余時童稚無知便謂古之傳人大抵皆然其後稍稍讀書見古之所稱能文者左史而下不及數十人頗疑天之生才古如是其縮今如是其盈邢崇禎丙子丁丑間吳門行世文集一時㳫出列屋兼輛自非闒茸閭閻之輩未有不購而觀者洋舶所至或用以填壓空艙外國人輙兼金易之余竊弄筆墨了然知其可從事也始疑文章如是而傳何傳之易耶及夫時運而事遷水落石出啟禎一輩之士老死畧盡而當日所爲之文章人人自謂握靈蛇之珠抱荆山之玉者竟不異虫讙鳥聒過耳巳冺葢不特􅢟斯頻頻之黨而所謂鉅公元夫者亦然矣其不隨之爲滅没者曾異撰之紡綬堂􅀺遂球之蓮鬚閣艾南英之天傭子徐世溥之榆溪僅百分中之一二耳曾不三十年而事巳如此况欲垂之千百世之遠乎然後知古來之不及數十人者其傳非易事也余久處竆山饑火所驅干渉人事始知今天下另有一番爲古文詞者聚歛拆洗生吞活剝大言以爲利祿之媒較之啟禎間卑之又甚矣葢無以議爲也道不中絕何意數年來甬上諸子皆好古讀書以經術爲淵源以遷固歐曾爲波瀾其遡而上之於古來數十人者巳非㫁流絕港矣而吾友杲堂橫厲其間如層崖束湍翔霆破柱戊申而後毎篇見示吾未甞不駭而喜歎入骨也夫文章不論何代取而讀之其中另有出色尋常經營所不到者必傳文也徒工詞語嚼蠟了無餘味者必不可傳者也昌黎惟陳言之務去士衡􅇶他人之我先亦謂學淺意短伸􅁓搖筆定有庸衆人思路共集之處故唯深湛之思貫穿之學而後可以去之怵之嗚呼非杲堂其亦焉能使吾駭所未見也今杲堂年纔五十從此主盟吾道數十年爲鉅公元夫文章之道其有不興起者乎葢不特曾􅀺數子僅以一身一集而傳矣陸汝和七十壽序壬子姚江慈水之交有烟火鎭曰藍溪岩巒擁秀水淸冷如明鏡葢四明之支麓多劉樊故蹟或者遂疑所謂藍橋自有神仙侶者卽此地也元亡戴九靈與其徒慟哭流連於此山光水影尚有黯然之色今汝和陸先生居之峩冠方領翺翔於市人之中莫不指而笑之聚童子數十人研土硃授三字經千字文以度日市日出逄故人則肘之入舍沽酒痛飮晶䀋脫粟盡歡而後去酒中亦時時道其生平過去之事慷􅁣泣下􅀡欲起九靈而與之爲友也葢先生本富室板蕩之際曾叅人軍事日在虞淵猶絙藤没水以隨夸父流離異地嘗見瑞香五色徧滿山谷禽鳥啁哳皆非人世所有久之隱隱闐闐疑是人聲則水石相搏也徒手歸來盡喪其田土五載間關成一窶人鄕里小兒窖有餘粟輙復傲之以所不如吾意先生自悔少年喜事念馬少遊之言不可再得便當䜟舌終身耳叨叨舉似性豈人殊先生嘗過錢牧翁牧翁嘆曰東浙固多人物如汝和者魯人也三吴智巧豈少十倍汝和使之欲事汝和之事則不能矣於是四方之客過余者亦或過先生以爲舊物其爲當世所重如此余嘗觀宋時文謝幕府之士身填滄海者無論矣其散而之四方者亦不負初心皆能潔然以自老程篁墩甞爲遺民錄記之余與澤望拾遺其後殘編之不滅没者尚不啻百餘屈指危亡事始一時名存身喪者固不讓於宋而槪然記甲子蹈東海之人未幾巳懷鉛槧入貴人之幕矣不然則索遊而伺閽人之顏色者也其逃之方外者可謂勇矣而撾鼓上堂亦竟忘其始之何以爲是也自吾友沈徐汪巢數子而外可以登汐社之堂者寥寥葢不數人先生豈非其一哉有篁墩者起知在所不遺向使先生而死文謝之幕下烈則烈矣何如以今日之所少者留之作一榜樣乎雖然自劉樊至今千百餘年國家代遷陵谷俱變而藍橋之名如故先生亦自其不變者而觀之將見靑牛白鹿之士攀仙木而拾靑櫺同一旦暮興亡之感亦可以釋然矣壬子歲除日爲先生七旬誕日二三知巳登堂爲壽濁酒瓦盆姑以此文代藏鈎之戲壽徐蘭生七十序白沙子謂名節者道之藩籬也程子亦云東漢之節義一變至於道葢道之未融謂之名節名節巳融謂之道非有二也庸人視爲焦原雕虎矯世之具妄人蕩高山廣川使爲魁陵糞土溝瀆而飾細故以爲名矜非義之義以爲節是故名節之壞不在庸人而在妄人夫名節非關生死利害之際不可得見山谷曰平居無以异於俗人臨大節而不可奪此不俗人也今妄人置大節不論而好短長人之平居以是而言名節豈名節乎吾友蘭生先生與汪魏美萬履安巢端明浙中謂之四先生葢皆有大名於時改革之際皆不赴公車抱道而不仕者也唐人之稱四䕫以才浙人之稱四先生以節每當有司推選先生不行以危法相中先生舉所佩帨以示之曰此我磬懸之具也數十年棲遲困辱壞褐破袍沛然滿篋王覇之畧汨没於柴水塵土之中曾不知悔而歌聲噭然若出金石嗟乎所謂臨大節而不可奪者非其人歟當其初聞先生之風者未甞不嗟嘆百鳥之􅀌鳯絳雲彩露不犯烟火年運而往世多械束宇宙可喜可愕之事變化實繁一寒餓無聊賴之老生浮沉閭里不足芥人耳目後生别出新意平地推瀾方遂槐黃而議所南之南向日理夏課而飾叚干之踰垣利害不臨安坐而欲以名節葢過前人是張巳之緦功禁人之咳嗽也豈通論哉先生之詩長於樂府嘗爲西湖竹枝詞以寓變衰之感流傳唱和彷彿銕崖北里新聲松隂奕算談諧間作風流蔭於一座道之融否不可知要不失爲眞名節也先生之祖受業於先王父太僕公令子子慶見余余亦以父執自處四世之交徐氏淵源於黃氏者如故而余以危葉衝風濵於十死其不敢負庭誥者卽是不敢負交情也不揣鄙言其爲先生之所樂聞矣陳䕫獻五十壽序今海内皆知甬上精綜六籍翶翔百氏危儒行標淸議一切誇誕骫骳之習擊去之今世誇誕骩骳之妄人累􅇥甬上終於不可親而止葢十年以來所稱魯衛之士必在甬上也嗟乎亦知其所以至此乎始陳子䕫獻與同里十餘人然約爲友俱務佐王之學以爲文章不本之經術學王李者爲勦學歐曾者爲鄙理學不本之經術非矜集註爲秘錄則援作用爲軻傳高張簧舌大抵爲原伯魯地也於是爲講經會窮搜宋元來之傳註得百數十家分頭誦習毎月二會各取其長以相會通數年之間畢易詩三禮方會之初立聞見之徒更口靳故鴟鼓害翼犬呀毒啄會者不懈益䖍里中有以罵坐自喜勝流多爲所絀間出違言力不及十年而能轉浙河東黃茅白葦之風槩使之通經學古浙河東豈少富貴如麻竹者皆俯首帖帖而不敢與爭是無所附麗之效也方今天下多事不可無䕫獻䕫獻亦安能悠悠於薖軸乎恐不免耳安石之言將無同仇公路先生八十壽序余友石濤滄柱之家先生歲戊午爲八旬兩兄謁文於余以爲壽其誕辰在五月余留省下不得登堂修敬秋七月石濤書先生之言行來先生少受知於學使鄒嘉生􅀺博庵有聲於塲屋甲申以後罷科舉不赴幅巾野服巍然爲鄉黨􅀕酒衣冠廣席必援前言往行以助談柄大略不以科目官職世家定榮悴盛衰先生之論未嘗同於俗人也三十年以來後生欲聞隆萬間人物風俗學問不可復得猶幸先生張此聞兄之路石濤滄柱承順嚴訓服食古聖人之道晝夜淬礪聲譽殷然爲江湖聞人而滄柱爲當今選家第一通都大邑窮卿村校皆家有其書先生不以爲喜嘗曰人心至靈無微不燭若或駕虛鶩僞盗竊名譽卽爲得罪名敎夫石濤滄柱所謂道弸於中而襮之以藝者也先生尚不欲具名過如此因念昔日交游之爲選家者呉門則張天如楊維斗許孟宏江上則吳次尾劉伯宗武林前則嚴叩持聞子將後則張天生金沙則周介生江右則艾千子張爾公閩則余􅆳之陳道掌一時爲天下所宗幾於三君八俊其他傭食於坊社者葢以百計不過爝火螢光之自爲滅没而巳諸君唯介生爲黨人所錮或以節義或以著述持淸議而廣聲氣期之後世雖有著有不著要不可謂純盗虛聲者也然推其所以成就顧不在區區時文之美惡耳千子以時文爲不朽之具震而矜之爲有識者所笑方今滄柱之名不下於余所稱引諸君亦以湛心經術墨守庭誥故文章風韻主盟於當世而無愧不然今之傭食於坊社者卽昔之傭食於坊社者也徒欲譸張弔詭於其間拾千子之餘唾寧知經史子集之外又有一種東鄕􅁓尾之學哉此卽先生所謂盗竊虚名得罪名敎者也唐宋以詩賦取士其時甲賦律詩當不減近日時文之汗牛充棟今巳化爲野馬塵埃不知焉往夫時文亦若是而巳矣然頗疑其久而不變古今制度云爲未有經五百年者自宋神宗罷詩賦帖經墨義以後一意時文卽稍有變更旋復如故於今葢六百一十餘年矣未有如是其力之徤也乃先生不赴塲屋不出三十餘年而時文頗爲黄金所絀坊社卽極力以張之顧有所不能使先生再觀數十年時文能保其復徤乎然後知子子呫呫以爲不朽者卽盗竊名譽亦不可得也張母李夫人六十壽序辛亥應酬之文知文者所不爲也頌禱之詞此應酬之尤者然震川於壽序雖置之外集而竟不能廢者何也顧壽序如震川而可以應酬目之乎余文豈敢望震川而不欲爲應酬之文年來刻啟徵文塡門排戸不異零丁榜道余未甞應之一二其學之友松欣栢悅豈得無情一年之中壽序恒居二三葢卽籍以序交情論學術與今所應徵啟文詞不􅀋苟非吾共學之友顧何當於華堂之黼黻而命之乎辛亥四月二十六日靈寳使君夫人六十誕辰吾黨以其文見屬夫人爲吾友張壁薦之母陳介眉妹氏之姑又不可以辭也甞觀古今學術不能無異同然未有舍體而言用者所謂體者理也宋儒竆理之學可謂密矣姚江尚疑其在物爲支離而歸之未發之知以爲宗旨文定公淵源於羅整菴與姚江議論不合其學在有明爲别泒而其議論以靜虛爲本事物未交收歛至密求放心之說雖濂洛不能易也姚江未嘗言用而其事業非捧土揭木者之所能爲文定公未嘗言用而鍳逹治體事該軍國靑史不可没也棒喝交馳飛箝雜出於是天時人事相趨而求所謂爲用居其位者以不任事爲明哲以關通苞苴爲經濟其屈曲于成敗之間以寓㨗丸不濡手之能者則世方視其進退以爲天下之安危而江湖熟軟之士亦且大言撼貴人之門徒手搏食以爲智嗟乎此固履狶竊鈎之常習一開之市莫不皆然本無所爲學術行之旣熟遂取而緣飾之以爲後世之名是故昔之講學者其言如是其行未必如是其心畏今之講學者其行如是而後其言如是其心無忌憚無體有用之言其禍􅀂是之烈也文定公以來今且五世使君吏治飾以經術夫人閫德煒於彤管而三子親師取友文譽沛然文定公之澤葢方張而未艾也吾聞文定公母夫人年九十餘文定公宦轍所至必御板輿以往壽觴舉慈顔和壁薦能世其學以變今之習則所以壽夫人者亦猶之昔日矣范母李太夫人七旬壽序壬子范國雯至自京師値其母李太夫人七旬誕辰三月初七日同學諸子修登堂之禮命余以文先之余曰吾聞昔之求文者齎貨幣貰舟車必至舘閣得之以爲親榮舘閣者文章之囿也今豈無以文載道足以希前古而聳後學者乎國雯居京師兩載以國雯之聲名爲公卿所倒屣何難得之卽不然京師者天下之才藪也文士馳騖談藝揚聲者多於管絃嘔啞國雯遍交其人豈無斐然懷作述之思者乎國雯忻然曰上之吾不聞下之吾未見也夫文章之權自宋元以來盡歸舘閣其僻固而狹陋者散在江湖明初舘閣之體趨於枯淡然體裁不失天下猶莫之不宗成弘之後散而之於縉紳各撡其權而舘閣姈爲空名矣嘉隆間縉紳亦不能盡收散而入於韋布然韋布崛起之士未有不藉縉紳而顯自萬暦至崇禎舉世䧟溺于塲屋縉紳之爲讀書種子者絕而淪剝甲子之餘猶能櫽括遺聲所謂舘課試錄之出自舘閣者不惟不足爲法且以之爲戒矣聞之鄭禹梅曰今世作者可略而言出于幙客者以割裂爲修辭出于經生者以膚淺爲大家雖分路揚鑣曾何與文章之事乎天尾旅奎舘閣江湖同一寂寞不知此權將復誰寄國雯起自東海與其徒酙酌六經叅攷衆論深明古今治亂之故溢而爲文非復世人模擬所及葢浸浸乎未有止也此豈草野人物潤色皇猷當必有待舘閣文章之權將見自國雯而復宜乎今日之爲文者皆非國雯之所欲也吾聞太夫人竝事兩姑皆得其歡心撫育諸子有均一之德就令太史書之可以無愧固非以舘閣一文爲榮者比此日執爵而登堂者皆與國雯同爲古文多天下之才士其讃誦之辭當不如余之蹇乏又何彼衰而此盛也施恭人六十壽序甲寅自摯仲治撰文章流别集其中諸體唯序爲最寡見之文選者止九篇耳唐宋而下序集序書加之送行宴集稍稍煩矣未有因壽年而作者也至元程雪樓虞伯生歐陽原功柳道傳陳衆仲俞希魯集中皆有壽序亦文體之一變也歸震川所作壽序不下百篇然終以其變體不古置之外集近日古文道熄而應酬之所不能免者大槩有三則皆序也其一陞遷賀序假時貴之官階多門客爲之其一時文序則經生選手爲之其一壽序震川所謂橫目二足之徒皆可爲之葢今之號爲古文者未有多於序者也序之多亦未有多於壽序者也其多之所以至於如此者求文之家不識古文詞爲何物無所差擇不過以爲誇多􅃲靡之資卽相如子雲之作豈能與李蔡劉屈􅈊爭其輕重乎南州李太虛云吾大索海内但得四君子之言爲吾親壽於願足矣其人則華亭陳仲醇山陰王季重閩曹能始竟陵譚友夏也四人者余得交仲醇季重仲醇似陸魯望而傷於纎巧能始博而雜要當以其人重友夏雕刻粗淺季重諧而俗余甞與萬履安山行不數里輙困余靳之曰當罰讀遊喚季重所著一過故錢牧齋之評四君子皆有貶辭雖不無過當大抵非古文之正􅂀也太虛有意於差擇矣而其失復如此且其文苟足傳卽一人巳足又何必至於四哉去歲老母八旬交遊之作喜得范陽孫鍾原一言然亦以其人足重而余先時之所注意者在吾友鄭禹梅之文禹梅薄遊在外不果作今八月初六日禹梅之母施恭人六十誕辰以其序見屬余文豈能過禹梅乃禹梅之注意則與余同恭人爲永從縣令之孫女總戎二華公之姪孫女其姑卽總戎之女也婦姑之慈孝著聞郡邑當平子先生風波之際恭人􅂄定震驚卒使家室宴然以爲故國之命婦當世之文母如恭人之賢卽使横目二足之徒交口誦之亦爲實錄余故不辭而序之南雷文案外卷終學箕初稿卷一起康熙戊申至丙辰姚江黃百家王一甫著續鈔堂藏書目序續鈔堂藏書經若干卷史若干卷子若干卷集若干卷􅃟文若干卷􅃟詩􅀂干卷志考類若干卷經濟類若干卷性理語錄天文地理兵刑禮樂農圃毉卜律呂數算小說雜技野史釋道俳優等若干卷總合若干萬卷或曰冨矣哉余曰書雖冨而道則窮也何則家大人抱􅀒内聖外王之學不􅀗出而康濟斯民身心性命一托於殘編㫁簡之中故顚髮種種寒以當裘饑以當食忘憂而忘寐者惟賴是書耳是是書之冨而道之窮也且自䘮亂以來提挈而行丙戌歲一徙於中村爲山兵所奪去爲鎧甲者不知凡幾未幾復徙歸於家戊子歲自西園徙於雙瀑爲里媪蕘兒竊去覆醬瓿者不知凡幾居無何又徙歸西園庚寅冬徙於老柳已亥秋自老柳徙於龍虎山堂者三年壬寅山堂災出書於烈焰之中零落而散失者又不知凡幾復徙歸於老柳秋徙於藍溪不能一年復徙歸家至今始得徙置於續鈔其間鼠殘蠧囓雨浥梅蒸而又經此流離兵火之餘葢十不能存其四五而存者亦復殘腐敗缺錯雜零星道固窮而書又不冨拂塵整頓對此不勝凄然是人之不幸而亦書之不幸適遭際其時也雖然虞山綘雲已歸一炬曠園緗袠亦復無餘凡今海内藏書之家或刑戮而他人是保或身死而子孫不能有者一切貨於賈人賈人所至街塡巷塞人莫有過而顧者其中目所未見世所絕傳之書累累而是壬寅以來余家所得野史遺集絕學奇經殆不勝紀道雖窮矣書不可謂不冨而家大人方將旁捜遍採不盡得不止則是目所未見世所絕傳之書數百年來沉沒於故家大族而將絕者於今悉得集於續鈔使之復得見於世是雖人之不幸而實書之大幸也况當是時河决酸􅀥海淺蓬萊苟全性命亦已足矣而我二三兄弟出而耕樵入而誦讀從家大人保此殘帙優游於續鈔之中采其華而咀其實窮其道以隆其學以視絳雲曠園與夫海内藏書之家已爲大幸矧又得彚集數百年將絕之奇觀於吾家而道之窮不窮則又未可知也是不獨書之幸亦人之幸也夫亦人之幸也夫送董在中遊河南序余家之交董氏凡三世矣自先大父忠端公讀書甬上實惟武銘先生是依銘存先生復締交于家大人文酒往還幾無虐歳邇年以來余數過甬上在中昆季復不鄙而辱與之游於是明山鄞水常有黃氏之跡矣余間過在中故居在中指其道旁巍樓曰此忠端公與先祖讀書處也因歷道曩時遺事并及銘存先生與家大人所常遊唱酬處爲之肅然徘徊者久之念先忠端公讀書積學卒能不負名節武銘先生歷守巖疆著有成績爲一代能吏銘存先生繼之雖老于孝廉而清風懿行實足師表一世家大人荒山窮老獨抱遺經罔敢失墜庻幾不墮家聲兩家祖父其所成就良可比擬今在中昆季又皆英明賢達文行卓然而獨余也株守蓬茅碌碌無似仰瞻祖父之儀型不能稍肖萬一所愧于在中多矣今年春家大人命余負笈甬上方將從在中昆季考德問業修先忠端故事而在中飢火所驅薄遊伊洛則今日在中之行余能無憾􅁘昔元時理學中衰許文懿公承黃何王金之統倡學于婺川其後黃柳吳宋之徒軰出而金華之人才甲天下今甬上聞蕺山之源流而興起者凡十數人月有會日有程相與窮經講道甞私謂此十數人得常相聚不替其講求則今日之甬東何難頡頑昔日之金華余雖僻處窮鄕尙欲負笈擔簦以就相切劘在中反將適乎數千里之外近舎故土之麗澤遠騖他鄕奔走卽在在中恐亦不能介然于懷也雖然士君子潛心問學非必一室之伊吾也名山大川之壮其胸懷幽人異士之資其捜討所在皆學况伊洛者固宋時諸君子破暗而開斯道之所也其百泉洛西之遺跡至今存焉吾黨有志于斯者從故􅁓中而遙想懸摩何如身至其地而親瞻其景物乎在中往矣明年夏余將遲在中于錢塘相與按中州之地圖考張程之軼事出其親歷所得則其流風餘韵必有非翰􅇘所及傳足使人俯仰感慕而不能自巳者則余之所以從學于甬東冀以稍肖祖父之萬一者終于在中是賴矣企予望之贈諸子宐序癸丑歲余讀書諸九徴先生家其族弟子宐年少力學有契于余執刺拜謁欲從余學時藝與之共學句餘日見其能以攻苦自勵心甚愛之其父母欲授以力穡之事怒而止之于是子宐以爲勿得與于爲儒之列也浩嘆徬徨悲不自已因作數言以慰之曰子亦知世之所謂爲儒者乎四子一經而外惟彚時藝百首論䇿判表數首而爲儒之能事畢矣此以外朝廷之所勿取也師長之所勿知也士卽有志而欲旁求乎斯外者其父兄必且搖手相戒謂無事乎此已足享其榮而食其報而士之習乎此者亦遂不知此外之大有其事以爲爲儒之道盡是矣嗟乎儒果若是乎然而昔之業此者朝單寒而暮廊廟實足通顯乎一時卽未得志者其聲光氣焰亦􅀮然如豹虎之在山鄉里之人莫不敬而憚之嗚呼何其榮也年來不幸詩書澤竭士之生其時者非出于冨貴之門不足以業儒閭閻凡近縱有特達之才無由自顯于是有志之士其爲時窮勢迫轉徙于他端者不知凡幾其有狥名而不知進退者則必至困頓無聊取笑鄕里于是向之父兄以旁求于科舉之外而搖手相戒者今之父兄且搖手相戒而及于科舉嗚呼爲儒之術昔不殊今而榮枯頓異則士之于斯時而猶有取乎爲儒者亦無謂矣余固狥名而不知進退者也業儒滋味葢已傋嘗嘗恨少時擇術不愼不得早習農桑以奉事我三老人致使無田可耕菽水不繼行年已踰三十磨蟻窓蜂猶日喃喃于數百字之中黎美周日科舉之學流行于天下者數百字而已毎一思之腦烘心然顧欲棄此又無業之可從則猶强顏忍耻不得已而爲之自嘆兹生不知何日得離此厄嗟乎子宐休矣汝湖之濱汝有屋一椽有田一頃力穡之暇就湖濵網魚蝦擷園蔬佐斗酒以介爾尊人此亦天下之至樂也我方以不得如爾之所樂以爲憂爾乃欲舎其至樂以不得傚我軰之取笑鄕里者以是爲鬱􅊊乎子宐其圖之陳介睂制義稿序相士於時文難矣相今日所需之士於時文更難今之所需者良將也循吏也良將卽不必短衣帕首武健麤􅁀而亦必非淹淹餖飣􅃈􅃈句讀者足以援抱束伍出奇而制勝也循吏則當此軍需䗬午羽檄交馳上之無失於輸輓下之無傷於撫字帖括中無是也所求在此所取在彼是何異求倉扁而試以卜求公輸而試以音總得君乎子埜其人卜與音則工矣於毉匠何與也雖然使取士而不於時文則尤難緩文急武格外收人以貲算欲得卜式之徒而團瓦闤闠紛然而起矣以䇿畧欲收鼂賈之英而皂􅀠賺徒條陳時事矣刷汚洗垢以招撫安反側之子而鷄鳴狗盗排闥爭道矣然則士䆒將何以知之自古不借才異代合數十萬之士子於天下之膠庠黌序而絃之誦之謂其中無人物吾不信也介睂陳子窮經學古碣障狂流固不徒以時文也卽以時文而論蓄積淵泓發其自得於理學則爲牛毛絲繭剝蕉解筍之文於論事則爲排宕震烈上下古今之文於􅃈體細格則爲狀情肖貎須睂刻畫之文余學於甬東葢嘗問途焉故知之尤悉也雖然介睂之時文工矣卽以此駢麗排偶爲􅇍伐陣壘使疆塲靖而戰爭休乎卽以此代唇效吻者使呻者以息泣者以歌乎卽以此細碎餖飣嵬􅃈朱墨足以爲茭芻錢榖使抒軸無煩憚人安枕乎我知介睂平日之所以羣居而講求與今日之所以有取於介睂者固自有在其無用此區區者亦明矣夫以介睂之時文而無所可用乃介睂方沾沾焉取其無所可用者而矜之詡之天下之士亦規規焉取介睂之無所可用者而趨之歩之不益爲盡餅哉雖然今之所以知介睂者時文也介睂之見知於今者時文也以時文而得介睂時文果不足以得士乎哉葢根沃者其葩必茂源遠者其流必長魁梧俊傑隨舉一事其事必可傳而具眼之鑒别卽其事足以定其人故古之人有因牛肥而知其足以覇國者有因宰肉而自信足以􅈗天下者夫牛與肉何􅀜於國與天下而古之豪傑卽以此自信古之賢君亦以此信人吾獨怪夫今之時文其工者何甚少也是猶牧牛而牛羸宰肉而肉頗無論相觀於其外卽此一事亦無足取然則介睂之時文斯不亦牧牛而牛肥宰肉而肉均也哉范國雯制義稿序士之不古若者非以專心實學爲有妨于進取哉其始爲說者曰苟得富貴不必迂其途也趨時逢世自有㨗徑名成而學未爲晚也其繼之者曰志圖進取必不可以實學也羣狸餌鼠北轍南轅非惟不得益相遠也一人倡之萬人和之于是天下之士俱枵其腹眯其眼塞其心瞀瞀焉如一丘之貉其有奮心篤志窮經學古者鄕里之人羣轟然而笑之而古學與時文不啻氷炭矣國雯范子少游庠序毎試必冠諸生是非以進取爲事者􅁘一旦與其鄕之同志十數人慕蕺山之源流問學于家大人月有會日有程相與勵志今古振㧞汚流于是其鄕之士莫不竊竊然曰是殆不欲以進取爲事者乎是殆將爲蓬蔂之老生以終者乎是殆與博奕好飲不顧父母之養者同爲􅆇榖之亡年乎卽有愛慕國雯敬信國雯者亦莫不有文叔亦復爲之之疑而國雯不顧也其志愈篤其學愈慇其與同志相砥礪愈切然丙午之薦陳子非園雋已酉董子在中鄭子禹梅雋今年國雯與陳子介睂仇子滄柱復雋而介睂爲薦首萬子貞一亦舉副薦于是向之笑者始訝然疑向之疑者亦稍稍信以爲古學之士非惟不妨于進取或反有助于進取矣嗟乎遜志時敏學古有􅀗士所自盡非以干祿也而上之人卽因之而相士豈有浮誇是務舎已狥人至相以古學爲戒乎然則昻藏七尺挺然斯世卽古學果有妨于進取在爲士者亦當所不顧矧有資于進取也哉觀于國雯之徒今世之以進取爲名而茫然于今古者其亦可以少悔矣仇滄柱時義稿序仇子滄柱操􅃟政十年舉業之家奉之爲金科玉律自通都大邑至窮山委巷家塾案上必有文徵自成名至初學惟文徵之是讀聲譽鏗鞫無不知有仇子滄柱者顧滄柱不以一時之騰噪自滿慕學術之源流降心虗巳獨喜師事夫先民遺老嗟夫今世之士能搦管爲文卽傲然目許一再見知于有司已岸然自足以爲儒者之學盡是矣寧復知有師承之統甚者卽借此以彈詆先儒不遺餘力此眞昌黎子所謂蚍蜉撼大樹可笑不自量者也滄柱之名滿天下天下之人久望之爲名儒􅂄􅀫而乃汲汲營營若有所企而未及者其母亦知時文之不足以竟學而此外之固大有其事乎雖然天下之事有可兼營者有不可兼營者解牛斵輪一枝之微必貫乎終身之精力以攻之况其大焉者乎滄柱于曲藝無不好好養生好堪輿好皇極筭數而又訓詁之纂述􅃟事之隲評一人之精力幾何干彼用一分則于此必有减一分之處吾恐此心雖耿耿而力之不克副所願者有之矣昔艾東鄕于時文辨析秋毫家大人云以東鄉之文章學力自足傳世惜其干時文過認眞是其受病處夫今天下之知東鄕者定與待也而孰知在東鄕之適以爲病乎然而世所崇尙功令在兹士生此世未拚活埋土室孰能不俯首爲之而􅃟文一事滄柱固以此津梁後學亦不能不藉以爲温凊之需故苟非脫頴而出安能無所拘纒而孤行其意見今者滄柱得雋矣自此而顧盻闕庭優游中秘固所必然滄拄今始可以謝棄時文專精悉力併當一路而不可測量矣故余不賀滄柱時文之見售而賀夫得謝時文之有日也讀滄柱之文者其無以定待定東鄕乎人譜補圖序代今天下盡人講學矣大約其􅂀有二而要未有不以詆毁先儒爲事者也一則習口頭之機鋒而改頭換面以主敬爲􅑋床以作用爲見性凡周程以下俱詆之爲禪爲敎而不遺餘力一則假餖飣之帖括名爲翌註以黄口之勦說陳言奉爲􅆱蔡因以慢罵􅁚山陽明􅀡指爲告子之邪說嗟乎先儒宗旨所在實從身心體勘萬􅂮囏難中得之此豈不入其堂不嚌其胾者所得冐昧議之乎吾原其意亦非爲學之必當講也先儒之必當毁也葢其腹中空然非此不足爲藏身之術語詩文則曰此詞章也而已可不學矣語經濟則曰此事功也而已之不材可掩矣語忠孝則曰此氣節也而凡綱維名敎俱可不檢矣于是肆口無忌妄行批駁必欲舉其空疎塊然之一身高置爲岑樓之方寸嗚呼上之人方將以學術風勵天下豈知流􅁦之一至此哉宋子瑜公博學弘文涖事便敏律已恂恂而尤敦篤乎倫類之際此固非不學無材與不檢夫綱維名敎者可同年語也設舘受徒倡學禾中余與神交六年矣今歲乙卯遇之會城傾葢莫逆各嘆相見之晩出其人譜補圖示余曰今世學者多用空言蕺山人譜最爲切實若能循此而行聖域眞不難到其紀過格言過不言功尤迥絕乎功利之學子因推廣其意將人生受過之由爲原之于有生之初與有生之後各爲圖以綴之此發明蕺山之意非敢有加也子其爲我序之予維瑜公一何知所崇尙􅀂此哉吾師棃州先生曰子劉子從嚴毅清苦之中發爲光風霽月故其學問縝密而平實人譜一書眞有途轍可循不患不至上達故吾友陳子夔獻特重刻之瑜公之意何其黙相􅆻合􅁘雖然使今之士見之又有甚不便乎此者矣葢人譜中所諄諄者讀書静坐以變化其氣質敦倫考行以致謹其細微而要旨則歸之愼獨夫愼者敬謹之謂也獨者其體至尊與物無對之謂也彼作用之流翌註之軰旣于先儒之主敬良知極力而詆之則愼之與敬相似獨之與良知相似其能獨免乎而且讀書則空疎不可以躱閃考行則立身不得以恣睢今瑜公銳意講學鼓勵後進何難自出其宗旨以撼動當世乃斤斤于人譜之一書不斥之排之反從而遵守之嗚呼何意衆鳥中見此孤鳯皇吾能不爲瑜公咏乎種茯苓記本草言茯苓者衆矣淮南子以爲千年之松下有茯苓則上有兎絲史記龜䇿傳茯􅂕在兎絲之下篝燭照之火㓕卽得此固皆輕信臆說未嘗身察其事而蘓頌李時珍軰辨析精詳亦僅言其狀類主治未及乎種之之方余先大父忠端公勅葬化安山有松數十畝比年以來海上用兵需松爲戰艦之材家大人懼其工度之及因爲去其二十歩之外者遺撥存焉或告余以種苓方鑿根一孔納苓種如彈丸土葢封之越三四五年可得苓如干余種旣如其方届期復使劚之其人以鐵錐一枚縱三尺許橫其柄首數寸以受握鑽其枝喜曰撥已成香子之苓已結而且鉅矣余問何以爲香其人曰殘枝居土如許年有不腐壞不爲蟻食者乎今騐之色若黃膓卽栢心俗名栢香故云香受錐若濕􅁅葢其生機巳有所洩故色如斯而不腐食然其脂巳歸于苓故其質又柔而易入已爲苓之根矣無苓種者卽此香亦可以爲種子之苓已結而鉅果可得如干矣因以錐遍鑱其撥之遠近遇苓則錐膠終日而􅀗苓四枚余曰余所種者三百五十有五而止􅀗其四何也其人曰噫子之苓未易㝷也葢茯者伏也苓者零也循根而行離根而實子之樹稠以此根交彼根轉展而流而茯苓遠矣余甚怪之凡植物植于是者卽得于是天下有恍惚誕渺不可究詰如斯者乎頗疑其性必陰幽沈滯無所益于人者也然讀坡仙胡麻賦盛稱其爲君服食之功而陶􅀮居孫眞人抱朴子王微等又極言其通神致􅂕㫁榖延年爲仙家上品藥此又何說意凡物其後之雷奮飈􅀤光顯利用于世者皆其先之善伏者與夫以松之不幸遭此撓折抑鬱其干霄凌漢之性使不得上達在人視之鮮不以爲澌滅無用特委棄之枯槎殘枿耳豈知其精英􅂕爽有不可磨滅故雖淪沒閉錮于沙壤之中終能成此􅂕物出而爲天下之所寳嗚呼遭際之得失其果有常乎吾以是未敢輕相天下物也哺記卵生爲四生之一而卵生之奇特甚鶴以聲交烏以氣交鵁鶄以睛交鵓鴿以雌合雄鼈之哺以目姑惡之哺以喚然皆其類之各爲哺惟鴨則不能自哺必待乎人與火今年甲寅余兄棄疾舘于客星山側余過候之其鄰皆哺坊也細詢其久于哺者故知哺事特詳其始必擇卵擇其状之圓者大者葢牧人貴雌而賤雄以圓者雌而長者雄也其竈編藁爲之泥塗其内而置火焉置釭其上爲釜又編藁爲門以閉火氣懼其過于烈也則釜內藉以糠粃置筐其中實以卵上復編藁以葢之懼其火候之不匀也又以一筐上其下下其上以易之如是者日五十五日上攤攤状如􅇃設薦席焉列卵其上絮以綿覆以被日轉八次而不用火葢十五日以前内未生毛必藉温于火十五日以後毛自能温但轉之覆之而已卵雖外包以殻而老于哺者其殻中之情形纖悉時刻後先歷歷不爽問其何以知之則皆由乎照也其照法盡堊其室穴壁一孔以卵映之若水精丸纖微必燭未哺以前止見黄白也其次日卽見一小珠熠煜其中甚亮而白三日其珠漸紅而稍大四日色正紅如小錢様五日如大錢而絡以血線六日見血生頭状似蜘蛛是日或間有壞而退者是爲六日厄七日生眼一隻黑細如菜子雄左而雌右八日兩隻九日其眼忽懸下蕩􅃞不定十日定十一日一邉白亮有光亦左右如前十二日兩邉十三日生足翼十四日生尾毛十五日色微黑葢身初生毛而尙不可辨是日上攤􅑋以三層亦間有壞者爲上攤厄十六日見微毛十七日生翼毛􅑋兩層十八日一層間半十九日一層葢至是毛愈長不必照而止于轉時聽聲至廿五日身猶着殻滴滴然其聲實也廿六日如擊核桃漸離殻矣廿七日索索然不麗于殻矣廿八日收黃于腹孚皮姚切頭是時照之其頭昻起彈指有聲是日有蟠頭厄廿九三十日破殻齊出矣客有問曰物以羣分而鴨獨藉人以生使不以人其􅀋何由傳乎黃子曰而不見夫野鴨乎野鴨不自哺聚卵百千腐爛其上下而居中者育矣余嘗聞字義于叔父播余曰鴨者甲也从鳥从甲言于鳥中獨如草木之甲宅也客曰鴨之物甚微也其卵之哺何所關係而子屑屑然記之乎曰噫子言過矣大易之係中孚特言卵也其孚字之義从爪从子鳥之抱子也子而在中是未離殻而爲卵也故曰燕曰鶴曰爵曰翰音言其類也曰虞曰有他慮其前之厄也曰或鼓或罷慮其中之厄也曰攣慮其終之厄也曰登天謂離殻見天而將爲小過之飛鳥也聖人于此憫育子之恩勤卽以之議獄緩􅂮烏得以卵而遂輕其􅃈屑乎且夫鴨其性喜羣于類不争待育于人故聖王以爲有􅀋于庻民而以之爲庻人之贄焉夫古者聖王知斯民之不能自遂其生也爲之井田以哺其身知斯民之不能自復其性也爲之學校以哺其心凡其所以爲之恤􅀌養老卵育而翼覆者無不備至今也􅃖􅃖之民久失其哺亦遂如晨鳬野匹自生自息亦可悲矣又從而􅆯之羅之破卵取子不盡其􅀋不止嗟乎焉得有哺民者復興其哺斯民之術亦能如哺斯鴨之周詳精悉乎是爲記鐡鐙檠記鐵鐙檠一具高一尺二寸枋一足三盤二上盤中空以承盞下盤承燼而稍大中􅆆一釘去盞卽可以置燭有里媪鬻是者祖母太夫人見之曰噫吾家故物也亡之且三十餘年矣余因以粟三斗贖之吾家先世自忠端公以前本素封也凡祭器與養器俱可不假吾生以來家難頻仍流離播徙卽先世之故居燬者圮者已數更其舊而室中之器物益蕩然可知矣毎一客至几傾席欹陶窳筯折至暮則藉藁于地以臥客而先代之故物惟餘此物而已顧吾家有書萬卷數更亂離岌岌不可保往者無論矣卽如去年之亂山冦􅀄起家大人卽以倉板百許橫施兩木毎二板列書五層其中約其三百本繩縳之爲一夾亟載至于四門而他物弗顧也至則屋又甚湫無容書處于是前者爲堂後者龜突隔書中央層纍而上以當垣壁海濵之人見而異之得邀天幸殘帙依然此外之形銷影沈者俱可付之雲煙過眼矣况此區區微物乎獨是余生遭亂離㓜失學二十始知讀書然亦惟是帖括之記誦耳兼之菽水是營朝而隴畝暮而市􅒡書雖在于我無與也幸也有兹鐙在割課分功倣曹孟德春夏較獵秋冬讀書之意而以自寅至西者爲帖括耒耜之時而以自酉而後者爲吾讀書之時􅀩汜旣沒氷輪未登篝寒焰􅀤故書而讀之失晨之鷄或可思所少補而不至􅀌負兹書之存者則此鐙檠之所益于余者大矣王征南先生傳征南先生有絕技二曰拳曰射然穿楊貫㦸善射者古多有之而惟拳則先生爲最葢自外家至少林其術精矣張三峰旣精於少林復從而飜之是名内家得其一二者已足勝少林先生從學於單思南而獨得其全余少不習科舉業喜事甚聞先生名因褁糧至寶幢學焉先生亦自絕憐其技授受甚難其人亦樂得余而傳之有五不可傳心險者好鬬者狂酒者輕露者骨柔質鈍者居室欹窄習余於其旁之鐵佛寺其拳法有應敵打法色名若干長拳滚斫分心十字擺肘逼門迎風銕扇棄物投先推肘捕隂彎心杵肋舜子投井剪腕􅀧節紅霞貫日烏雲掩月猿侯獻果綰肘褁靠仙人照掌彎弓大歩兊換胞月左右揚鞭銕門閂柳穿魚滿肚疼連枝箭一提金雙架筆金剛􅯓雙推窓順牽羊亂抽麻燕擡腮虎抱頭四把腰等穴法若干􅂮穴啞穴暈穴咳穴膀胱蝦蟆猿跳曲池鎖㗋解頤合谷內關三里等穴所禁犯病法若干􅈸散遲緩歪斜寒肩老步腆胸􅀡立軟腿脫肘戳拳紐臀曲腰開門捉影雙手齊出而其要則在乎鍊鍊旣成熟不必顧盻擬合信手而應縱橫前後悉逢肯綮其鍊法有鍊手者三十五斫削科磕靠擄逼抹芟􅃻搖擺撒䥥兠搭剪分挑綰衝鈎勒耀兊換括起倒壓發挿削釣鍊步者十八歩後步碾歩冲歩撒步曲歩蹋歩歛步坐馬步釣馬步連枝步仙人步分身步翻身歩追步逼步斜步絞花歩而總攝於六路與十叚錦之中各有歌訣其六路曰佑神通臂最爲高斗門深鎖轉英豪仙人立起朝天勢撒出抱月不相饒揚鞭左右人難及煞鎚衝擄兩翅搖其十叚錦曰立起坐山虎􅀔􅅆身急歩三追架起􅀟刀歛歩滚斫進退三㢠分身十字急三追架刀斫歸營寨紐拳碾歩勢如初滚斫退歸原路人歩韜隨前進滚斫歸初飛歩金雞獨立􅂃攀弓坐馬四平兩顧顧其詞皆隱略難記余因各爲詮釋之以傋遺忘詮六路曰斗門左膊垂下拳衝上當前右乎平屈向外兩拳相對爲斗門以右足踝前科靠左足踝後名連枝步右手以􅀟指從左拳鈎進復鈎出名亂抽麻右足亦隨右手向左足前鈎進復鈎出作小蹋歩還連枝通臂長拳也右手先隂出長拳左手伏乳左手從右拳下亦出長拳右手伏乳共四長拳足連枝隨長拳微搓挪左右凡長拳要對􅀡手背向內向外者卽病法中戳拳仙人朝天勢將左手長拳往右耳後向左前斫下伏乳左足搓左右手往左耳後向右前斫下鈎起閣左拳背拗右拳正當鼻前似朝天勢右足跟劃進當前橫向外靠左足尖如丁字樣是爲仙人步凡步俱蹲矬直立者病法所禁抱月右足向右至後大撒歩左足隨轉右作坐馬步兩拳平陰相對爲抱月復搓前手還斗門足還連枝仍四長拳歛左右拳􅂃又當朐陽靣右外左内兩㬹夾脇揚鞭足搓轉向後右足在前左足在後右足卽前進追歩右手陽發隂膊􅀡肘平屈橫前如角尺様左手扯後伏脅一歛轉靣左手亦陽􅀤陰左足進同上煞鎚左手平陰屈横右手向後兠至左掌右足隨右手齊進至左足後衝擄右手向後翻身􅀡斫右足隨轉向後左足掲起左拳衝下着左膝上爲釣馬歩此專破少林摟地挖金磚等法者右手擄左㬹左手卽從右手內􅆆起左足上前逼歩右足隨進後仍還連枝兩手仍還斗門兩翅摇擺兩足搓右作坐馬歩兩拳平陰着胸先將右手掠開平􅀡如翅復收至胸左手亦然詮􅁲叚錦曰坐山虎勢起斗門連枝足搓向右作坐馬兩拳平陰着胸急步三追右手撒開轉身左手出長拳同六路但六路用連枝步至槎轉方右足在前仍爲連枝歩而此用進退歛歩循環三進􅀟刀歛步左膊垂下拳􅀡豎當前右手平屈向外义左手內兩足􅂃歛步滚斫進退三􅅆將前手抹下後手斫進如是者三進三退凡斫法上圓中􅀡下仍圓如􅃏斧様分身十字兩手仍着胸以左手撒開左足隨左手出右手出長拳循環三拳右手仍着胸以右手撒開左足轉面左手出長拳亦循環三拳架刀斫歸營寨右手復义左手内斫法同前滚斫法但轉面只三所用右手轉身紐拳碾步拳下垂左手畧出石手下出上進俱隂面左足隨左手右足隨右手搓挪不轉面兩紐滚斫退歸原路左手翻身三斫退步縚搥連進左手平着胸畧撒開平􅀡右手覆拳兠上至左手腕中止左足隨左手入歛步翻身右手亦平着胸同上滚斫歸初飛步右手斫後右足搓挪金雞立􅂃攀弓右手復斫右足搓轉左拳自上揷下左足釣馬進半步右足隨還連枝卽六路拳衝釣馬步坐馬四平兩顧卽六路兩翅搖擺還斗門轉坐馬搖擺六路與十叚錦多相同處大約六路鍊骨使之能􅂃十叚錦􅂃後又使之放開先生見之笑曰余以終身之習往往猶費追憶子一何簡㨗􅀂是乎雖然子藝自此不精矣余旣習其拳射則以無其器而僅傳其法其射法一曰利器調弓審矢􅃓必視乎已力之强弱矢又視乎􅃓力之重輕寧手强於弓母弓强於手如手有四力五力寧挽三力四力之弓古者以石量弓今以力一個力重九斤四兩三力四力之弓箭長十把重四錢五分五六力之弓箭長九把半重五錢五分太約射的者弓貴窄箭貴輕禦敵者弓寧寛箭寧重二曰審鵠鵠有遠近欲定鏃之所至則以前手高下凖之箭不知所落處是名野矢欲知落處則以前手之高下分遠近如把子八十步前手與肩對一百步則與眼對一百三四十歩則與眉對最遠一百七八十步則與㡌頂相對矣三曰正體葢身有身法手有手法足有足法眼有眼法射雖在手實本於身忌腆胸偃背須亦如拳法蹲矬連枝歩則身不動臀不顯肩肘腰腿力萃於一處手法務要平􅀡必左拳與左㬹左肩及右肩右㬹節節相對如引繩發箭時左手不知巧力盡用之右手左足尖右足跟與上肩手相應眼不可單看把子葢眼在把子則手與把子反不相對矣只立定時將左足尖怡對垜心身體旣正則手足自相應引滿時以右眼觀左手無不中矣然此雖精詳纎悉得專家之秘授者猶或聞之而惟是先生之所注意獨喜自􅀒逈絕乎凡技之上者於拳則有盤斫拳家惟斫最重斫有四種滚斫柳葉斫十字斫雷公斫而先生另有盤斫則能以斫破斫於射則於斗室之中張弦白矢出而注鍭百發無失卷席作垜以凳仰置桌上將席閣之使極平正以矢鏃對席心離一尺滿彀正體射之矢着席看其矢鏃偏向或左或右卽時救正之上下亦然必使其矢從席罅無聲而過則出而射鍭但以左足尖對之信手而發自然無失此則先生熟久智生劃焉心開而獨創者也方余之習拳於鐵佛寺也琉璃􅃤澹土木猙獰余與先生演肄之餘濁酒數杯團圞繞歩候山月之方升聽溪流之嗚咽先生談古道今意氣忼􅁣因爲余兼及槍刀劔鉞之法曰拳成外此不難矣某某處卽槍法也某某處卽劒鉞法也以至卒伍之步伐陣壘之規模莫不淋漓傾倒曰我無傳人我將盡授之子矣余時鼻端出火興致方騰慕睢陽伯紀之爲人謂天下事必非齷齪拘儒之所任必其能上馬殺敵下馬擒王始不􅀒七尺於世顧箭術雖授未嘗習其支左屈右之形因與先生約將於明年正月具是器而卒業焉然當是時西南旣靖東南亦平四海晏如此眞挽强二石不若一丁之時家大人見余跅弛放縱恐遂流爲年少狹邪之徒將使學爲科舉之文而余見家勢飄零當此之時技卽成而何所用亦遂自悔其所爲因降心抑志一意夫經生業擔簦􅀒笈問途於陳子夔獻陳子介睂范子國雯萬子季野張子心友等而諸君子適俱亦在甬東先生入城時嘗過余齋談及武藝事猶爲余諄諄愷切曰拳不在多惟在熟鍊之純熟卽六路亦用之不窮其中分陰陽止十八法而變出卽有四十九又曰拳如絞花槌左右中前後皆到不可止顧一面又曰拳亦由􅀶而歸約由七十二跌卽長拳滚斫分心十字等打法名色三十五拿卽斫刪科磕靠等以至十八卽六路中十八法由十八而十二倒換搓挪滚脫牽綰跪坐撾拿由十二而總歸之存心之五字敬􅂃徑勁切故精于拳者所記止有數字余時注意舉業雖勉强聽受非復昔時之興㑹而先生亦且貧病交纒心枯容悴而憊矣今先生之􅂮止七年干戈滿地鋒鏑縱橫吾鄕盗賊亦相蟻合流離載道白骨蔽野此時得一桑懌足以除之而二三士子猶伊吾于城門晝閉之中當事者命一二守望相助等題以爲平盗之政士子摭拾一二兵農合一之語以爲經濟之才龍門子秦士錄曰使弼在必當有以自見言念先生竟空槁三尺蒿下寧不惜哉嗟乎先生不可作矣念當日得竟先生之學卽豈敢謂遂有關于匡王定覇之畧然而一障一堡或如范長生樊雅等䕶保黨閭自審諒庻幾焉亦何至播徙海濵擔簦四顧望塵起而無遯所如今日乎則昔以從學于先生而悔者今又不覺甚悔夫前之悔矣先生之家世本末家大人已爲之誌小子不敢復贅獨是先生之術所授者惟余余旣􅀒先生之知則此術已爲廣陵散矣余寧忍哉故特備著其委屑庻後有好事者或可因是而得之也雖然木牛流馬諸􅁑書中之尺寸詳矣三千年以來能復用之者誰乎書後葦碧軒詩稿後翁祖石先生有詩集曰後葦碧軒家大人旣删定而序之命某持以授先生某走謁一揖外未暇問無恙先生執某手曰吾以詩集求若翁先生刪而序之者數矣子盍爲我言之某謹出所序對曰已就矣先生驚喜踴躍急索眼鏡架其鼻瞪目伸􅁓拍案朗誦者數四曰我其不冺矣乎猶憶某六七歲時從先生受句讀于西園是時先生年雖五十餘患齒疾􅁂半白兩耳重聞日呻吟而爲詩詩稿已數帙矣離去二十年妻􅂮子殀孑然一身窮老無依行年八十僦他人半宇喃喃猶課三四兒童以活嗟乎天下之老且窮者孰有如先生哉向使先生目不識丁不能爲詩或爲農夫或居百工之一未必不槿籬茅舎如鄕村郊鄙之累累者得安享以終天年今其老苦至此詩雖工矣亦復何用􅀂是乎詩之爲禍于先生甚烈也吾意先生思其壮時追悔無及必且懊惱憤懣痛讐而深絕之乃猶如此豈眞後世區區淼茫之名足以易吾生前切膚之困苦而不惜也先生曰豈其然豈其然子亦爲是言􅁘古語雖云詩能窮人然兵戈以來天下之不能爲詩而窮者何限豈皆章惇之故與吾之老而窮命也幸而有詩足以慰我我于數日前見積雪初晴千峰如􅀞得新詩數首將以自後所作另爲一稿待其成帙復煩若翁先生删之子亦學爲古文詞可爲先序此一叚乎固辭不􅀗書此以附於後哀張梅先辭閏五月某日余歸自武林未抵家十里舟過咸池滙有客推篷而嗟曰此我客冬覆舟之所也山冦之亂舟往來者恒惴惴其時同泊者三舟有病噩者中夜而呼曰白頭至矣山冦俱以白布褁頭故土人呼爲白頭同舟者俱破寢驚躍舟遂覆方是時陰雲四屯寒風刺骨􅂮月無蹤對面不相見飄流抵岸者呼號求救其二舟果以其被盗也亟解䌫而行號愈哀而行愈急我適以不寐得附篙楫而至他舟舟中十五人惟我得免焉余黙識曰吁此我友張子梅先泅水之處矣余之聞是已在今年正月是時賊焰正衝斥余家避居海濵方岌岌不可保前月冦甫平又以馳驅跋涉未遑褁鷄漬酒且聞其家卽于是時又被冦氛殺掠嗟乎張子生人之慘萃于一人諍想音容不自覺其涕泗闌干悲聲酸咽同舟之人愕不知何謂也猶憶余之見梅先在丁未歲是時余讀書甬上梅先過訪萬子季野意氣軒翥余在座梅先初不相識視之􅌸如也有頃抗聲問季野春王正月文定之冠夏時此不易之論矣何以必欲謂之改月􅌈時乎余曰此不可以懸虗臆斷也梅先始愕然問余于季野季野爲道余姓梅先曰此得非卽黃先生之世兄主一乎季野曰然因始向余致寒温且問何以爲斷始不懸虗余曰此必明于曆始知之葢吾家大人有春秋日食曆推之于改月時者無不肳合而推之夏時則不啻河漢也至于諸經之證佐則篁墩諸人固又辨之詳矣當是時梅先爲學銳甚其自許亦甚高因數至余家質疑于家大人其時甬上知名士慕蕺山之源流同梅先而來問學者不啻二十餘人固皆卓卓不凡人人自必期于有成者乃無何而董子吳仲􅂮又無何而錢子漢臣􅂮今梅先又􅂮於水倐爍未十年凋此三人何也夫造學于成誠非易易譬之美種有頴有栗者固必有不秀不實者然必其志之不堅附聲借齒者也不然必其積習錮環蠢廵菌縮未全蛻破者也不則其始奮而終怠者也嗟乎梅先以貴介之子能盡去其紈袴之氣抗心于學斯亦傑然不撓未可易量者矣乃使之􅂮于非命卒以不實終寧不可悲􅁘禮曰知􅂮者傷余未及慿棺􅀮墓爰作數言以哀之曰茫茫江濤何㝠頑助冦爲虐沉梅先上古有㝠後子安一省其父一勤官亦向􅇝流身殞殄浙有胥兮湘有原太白采石跨文鸞子美崎嶇漂蜀湍世傑營宋覆厓山彼蒼難問自古然何况區區張子焉獨是數子皆鵬騫水因數子水亦傳張子有志志未宣前途􅄅􅄅中道捐無乃竟爲水所淹吁嗟作孽來自天謂之何哉徒涕連解或某年月日某衡文案臨於越兼試台寧帶覆西浙兩浙之人蟻攅一垤豪者傾􅇸冨者倒篋走棍賺徒因之踏躐逢人執裾緣街炫熠舉國營營魂不體攝以公著爲市門以黌序爲貨積未試以前某乙某甲已而果然不爽毫髮有或愠見于黃子曰嗟哉何命之窮也生遭亂離家如懸磬甔石無存原思同病井底清泉朝寒釜甑上有老人恒虧温凊吾之家可謂艱矣夏暑金流祈寒膠折苦雨宵凄悲風旦烈羣動蠕蠕孰不憇歇哀我憚人吾伊敢輟吾之功可謂勤矣滌洗陳言剔爬膚淺理奉朱程毛牛絲繭氣取曽蘓濤流波轉意必精深詞必達顯吾之文亦不甚媿于人矣然而年等安仁將見二毛田遜畦農市遜牙曹托身硯北値此貪饕嘆跬步之尙阻將何日得至于雲霄也黃子曰此正見今時之崇學朝廷之尊士也何言之在昔有元分人十體九儒十丐優娼之趾觀今丐者齊民不齒詈人曰丐髮怒上指儒之與丐其差有幾今試納人于丐卽與以千金而猶耻乃求爲儒卽千金捐割而不吝鄙是非慕聖學而嚮風瞻廟貌而仰止而烏以若是且自兵興以來膴仕多途某宫某價件繫錙銖朝而負擔暮可軒輿蒼盧闤闠簿鹵馳驅是眞將軍之告身一醉侯尉之封及庖厨兼之禦人者卽授以草􅀼之號干澤者盡目爲隆上之雛而獨于學宫之肄業鄭重靳惜必待善價而沽諸豈非一以至聖威嚴之地不容慢褻使人得以空言徒手以希圖一以倣古者世祿之微意必欲擇夫膏梁紈袴之子弟而不得厠以酸寒藜藿之夫也乎然則終不當人學宫列讀書士􅁘曰噫子益陋矣今之學宫非昔之學宫也銅􅆨輿臺穢兹名藉胥􅀠割臂令丞候色高者時文之乎數百外此茫然云非我職法堂深草奚啻十尺子而必欲以此爲進身之級則姑舍喃喃治生爲急三致千金青紫俯拾子而必欲以此爲詩禮之所自出則柴胡桔梗求于沮澤三代而下士皆自立問學膠庠何所關涉惟餘利欲誘人使溺我方日聆聖人言夜侍聖人側窮神千載覃思一室寧與􅀌鳯而翺翔豈與鷄鶩而争食則我自有所以得其爲我者而子胡庸戚戚也神燈賦伊神燈之奇兮惟獨傳乎吾姚當莫春之節候正禮拜姚俗禮佛聚千百人爲一社鳴鑼列陣舉國如狂之喧囂金鉦映佛號以鏗鍧旌旗雜裾裙以飄颻傾士女于東嶽東嶽廟在鳳山趾禮拜者呼釋伽代嶽求壽恣雥踏而炎歊爾時靈曜西沉人蹤甫息神其厭苦駕言遠出俗名躱油頭莾慿高而眺望紛靈光其燁㷜始祗見其一二繼緫緫其無極恍傳呼之有聲咸後先而擁蹕余固信而猶疑豈神光其顯赫雖口述之盡然終未免乎耳食必一覩其形容始中懷之可釋然其出也有候而其見也有地非夏之初必春之季天欲雨而礎潤雷將聲而尙閉氣藴隆而風伯無蹤雲靉靆而夜光已􅂮于是或登龍泉之頂或陟鳯凰之脊始得暢乎奇觀不則終于閴寂此抱願其有年究蹉跎而未得兹四月其過半嘆三春之已逝訪吾甥朱子緯于城東惟刺花之滿鼻叶天黯􅞝而濕蒸庶此願之可冀于是候薄暮陟鳯巓叩􅂕􅃈俯九埏待歸烏之旣盡惟蟹火之熒然無何谷風大作動搖林莾肌膚生粟殿鈴亂響僧吿余以不遇􅆧廽步以悵怏惟葉子公旦之好奇彼固知之甚悉遡前日之所見惟龍山尤奇特因訂期于黃昏恨蔽光之無術屈子折若木以蔽光謂鞭日使暮也遂預約夫同心候人定而俱陟及崦嵫之旣暮冺萬形于無色乃俯瞰乎郊原路幽昧以若漆忽一炬之熒然疑扶桑之吐日葉子狂呼神燈已出凝眸少􅃟倐爾千百爾其始也燁燁熒熒白山之址必起于白山旣暗復明􅀌停不徙或案衍而將行或遷延而復止豈侶伴之未偕乃躊蹰而有所俟爾其繼也纍纍而出如珠貫縷剛覩一方俄焉四起遠則彌乎剛巒近則興乎尺咫總大地之盡然又何分乎城墅爾其徐也雖極日之輝煌亦條分而縷析或渡水而後先晻映或乘橋而往來絡繹或凝然延佇而將南究又何因而忽北爾其疾也閃爍無常東西倐忽或干霄而􅀡上或電馳而忽沒或一炬而散爲百千或百千而倐焉合一怪怪奇奇不可髣髴初疑百萬之兵俱列炬於昆陽又疑彌天之星咸馳流而如孛余乃目眩魂驚精移神奪若迷若夣信疑難决未幾城鐘發響山月吐焰清飈頓興光輝零亂若滅若沒忽焉而㪚客有問曰此果何物􅁘朱子曰此天地之生氣也萬物怒生鬱氣蓬勃光入虞淵熛艶熠煜此春夏之昭融而秋冬之寂沒葉子曰此太陽之魄氣也㬨曦照臨遍滿寰區一日所暴萬物漸濡故雖􅄥汜之旣沒猶餘光之未除余曰天地之間孰非此氣何宇内之盡然乃獨見夫此地若夫蟹匡腐草見火則明豈白日之照臨㑹不如夫殘燈但往來之歷歷寧無物焉是慿客曰然則究爲何物􅁘余歌曰神燈㷜㷜兮何者非􅀑神之跡兮神燈熒熒兮何者非鬼神之功兮謂妖僧之造作以誑人兮固祗覩其僞而未嘗覩其眞胡致堂見僧僞放佛燈事謂吐光芒于丹室兮東坡咏聖燈巖詩亦逞夫胸臆而淺之乎測也田草賦夫何余生之愚拙兮罔識世所崇高欲托庇于聖賢兮惟墳典之是操是餌鼠以羣狸兮宐八口之嗷嗷將違棄而改求兮思從事于南郊􅆧民生之爲業兮惟農夫爲最勞夏暑雨而流金兮冬祈寒而折膠日匍匐于畦町兮雖勤劬而莫號况災荒之洊臻兮兼賦歛之貪饕思九州之􅀶大兮豈必懷乎故宇覽相觀于四極兮欲遠集而何所止彼稼穡之雖艱兮猶吾力之可恃苟豐亨之有望兮何惜吾躬之胼胝奈磽瘠之久蕪兮厥草蓁蓁紛緫緫其狀類兮據我田畇欲盡殪此柔苗兮惟爾􅀋之獨存不悉爾之情狀兮何以施我之經綸相彼肥田兮玉菜生之又紫蔈與温草兮及地毛與水薇土名水蓬頭是雖害而尙小兮欲爾除亦易施惟一耘而一耨兮已種類之無遺相彼瘠田兮惟江箴之最頑根旣深而苗滑兮欲爲揠而甚難似野茨野鳬茨亦甚害禾而差小兮等莆雚之紛繁又田姜之九子兮田姜一夜生九子與過海之破錢農諺云破銅錢一夜能延過海我將先其橫兮繼鑤田鑤其縱秋旣蒔以苜蓿卽黄草子兮夏復漑之以馬通旣肥土與潰根兮自爾類其難容苜蓿肥土江箴野鳬茨見馬糞根潰相彼山田兮浸彼澗泉有水松與蘋藻兮芩荇與金蓮厥性清冷兮而惡夫旱乾我將先决其流兮始繼以芸燒薙草以行水兮如􅀬湯之氤氲復鋪港以柴苗兮嗟爾類其何存相彼湖田兮惟湖草之爲害紅蓼茭芡浮萍兮浮薔蘝餂眼子菜自湖濵而連延兮使我苗之有閡我將捻爾于湖兮預堆積而若丘俾潰爛之有日兮及臨用而始收旣以遂殺爾􅀋兮又以糞我之田疇相彼江田兮惟江潮之灌輸生望潮與鹹草兮曁蒹葭與水蘆彼梗硬而根固兮非指力之能刳我將削以覃耜兮復耘之以蓧令陳根之必􅂮兮始裁培而有效且趂臘而氷耕兮使餘孽其盡耗相彼高田兮旱草不一或狗尾之芃芃兮或羊須之菀菀或三稜之錯雜兮或帚草之攢植雖性􅀋之不同兮要遺種而能出旱草興害禾之草不同旱草喜燥害禾之草自種禾後始生我將及宿草之旣枯兮正新草之未生未牛翻與桔橰兮先導之以火耕旣將爾類之燔兮且使土脉之動萌相彼低田兮終歲沮洳冬無菽麥兮惟水草之是居湖苔蝴蚣薬名候春氣而發作兮水甜水甜菜花瓣二出鴨舌雖寒月而榮敷我將布以鹽􅁅兮使爾性之不遂復瘞之于苗根兮惟速朽之爲利卽藉爾之􅂮腐兮發我禾之生氣凡兹草之爲類兮固悉數而難殫要爾性之相近兮就大凡而爲言葢一長而一消兮何能聽爾之紛繁獨怪天之生物兮惟爾類之獨厚嗟我苗之日䕶兮尙顦顇而難秀何惟爾之務去兮乃不植而愈茂因知天之惡善而好􅁋兮自前世而固然彼好修之蹇蹇兮俾窘步而不前乃㨗徑而昌披兮盡青紫之翩􅝆此自古之窮殀兮不在夫蹻跖而在夫孔顏余豈不知蕭艾之易盈兮固椒蘭之易委奈旣托此美種兮寧肯羡夫荑稗苟芳菲其未沬兮雖顑頷其奚悔余惟盡吾力之當爲兮不顧一已之倦疲保此種于長存兮不使稂莠之或滋苟天不欲靡望而爲茅葦兮夫豈無年歲之可期撰杖集南雷文案三刻學人楊中默編次翰林院庶吉士子一魏先生墓誌銘天啟朝以攻逆奄而死者一十有三人其後人爲世所指名者唯黃魏兩家李賊䧟都城子一死之是亦可以免於疑論矣顧四十年以來子一之大節尚然沈滯則黨人餘論錮之也乾坤未毁所賴吾黨淸議猶有存者子一以同難視余猶弟余老矣可不及其未死披發白日乎子一之子札以墓銘來請亦復何辭子一諱學濂别號內齋魏氏吳之舊姓世爲嘉善人曾祖祥祖􅀖􅈂皆贈太常寺􅀸父諱大中吏科都給事中以􅀡諫死謚忠節妣錢氏封淑人忠節有才子三人長學洢字子敬所謂魏孝子也次子一次學洙字子聞子一風神傑出少受學于子敬卓犖不羣年十六應試邑令康元穗奇之使冠多士不因忠節在要位也乙丑忠節受難孝子捐生遺孤滿室追吏坐門子一紹述荒屯輸寫心力破巢之下復有完卵逆奄伏誅忠死之家哀榮巳備而導之興獄者阮大鋮傅槐方改頭換面捲土重來子一刺血上書申復讎之義天子愍然爲之動容下其章大鋮久依城社不畏薰燒僅以考功之議上子一復上䟽力爭卒麗丹書同難諸子先後謝恩闕下余年最少共推子一爲文設祭詔獄中門讀文未畢莫不狂哭觀者亦哭左右入吿烈皇烈皇曰忠臣孤子甚惻朕懷甲戌葬忠節迎蕺山夫子題主㑹葬者千人子一布置閖通不露貧狹吳子􅉨陳幾亭皆子一姻家因請蕺山講學於丙舍讀書柳洲與長洲薄子珏務爲佐王之學兵書戰䇿農政天官治河城守律呂鹽銕之類無不講求將以見之行事逆知天下大亂訪劍客奇才而與之習射角藝不盡其能不止􅀡指督學行部謁廟講書故事籖抽一二諸生敷演儀文子一不待宣及奮袖橫經以古義實今事利害之興作吏治之循墨昌言無所隱避聞之莫不震動主者唯唯不能不爲理奪也是時塲屋之文兢學浮麗爭爲闡緩子一造于疏通廣博之域脫稿流傳然子一孤行一意不肯附㑹婁東二張主張復社士集其門者如燕雀子一多相靳故卽虞山古文未嘗以一代作手歸之其所奉手摳衣者蕺山一人而巳乙亥特詔選士子一舉第三一時同志之士想望其岀以爲世用壬午舉應天鄕試明年登進士第改庶吉士㓂患巳深子一多所建白請援靈武舊事出太子討賊請號召三輔義勇入援范文貞言之天子而烈皇菁華巳竭但有周章托之空言巳矣京師旣䧟子一謂其同志曰吾輩自分唯有一死然死有三節目先帝上升之日一也發喪之日二也李賊卽僞位之日三也前此二者今巳不及以彼簒位之晨爲吾易簀之期耳此言余聞之魯季先是子一與容城孫鍾元密結義旅刼其不備賊中亦頗有願內應者故子一遲遲以待其至久之音塵斷絕賊黨勸進將以四月二十九日燔燎告天以正號位子一曰吾死晩矣以其日賦詩二章自縊死距生萬曆戊申九月二十八日年三十七配陳氏戊午解元山毓女子三人允枚順治戊子舉人允札增廣生允桓庠生女一人壻徐銳意問學遠駕經生先友宿艾望風推服莫窺其底裏加之旁通藝事章草之書倪黄之畵陽冰之篆孤姿絕狀觸毫而出無非詩書之所融結學侶挹其精微詞宗稱其妙絕一時盛名無出其右子一亦未免矜貴自喜不知盛名之難居也且子一雖學於蕺山其所重􅁍在經濟上此便是功利之學旣與倪范諸公同是一死而牽挽于密約不得自由亦是功利誤之此則可爲子一惜也然子一實有過人者余束髮交遊所見天下士才分與余不甚懸絕而爲余之所畏者桐城方密之秋浦沈崑銅余弟澤望及子一四人五行一覧半面十年漁獵所及便企專門天生此才僅供喪亂之摧剝乃使頑鈍如余者執簡而拾其後可愧也夫銘曰天降逆菴繼之賊李蕩覆乾坤冺絶綱紀於戲忠節忠於天啟於戲子一忠於末祀前有其父後有其子一家之禍千秋之美三十九年余始作誄彼黨人者巳如屠豕答萬充宗問鄕射侯制按干侯之制中方十尺鵠方三尺三寸三分强上躬崇二尺廣二丈下躬亦崇二尺廣二丈上舌崇二尺廣四丈下舌崇二尺廣三丈自上綱至下綱凡一丈八尺參侯鵠方四尺六寸六分强中方一丈四尺上下躬各廣二丈八尺上舌廣五丈六尺下舌廣四丈二尺躬舌之崇皆各二尺與干侯同也自上綱至下綱凡二丈二尺大侯中方一丈八尺鵠方六尺上下躬各廣三丈六尺上舌廣七丈二尺下舌廣五丈四尺躬舌之崇三侯一也自上綱至下綱凡二丈六尺三侯之崇廣如此干侯下綱去地尺二寸高一丈九尺二寸參侯下綱去地一丈五寸少半寸高三丈二尺五寸少半寸大侯下綱去地二丈二尺五寸少半寸高四丈八尺五寸少半寸張侯之高下如此來書躬崇廣方三丈據干侯而言中棲於躬之正中中掩躬十尺則躬之左右合二十尺上下亦然非也中與躬舌皆是單幅但上下聯屬耳若中掩躬則夾幅矣中之左右無躬焉得有合二十尺上下之躬各二尺亦不得云合二十尺所謂倍中以爲躬者言其廣不言其崇也來書躬方三丈上舌倍之當六丈而止五尋者置中所棲之十尺不倍夫躬廣二丈上舌倍之廣四丈本是􅀡截不倍中棲無乃曲說乎吾兄認廣爲崇由是於鄭說多所齟齬故疑三侯躬舌各二尺與倍中爲躬倍躬爲舌之文不相合也若如兄言以崇計之則十侯中一丈上下躬各二丈上下舌又各四丈是一十三丈矣寧可通乎劉公是勾股之法人去干五十歩通歩爲五尺古法五尺爲步得二百五十尺千去參二十歩通爲一百尺干高一十九尺二寸目高七尺自目至參三百五十尺以干高目高相較得一十二尺二寸以干目較乗目至參得四千二百七十以人去干除之得一丈七尺五分寸之四加目高七尺共二丈四尺五分寸之四必如此數方能見之今參侯之鵠去地一丈九尺二寸則鵠爲干高所掩其說是也但記言射自楹間序則物當棟堂則物當楣是射位在堂上以堂高目高計之爲一丈四尺干侯髙一丈九尺二寸則干侯之高於目五尺二寸耳且去之五十步何患不見參鵠哉始知公是之說非也鄭氏解經間有穿鑿然去三代不遠制度猶有存者無容輕議耳問金奏肆夏之三劉公是曰春秋傳稱金奏肆夏之三工歌文王之三夏云金奏文王云工歌則九夏乃有聲無辭者也按樂有間有合間者堂上堂下一歌一奏更遞而作合者上下之樂竝作歌者人聲奏者樂聲歌奏皆有辭此之金奏亦如琴之有操笙之有詩焉可謂之無辭哉但奏與歌不同孔頴逹於金奏工歌渾而爲一云晉人作樂先歌肆夏次歌文王則非也問左傳文元年孔䟽云古今曆法推閏月之術皆以閏餘滅章歲餘以歲中乘之章閏而一所得爲積月命起天正算外閏所在也此數言義有未解求詳示四分暦推閏月所在以閏餘減章法十九餘以歲中十二乗之滿章閏七得一爲積月天正起算積月盡爲閏月減字誤滅故難解也問從來言地勢者謂北高南下春秋桓三年日食孔䟽謂月在日南從南入食南下北高則食起於下月在日北從北入食則食發於高其行有高下故食不同按日月麗天何以亦分北高南下曆家言日高於月謂月在日南日非則可謂北高南下似不可豈以北極出地南極入地天形如倚葢日月亦因之高下乎按孔䟽所云此言緯度也月在日南謂之陽曆月在日北謂之陰曆其所謂高下者止據日而言日以南爲下以北爲高月輪之下於日甚遠豈能高於日哉問春秋日食三十六而頻食者二先儒咸謂日無頻食法王伯厚云衛朴推驗春秋日食合者三十五獨莊十八年三月古今算不入食限豈二頻食亦入限乎抑史官怠慢當時失記從後追憶疑莫能定遂兩存之春秋因而不削乎沈存中云衛朴精於曆術春秋日食三十六密者不過得二十六七一行得二十七朴乃得三十五唯莊公十八年一食今古算皆不入食法疑前史誤耳王伯厚之言本此愚按襄二十一年秋九月庚戌朔日有食之冬十月庚辰朔日有食之又二十四年七月八月兩書日食曆家如姜芨一行皆言無比月頻食之理授時亦言二十一年巳酉中積六十六萬九千一百二十七日五十五刻步至九月定朔四十六日六十五刻庚戌日申時合朔交泛一十四日三十六刻入食限是也歩至十月庚辰朔交泛一十六日六十七刻巳過交限故姜芨一行之說爲是西曆則言日食之後越五月越六月皆能再食是一年兩食者有之比月而食者更無是也襄二十一年巳酉九月朔交周宮九度五一二八入食限十月朔一宮一十度三一四二不入食限矣二十四年壬子七月朔交周宮三度一九三五入限八月朔交周一宮三度五九四九不入食限矣乃知衛朴得三十五者欺人也其言莊十八年一食自來不入食法按是年乙巳歲二月有閏至三月實㑹四十九日一十三時合朔癸丑未初初刻交周一十一宮二十八度三四三七正合食限朴葢不知有閏故算不能合耳朴於其不入食限者自謂得之於其入食限者反謂不得不知何說也再答萬季野喪禮雜問諸家皆以卒􅂘爲祭名唯敖繼公謂卒哭卽三虞之祭儀禮言三虞卒哭盖於三虞之日卽卒無時之哭故謂三虞爲卒􅂘非别有祭某叅考禮文頗以其說爲是以三虞卒􅂘同是一事者乃先儒之舊說不始於繼公也鄭氏始别明卒哭與虞不同據雜記云士三月而葬是月而卒哭大夫三月而葬五月而卒哭諸侯五月而葬九月而卒哭是三虞與卒哭不同一事之證也又雜記云上大夫之虞也少牢卒哭成事附皆太牢下大夫之虞也犆牲卒哭成事附皆少牢是卒哭之祭重於虞祭之證檀弓云葬日虞弗忍一日離也是日也以虞易奠卒􅂘曰成事是日也以吉祭易喪祭明日袝于祖父其言與雜記相合觀此則鄭說爲長諸家皆以禫爲祭名近見方履中古釋疑称密之先生之說謂禫乃除服之名非祭名儀禮祝詞初虞曰袷事再虞曰虞事卒􅂘曰成事小祥曰常事大祥日祥事而禫獨無所言又戴記言三年而後葬者必再祭何以止有練祥而無禫其說如此某又曰三年之喪二十五月而畢則禫在二十五月喪事先遠日此一月之中旣於下旬十大祥之祭不數日而又行禫祭有是禮乎按喪服小記期而祭禮也期而除服道也祭不爲除喪也則祭而除喪在練巳然不别立名也安得於祥祭復重一禫以爲除服之名哉且古禮從祥至吉凡服有六祥祭朝服縞冠一也祥訖素縞麻衣二也禫祭􅀇冠黄裳三也禫訖朝服綅冠四也踰月吉祭玄冠朝服五也旣祭玄端而居六也不比今人從喪至吉一服而巳除則竟除無漸次也密之以今事釋古禮䟽矣其以祝詞無禫祭爲據卒哭之後尚有祔祭亦無祝詞豈可亦謂無祔祭乎又言三年而後葬者再祭止有練祥而無禫祭夫再祭之中且無虞祔何獨於禫而疑之卽如兄言禫在二十五月亦未爲得三年之喪二十五月而畢是矣人之哀樂原非截然喪旣畢而餘哀未忘有禫祭以表之此居喪之餘也若謂禫是除喪之名則祥祭巳除喪矣何以復曰中月而禫哉中月而禫自是與祥間隔一月此二十七月也唯是檀弓祥而縞是月禫徙月樂初讀而疑之以爲是月者祥之月也繼而思之是月禮徙月樂不連上爲文蓋爲是月禫須徙月而樂也如是則可通矣儀禮言中月而禫是月也吉祭猶未配特牲饋食命筮之詞言祖而不及配正與此合諸家因爲禫月合祭祖考之時但祭祖而不以妣配某謂儀禮所言未配蓋禫月而遇祖廟吉祭不以新死者配食於祖而非妣之不配祖也且特牲乃士之常祭非止禫月之吉祭豈可因其不言配而謂常祭亦不祀妣乎按特牲饋食禮鄭云諸侯之士祭祖禰少牢饋食禮鄭云諸侯之􅀸大夫祭其祖禰皆屬吉禮無所分别於喪無與今以特牲不言妃配少牢言妃配遂牽特牲於喪禮之下豈特牲􅌹爲禫月而設乎豈特牲與少牢有所分别乎鄭氏亦自相不盾矣蓋自卒哭而祔新主不返於寢其蒸甞行于祖廟者新主雖在不以配食三年之喪未畢皆然今在禫月則喪畢似可配矣而曰猶未配者乘喪未畢而言也按齊王儉云朝聘蒸甞之典卒哭而備行婚禘蒐樂之事三載而後舉陳葦庵年伯詩序風自周南召南雅自鹿鳴文王之屬以及三頌謂之正經懿王夷王而下訖於陳靈公滛亂之事謂之變風變雅此說詩者之言也而季札聽詩論其得失未嘗及變孔子敎小子以可群可怨亦未甞及變然則正變云者亦言其時耳初不􅀜於作詩者之有優劣也羙而非謟刺而非訐怨而非憤哀而非私何不正之有夫以時而論天下之治日少而亂日多事父事君治日易而亂日難韓子曰和平之音淡薄而愁思之聲要妙讙愉之辭難工而窮苦之言易好向令風雅而不變則詩之爲道狹隘而不及情何以感天地而動􅀑神乎是故漢之後魏晉爲盛唐自天寳而後李杜始岀宋之亡也其詩又盛無他時爲之也卽時不甚亂而其發言哀斷不與枯荄變謝者亦必逐臣棄婦孽子勞人愚慧相傾惛算相制者也此則一人之時也蓋詩之爲道從性情而出入之性情其􅅴苦辛酸之變未盡則世智所限易容埋没卽所遇之時同而其間有盡不盡者不盡者終不能與盡者較其貞脆謝臯羽鄭所南同爲亡宋之人臯羽之詩皎潔當年所南沉井之時年四十三歲至七十八歲而卒沉井以後三十五年豈其斷手絕筆乃竟無一篇傳者苟其井渫不食羵羊失䕶寧保心史之不終錮乎詩之爲敎温厚和平至使開卷絡咎寄心􅄀漠亦是􅅴苦辛酸之迹未冺也陳葦庵先生風度閒綽早優名輩詩情所結若開金石曾靡榛蹊其對揚恭紀諸詩與早朝大明宮賈杜王岑並稱典雅逮夫笙管革文先生流矢影風顧有憂色一唱三歎凄人心脾讀之者但覺秋風憀慄中人肌膚方其悲樂相生掩卷不能曾何忌諱之可言平此一人之身而正變備焉者也令子同亮刻之問序於余同亮方集春秋傳註數十家􅂨其醇疵詩亡然後春秋作亦知詩之有不亡者乎不必舍先生之詩而别求也張南垣傳古今之事後起之勝於前者多矣故烹餁起於􅀬石玉輅基於椎輪卽如畵家有人物有山水漢唐以來􅆊天帝釋聖主名臣之像皆以繪畵其後稍稍通之而爲塑土範金􅅮換元劉元欲造嶽廟侍臣像心計久之未措手也適閲秘書圖畵見唐魏徴像矍然曰得之矣非若此莫稱爲相臣者遽走廟中爲之卽日成以此知雕塑之岀於畵也然畵師之名者不勝載而塑工之名者一二耳至於山水能玅神逸筆墨之外無所用長未有如人物之變而爲塑者則自近日之張漣始張漣號南垣秀水人學畵於雲間之某盡得其筆法久之而悟曰畵之皴澁向背獨不可通之爲叠石乎畵之起㐲波折獨不可通之爲堆土乎今之爲假山者聚危石架洞壑􅅁以飛梁矗以高峯據盆盎之智以籠岳瀆使入之者如䑕穴蟻垤氣􅁚蹙促此皆不通於畵之故也且人之好山水者其㑹心正不在遠於是爲平岡小坂陵阜陂陁然後錯之石繚以短垣翳以密篠若是乎奇峯絶嶂纍纍乎墻外而人或見之也其石脉之所奔注㐲而起突而怒犬牙錯互决林莽犯軒楹而不去若似乎處大山之􅅢截溪斷谷私此數石者爲吾有也方塘石洫易以曲岸􅅆沙􅃉闥雕楹改爲靑扉白屋樹取其不凋者石取其易致者無地無材隨取隨足或者以平泉爲多事朱勔眞笨伯矣當其土山初立頑石方驅尋丈之間多見其落落難合而忽然以數石􅀧綴則全體飛動若相唱和荆浩之自然􅀜同之古淡元章之變化雲林之蕭踈皆可身入其中也漣爲此技旣久土石草樹咸能識其性情毎創手之日亂石如林或卧或立漣躊躇四顧主峯客脊大礐小磝皆黙識於心及役夫受命漣與客方談笑漫應之曰某樹下某石可置某所目不轉視手不再指若金在冶不假斧鑿人以此服其精漣爲人滑稽好舉委巷諧謔以資撫掌梅村新朝起用士紳餞之演傳奇至張石匠伶人以漣在坐改爲李木匠梅邨故靳之以扇确几賛曰有竅閧堂一笑漣不荅及演至買臣妻認夫買臣唱切莫題起朱字漣亦以扇确几曰無竅滿堂爲之愕眙梅邨不以爲忤有竅無竅吳中方言也三吳大家名園皆出其手其後東至于越北至于燕請之者無虗日漣有四子皆衣食其業而叔祥爲最著柳敬亭傳余讀東京夢華錄武林舊事記當時演史小說者數十人自此以來其姓名不可得聞乃近年共稱柳敬亭之說書柳敬亭者楊之㤗州人本姓曹年十五獷猂無頼犯法當死變姓柳之盱眙市中爲人說書巳能傾動其市人久之過江雲間有儒生莫後光見之曰此子機變可使以其技鳴於是謂之曰說書雖小技然必勾性情習方俗如優孟揺頭而歌而後可以得志敬亭退而凝神定氣簡練揣摩期月而詣莫生生曰子之說能使人驩咍嗢􅛐矣又期月生曰子之說能使人慷􅁣涕泣矣又期月生喟然曰子言未發而哀樂具乎其前使人之性情不能自主蓋進乎技矣由是之楊之杭之金陵名逹于縉紳間華堂旅㑹閒庭獨坐爭延之使奏其技無不當於心稱善也寧南南下皖師欲結歡寧南致敬亭于幕府寧南以爲相見之晩使叅機密軍中亦不敢以說書目敬亭寧南不知書所有文檄幕下儒生設意修詞援古證今極力爲之寧南皆不悅而敬亭耳剽口熟從委巷活套中來者無不與寧南意合嘗奉命至金陵是時朝中皆畏寧南聞其使人來莫不傾動加禮宰執以下俱使之南面上坐稱柳將軍敬亭亦無所不安也其市井小人昔與敬亭爾汝者從道旁私語此故吾儕同說書者也今冨貴若此亡何國變寧南死敬亭喪失其資畧盡貧困如故時始復上街頭理其故業敬亭旣在軍中久其豪滑大俠殺人亡命流離遇合破家失國之事無不身親見之且五方土音鄊俗好尚習見習聞毎發一聲使人聞之或如刀劍鐵騎颯然浮空或如風號雨泣鳥悲獸駭亡國之恨頓生檀板之聲無色有非莫生之言可盡者矣馬帥鎭松時敬亭亦岀入其門下然不過以倡優遇之錢牧齋嘗謂人曰柳敬亭何所優長人曰說書牧齋曰非也其長在尺牘耳蓋敬亭極喜冩書調文别字滿􅁓故牧齋以此諧之嗟乎寧南身爲大將而以倡優爲腹心其所授攝官皆市井若巳者不亡何待乎偶見梅邨集中張南垣柳敬亭二傳張言其藝而合于道柳言其叅寧南軍事比之魯仲連之排難解紛此等處皆失輕重亦如弇州誌刻工章文與伯虎微明比擬不倫皆是倒却文章家架子余因改二傳其人本􅃈􅃈不足道使後生知文章體式耳李因傳李因字今生號是菴錢塘人生而韶秀父母使之習詩畵便臻其妙年及笄巳知名於時有傳其咏梅詩者一枝留待晩春開海昌􅁑光祿見之曰吾當爲渠騐此詩䜟迎爲副室崇禎初光祿官京師是菴同行禁邸淸嚴周旋硯匣夫婦自爲師友奇書名畵古噐唐碑相對摩玩舒卷固疑前身之爲淸照暇卽潑墨作山水或花鳥冩生是庵雅自珍惜然脫手卽便流傳癸未出京至宿遷猝遇兵譁是菴身幛光祿兵子驚其明麗不敢加害光祿自是無仕宦意琴臺花塢風軒月榭絲竹管􅃶之聲不絶是庵以翰墨􅃳色其間當是時虞山有柳如是雲間有王修微皆以唱隨風雅聞於天下是庵爲之􅂦足傖父擔板亦艶爲玉臺隹話亡何海運而徙鋒鏑遷播光祿捐舘家道喪失而是庵㷀然一身酸心折骨其發之爲詩尚有三世相韓之痛三十年以來求是庵之畵者愈衆遂爲海昌土宜饋遺中所不可缺之物是庵亦資之以度朝夕而假其畵者同邑遂有四十餘人是庵聞之第此四十餘人之高下不在高第者母使敗我門庭其殘膏剰馥尚能沾漑如此吾友朱人遠以管夫人比之其宦遊京師同其易代同其工辭章同其翰墨流傳同差不同者晩景之牢落耳余讀文敏魏國夫人之誌誇其遭逢之盛入謁興聖官皇太后命坐賜食天子命書千文勑玉工磨玉軸送秘書監裝池收藏而是庵方抱故國􅁰離之感凄楚藴結長夜佛燈老尼酬對亡國之音與皷吹之曲共留天壤聲無哀樂要皆靈秀之氣所結集耳人遠傳是菴欲余作傳以兩詩夀老母爲贄有不惜淋漓供筆墨恭隨天女散花來之句老母嘗夢注名玉札爲第四位天女降謫人世故讀是菴之詩而契焉余之爲此者所以代老母之荅也萬履安先生詩序李杲堂選甬上􅂄舊詩余欲合陸文虎萬履安兩先生合刻之杲堂以兩先生同時之人其子孫未免比例故稍遲之以待潦水之盡杲堂旣卒公擇欲先以家集行世問序於余余謂先生之詩不可不急行也今之稱杜詩者以爲詩史亦信然矣然註杜者但見以史證詩未聞以詩補史之闕雖曰詩史史固無藉乎詩也逮夫流極之運東觀蘭臺但記事功而天地之所以不毁名敎之所以僅存者多在亡國之人物血心流注朝露同晞史於是而亡矣猶幸野制遥傳苦語難銷此耿耿者明㓕於爛􅁓昏墨之餘九原可作地起泥香庸詎知史亡而後詩作乎是故景炎祥興宋史且不爲之立本紀非指南集杜何由知閩廣之興廢非水雲之詩何由知亡國之慘非白石晞髪何由知竺國之雙經陳宜中之契濶心史亮其苦心黃東發之野死寶幢志其處所可不謂之詩史乎元之亡也渡海乞援之事見於九靈之詩而鐡崖之樂府寉年席㡌之痛哭猶然金版之出地也皆非史之所能盡矣明室之亡分國鮫人紀年􅀑窟較之前代干戈久無條序其從亡之士章皇草澤之民不無危苦之詞以余所見者石齋次野介子霞舟希聲蒼水澹歸十餘家無􅀜受命之筆然故國之鏗爾不可不謂之史也先生固十餘家之一也生平未嘗作詩今續騷堂寒松齋粤艸皆遭亂以來之作也避地幽憂訪死問生驚離弔徃所至之地必拾其遺事表其逸民而先生之詩亦遂棲楚藴結而不可解矣夫蔓艸零露仍歸天壤亦復何限先生獨不能以餘力畱之乎故先生之詩眞詩史也孔子之所不刪者也張心友詩序余甞與友人言詩詩不當以時代而論宋元各有優長豈宜溝而出諸於外若異域然卽唐之時亦非無蹈常襲故充其膚廓而神理􅑪如者故當辯其眞與僞耳徒以聲調之似而優之而劣之楊子雲所言伏其几襲其裳而稱仲尼者也此固先民之論非余臆說聽者不察因余之言遂言宋優於唐夫宋詩之隹亦謂其能唐耳非謂舍唐之外能自爲宋也於是縉紳先生間謂余主張宋詩噫亦􅁈矣且唐詩之論亦不能歸一宋之長鋪廣引盤摺生語有若天設號爲豫章宗􅂀者皆原於少陵其時不以爲唐也其所謂唐者浮聲切響以单字隻句計巧拙然後謂之唐詩故永嘉言唐詩廢久近世學者已復稍趨於唐滄浪論唐雖歸宗李杜乃其禪喻謂詩有别材非􅀜書也詩有别趣非􅀜理也亦是王孟家數於李杜之海涵地負無與至有明北地摹擬少陵之鋪寫縱放以是爲唐而永嘉之所謂唐者亡矣是故永嘉之淸圓謂之非唐不可然必如是而後爲唐則專固狹陋甚矣豫章宗􅂀之爲唐浸滛於少陵以極盛唐之變雖有工力深淺之不同而槩以宋詩抹摋之可乎張子心友好學深思不以解褐爲䆒竟余所論著矻矻手抄不巳李杜王孟諸家文集亦觀余批􅀧以得其指趣其發之爲詩超然簡獨永絕塵粃流連光景極詩家聲色之致天假之年以文字爲詩以才學爲詩以議論爲詩莫非唐音今雖未竟其志其氣􅁚要自不凡不能不爲之三歎也紫環姜公墓表公諱天樞字静甫號紫環姜氏本淄川自仲開知􅌘縣徙嵊其後紹夫又自􅌘徙餘姚之咸池滙遂爲餘姚人高祖榮弘治壬戌進士官工部郞曾祖子羔嘉靖癸丑進士仕至行太僕寺􅀸祖鏡萬曆癸未進士以禮部郞中贈光祿寺􅀸父逢元萬曆癸丑進士仕至太子太保禮部尚書太保七子公其長也公生而好學無秦川貴公子之習顧裘馬弓劍旗亭北里未嘗置足弱冠爲諸生尋遊太學癸酉丙子在糊名中已中有司之尺度及拆號皆避嫌落之遂以任子入仕授都察院簡較陞工部都水司主事歷員外郞中督視北河累年亢旱河渠不通運河之水故藉山東諸泉濟其不足特設主事一員管理泉源至是亦竭摠河束手無䇿公曰按正統十三年御史林廷舉言元時衛河分引漳水支流永樂間填淤􅃇跡宜發丁夫開鑿可資漕運嘉靖六年僉事江良材言導河注衛􅒩由江入淮沂流至于河陰順流而逹衛更增一運道也考之前議運河之水原不必專藉山東諸泉矣今河水旣竭獨不可借良材之議而反用之導河注衛者導衛注河乎摠河韙其議公於是討求故道䟽理泉源衆流奔注河水驟盈􅒩舟皆歡呼而濟請如山東故實添設衛河主事遂著爲令當公創議時􅀔家􅀻此水利者謡啄繁興多設支閡公毅然不顧由是交􅀜津要共相唇齒致公于理以公之才始見之行事巳破浮華交㑹之徒使充其所至刻石之功正未可量而覆折於迫狹之世論不復再試是可惜也當是時石齊黃先生在獄上必欲殺之小人遂指交通􅀜涉者槩爲福党同繫者至故爲睚眦以明割席公獨眷顧爾雅咸張耳目石齊書孝經百本散之士林公亦書金剛湼槃百餘卷分於名刹書法皆奇偉藝林相傳以爲盛事淸獄命下徐司㓂虞求悉公本末始出之公患難之餘落然世事壯懷遠識一寄之于詩酒鏡湖之花月拈題顧曲所謂太白死三百年無此樂者公殆繼之大江以南西湖牛首虎丘烟雨遊􅄚所至以昌其詩未始非天之厚公也公於家庭之間意愛篤摯宗伯官京師公侍慰王母于家孝養無方宗伯棄世窀穸之事公苦身持力諸弟唯在位而巳諸父敬勝爲山東布政司理問城破闔門殉難唯一子婦得逸公從兵火中歛其骸骨訪其子婦得之民間重爲立後外父無子公擇其族子嗣之巳而嗣子天公復擇人嗣之其克盡田里骨肉之歡大槩􅀋此公之急難窘􅂇未易更僕數其著者如倪文正淺士三十年過者但揮泪而去公買地塟之蔞翣芻靈禮文畢偹會塟者千人皆於公是資甬東陸文虎無子棺槨􅁀露其從子假丐塟之名以告公公恩加松􅂎而從子未嘗加坏土其上再三應之公終無倦容文正之事好名者或能勉之文虎之事大類郭元振非其天性篤烈寧有是乎公生于萬曆己亥正月一日卒于康􅄉壬子六月二十七日年七十五所著有睆堂集娶錢氏前封㳟人今封孺人子三人長希軾庠生次希轍奉天府府丞卽定庵先生也次希輅丁巳舉人女三人長適周文節子玉忠官生次適沈鞏址次適邵文發皆庠生孫七人曰壵國子監慱士曰埈壬子選貢曰坦庠生曰垂曰埛曰塽曰增曰某孫女六人曾孫五人公銓丁巳舉人公鎭公錫公錄曾孫女五人某年月日塟公于鷄頭山之原當公之塟廟堂金石之文已偹復詢之草野者以其聞見之眞也銘曰秀偉相承明德繼踵於唯我公人倫珍重廊廟之才山林之福天之生人毎居其縮賦公之才惆悵風雲與公之福花月耕耘孰得孰先必有辨此留連管樂以俟孫子明司馬澹若張公傳天啓乙丙之際訛言繁興謂三吳諸君子欲翻局而以先忠端公爲謀主於是逮七君子於詔獄必欲殺之五月丁未王恭厰災壞民居十餘里撃死數千人熹宗在乾清宫走避建極殿御座毀折􅁇又朝天宫火災異叠見且古今所未有詔廷臣修省是時澹若張公爲兵部職方司主事與同官王陞密議因草䟽言修省之實刑獄係死生人命董以士師申以覆奏誠愼之也今罪囚半歸詔獄追賍卽以畢命雖其人自不􅁈而於好生之德無乃未愜乎甚至秋後與不時并律􅇸首與絞斬同斃痛快之事毎干天和自今以徃輕重罪囚悉付法曺使罹法者知自絕於天比附者無舞筆之恐罪疑惟輕則􅄀途有重返之魄罰當其咎則单門無連染之人肅殺之後繼以陽和此其時矣至於軍儲告匱土木宏規豈不知生財爲急而急土木不如急軍儲議捜括不如議節省今旣捜無可搜括無可括􅃈屑凌雜盡以人告竊恐焚林竭澤之後能無魚驚鳥散之憂請自皇極告成暫停工作悉以海内物力併爲軍前見粮寢其屑瑟之誅求益見聖心之惇大俟彊宇廓淸􅂯完堂搆未爲遅也公衘䟽袖中入白堂官堂官長垣王永光也長垣固攻東林者然其人有權術把持局靣亦不欲寄乾兒門客之虎落思深慮遠得公䟽竟上之上傳覧樞臣所奏停工緩刑言若忠愛朕熟思旬日皇極殿工已抵八九止用銀壹百伍拾万兩務崇儉約匪雕匪刻邉儲嵗解不缺外發帑二千餘萬洪流束楚功績闇然今當節縮皇極之餘經始三殿計外解一百餘萬未至皇考發帑百萬尚存内外臣工乘此一德搜括編􅂀俱無所事苟疆臣民牧齊契工官則乾没風消怨咨聲冺何功不奏何治不隆乎刑不上大夫崇養士節皇祖成憲柰士不自愛争爲奸宄如周宗建保熊廷弼於亡遼之後涕唾封疆歛金畿輔創建書院翼戴奸邪惡郭鞏之攻廷弼誣以交結內侍􅇯􅄡狡語遠埋疑案周順昌逗撓詔獄止檻車而結烟挾市魁以稱亂明與君抗黃先忠端公諱請寄爲奸李若星之節􅃏鄒維璉之吏部何所由來撓亂朝政捭搕鄕􅀖夫朝廷重士士實自輕朝廷建官官反侮上一槩縱舎姑息無將之誅春秋謂何難乎其爲上矣諸臣顧動以爲朝廷之過朕甚惑焉海内方汙􅁾朝廷聞是䟽之上莫不舉手加額以爲中流之一壼豈知其殺機巳决騎虎之􅀔不能復下然矯㫖之反覆辭費小人之氣未甞不阻喪矣長垣旣以此去而公有寧錦之功逆奄絀之未幾推補吏部郞中㫖以門戸罷之昔李膺在獄賈偉節西行說竇武霍諝訟之呂惠􅀸興大獄蘓子瞻勸王安石言之竇王皆與奸人異趨故賈蘓之言易入公之於長垣水火也而欲格之以正議此陳子翁不能得之於章惇者公竟得之可不謂奇乎公諱􅂂端字旋吉號澹若世爲華亭人曾祖良佐祖謨父元輔太學生生三子長拱端當陽知縣次卽公次􅁤端邵陽知縣萬曆壬子三人同舉鄕試公登丙辰進士第岀知晉江束鹿縣皆有能名其大者於晉江得黃石齋先生爲一代大儒於束鹿河决遷縣治二十里築城一千五百丈民不加賦遷者如歸其爲治詳石齋卧子誌狀公自職方歸禁割朝議放情詩酒烈皇更化以次召骨鯁之臣起公吏部而傷於哀樂不能復赴崇禎元年卒年四十三娶沈氏封安人子三人曰定諸生曰寧曰守康熈壬子舉人一女嫁諸生王世烱公卒後五十五年守函幣以傳文屬余憶乙酉於徐太宰座上識守忽忽交臂不知其爲公之子也皇風散口說流行余以身所見聞者詮次其事家國之恨集於筆端不覺失聲痛哭棲鳥驚起後之覧者亦將有感於斯文續塟書問對或問趙東山塟書問對所謂形氣者對曰形者山阜之􅁚形於金木水火土也氣者山川之脉理或聚或散聚者其生氣也又問所謂方位者對曰以八卦辨龍之貴賤及二十四山之衰旺生剋是也問者曰東山信形氣而斥方位是乎對曰是也然東山不能自持其說耳夫山川之起止合散觀其大畧亦不難辨固人人可以顯而得之東山精微其說以爲吉土之遇由於天􅂌塟師言天命可改東山言人事難致其害理同也然則其故何也曰􅀑䕃之說惑之也問者曰􅀑蔭之說非乎程子言父祖子孫同氣彼安則此安彼危則此危亦其理也對曰唯唯否否夫子孫者父祖之分身也吳綱之貌四百年尚類長沙蕭頴士之狀七世猶似鄱陽故嚙指心痛呼吸相通夫人皆然後世至性汨没墮地以來日遠日踈貨財婚宦經營異意名爲父祖實則路人勉强名義便是階廷玉樹彼生前之氣巳不相同而能同之於死後乎子孫猶屬二身人之爪髪托處一身隨氣生長翦爪㫁髪痛痒不及則是氣離血肉不能周流至於手足指鼻血肉所成而折臂刖足蒿指劓鼻一謝當身卽同木石枯骸活骨不相干涉死者之形骸卽是折臂刖足蒿指劓鼻也在生前其氣不能通一身在死後其氣能通子孫之各身乎昔范縝作神㓕論謂神卽形也形卽神也形存則神存形謝則神㓕難之者謂神與形殊生則合爲一体死則離爲二物二說雖異然要不敢以死者之骨骼爲有靈也後來儒者言㫁無以旣盡之氣爲將來之氣者卽神㓕之說也釋氏所言人死爲􅀑􅀑復爲人者卽神不㓕之論也古今賢聖之論􅀑神生死千言萬語總不出此二家而􅀑蔭之說是於二家之外鑿空言死者之骨骼能爲禍福窮通乃是形不滅也其可通乎是以古之先王懸棺之後迎主於廟聚其魂魄以墓中枯骸無所慿依也其祭祀也三日齋七日戒求諸陽求諸陰徬徨凄愴猶不能必祖考精神之聚否今富貴利逹之私充滿方寸叩無知之骸骨欲其流通潤澤是神不如形孝子不如俗子也問者曰若是而塟又何必論形氣乎曰不然布席畫階亦有方位筮賔求日豈因利益况乎永托親骸而使五患相侵坐不正席於心安乎程子所謂彼安則此安彼危則此危者據子孫之心而爲言也豈在禍福乎問者曰今世視此若禍福交手而付寧皆狂惑乎曰不觀宋景濓之誌傳守剛乎焚屍沉骨之俗成纓弁之家亦靡然從之不然則以爲辱親也彼之惡擇地猶此之惡焚屍也習俗亦何嘗之有問者曰地苟不吉遷之可乎曰不可焚屍之􅃤夫人知之入土之屍棺朽骨散拾而置之小櫝其􅃤不異於焚如也何如安於故土免戮屍之虐乎卽不吉亦不可遷也問者曰形氣旣吉則􅀑䕃在其中又何必外之也對曰􅀑蔭之說不破則算計上度之心起受蔭之遲速房分之偏枯冨貴貧賤各有附㑹形氣之下􅀔不得不雜以五行衰旺生剋心愈貪而愈昏說愈多而愈亂於是可塟之地少矣誠知􅀑蔭之謬則大山長谷􅅆溪伏嶺之中其高平深厚之地何在無之便是第一等吉壤精微之論不能出此雖有曾楊瘳頼亦無所用無俟乎深求遠索無可柰何而歸之天命也問者曰古人凡事筮日東山斥方位而并斥時日何也對曰古之筮日非生尅衝合之謂也時則皆以質明唯昏禮用夜有定期也曾子問見星而行者唯罪人與奔父母之喪者塟以日中可知不然謂之痁患下癀而以宵中今日擇時之害也風和日出便於將事謂之吉日風雨卽是㐫日筮者筮此也今之塟者不以雨止擇日之害也故東山之見卓矣蔣氏三世傳蔣洲字宗信别號龍溪鄞縣人補其學諸生好游俠留連管樂平居愛客置酒雅歌投壺高睨大談終日不倦以故人樂與之遊嘉靖癸丑王􅈂勾倭入㓂烈港􅀡歙人母汪嫗夢弧矢星入懷而生長而與其徒入海連巨舶載硝磺絲綿違禁諸器物往來互市於日本暹羅西洋各國貲累鉅萬各島君長以下並信服之稱爲五峰舶主五㖓其號廣有賊首陳思盻者不入􅀡黨􅈂掩殺之併其衆由是海上之㓂非受􅈂節制不能存威名籍甚尋招集亾命據薩摩州之松浦僣稱徽王置官屬三十六號令島人時時遣部下剽攻沿海郡邑東南危動當是時胡梅林宗憲開府浙􅀡歷訪奇士而宗信之里人都督萬鹿園表留心人物謂梅林曰里有蔣生者縱橫之士也梅林遂介鹿園置之幕府宗信曰漢之困於匈奴由中行說也宋之患於元昊由張元也自王􅀡航海遂有東南之禍今與我爭於鯨唇之上者皆􅀡之分䑸也我不得􅀡彼鴟附鼃援其可旣乎􅀡之母妻與子盡在我地彼雖作賊骨肉刺心公如開以丹靑之信未有不就戎索者梅林曰此名計也請於朝授宗信提舉以陳可願爲副復赦海上亾命十餘人使之向導􅀡之子澄亦囓血致書於父曰幕府長者唯願一見阿父以有詞於朝無他患也乙卯九月開洋至小衢山七日抵五島島倭疑爲商舶將肆劫勒有僧譯之酋長酋長始郊迎示以天朝宣諭之㫖酋長受命乃使人招王􅀡􅀡至殊作意氣宗信論之曰君卽不念祖宗墳墓獨不爲老母妻子計乎國家方急東方誠以此時罷遣衝鯨􅃠絡波臣此萬世刻石之功也兼官重紱舍君誰適不然倭情貪狡國家縑帛無限購君萬里之外不異庭除矣􅀡感其至言苦意遂與之同食遞衣言無不盡偕返松浦日本以天文王爲共主然號令不出國門各島自相雄長豐後山口又島中之最雄者也故入㓂者多二島之人􅀡與宗信同行宣諭明年丙辰至博多津召其色目賞賜旅誓四月至豐後島王懷音革狀詰以從前作過稽首主臣願貢方物遂令其檢攝風帆凡筑前肥前等五十三所羣盗盡殄五閱月始至山口島主䖍奉如豐後送還被掠指揮袁進奉表謝罪馳啓天文王十二月天文王下教所部周昉長門等一十二島徧行禁約對馬薩摩姦宄尤多皆氷駭風散方宗信未至日本時徐海勾衆入㓂以數萬人圍桐鄕甚急宗信聞之遂遣陳可願與王􅀡義子毛烈先歸諭徐海罷兵如約海詣幕府降而海黨陳東葉麻自相疑貳內亂梅林乗機擊殺之丁巳四月宗信同王􅀡􅀤松浦海舶數十隻貢使四百人流寓六百人碇定海關七月宗信及貢使僧德陽先入而􅀡艦爲􅄓風飄墮朝鮮不得偕來宗信在日本三年諸帥疑其掌握之內價盈兼金從之索賂不應分宜亦望有海外奇貨宗信又無以自通乃因王􅀡之不至謂其空言無事實廵按周斯盛劾奏遂下宗信於獄九月􅀡始叩關先遣王滶入見曰吾等奉命而來冝有使者迎勞道路今行李不通而戈鋋戒嚴公得無誑我乎梅林曰國法冝爾母我虞也與之設誓甚苦􅀡終不信曰果爾可遣滶出梅林立遣之復以指揮夏正爲質􅀡於是使毛烈王滶守舟而身入見頓首言死罪且陳與宗信馳驅出百死從此海有恬波矣梅林多方慰勞權寄獄中梅林與􅀡同鄕宗信出使本許其互市授官及􅀡至流言梅林受賂數十萬爲之貸死朝議閧然科臣徐浦復劾宗憲濫課軍需隂縱蔣洲勾引東倭梅林大懼因盡易曲貸王􅀡之疏謂以誘􅀡爲秘計􅀡罪在不赦且謂宗信曰吾方不自保何能敘君功不􅁯息壤酬君請俟他日遂疏云蔣洲宣諭日本巳歷三年所宣諭者止及豐後山口豐後雖進貢方物而無印信勘合山口雖有金印回文而無國王名稱是洲不諳國體計其擒􅀡合應功罪相凖有詔誅􅀡王滶毛烈遂殺夏正據舟山征之踰年方解宗信出獄􅃼然自傷唐荆川順之趙大洲貞吉皆爲之扼腕頌􅁈俱報罷司馬譚綸在薊遼召宗信叅其軍事欲使一得當以就功名宗信流涕而言曰洲本書生萬里航海父衰老而待盡妻憂怖以致死洲皆不顧惟欲爲國家樹尺寸之效乃功成而謗興屈捐命之功比贖罪之例洲復何望哉公休矣洲不能再側足於焦原矣司馬嘆息久之隆慶壬申中寒病卒於昌平之旅舍余讀茅鹿門坤紀剿徐海本末以爲倭之入㓂皆由徐海故曲折其反覆憸滑之術以著平倭之要領獨不念徐海爲王􅀡之餘黨􅀡苟無歸命之心則海必不受我之籠絡總使滅一海而爲海者皆是亦安得盡施其鈐鍵乎鹿門但侈脅從之治而薄折首之勳不巳悖乎宗信致􅀡解東南之厄而身塡牢戸此與陳湯斬郅支而下獄亦復何殊然陳湯身没而名彰宗信姓名曾不得與俞戚大帥之徒􅀠齒豈古今之時異歟其後沈惟敬之使闗白垂成而敗身死猶爲僨事者委過成則爲宗信敗則爲惟敬無怪天下之樂爲首施也子有德有德號蕙江十六歲學易於何孝廉卽洗除先注業高名輩農丈人余寅君之舅氏也嘆爲東南貴寶不但會稽之篠簜耳十八歲爲諸生擅聲場屋者數十年其間有巳合有司之尺度而分房爭解又復落之同舉者爲之太息郡邑無不䖍􅅃太守游應乾一日接之謂其鄕大夫曰蔣子奇才不當以諸生之禮禮之萬曆甲辰以貢元當任府判沈文恭當國避嫌授福建大田儒學教授凖墨伊顔以作士子邑有田副使者毒殺叚令令子頌􅁈以君爲證時閩撫徐石樓故君之主人慮囚董石謨又君之門人副使大懼崎嶇私舘以貨自通君毅然謝之卒無阿悒副使怨毒殊甚君流矢影風顧有憂色徐撫以啓事挽君終賦歸田處則檢御風俗坊表一鄕當事欽其名德往往千旄造門崇禎戊辰三月卒年八十二母余孺人老而瞽目君􅅮顙愀辭不懈晨夕㝠漠生明祖殯淺土君不煩羣從獨力襄事下􅉎之時松柏夜明疑有神隂相之者宗人皆以爲孝感所致子之驎之驎字龍友生而頴異奉常余寅僉事黃元恭見之皆歎故是後來一器入郡學爲諸生自萬曆丁酉至乙卯六應鄕舉其經義墨守先正愧􅆞艶粉不能與晚學卑品爭一日之長庭闈之内恩意周浹余孺人病瞽席衽七箸皆於君是賴久而不懈益䖍奉常目爲孝孫孺人曰吾非此孫不能有今日矣君以授經爲生計應繩中理取信高門皆以爲堅强一學之士也蘭溪徐石樓延爲子師有書室爲魅所據人不敢入君入之黃金滿案君不顧而出魅因歛迹徐氏多藏書君借閱幾半始知場屋之外復大有事嘗客龍溪徐令民王九如晨出不返其子擬一怨家投牒屍不得無以成獄令問于君君曰請筮之遇賁之離其爻曰突如其來如焚如死如棄如君曰如者其名也突來而焚死其屍巳焚矣一訊而伏海賊劉香之奸細投宿妓舘事覺并捕主人瘐死者數人君曰此濫刑也妓舘利客之來奚暇詰所從來乎令然之乃釋其餘崇禎戊寅上行保舉掌院徐蓼莪以君應詔授順天儒學教諭與修會典亾何京師戒嚴君遂南還君嘗曰吾少得事君房而志立長得親石樓而學博晚得交蓼莪而識廣此平生之大槩也順治甲午君子弘憲落解君執其手而泣曰予宣和􅈂臣蔣猷之裔也後世中衰吾祖投筆立功異域失侯鬱鬱而死吾父復還故業三登副榜余亦一登副榜爾今四舉而又落祖孫父子竆經積百年不能起于講堂之上是命也夫其年十月卒七十八歲所著有志林二十卷詩經􅀋疏六卷㫁章别義二卷禹貢注一卷舊史曰余友蔣弘憲志行之士也衘哀貢誠乞余序其三世余讀之神傷不能下筆昔湯臨川序張元長六世謂其數冬而不遘一春恒夜而不經一旦弘憲三世得無􅀋是雖然于公謂我治獄多隂德未嘗有所􅁈子孫必有興者宗信活生靈數萬非治獄可比弘憲且置無悲運數之來㑹有時也此特爲弘憲言之耳吾觀胡之幕府周雲淵之易曆何心隱之游俠徐文長沈嘉則之詩文及宗信之遊說皆古振奇人也曠世且不可得豈場屋之功名所敢望哉萬􅂶宗哀辭今年正月下弦殘梅子與莘學過吾南雷話未終夕風急潮催帆影碧空注目徘徊豈知此别便隔泉臺三月上巳吾病頭暈八十老翁死是其分但念好㕛都不在近有許胸懷未宣厥藴秋聲暑退病骨漸蘇不耐寂寞來遊西湖七月廿七涉江方晡聞子在杭不勝歡呼誰謂先日巳自告殂􅄀然之痛貫徹三途子著春秋畢力窮年鈎深索隱折衷羣言所未完者定哀二篇徹瑟之辰魂夢􅅶綿曰季武子聲尚在焉如宗忠簡死呼渡河如徐靈照争天奈何志之所至生死不磨窮經之士如子豈多子之質疑久巳行世儀禮有商周官有刺禮記偶箋春秋筆記上􅆻諸儒其功不細在子無忝在余則憂讀書一生章句􅚗輈老而望洋日薄山陬藉手於子薪火魯鄒子今先吾吾又何求河海之跡堙爲窮流嗚呼哀哉復秦燈巖書名松岱主東林講席忽奉乎書囘環不能釋手弟明山鄙夫年踰七十曾備蕺山門人之一數今師友巳盡夾持無力終於墮落可悲可涕何意大賢講席猶齒及姓名賜之教誨愈增慚懼耳前從定侯得見高彚旃傳文排擊文成同於異學以爲一時風尚大抵􅂗毒鼓聲不止石門一狂子而巳也兹讀先生之書謂忠憲與文成之學不隔絲毫姚江致知之說卽忠憲格物之說也明眼所照千門萬戸鑽鑰齊墮始知東林自有眞傳風雨如晦鷄鳴不巳爲之三復所言德性問學之分合弟謂不然非先忠端諱德性則不成問學非道問學則不成德性故朱子以復性言學陸子戒學者束書不觀周程以後兩者固未嘗分也未嘗分又何容姚江梁溪之合乎此一時教法稍有偏重無􅀜於學脤也又言新安姚江爲兩大宗學者不宗洛閩卽宗姚江不可别自爲宗此亦先生門面之言建安無朱元晦金溪無陸子静學者苟能自得則上帝臨汝不患其無所宗也先生患别自爲宗者足以亂宗夫别自爲宗則僻經怪說豈足爲宗弟所患亂宗者乃在宗晦菴宗姚江之人耳忠憲言釋氏之學其精㣲吾儒具有之總不岀無極二字其弊病總不岀無理二字先生解之云儒釋雖異而無極二字畢竟是同究得無極之旨而無理二字不辨自明此言無乃兀突乎弟以爲濂溪原主太極加無極二字恐其落於形氣也忠憲單拈無極巳自有病先生合儒釋而言之則儒者亦是無理儒釋界限越不淸楚大畧先生㑹通儒釋主於向上一著謂兩家異處在下學同處在上逹從來儒者皆爲此說弟究心有年頗覺其同處在下學異處在上逹同處在下學者收歛精神動心忍性是也異處在上逹者到得貫通時節儒者步步是實釋氏步步是虛釋氏必須求悟儒者篤實光輝而巳近之深於禪者莫如近溪天地間色色平鋪原無一事不假造作下學之至儒釋皆能逹此無有異也要之釋氏拈他不上亦不欲拈之以累虛空之面目儒者動容周旋正在此處色色皆當身之矩矱不可謂不異也弟非欲異同長者而日暮途遠相㑹無期不敢匿其胸懷先生當不以爲罪也然其至者非言可傳天假因緣或在異日與顧梁汾書名貞觀涇陽先生之孫台兄與㑹老札有所下問弟老而失學豈能知先儒之宗旨第曾侍蕺山夫子徃徃得聞緒論今亦荒落久矣台兄云學案有高子不諱其爲禪學之語弟學案中未嘗有是也葢相傳之誤高子之爲聖學無疑然遺書間或有一二闌入則先儒皆所不免甲戍歲隨先師至嘉禾陳幾亭以遺書爲饋先師在舟中閱之毎至禪門路徑指以示弟弟是時􅃼然其後讀先師論學書有與門人韓位者日今之忠憲半雜禪門葢忠憲汀州旅舎一悟所謂百觔擔子頓爾落地又如電光一閃透體通明卽前後際㫁大地平沉之謂也其言釋氏之學其精微吾儒具有之總不出無極二字其弊病總不出無理二字以爲分别之精矣然忠憲之所謂理者求之人生而静以上則未免言語道㫁心行路絶相去不遠卽其正命之語曰心如太虚本無生死先師謂先生心與道一盡其道而生盡其道而死是謂無生死非佛氏之無生死也高子之闌入禪門者不過如此亦何礙乎其爲聖學乎且高子之辨陽明雖若與之抵牾然以陽明之無善無惡謂無善念惡念非性無善無惡也竟以無善無惡屬之性者乃其門人之誤是深得陽明之傳者且在忠憲陽明議朱子析心理爲二忠憲辨之謂是陽明析而二之非朱子析而二之也朱子言人心之靈莫不有知天下之物莫不有理可謂之不析乎羅整庵言心之所有惟知覺理則在於天地萬物自來傳朱子之學者莫不皆然則陽明謂朱子析之者非過也忠憲以陽明之學攻陽明不過欲爲朱子之調人耳其實忠憲之格物與陽明之格物無有二也獨怪高彚旃􅄭肆譏彈於忠憲之學何曾夢見其攻陽明者無廼卽攻忠憲乎恐爲東林之累台兄主持講席不可不三思也書神宗皇后事吾始祖萬二府君諱萬河字時通號鶴山其父慶元府通判金人䧟慶元不屈死府君避難由􅄌谿竹墩渡江而南子孫散居餘姚之通德􅀟雁泉水三鄕雙雁之小聚落有上黃南黃因其姓以名地皆府君之支庻也明初勾軍最苦吾黃氏皆改爲王至成化間宗伯黃珣提學黃韶教諭黃伯川始復本姓先是洪武十九年上黃王藴充軍入京積功至錦衣衛百戸藴生教授賢賢生鎭撫􅂎􅂎生太學生正正生偉歷五世未嘗復姓偉有女喜姐神宗􅃟爲皇后萬曆六年二月英國公張溶册立大學士張居正奪情副之神宗問后近屬時新建伯王正億方貴盛后欲侈其家世遂以正億對及偉封永年伯餘姚兩伯皆歸王氏於是偉之近屬在上黃者復由黃而改爲王然南黃與上黃相距甚近南昭上穆同告利成而南黄守黃姓如故時某嘗聞大父太僕公言神宗皇后吾黃氏也住在鳥弔上蓬去有司以戚畹表其閭其時以爲疎族不甚詳考今南黃之族來敘其始末且以家譜證之而戚畹之楔綽亦在上黃始知爲鶴山府君之子孫也大父誤記爲鳥蓬耳古來后氏攀援門望􅁯其宗祊者如唐劉后之笞黃鬚叟宋楊后之冐楊次山亦多有之不足爲怪而我黃氏不欲以外戚爲榮父老若不見聞至國亾之後始追數而得其實可􅁣也夫萬􅂶宗墓誌銘五經之學以余之固陋所見傳註詩書春秋皆數十家三禮頗少儀禮周禮十餘家禮記自衛湜以外亦十餘家周易百餘家可謂多矣其聞而未見者尙千家有餘如是則後儒于經學可無容復議矣然詩之小序書之今古文三傳之義例至今尙無定說易以象數䜟緯晦之于後漢至王弼而稍霽又以老氏之浮誕魏伯陽陳􅅮之卦氣晦之至伊川而欲明又復以康節之圖書先後天晦之禮經之大者爲郊社禘祫䘮服宗法官制言人人殊莫知適從士生千載之下不能會衆以合一由谷而之川川以達于海猶可謂之窮經乎自科舉之學興以一先生之言爲標準毫秒摘抉於其所不必疑者而疑之而大經大法反置之而不道童習自守等于面墻聖經興廢上關天運然由今之道不可不謂之廢也此吾于萬􅂶宗之死能不慟乎􅂶宗諱斯大吾友履安先生之第六子也其家世詳余先生誌中􅂶宗生逢䘮亂不爲科舉之學湛思諸經以爲非通諸經不能通一經非悟傳註之失則不能通經非以經釋經則亦無由悟傳註之失何謂通諸經以通一經經文錯互有此畧而彼詳者有此同而彼異者因詳以求其畧因異以求其同學者所當致思者也何謂悟傳註之失學者入傳註之重圍其于經也無庸致思經旣不思則傳註無失矣若之何而悟之何謂以經解經世之信傳註者過于信經試拈二節爲例八卦之方位載于經矣以康節離南坎北之臆說反有致疑于經者平王之孫齊侯之子證諸春秋一在魯莊公元年一在十一年皆書王姬歸于齊周莊王爲平王之孫則王姬當是其姊妹非襄公則威公也毛公以爲武王女文王孫所謂平王爲平正之王齊侯爲齊一之侯非附㑹乎如此者層見叠岀􅂶宗㑹通各經證墜緝缺聚訟之議渙然氷泮奉正朔以批閏位百注遂無堅城而老生猶欲以一卷之見申其後息之難宜乎如腐朽之受利刅也所爲書曰學禮質疑二卷周官辨非二卷儀禮商二卷禮記偶箋三卷初輯春秋二百四十卷燼于大火復輯絶筆于昭公丁災甲陽艸各一卷其間說經者居多萬氏家譜十卷噫多矣哉學不患不博患不能精􅂶宗之經學由博以致精信矣其可傳也然毎觀古人著書必有大儒爲之流别而後傳遠如蔡元定諸書朱子言造化微妙唯深于理者能識之吾與季通言而不厭也故元定之書人皆敬信陳澔之禮記集說陳櫟之禮記解吳艸廬曰二陳君之說禮無可疵矣故後皆列之學宮自蕺山先師夢奠之後大儒不作世莫之宗塲屋放言小智大􅃛相煽以自高但有講章而無經術􅂶宗之學誰爲流别余雖嘆賞而人亦莫之信也􅂶宗爲人剛毅見有不可者義形于色其嗜義若饑渴張蒼水死國難棄骨荒郊􅂶宗葬之南屏使余誌之春秋野祭葢不異西臺之哭焉父友陸文虎甬中所稱陸萬是也文虎無後兩世之䘮皆在淺土􅂶宗葬其六棺凡所爲皆類此不以力絀隻輪而自阻也崇禎癸酉六月六日其生也康熙癸亥七月二十六日其卒也娶陸氏子一人諸生經能世其學􅂶宗之卒余許銘其墓以鄭禹梅之跛翁傳盡其大指故閣筆者久之而經累請不巳又二年始克爲之銘曰三代之治懸隔千祀制度文爲三傳三禮牛毛繭絲精微在此釋者以意或得或否躪訛踵陋割裂經㫖侃佩􅂶宗尋源極委㑹盟征伐冠昬䘮紀如捧珠盤如承明水如服􅀇端不謂故􅁓三尺短碑西溪之址書帶環之不生葛藟
