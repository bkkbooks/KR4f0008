  text: 南雷文案卷二
  hash: sha256:198b185cfd045cb5124475a110cd0ce3e2540faf55f1dbf5d408cbcb491620ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0008_SBCK_002-1a}
body:
  text: 姚江黄宗羲著留别海昌同學序歲丙辰二月余至海昌酉山許父母以余曾主教於越中甬上也戒邑中之士大夫胥會於北寺余留者兩月餘巳而省覲將歸同學諸子皆眷眷然有離别可憐之色余南雷之野人也氣質鹵莾諸子風華掩映千人多廊廟之器余何以得此於諸子乎嘗謂學問之事析之者愈精而逃之者愈巧三代以上祗有儒之名而巳司馬子長因之而傳儒林漢之衰也始有雕蟲壯夫不爲之技於是分文苑於外不以亂儒宋之爲儒者有事功經制改頭換靣之異宋史立道學一門以別之所以坊其流也葢未幾而道學之中又有異同鄧潜谷又分理學心學爲二夫一儒也裂而爲文苑爲儒林爲理學爲心學豈非析之欲其極精乎奈何今之言心學者則無事乎讀書窮理言理學者其所讀之書不過經生之章句其所窮之理不過字義之從違薄文苑爲詞章惜儒林於皓首封巳守殘摘索不出一卷之內其規爲措注與纎皃細士不見短長天崩地解落然無與吾事猶且說同道異自附於所謂道學者豈非逃之者之愈巧乎吾觀諸子之在今日舉實爲秋摛藻爲春將以抵夫文苑也鑚研服鄭函雅故通古今將以造夫儒林也由是而歛于身心之際不塞其自然流行之體則發之爲文章皆載道也垂之爲傳註皆經術也將見裂之爲四者不自諸子復之而爲一乎某雖學文而不能廢夫應酬樂府廣序序丁巳原詩之起皆因于樂是故三百篇卽樂經也儒者疑别有樂經秦火之後無傳焉此不知詩者之言也三百篇皆可歌若朝夕諷咏更唱迭和節以鐘磬鼗鼓和以琴瑟笙簫則感觸天機自不容巳今學者祗玩其文所得淺蹙詩雖存而實亡故樂亡也然猶幸六義之教未亡導以天潢瀹其融伏作者用者之精神時相遇於冥漠樂亡而詩可孤行者僅僅藉此一端耳三百篇而降詩與樂遂判爲二胡肰而作之胡肰而用之皆不知其故無他所謂六義者葢亦亡矣其後朱子之註離騷以其寓情托意者謂之變風以其感今懷古者謂之變雅其語祀神歌舞之盛者則謂頌之變賦則自序比則香艸惡草興則泛濫景物於是離騷之指燦肰明備然於他詩則未遑數數也元末有劉履者爲選詩𥙷註倣朱子之㳒以賦比興論詩亦諸家之傑出矣肰不及樂府於風雅頌無當焉夫六義而存緯去經不亦恧乎海昌朱岷左先生有慨於此取漢魏六朝有唐之樂府及詩分爲三集其相和淸商五調雜曲新曲爲風其燕射鼓吹横吹舞曲散樂爲雅其郊祀廟祀明堂封禪雩蜡爲頌詩附其後而以賦比興三者緯之上下千年儼然三百篇之餘以比文中子續經之作葢庶幾焉由先生之著而論之六義之教復矣然而終不可用之於樂樂之道圓而神其妙全在散聲散聲多者不可損少者不可益自然之爲天籟也開元詩樂以一聲叶一字朱子深疑之而亦不能求其故先生倘有得於篇章之外者使不爲𥿄上之空言猶望次第而復之也先生屬余序余不能審音聊以答先生之意云爾學禮質疑序丁巳六經皆載道之書而禮其節目也當時舉一禮必有一儀要皆官司所傳歴世所行人人得而知之非聖人所獨行者大而類禋廵狩皆爲實治小而進退揖讓皆爲實行也戰國秦漢以來相㝷於干戈智術之中僉以爲不急而去之數百年之耆舊旣盡後生耳目不接久矣漢儒煨燼之餘掇拾成編錯陳午割得此失彼又何怪其肰乎鄭康成最號通博而不知帝王大意隨文附㑹輙形箋傳有宋儒者繼起欲以精微之理該其粗末三代之彌文縟典皆以爲有司之事矣朱子亦常修儀禮經傳不過章句是正於其異同淆亂固未彈駁而使之歸于一也其時唐說齋創爲經制之學繭絲牛毛舉三代已委之芻狗以求文武周念椿許公霍丘名宦錄序戊午許酉山先生治海昌之五年政通人和舉循吏第一余數年來得交於先生毎見其舉一事發一言必稱引先世日吾先人之心學若何吾先人之經世若何不敏未能推行其一二夫海昌之政美矣先生猶不敢自是如此豈數典而不忘其祖之義歟不然何其知之者之寡也巳得霍丘名宦錄讀之刑部公之惠政條分縷悉當年設施之次第粲然可㝷不必西門豹之投巫嫗何易于之焚詔版但使里巷阡陌之間其顰呻得自達而巳公之愛民之心葢至今而尙在也唯公愛民之心尙在故民之思公亦不以久近幽明爲計較耳夫公之蒞任去今七十九年矣而霍丘爲流賊䧟没頻經兵火山川如故城郭已非不特當時之父老老死畧盡卽公當日之政霜吞雪蝕此相與聊生之民寧猶受其賜歟卽使起公於九原復理當日之墜緒時異勢殊吾知其有所不能也乃父傳之子子傳之孫追想公之聲音笑貌於瓣香庭燎之中不能自巳豈非可没者政也不可没者心也寧有所强而然耶霍故六蓼國地也臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉夫六蓼以千年之祀墜其香火公以數年之宦垂其蘋藻使千年不能與數年爭者非其入人之深何以有此夫然後知海昌之政淵源於霍丘者遠矣鳥遊空府影末之餘波猶足以潤澤枯稿子産日僑不才不能及子孫若公者其不謂之及子孫乎李杲堂文鈔序戊午往丙子丁丑間一時文集行世者十餘部婁東張天如日此十餘人者皆今之鉅子也吾讀正嘉時不以文名者之文集其渾厚悠長反若過之豈世運之升降歟余日科舉盛而學術衰昔之爲時文者莫不假道於左史語策性理通鑑旣已搬涉運劑於比偶之間其餘力所沾漑雖不足以希作者而出言尙有根柢其古文固時文之餘也今之爲時文者無不望其速成其肯枉費時日於載籍乎故以時文爲墻壁驟而學步古文胸中茫無所主勢必以偷窃爲工夫浮詞爲堂奥葢時文之力不足以及之也爲說者謂百年以來人士精神盡注於時文而古文亾余以爲古文與時文分途而後亡也自余爲此言已歴一世矣風氣毎變而愈下舉世眯目於塵羹土飯之中本無所謂古文而緣餙於應酬者則又高自標致分門别戸纔學把筆不曰吾由何李以遡秦漢者也則日吾由二川以入歐曾者也黨朱陸爭薛王世眼易欺罵詈相高有巨子以爲之宗主則巨子爲吾受彈射矣此如奴僕掛名於高門巨室之尺籍其錢刀阡陌之數府藏筐篋所在一切不曾經目但虚張其喜怒以哃喝夫田騶纎子高門巨室顧未嘗知有此奴僕也余與杲堂然約爲讀書窮經淛河東士稍稍起而應之杲堂之文具在故未嘗取某氏而折旋之亦未嘗取某氏而赤識之要皆自胸中流出而無比擬皮毛之迹當其所至與歐曾史漢不期合而自合也余嘗謂文非學者所務學者固未有不能文者今見其脫畧門面與歐曾陳子文再遊燕中詩序戊午陳子文海昌才士精綜六籍翺翔百氏操筆屬詞緣情綺靡之功離絶畦逕故其名聲遠聞柯葉張皇丁巳入京師名公鉅卿貪其俊逸東閣靚深險韻促漏鋩刃愈出格於例不得入闈謁選而出夫以子文之才馳騖古今之際高步天地之間謂當以稽古之力潤色王度屈於下職聞者皆愛惜焉而子文方游大梁摹銅盤之篆字撫昭陵之鐵馬經行名蹟之處破荒捜討往往迷失道同行者秣馬卽次炊黍巳熟遲子文尙未至也豈感慨悲歌之氣鬰于中有伶官簡兮之風乎抑以名山大川昌其詩如崔斯立之丞藍田日哦爲事與唐宋以來丞尉皆進士釋褐之官卿相于是乎出有明假途于吏于是士人始不樂就今制復唐宋之舊由此爲大官者不可勝數子文功業不難戾契而至則其縱古橫今要非耽戀光景不得志於時者之所爲矣竊料四海之士如子文者不可多得知百里不足以處士元魯肅之所以能覇也以公禮格孟博陳蕃之所以不終也世自有急子文者子文藏聲匿影以待之撐霆裂月之作夫亦可以銷磨其歲月矣陳葵獻偶刻詩文序己未周元公日文所以載道也今人無道可載徒欲激昻於篇章字句之間組織紉綴以求勝是空無一物而餙其舟車也故雖大輅艅艎終爲虚器而巳矣况其無眞實之功求鹵莾之效不異結柳作車縳草爲船耳吾友陳葵獻汲古窮經聚同志爲經㑹葵獻常爲都講毎講一經必盡捜郡中藏書之家先儒註說數十種叅伍而觀以自然的當不可移易者爲主而又積思自悟發先儒之所未發者嘗十之二三焉當更端之際一堂數十人所傾耳注目者必葵獻也是時葵獻固未嘗以古文自命然其筆授之章論學之書舂容典雅辭氣和平無訓詁鬬飣之習余曰此眞古文也應酬之中豈有古文哉今年秋月與余同寓吳山至之限過齊魯燕趙之墟聖賢豪傑經營之跡猶有在者入長安觀其宫室之壯麗竒材劍客之聚集葢建都者近千年矣觸目駭心動成篇什素所畜積於此焉發之所見者與人同所得者固與人異也司馬子長之文章得之山川子長讀書十年之後方可言此今葵献讀書年過子長從此而後方知六經非几案間物耳此區區所刻恐不足以盡葵献也黄孚先詩序己未吾族之在四明山中者自菊東先生以來代有聞人近雖中衰而孚先禹平茁焉秀出兩人嘗以詩文過余而孚先往來尤數中更亂離五六年不見則以詩一編寄余請序歲盡自來促之孚先論詩大意謂聲音之正變體制之縣殊不特中晩不可爲𥘉盛卽風雅頌亦自有逈然不同者若身之所歴目之所觸發于心著于聲廹於中之不能自已一倡而三嘆不啻金石縣而宮商鳴也斯亦奚有今昔之間葢情之至眞時不我限也斯論美矣然而正自有說嗟乎情葢難言之矣情者可以貫金石動鬼神古之人情與物相遊而不能相舍不但忠臣之事其君孝子之事其親思婦勞人結不可解卽風雲月露艸木蟲魚無一非眞過雲木氷記歲在壬午余與晦木澤望入四明自雪竇返至過雲雰靄淟濁蒸滿山谷雲亂不飛瀑危弗落遐路窈然夜行撒燭霧露沾衣嵐寒折骨相視褫氣呼嗟咽續忽爾㝠霽地表雲斂天末萬物改觀浩然目奪小草珠圓長條玉潔瓏鬆挿於幽篁纓絡纒於蘿闕琤琮俯仰金奏石摶雖一葉一莖之微亦莫不氷纒而霧結余眙􅌓而嘆曰此非所謂木氷乎春秋書之五行志之奈何當吾地而有此異也言未卒有居僧笑於旁日是奚足異山中苦寒纔入冬月風起雲落卽凍冷飄山以故霜雪常積也葢其地當萬山之中囂塵沸響扃鐍人間村煙佛照無殊陰火之潜故爲愆陽之所不入去平原一萬八千丈剛風疾輪侵鑠心骨南箕哆口飛亷弭節土囊大隧所在而是故爲勃欎煩冤之所不散溪囘壑轉蛟螭蠖蟄山鬼窈窕腥風之衝動震瀑之𫾣㗐天呵地吼陰崖沍穴聚雹堆氷故爲玄冥之所長駕群峰灌頂北斗墮脇藜蓬臭蔚雖焦原竭澤巫吁魃舞常如夜行秋爽故爲矅靈之所割匿且其怪松人楓礜石㒺草碎碑埋磚枯胔碧骨皆足以興吐雲雨而仙宮神治山岳炳靈高僧懸記冶鳥木客宵崒幽深其氣皆斂而不揚故恒寒而無燠余乃喟肰曰嗟乎同一寒暑有不聽命於造化之地同一過忒有無關係於吉凶之占居其間者亦豈無凌峰掘藥高言畸行無與於人世治亂之數者乎余方齟齬世度將欲過而問之石門孫爽喜讀此文書之便靣庚戌七月二十五日燈下重寫一過念亡友下世巳二十一年棺和出土乾科颯颯知巳之淚能不泫然阿育王寺舍利記庚戍庚戍十一月甲子余爲高旦中題主於烏石山明日雨不可出山遂偕辰四宿阿育王寺丙寅請觀舍利寺僧啟銅塔塔爲萬曆間慈聖太后所賜捧一小方篋出殿門外南向立篋方廣六七寸玲瓏內外不隔中繫小木鐘塗以泥金有小珠在其內作琥珀色則所謂舍利也余讀宋景濓阿育王寺碑言舍利歴代之神異詳矣自是以後稱其神異者陸光祖郭子章先後詣明州頂禮述其所見然而不知其僞也嘉靖間倭犯寧波胡宗憲防海之師屯於市竊金鐘并舍利以去住持僧傅瓶無以眩人用眞珠褁金僞造以充之光祖之所見者此也其後海上有警住持懲異時之失以僞造舍利寄藏鄕民李台垣家台垣家之婦女私發而玩之墮地不見則又以其奩中之珠塗飾置於鐘内海警旣息迎還於寺郭氏萬暦壬子甲寅所見者此也崇禎甲申象和爲住持又將此僞造者質酒於纓絡河久之始復寺中是故阿靑王舍利不特僞造卽其僞造者亦不一人一事余之所聞自嘉靖以來者景濓碑文作於洪武十二年距今二百九十三年耳巳不勝其僞如此豈自洪武以上歴一千九百七年之久舍利依然爲劉薩訶故物耶且洪武來舍利不出境內啟閉一二山野驅烏之手洪武以上一歸官庫再入臨安一入燕京流轉不復一寺其譸張爲幻更復何如耶然則景濓碑中之神異亦不過世俗自欺欺人之說一如郭陸遂從而拾之耶或曰是在觀者之誠否卽如碑言松枝放光何關舍利曰不關舍利是名妄見豈可以所見之妄而謂舍利之靈乎憶余丙寅冬日書窓油盞燈注時吐靑珠細於芥子堅不可破竟夕可得圭撮如是者月餘或謂此草舍利也嗟乎卽舍利亦復何竒而况於僞爲者乎彼沾沾其神異者可謂大惑不觧矣海鹽鷹窠頂觀日月並升記丙辰鷹窠頂濱海之山也名雲岫毎當十月之朔五更候之日與月同升相傳以爲故事丙辰歲余在海昌許使君約之往觀九月晦日余與邵蓼三仇滄柱陳彝仲同舟至袁花時巳薄暮輿行二十里斜陽紅葉裝點村落如畵登山昏黒使君遲之寺中查二南馬次眞許稚圭許欲爾朱人遠祝雝來皆在遠近來觀者踰數百人主僧言住此數十年僅一逢之其初紅者上升已而白痕一抺出於紅内始分爲二余日此山故事原是日月並升不是日月合璧也不知土人何緣錯誤葢合璧則日食矣如僧所言是日食也當在庚戍歲此月合朔於卯末交周六宮一十度入食限但謂白在内紅在外則視之欠審在外之紅乃是日光溢部獄一載餘甲申二月遣戌宣州衛未踰月而京師陷先生不敢以桑海之故弁髦君命終身不返故居卒塟於敬亭君子曰可謂仁之盡義之至也夫國破君亡是非榮辱巳爲昨夢先生猶硜硜不變自常人言之未有不以爲迂者也試揆之于義朝廷無放赦之文臣子營歸田之計謂之不違得乎故升菴殁于戌所勢所不得不然先生塟于戌所勢可以不然而義所不得不然者也古人作事未嘗艸艸蘓武十九年而返奉太牢謁武帝園廟欒布從齊還奏事彭越頭下而後使事告終先生下窆宣城而後戌事告終豈以幽明有間也是之謂義至南齊華寳父戌長安寳年八歲臨别謂寳曰須我還當爲汝上頭長安旣陷父不得還寳年至七十不婚冠或問之輙號慟彌日毅宗不也必不專好之不專亦無由知書之有易得有不易得也强解事者以數百金捆載坊書便稱百城之富不可謂之好也故曰藏書尤難歸震川日書之所聚當有如金寳之氣卿雲輪囷覆䕶其上余獨以爲不肰古今書籍之厄不可勝計以余所見者言之越中藏書之家鈕石溪世學樓其著也余見其小說家目錄亦數百種商氏之稗海皆從彼借刻崇禎庚午間其書初散余僅從故書舖得十餘部而巳辛巳余在南中聞焦氏書欲賣急往訊之不受竒零之値二千金方得爲售主時馮鄴僊官南納言余以爲書歸鄴仙猶歸我也鄴仙大喜及余歸而不果後來聞亦散去庚寅三月余訪錢牧齋舘于綘雲樓下因得繙其書籍凡余之所欲見者無不在焉牧齋約余爲讀書伴侶閉關三年余喜過望方欲踐約而綘雲一炬收歸東壁矣歙溪鄭氏叢桂堂亦藏書家也辛丑在武林捃拾程雪樓馬石田集數部其餘都不可問甲辰舘語溪檇李高氏以書求售二千餘大畧皆鈔本也余勸吳孟舉收之余在語溪三年閱之殆徧此書固他鄕寒故也江右陳士業頗好藏書自言所積不甚寂莫乙巳寄吊其家其子陳澍書來言兵火之後故書之存者惟熊勿軒一集而巳語溪呂及父吳興潘氏婿也言昭度欲改宋史曾弗人徐巨源艸創而未就網羅宋室野史甚富緘固十餘麓在家約余往觀先以所改暦志見示未幾而及父死矣此願未遂不知至今如故否也祁氏曠園之書初􅍥家中不甚發視余毎借觀惟德公知其首尾按目錄而取之俄頃卽得亂後遷至化鹿餘姚至省下路程沿革記己未吾邑至省下其程不過三百里而曹娥錢淸錢塘三江橫截其間又地勢卑下曹娥而東未入姚江率數十里而一堰船之大者不能容數十斛不然則不可以拖堰風雨之夕屈折篷底躑躅泥淖故行者爲甚難自餘姚至曹娥其路有二分於城西二十里之曹墅橋遡姚江而行謂之南路進曹墅橋入支港而行謂之北路南路二十里至下􅄵又分爲二挽􅄵而上旁渣湖行支港中十八里至新􅄵挽􅄵而上十里卽上虞治也不挽下􅄵仍遡姚江而行三十里至通明􅄵始挽而上至上虞縣城與支港之路㑹又三十里乃至曹娥初南路必出通明􅄵宋淳熙間魏王薨于四明將塟於越詔遣刑部尚書謝廓然運副韓彦質䕶䘮使者旁午州縣震動知上虞縣汪大定以通明􅄵高峻潮汐雖登僅過數舟則巳涸矣於是增浚渣湖别於支港創小堰以通舟募遊手二百人别以旗色分列左右俟大舟入引湖水灌之水溢堰平衆力扶䘮舟以進畧無欹側舳艫相衘俄頃俱濟自是以來反以支港爲通衢非大旱水涸則無有由通明者矣世傳史彌遠所開有恩多怨多之謡非也北路較南弱十里歴陡亹横河驛亭三堰南堰挽舟設轆轤北堰則徒手舉之故其舟尤小也三堰盡掠夏葢湖渡百官江卽曹娥之下流也陸行二里至塔橋與南路㑹自曹娥而西路無支徑地勢平衍無拖堰之勞無候潮之苦較曹娥而東相懸絶矣然按周益公思陵録錢淸江者東自三江口來西過諸曁約三百餘里濶十餘丈運獨免公爲臨安守日不戮此軰則殺人未艾也悉論殺之更造大艦十數毎一艦受若干人製號如其數以五采别異之置吏監總渡者給號登舟卽過數而號與舟不類者皆不受舟人給直有定估除十之一備修葺之費抵今二十年無一舟之覆葢錢塘除暴風積水亦不甚險唯載人過甚舟力不勝則有覆沉之禍舟子僥倖頃刻往往以㝷丈之舟載至百十人當事毎毎以空言申勑安得如汪守者而與之講濟人之事乎百官江本不甚濶而土人輪日取利止以一舟値渡餘舟不得攙入往來候渡甚艱爲令者苟革其輪日之例則行者不滯矣是故吾邑風氣朴畧較之三吳截然不同無他地使之然也然而民生愈促朴畧變爲智巧是則非三江疊堰之所能限也不能不歸之世運耳南雷文案卷二南雷詩曆卷二同門陳之問近思批點門人施敬勝吉較刻待祝兒不至四月二十一日以下甲辰出門說是綠隂前何事於今尙杳然簡點新秧姑惡水支持舊欠月椿錢濤江不礙單身客端午還逢競渡船我亦歸程應計日擔頭書册好分肩三峯與熊魚山夜話亂前曾是訪湖頭豈料今從烏目遊十載間關心力盡一龕彌勒晩香幽盡飜諌艸支那述危舉僧條同室讐脫得朝中朋黨累法門依舊有戈矛贈以靈上座樹橋小寺寄城中不礙踈籬短楫通吾出干峯松雨溼共眠終夜佛燈紅閒拈舊句如霜冷曾遇師家得耳聾殆欲因緣相舉似無忘行脚過江東同晦木高旦中王雙白鄒文江文孫符周子潔徐昭法集靈巖寺艷說古吳名勝地松風五月隔兵塵應憐此日軍持下同是前朝黨錮人霜雪蒙頭羞佛火興亡昨夢到蟣臣狂言世路難收拾不道吾師狂絶倫與徐昭法人傳徐昭法可聞不可見我今上靈巖鐘鼓集法眷相看盡陳人不叅以時彥徐子最後來布袍巾幅絹儲公賢拙文珍重壓端硯徐子翻讀之喟然而稱善謂是震川後敘事無人薦虞山加粉澤可謂不善變落此一瓣香百年如覿面出其論文書并與他著撰體裁旣整齊字句亦工錬夜坐天山堂諸家評畧徧人言子寡言子言如竹筧乃知世知子猶爲子之羡題簡石騎虎圖簡石禪師騎虎圖下士見之争胡盧豪猪健狗尚足畏何况虎乃毅獸乎腥風一過烏鵲噪倀鬼前後相牽扶安肻俯首出跨下給公指使同家奴梨州老人謂不然事固易易言非誣吾家四明萬山中虎聲夜夜繞坐隅落日一半在青楓便與牛羊争路途有時醉踏明月歸攔向谿橋如蒙箕叱之帖耳避道傍不用尺箠相支吾此非有道習則然何况公事於浮屠十月雪中觀牡丹錢塘江浪高十尺錢塘衚衕雪堆積豈知萬戸深屋底牡丹一朶照几席丁東曵杖我渡江旅舍無火𫾣頑石有言十月開牡丹我時聞之便往觀晦木旦中萬興國一人導者黃孟瀾小巷余氏白板扉𥿄旗標識瓦盆端主人向客誇勝事放來十日今未殘我向花前細揣摩艷情終少慘色多佳人絶世而獨立風饕雪虐其奈何君不見西狩獲麟非時出孔子亦爲之反袂而滂沱過馮儼公悰江道闇浩墓下廿年靈隱山中土我向此間尚淚傾閒道野僧燒𥿄燭更無片石誌生平三番東渡交情在儼公三至敝廬一閧西湖秋月明道闇與余辨論湖上歷歷難忘當日事白頭愧我尚零丁集飮水生艸堂分得陽字去年曾此度端陽倡和盈編號艸堂徑轉暫添新竹柏水痕猶記舊池塘􅍐題小𥿄三分濶勸酒天星數丈長勝事永和相較量座中無有不成章時有彗星夜出十二月二十二日夢汪魏美湖上遊踪巳數年夢中相遇在開先夢同魏美在匡廬開先寺話舊幅巾酒量曾如舊僧舍寒燈何處眠湖海故人將盡矣風波此老尚巍然那堪岀入如相避狐負山隂雪後船拜輔濳菴先生墓以下乙巳艸難埋没水難齦五百年來輔氏墳日暮碑生牛角火秋深綠變女腰裙一時僞禁人將散千古㣲言賴所聞潜菴記甲寅以後所聞弟子朱門無列傳慿誰好事托斯文議重爲立碑乞炭隨例裁成乞炭詩重陽風雨巳嫌遲豈因橋下聲難變不爲簧中字欲移蚓竅正哀秋在樹蠏湯初沸月登陴歡顏君欲慰寒士不惜佳篇侑土宜乞西香香方海上得傳諸四十年來盡學渠文士好奇銷麗句孫子度自造西香閨中待雪破蠻書將修鼻觀霜寒後獨契心宗夜坐餘艸木亦知有臭味從君乞得更何如乞書副本借書還書各一瓻一叚風流吾所師古墨聞香魚亦壽新抄未較豕生疑綘雲過眼哀神物梅閣驚心落市兒副本君曾許見乞幸寛十指出支離綘雲牧齋藏書梅閣祁氏藏書吳自牧謂鮑螺自來無賦者因作紅燭燒殘出鮑螺輕盈直讓一銖多深寒雪殿肌無粟斜日蜃牕頰有渦名向武林傳舊事桃畱半壁自宣和最宜冷落殘牙齒映面醇醪不用磨周公謹書南渡市物有鮑螺汪孝亷魏美一别城西經七載巳亥二月望别于清波門外豈知再會竟無從狂濤遙隔龍威水魏美曾避地洞庭山妖夢難慿五老峯去年十二月夢與魏美㑹于廬山黏背相溫僧榻月與魏美宿笑魯房寒甚貼背而寢勘心竝坐㫁橋鐘亂來消受祗如此天意胡然又不容陳晋州士業南都昔是論文地擕手同尋未見書銷盡故吾隂火力庚子士業書吾非故吾始畱人物歲寒餘兩楹陽厭當春老一帖台安尚夏初余四月寄書士業而士業卒于二月其子陳澍見答巳祗告几筵身後祗餘熊氏集平生集古竟何如澍書言藏書巳遭兵火唯有熊勿軒集將抄寄申山人自然過我巳經十二年癸巳存亾契濶各茫然湖南驚視君猶在甲辰遇于南屏斗北關心老未捐死友孤兒收畵値亾家餒鬼集僧筵傳來末後難忘語只合要離塜共穿叔父孝廉季眞别來方自更三月一𥿄麄疎岀影堂兩眼眞難埋下土幅巾終不點吳霜蠅頭斜整殘燈字六月叔父手書所作予劉子行狀馬尾新開烈祖章馬尾石建事因叔父脩家譜藥不親嘗含不視泫然欲孝巳無方錢宗伯牧齋四海宗盟五十年心期末後與誰傳憑裀引燭燒殘話囑筆完文抵債錢問疾時事宗伯臨殁以三文潤筆抵䘮塟之費皆余代艸紅豆俄飄迷月路美人欲絶指筝絃皆身後事平生知巳誰人是應三四句能不爲公一泫然應五六句蒼水廿年苦節何人似得此全歸亦稱情廢寺醵錢收棄骨老生秃筆記琴聲遙空摩影狂相得羣水穿礁浩未平兩世雪交私不得只隨衆口一閒評劉先生伯繩頺山㫁港鬰黃茅猶有斯人繼寂寥磬瑟滿堂屨迹絶氷霜埋骨劍光銷病中三禮完猶改身後雙棺塟且遙落葉來尋山下路當年誰與說無聊辛丑二月伯繩來雙瀑院仁菴義禪師昔年曾記别雲居巳亥與仁菴别于雲居寺共學何人得所如余規仁菴何苦領衆仁菴日與之共學耳曾入南都防亂揭揭中張岐然卽仁菴也旋叅安隱救宗書潭吉忍住安隱作五宗救多岀仁菴手山光銷鑠飛來路人物粗狂馬走餘君亦何心成假借至今遺恨費分疎萬充宗書來言從舒文靖璘裔孫見其先集朱陸二先生答問尚存以下丙午甬上舒公有舊文郵筒千里特相聞鳥聲花艶疑流水漆火枯青現慶雲朱陸未乾同異血淵源重破豫章墳春蠶未脫寒燈殻好事抄書獨有君八月小盡接家書有感秋深昏曉異溫凉静坐南牕白日長青鏡絲絲添髩白家書歲歲說年荒摩挼老脚登嵩華堆疊沙鍋煮雪霜此願此生猶未遂問誰挽汝落塵糠擎拳𥪡脚此蒼天慚愧何曾讓昔賢一擊便當千里逝孤身只合萬山巓握中算子饒王伯筑裏新聲雜鐵鉛斯意今人無會取故令花艸得嫣然過孫子度殯宮城西數里路三乂信步行來自不差病裏猶看争坐帖亂餘誰識墨兵齋子度齋額乾科颯颯和頭出寒葉層層詩句埋一自九原人去後語溪風景不堪懷偶成以下丁未江村無事髮鬅鬙信步斜流與㫁塍香到刺花剛欲盡妮人鼻觀又甜藤喜萬貞一至自南潯以近文求正萬子近從南潯來古文一卷請彈射寧謂子文巳臻此焚香誦之遂終夕規摹震川之古淡加以剡源之色澤此道今人知者希爲子狂言罄胸膈四十年來歸虞山所得一半只氣魄晩來隨波文字禪質以義理終迫窄是時落落遙相望千子疎通文止僻古文不入道學語于子答彝仲書斯言畢竟無阡陌弗人長句似東坡巨源小品亦中格壽州遺文知在無蓮鬚清風拂几席吾友進退旅于人一閧聲名亦赫奕豈知轉頭二十年朝華夕秀都復籍不埋陳土數子耳揣骨聽聲竟何益只今海內學者誰玉山重按虞山拍靈巖昭法廬阜黃讀書窮年方矻矻昭法屈指文章家近日四人一窀穸生者迎人顧及太冲死者歸德侯方域其一昭法不多讓其言然否不敢白余交侯徐不識顧余于二子僅爲役萬子萬子幸勉㫋舍子竝驅更誰適啁啾王李變韓歐一樣空疎各把筆狐狸晝舞蟮號孰爲斯文任其責㝛天章寺以下巳酉天章古寺山南陲義士曾將龍穴移繞地猶流嗚咽水林霖山詩水到蘭亭轉嗚咽滿山不見萬年枝唐珏詩遙遙翠葢萬年枝卽冬青也空將餘恨酬來客竟不開花償所知謝翺云此樹終有開花時却怪從前三百載竟無片石署哀辭雲門紀遊泊舟顯聖寺紆囘入烟竹風旛表心路殘碑話興復幽賞淡忘言春山多古木若耶溪邉路村村自楚楚屋角覆桃花竹筏載遊女溪橋數十丈水聲不聞語莫話興亾事御書見廣孝山翠釀春寒筆塜荒晚照自從處士後麗句散窈窕有秦系䴡句亭明發過别院石牀僧臘古冷句記雪庭遺像侍五乳茶話且從容霧重滿山雨應接多奇地天意亦開霽怪石風一絲任公釣石流泉骨千歲寶長洗骨地累累採樵人何必無避世薄暮至平陽木陳殷勤同話舊剪燭點新文呼名招遠岫侍者總能詩投卷求指授詰旦登秦望沙彌爲前導鯨浸合烟雲螘蛭收城竈秦碑傳說異白葦空浩浩兩山竹雞啼僧㕑報火熟平明過艸市元㣲之言平水艸市未午入城曲古蹟待幽尋重來采黃菊㝛雲門幻際房雲門二月桃花候慚愧禪師一夜忙白版放叅循鹿跡名泉凝乳奪龍香冰霜皎月逍遙路雪嶠偈語幻際守雪嶠塔沬雨寒鯨古道塲憨山在勞山時山門大雨時注而日光皎潔視之乃海中一鯨吐洙也幻際曾爲憨山侍者話到無人能領取松濤竹響一齊狂達蓬紀遊延連闞湖曲時復渡小嶺霜花明謝豹病葉塡空井尚餘春色在夕陽照人影登登松路盡巨石忽當闕艸香水亦香蹟没靈不沒老樹不記年寒空畱突兀高人㝠空無寄跡在文字苦吟嗣石屋劚碑創山志秉燭話更闌月明猿鳥至明發上崚嶒烟雲煩分劈潺湲攛水巖昂藏鬬雞石黃茅白葦地相失在咫尺東盡觀滄海往事一慨然浪中鼓萬疊鯨背血千年何物秦始皇於此求神仙傴僂入古洞天光忽開霽危石削雙門蹠痕粲五指渾然太古中豈是開元始高僧傳云開元中始現此瑞剝蘚見題名情親異代䰟隆興錢集錦淳熈唐仲温攀蘿復穿石勝遊今尚存題名有攀蘿穿石東觀滄海眞勝遊也按唐仲温爲仲之弟經行過蓀湖薄暮㝛花嶼不有青蓮舌難與白龍語青蓮蓀湖僧圓遠事白龍聽經花嶼僧師𧦬事茲遊信奇絶隆冬聞杜宇馮道濟齋頭見澤望圖書書此索之石田耕叟圖書刻此四字古銅章曾是藤龕澤望别號舊所藏茅屋有心依瀑下元毛道土于四明山結石田茅屋文龍直欲破天荒松毛闇淡遮寒骨故物零星出艸堂幸遇故人相珍重重歸口實亦芬芳同卭在晦木道傳㝛石井閏二月十九日以下庚戌偶從同伴㝛山樓明燭談心夜未休簡點鳥聲何樣好銷磨布襪幾番遊一村烟色千山瀑萬種春花三女峯名頭侵曉寒空雨數點幽蘭啼眼未曾收贈仇滄柱積葉牕前日日深讀書好自傍巖隂百科巳竭時文力千載惟畱當下心坊社連環何足解儒林廢疾望誰鍼慿君一往窮經願明月當前日未沈寓吳山昔年曾向此山居盛世繁華一夢餘簫鼔聲中明月落湖山勝處美人居朝廷議論歸名士前軰風流在讀書今日風光渾不改却將感慨自銷除遊西湖南山凌晨出郭門一舸破烟霧赤山遂登陸落葉莽廻互初經高麗寺澗水琤琮注當年秦淮海濯足脫雙屨問途至法相繁華非復故念此長耳僧嘗向明山寓名花天外來獨㝛青松樹石屋何窈窕鬼斧開靈路似道領客來東坡同友聚不沒兩題名判然若蒼素延連烟霞寺敗屋走寒兎四壁畵名山半爲風雨蠧倦來枕石眠乞茗醒初寤何年應眞像洞口黃金鍍似與木客徒登降相賓阼苔蘚封隷書彷彿尹氏署尹彥明朅上風篁嶺奇石窮鬼趣何必一片雲纔可銷麗句酌泉龍并亭時日巳薄暮更尋夀聖院循澗板橋渡野老指故基秋墳衰艸幕返㝛鉢池菴竹聲終夜訴明旦烟雲合靑鞋不可步冐雨上湖船猶披句曲墓憶此經行地曾執先公御四十七年間風光等飄絮其事若夢中恍惚不可疏丁丑㝛法相其時澤望與秋茶初出火新栗猶垂露請觀過客曆拊掌笑常住寺有三房客舍其一再來不得別舍故姓名居止記之甚詳計年亦卅四一棺巳權厝頭白吾重來但爲悲凉助得沈睂生書結髮心期更莫如廿年始得一封書同人㓕頂丁連甲天外舉頭吾與渠止水不收山鬼價人間尚有指南車明年有約浮黃海絶頂相看慟哭餘春盡來書歲暮收從前猶勝竟沉浮已輕野葛尋常味只少名山汗漫遊頭白未曾成一事燈靑猶可役雙眸兩人踪跡非容易納納乾坤截衆流甲戌管乾三寄三詩見懷久已失去從遺集得一章因次其韻不異封初寄豈知歲月深庭空傳毒鼓月白奏焦琴古塔寒花繞遺編老蠧侵重尋零落句感慨自難禁寄懷太冲先生管鑨越溪寒色入之子意何深太華三生夢岷江一弄琴評書秋雨集趺坐竹光侵可踐重來約相思不自禁閩人林君言贈詩次韻答之辛亥鶗鴂先鳴艸不芳凄凉往事話偏長吳霜已自點歸髩桑海猶然記貼黃今日遺民誰汐社當年司馬盡無傷曹無傷譛沛公者難銷殘夢雞聲後不覺逢君又發皇卽事新菴有武弁楊長青女寄櫬時現影響夢中乞詩城東小院隔花村旅櫬多年壓敗垣風雨應憐依佛火爺娘何日送楓根櫻桃曾漏科塲語甘蔗難銷冥漠䰟從此諾臯增勝事雙鬟白袷立黃昬汪玉山事後人演爲櫻桃園雜劇有讀書新菴者女亦豫示以兆不寐年少雞明方就枕老人枕上待雞明轉頭三十餘年事不道銷磨只數聲弔虞鑑清唯君眞朴出天然相識於今十五年毎渡曹娥必信宿亦來黃浦共延連村祠月冷神絃急雪路梅紅茶話牽頭白可知無别事胡然一旦付荒烟拄杖癸丑茶條七尺出東明月露風雲醖釀成秋壑聽詩逢木客講筵釋義示諸生一生將計數干載百里還看九十行自落宗門長失職一枝畱此作干城贈楚人屠宗輿其父官蜀中死獻賊之難求余作傳而宗輿當父殁時年數齡耳不能知其節目向余流涕久之黃州君是舊名家落魄杭州太守衙五月楊梅來渡口一枰棋子閙燈花浮屠猶著求兵箭戰地誰驅搏食鴉通人犀導事舊事巳隨流水盡茫然執筆共咨嗟老母八旬謝祝壽諸君子前朝忠節數南雷余所居鄊名潮打柴門日兩囘五十多年人物表登堂試看幾人來漠漠風塵徧九垓艸堂依舊壽筵開書生不識從前事冷落當年十四哀十四哀周仲馭所作黃石齋和之中有壽太夫人詩八十年經幾刼灰春風不復到枯荄粧臺都向王家盡畱取青銅自獄來先生殉節時畱一古鏡肓風惡浪近扶桑故國飄零只數航唯有東林老寡婦手裁紅絹寄娥皇史濱若惠洮石硯甲寅古來硯材取不一海外羗中恣求索今人惟知端歙耳聞見無乃太迫窄水巖活眼旣難逢龍尾羅紋亦間出遂使頑石堆几案僅與堦礎相甲乙猶之取士止科舉號嗄雷同染萬筆雞舞甕中九萬里鼠穴乘車誇逐日吾家詩祖黃魯直好奇亟稱洮河石旣以上之蘇子瞻復與眺張同拂拭欲使蘇門之文章大聲挾洮争氣力吾友臨洮舊使君贈我一片寒山雲金星雪浪䰟暗驚恍惚噴沫聲相聞欲書元祐開皇極山谷贈文潛句愧我健筆非蘇門避亂海濱淸明不得上墓乙卯禁塋蔓草積成堆何似猶閒海上臺一道裙腰無主墓春風亦送紙錢來春郊士女上墳同咫尺無山入剡中李白桃紅花巳徧如何不到映山紅剡中映山紅望若錦城海上所無南山亂定自海濱返故居梅花開徧到籐花半載幽然玩物華今日扁舟將欲去此情不異昔離家夕陽長向汝湖邉弄水看山上釣船一段閒情眞不惡臨行多謝主人賢孫千頃過訪同遊永樂寺次韻亂後煩君顧高情近古人擕笻尋佛蹟橫艇量江身苦霧纏河鼓時近七夕驚濤泊石林一生幾輛屐三過老僧因水竹匡公處正宗匡與桺道傳善有水竹居二蘭祖闡音祖闡曾使日本善鼓琴有二蘭齋古來人物逝剩有寉猿顰龍去寒潭碧魂來楓樹燐孤帆天際現㫁碣土中眞巾鉢開來學風旛㫁去津鐘催未返鳥月照欲歸雲秋水蓮花漏平田瓜蔓垠一燈荒殿暗百丈古規塵茶話通身汗禪房岀句神吾儕非土偶豈戀運圓甄飮洋溪重九巳過五日强菊花消息在茅堂江山此處無兵馬紅紫堦前正艶陽甲子差年皆慶曆永和一會盡淸狂籬邉不惜分擕去借得寒鑱木柄長壽聞人老者平生不作應酬文徵啓何曾入見聞却爲城東老措大染他一幅白羅紋知君好士喜文人試問文人若箇眞七十年來所見者可憐空費此精神車廐謁慈湖先生墓山疊水環此一坏千年相證幾人來不知有意還無意一樹奇松覆墓臺明明指示此光明今古何曾有暫停昔日千松䖝食盡獨畱此樹自青青萬曆二十年事還鄊鐘鼓汗通身指點當機多少人争奈殷勤無盡意氷霜迸岀一山春過史嵩之墓莫道荒烟蔓艸墟千秋有恨尚畱諸墓林遺穢何心也石槨鳴琴是禮歟方恨誅奸無特筆宋史不列之奸臣傳誰將奪諡尚濃書嵩之初謚莊肅德祐初以右正言徐直方劾見奪今其族姓不考重書初諡西天福地殘碑下其功德院亦敗壞有西天福地四大字碑在菜園中但見僧人出荷鋤除夕懷亾友一年功課復如何文案巳完學案多豈爲聲名垂後世難將歲月浪銷磨年年欲作宛陵行此願誰知竟不成只是西牕一夕話無緣銷受在今生一讀來書一種愁昔年相約共周流如今總使身强健還忍重登疊嶂樓睂生約登疊嶂越城魯桌日人人近交親一見文章識僞眞天意不畱知巳在抱琴更欲向何人氷纏雪壓僅遺民一載那堪去數人忍死終然畱不住如何忍過此三旬沈睂生魯季㮚沈治先趙禹功魏聖水贈雲間錢子璧穀以下丙辰幾社於今數十辰猶隨年少鬬清新慿君欲話當年事同是琵琶亭裏人道遊堂小集次葉公旦韻一時著論掩潜夫不數高陽舊酒徒佳節只將好句换名花豈怪老人逋諸子分韻不及余烏無杜宇春長住杜宇聲爲春去丁海昌無此鳥山隔潮頭青不殊海昌無山對岸越山在望如此風光良弗惡故鄊亂後得能無題海上圖去歲臨山望海昌今年此地憶家鄊濤聲一樣如聲鼓愁緒緣何判兩行曾是乗桴隊裏來當年噩夢巳塵埃白頭自咲眞多事又向長塘看浪囘題黃巖張魯山後貧交行誰向中流問一壺少陵有意屬吾徒社盟誰變稱同學慚愧弇洲記不觚同學之稱余與沈睂生陸文虎始也題朱人遠日觀圖指顧茫茫不可尋片帆東去是何心莫輕一滴指頭血曾與滄波較淺深千奇萬怪亂礁洋變姓劉洙向此行多少蒼鷹飛上下至今怒氣未嘗忘與陳青田上虞話舊故人邂逅北山宮梅雨花開一丈紅細認都亭雙鬢改蘭亭脩禊有上虞令華茂封都亭侯因言嬌女雪詩工余兒婦青田爲媒有女巳長成矣未收涕淚餘波在半墮城隍返照中兩度訪君惆悵去此來又恨别匆匆讀蘇子美哭師魯詩次其韻哭沈睂生昔年崑銅死余哭萬山頭崑銅睂生江上稱爲二沈今聞睂生死有客自長洲探懷書一卷墨溼尚未收四月廿日寄瀨聲如轉喉書筒上書四月廿日瀨上寄爲言我兩人齊契同蘇歐奈何三十年溝水東西流不腆敬亭山聊以備庻羞從子渉黃岳杖屨恣㝠搜西臺賡慟哭蕺山釋脡脩登堂拜我母此意良巳稠一日復一日眼穿疊嶂樓兩人皆老矣絃急調彌遒亦聞倡絶學壁上觀諸侯嗟我徒道聽索處賦山囚把書讀未畢淚如珠垂旒發書未踰月君遂厭世媮睂生以五月卒何異執手别豈知各方州憶昔定交日有如豕遇貅君方有盛名我始脫戈矛南都多朋友導我相勸酬予時未知書鈐鍵待君抽掩關茅曲下王途鑿通郵與周仲馭好談經世之學癸酉急友難過海相援賙友人叅將周梅骨戰死睂生往迎其家叩門黃竹浦不遇空注眸黄竹浦予居也時予在杭睂生相訪不値邂逅明聖湖沉疴忽以瘳議持名士苦膓爲美人柔武林傳舊事再盛不可求時四方之士皆集戊寅我訪君君作帝京遊危言榜朝堂獨身宰相讐睂生劾楊嗣昌紅林睂生住處我信㝛消息苦揶􅟧延連黨禍起以南都防亂揭阮大鋮必欲殺睂生與余望門不可投乘桴喜從者變姓依婆畱十死不得死各得返故丘契濶歲月長吟咏道里悠予有詩寄睂生曾與文江約宛水弄新秋睂生寄食諸門人無常住處惟鄒文江知之十年渠不來日日想風猷義熈之全身唯君不可疣中間我寄書同懷于歲憂人種繫一粒霜雪宜共耰宛其兩人死茫茫來者愁不謂斯言讖君竟從枯髏孤我天壤間不辨劣與優九日同仇滄柱陳子棨子文查夏重范文圍出北門沿惜字菴至范文清東籬兩兩三三郭外阡僧房籬落共延連高林初帶氷霜氣風景俄成慘淡天如此江山殘照下奈何心事菊花邊不須更覔登高地只恐登高便泫然寄陳介睂兼懷萬貞一鴻雁北方來秋風滿庭除嗟我懷朋友氣象鬰不舒所懷翳何人有友在石渠君以通明質抗志古人居􅗀絲析大義卓犖緯聖途當其臨講席敷論玉屑如將使馬當險鑿空岀康衢借君如月眼滿堂勿躊蹰浙東古文詞近日方權輿杲堂開之艶禹梅勝以癯國雯去陳言季野眞書㕑文三不輕作意欲探隋珠破壞訓話陋䕫獻充宗歟貞一之秀頴介眉之奥樞應酬豈文章彼此皆述朱數子㧞其一便可啓荒塗層氷與大輅尚未抵所於奈何君遠道貞一與之俱君固輕富貴繁華不足濡視玉堂金馬豈與茅舍殊憶昔聞君言非不企通儒一身事科舉又欲授生徒轆轤時文間遂不得讀書今君罷科舉曩累葢絶無前言信旦旦當不惜囘車熟處最難忘前哲曾疾呼同張書乘陳簡菴陸氷修家晦木郊外觀菊聞道郊圻秋色濃小舟共出郭門東好花都發重陽後名品偏遺舊譜中件繫小籖眞瑣碎畧觀大意只青紅一村看盡一村去如此繁華不厭豐登雲岫山卽鷹窠頂觀合朔遇雨海山日月看同升詎料偏逢雨氣蒸千衆欲觀慿碣石十年未見說居僧居僧皆言未見衡雲端爲何人歛蜃市能因暮歲興豈必天工眞有意明秋此日復來登次韻祝獻虞文琯話徐忠襄舊事自從斯世失匡型潦倒無殊昔管寧總使挑燈談舊事有如鼓瑟聽湘靈寒松血蔓琴城字公墓在龍山野史雲迷目睫螟頭白相逢眞不易眼光合放一條青海鹽同彭駿孫陳緯度觀海鹽官潮汐打城邉見此茫茫忽慨然戰鼓千重飜地軸米壺一片失星纏分明昨夢乘桴路零落殘書記事年不信乾坤如許大醯雞猶刼甕中天謝胡令脩借孝轅先生藏書聞說匡床楊子居何期得見昔年書塵封蠧走精神在墨艶朱明歲月除寰海𬒳兵方賤士傳家有集勝垂魚一瓻還借我無有慚愧此來幸不虗觀天寧寺楚石琦衣鉢楚石篇章字字新猶畱故物在城闉犀皮亦作比齋鉢何方乞白㲲禪衣不染塵巳閱興亡三百載只消鐘鼓數千廵門庭自是能堅忍錯會捧持有鬼神章淡如索書便面丁巳少年被繡戴朱纓碩果猶然見老成賽社人逢寒食雨叅禪狗餂熱油鐺淡如叅禪十年長我茶條滑百里看山眼鏡明便欲與君同卜築淡如山居甚佳至今隱地負生平次葉訒庵太史韻三百五十字投來自修門意欲規感興麗不數文園誰開塲屋眼而滌濓洛源讀之再三歎洗濯出佳言吾聞玉峯麓莊渠割䁱昬此心爲主宰屹如砥柱存瓣香展餘干千年歸玉墩千城意自遠碎鉢何足論曹溪鉢爲莊渠所碎一傳爲震川月脇開九􅕡文章以載道不與江河奔太史金閨彥學不離天根天根莊渠講學宗㫖源深流自長仁體春風温何意罍洗中有此瑟若璠念予處幽篁何得御李君風期託想像求日而燭捫忽然惠斯詞􅗀絲析鶻崙茫然數難端口吃類子雲隱公己未來治亂畱其垠何條可設施慷慨未敢陳平生汎學海星野苦難分崇王及賤覇衆說徒紛紛非無豪傑士不救溺與焚始信本領濶寰宇方週廵不然朱墨行爲儒恐未眞所以介子推抱桂枯於汾憫予幼失學患難屢破墳幽情發古思面目誠主臣姑置四海大未能康一身宻爾文自娱無以答戲賓牧豕海上老所嗟非隱淪斯民方憔悴何以返夏殷聖學將墜地何以辨朱纁其責在公等學優而仕勤危舉天下溺豈徒門人親勿令吾鄊校竊議東海濱四明董在中過訪訽知爲黃大冲先生及門於其南行賦此奉送并寄先生葉方藹會稽有大儒世系出忠門黃童名無雙白首晦丘園六經探奥窔百氏窮淵源躬蹈丘與軻不肻託空言青衿數十徒講誦徹朝昬曾經其指授規矩秩秩存我聆聲譽久仰止情彌敦一官苦束縳負笈失討論董子家東海獻賦來帝􅕡視我頌一篇浩浩三峽奔所言雖甚夥仁義實本根進止更可觀笑語藹春温都雅周容刀貴重魯璵璠驚問所師誰答言是黃君聞之增愾歎寸心暗自捫讐如觀河者溯源必崑崙便欲裁尺書因風附南雲綿邈泝太始涬溟究無垠隂陽所綂攝方册所羅陳聖狂何懸濶王霸何剖分一一質蒙昧了了破紛紜書成再三讀羞澁還手焚寸莛撞黃鐘如何不逡廵徒詢容貌異那得謦欬眞在昔文中子道學倡河汾韜迹隱弗仕著述擬丘墳高第房魏流佐唐爲名臣吾學苟措施奚必在其身先生富門徒半作王國賓斯道巳有傳何用嗟沉淪興朝亟求賢側席心殷殷安知柴荆外旦夕無玄纁北面脩盛典憲乞禮數勤予亦得挾册函丈時相親勿着羊裘去蒼茫烟水濱壽族兄鎭惡七十戊午衰宗時藝壓科塲君與道傳稱雁行不謂一番霜雪後名花無主任飄颺落拓無成莫怨天譬如只在未生前娶妻生子從新起一筆勾銷七十年唯君澤望最相親泥飮村田作酒人巳是輸君十六載山頭無酒溼枯蓁哀章淡如用去年清明贈淡如韻藍水清流可濯纓相邀九老㑹初成巳抛辛苦屠龍技共守凄凉折脚鐺溪路無橋知夜漲詩牌未穏急餘明豈知一别成今古墓土新飜尚未平老來白日繫長纓精舍臨溪何日成不見抱琴來水北猶疑褁米向僧鐺耳邉苦鳥哀三界脚底艸鞋斷四明社鼓逢逢君或出青烟詩句誦君平端陽喜舅氏見過六年始得北番來兩地巳看過劫灰千歲寒松殭智果寺名四明兵氣暗南雷土硃瓦硯師童子伐鼓鳴鐘上講臺同是隨緣非得志差强伴食老三台陸汝和索書三十餘年月社人不堪追數各酸辛送吾每到三乂路過市争看四定巾楊鐵崖戴四方平定巾斗酒豈嫌屠狗盡長宵其奈老妻呻夢中猶撇廻瀾去牡蠣灘頭月色新徐虞求先生墓下昔年曾是撫寒松丙子歲頭白重來掉短篷謝客荒臺人甲乙徐公墓樹劍雌䧺一腔熱血終難化百折師門是則同宿艸豈能收痛淚山川何日不悲風申山人墓金粟霜林古寺邊一坏黃土艸芊芊樓頭曾記南屏醉井底長沉德祐年姓氏未銷游俠口故人猶泊上墳船從來多少難平事不是因君獨泫然周公謹硯弁陽片石出塘棲餘墨猶然積水湄一半巳書亾宋事更畱一半寫今時剰水殘山字句饒剡源仁近共推𫾣硯中斑駁遺民淚井底千年尚未銷詩格清寒窮愈高須知此硯著功勞一時傳寫癸辛巷不數從前丁卯橋竒物終非井內藏還來發洩好文章流傳到我眞慚愧不識可能繼弁陽送萬季野貞一北上己未史局新開上苑中一時名士走空同是非難下神宗後底本誰搜烈廟終此世文章推婺女明初脩元史以宋景濓王子充爲總裁皆金華人今以徐立齋葉訒菴爲監脩總裁皆崑山人故以爲比定知忠義及韓通慿君寄語書成日紏謬須防在下風管村彩筆掛晴霓季野觀書决海堤卅載繩床穿皂帽一篷長水泊藍溪余所居地猗蘭幽谷眞難閉人物京師誰與齊不放河汾聲價倒太平有策莫輕題堂堂載筆盡能人物色何緣到負薪且莫一詩比老婦楊鐵崖有老婦行上太祖應憐九袠有萱親重陽君渡盧溝水雙瀑吾被折角巾莫道等閒今夜月他年共憶此良辰尋張司馬墓艸荒樹宻路三乂下馬來尋日色斜頑石嗚呼都作字冬青憔悴未開花夜臺不敢畱眞姓萍梗還來酹晚鴉牡礪灘頭當日客茫然隔世數年華同徐霜臯陳䕫獻視兒至唐殿宣書屋共訪名園日欲沉四圍花木鎻秋深亭臺著處江山穩東坡題此山有江山雖有餘亭榭著難穩風景收來吳越森一賞固然高七願來賢何况主人心殿宣令余至下榻此園舉頭盡是開荒句不用奚囊别地尋雪後芝兒上府終夜雨聲不止因念祝兒雨聲銷雪聽琳琅白髮愁心與夜長篷底漏痕争坐位言芝兒孤城濤勢逼匡床祝兒在海昌書生門戸傳辛苦老子生涯岀劒鋩安得團圞茅屋下傳經何必讓毛萇次山曉韻新成九老青􅎉社只在雲深洗藥村不是相尋尋不見猶疑擔板出徐門庚申秋暮過訪太冲先生不値詢山童云看花未歸悵然口占本晢短杖柱泥深尺許遠隨牛跡辨荒村先生乘興看花去惆悵斜陽立板門吾悔集卷之二南雷續文案男正誼較叙陳言揚句股述句股之學其精爲容圓測圓割圓皆周公商高之遺術六藝之一也自後學者不講方伎家遂私之溪流逆上古塜書傳緣飾以爲神人授受吾儒一切冐之以理反爲所笑近世韓苑落作志樂律管空圍不明算法割裂凑補終成乖謬其言志樂成而九鶴下舞於庭不知律呂未諧何以能感九鶴也珠失深淵㒺象得之于是西洋改容圓爲矩度測圓爲八線割圓爲三角吾中土人讓之爲獨絕闢之爲違天皆不知二五之爲十者也數百年以來精於其學者元李冶之測圓海鏡明顧箬溪之弧矢算術周雲淵之神道大編唐荆川之數論不過數人而巳海昌陳言揚因余一言發藥退而述爲句股書空中之數空中之理一一顯出眞心細於髮析秋毫而數虛塵者也不意制舉人中有此奇特余昔屏窮壑雙瀑當窻夜半猿啼倀嘯布算簌簌自歎眞爲癡絕及至學成屠龍之伎不但無所用且無可與語者漫不加理今因言揚遂當復完前書盡以相授言揚引而伸之亦使西人歸我汶陽之田也嗚呼此特六藝中一事先王之道其久而不歸者復何限哉汪氏三子詩序休陽汪周士晉賢季靑三子皆天下才而愛風雅喜讀書僑寓桐溪畵溪海內之名宿聞其風者多操舟到門結交而後去顧非今世坊社之氣習比也周士之詩沖融高邁從開元大曆諸家咽噱澄汰別出機杼晉賢之詩懷古感今往復流連其悱惻煩傷之㫖情文俱備季靑之詩磊落多英其槎枒排奡之致側足焦原而手搏雕虎三子葢巳駸駸逼古作者宜乎爲人之所貴重耳嗟乎天尾旅奎士生斯世挨肩叠足風流都盡踽踽抗塵而行者莫不有憔悴可憐之色追數百年間嘉隆以下藝林文苑見重于時布衣稍通聲律便嘯傲王公之上卽如謝榛王穉登所至傾動草堂之中羔鴈成群徐渭最爲蹇乏鎭海一記襄愍猶數字酬之故一名爲士口不言錢更無米鹽俗事余嘗言吾輩福分爲前人支盡無庸更怨寒苦今讀三子詩遊山題畵種花載書雅集懷人一切囂塵烟火不入筆端恍然身在隆平之日也豈前人猶有未盡之福分僅以私俾三子歟庚申仲冬余謝弔過桐溪三子岀其詩求序余明山之樵人也偶爾行脚遂爲耳目所跡行將掩其聲光還山弄月三子之才自當爲世所急翺翔王路余與三子邂逅正未可期庻幾藉此詩口授樵侶潤色枯稿也題張子遊卷傳影之家今所稱名手者大畧爲曾波臣之弟子如金榖生王弘卿張玉珂顧雲仍廖君可沈爾調顧宗漢謝文侯張子遊皆是也非是則無師法卽有肖有不肖究與俗工不遠戊寅波臣來姚江寫先忠端公像辛巳余至南京寓鷲峯寺與波臣之居相近毎至薄暮波臣過我寓中邀往書室余不能酒黃花綠茗雜以果餌出其所畜書畵古奇器觀之自後不相聞問庚申邂逅子遊言其師卒于丁亥年八十四晚年目不能細視爲牛首僧畵八十一代祖師像遂終焉因念辛巳去今四十年耳耆舊凋零海內之藝苑方伎一切不如昔日不特傳影爲然也波臣弟子今亦寥寥如子遊者寧不可貴重哉題海昌六老圖圖中六老余不及見者文白嗣畱耳元怙見之於語溪冠解果曵長裾及來海昌尙申剪燭之談介皇信宿其家同遊兩山劍耿曾訪之桑林之下而尤契者爲止溪先生老人之聚香山洛下大抵多名公卿海昌六老名在顯晦之際則所遇之時爲之也余亦嘗爲九老㑹於四明山皆樵夫木客姓名不通於郡邑其一人潘姓者一百有二歲歲鋤地五畝種木棉以給衣食餘亦肩隨不遠然余猶以爲未足往來樊榭石窻之間行求白公劉綱劉晨阮肇之徒而與之齒年歲耳其中當虛一位待止溪先生補之不知肯入㑹否卓母錢孺人墓誌銘李大泌誌弇洲夫人之墓謂其生長富貴人望之如在天上畢生不知憂苦爲何等而夫人盡瘁操心有單門之所未嘗者以信憂樂之命非富貴貧賤之所與也余讀武康韋六象之狀卓母錢孺人何其相類乎按狀孺人姓錢氏名蕡字淑儀杭之錢塘人父朝彦崇禎丁丑進士句容知縣妣許氏孺人生而性慧內則孝經詩詞畧皆上口年十五歸仁和卓君麟異子孟子孟翰林侍讀諱彝之子也卓氏爲塘棲望族富甲一方阡陌間架牽連郡邑僮客數百人轉鷇鳴橈晝夜不絕舅姑皆在京師子孟讀書不問生産孺人以弱女子未明而起諸事塡委候其指揮左握算子右徵市曆官租歲計轉運貯積會要不爽毫髮細至庭内灑掃竈養柴水亦經心目子孟隨舉順天當卓氏之盛孺人不以林下之風願息閨閤也亡何侍讀卒官家勢中衰盗入其室發大珠黃金以去利其財者廣設機械哃喝數萬金子孟亦暴卒病姑在堂稚㓜滿室孺人搘定風波上侍湯藥下授詩書䘮葬婚姻禮文畢備觀者不知其爲患難之餘當卓氏之衰孺人不以風雨之晦改其昏曉也逮姑潘恭人卒葬旣畢兩子爲諸生侍讀詩書之澤有託門戸重立而孺人亦病矣從容謂其子女曰吾昔奉汝祖母秉燭晚食祖母南向吾與諸姑左右汝父從容從客座來舉觴加餐笑語歡洽將謂此樂可常何意轉瞬間零落俱盡正如長亭旅憇先後散去唯我獨畱亦復何堪因欷歔不自巳未幾而卒時康熙巳未十二月十九日年五十子四人長齡太學生松齡庠生永齡錫齡女四人婿陳奕昌項灝俱太學生餘未字孫男三人長齡等將以年月日葬子孟之墓將葬奕昌傳其內子之命乞余銘之昔陳同父夫人欲朱文公篆其親墓因夫以乞孝思㝠契千載如新但不知余之文能如文公之篆亦可傳後乎銘曰物盛而衰衰久而復天道之常人事之卜吁嗟孺人霜雪性情高名之家而荼苦一生雪中簡鄭禹梅老來生怕是嚴寒雨雪今年四度看香結濃雲埋唵叭酒甞奇味瀉何蘭二十日陳令翁出荷蘭酒禦寒三江九􅄵歸舟凍黃獨靑􅎉生計酸若使萱庭猶在望應知淸淚滴欄杆歸途雜憶出門長自請歸期纔到歸期卽望兕今日更無人倚閭蕭蕭唯有白楊知負米鋤瓜事巳闌此身雖在亦凋殘親恩嗚咽來生願此語傳家血未乾先忠端公臨難之言偷生乞食總風塵母在何能避辱身一旦于今成夢幻可知多少不如人送死養生在一身流離贏得鬢如銀自傷子􅕄無毫盡累母長憐兒苦辛禮俗相叅自有程傷哉貧也不能行朝昏俱向經營度擗踊無暇展寸情靈隱訪三目西湖十月景蕭森共約扁舟到碧岑七十二人我獨在蜀人劉道貞癸酉問道錄載七十二人儒黃佛法總難尋庭前栢樹原無事門對江潮繼苦吟禪子莫誇今日盛西風颯颯日隂隂大雪野祭湖邉已㫁草鞋痕何似冰天共出門雪夜千年同此哭孤墳三尺大於崑諱名自甲還終癸同祭十人遺事書潮不繫元近日傳聞君莫告歌聲變徴咽淸樽張仁菴古本大學說序癸酉甲戍間余與江道闇張秀初同學道闇讀書不求甚解任懷得意融然遠寄秀初讀書字櫛句比嘗見其讀三禮五傳升降拜跪之細肴蒸籩豆之煩時日錯互地名異同莫不辨析秋毫立身制行粹然儒者之矩度也當時來學之門人共建一小樓于南屏之下余欵然良對閒談律呂因取餘杭竹管肉好停勻者㫁之爲十二律及四淸聲製作精妙武塘魏子一吳門薄子班方講此學見之推服桑海之交道闇秀初俱爲法門有力者所網羅道闇尋謝世秀初白椎升座聽講常數百人諸方所稱仁菴禪師是也余見之於靈隱再見之於雲居仁菴所言唯法門事不復理經生前說矣頗爲惜之庚申季冬其外孫鄭春薦出仁菴古本大學說云是晚年維楊所著授子止菴分章㫁句天衣無縫新建欲復古本尙在離合之間此說出紛紜聚訟諸義盡墮然以其出自仁菴世儒妄橫儒釋之見未有不疑之者也夫儒釋之淆亂久矣儒而不醇者固多出入於佛而學佛者亦未必醇乎於佛顧視性分學力二者性分所至佛法不能埋沒往往穿透而出學力由來亦非佛法之所能改此如水中鹽味濟入河流夾雜之中歷然分别唯知道者能辨之不爲墉垣膚瓜之論所掩葢耳仁菴之說本之生平學力與釋氏無與也仁菴去世今十有六年當日小樓巳毁其旁虞氏水閣無一存者老梧數樹僵立冰雪之下想像舊遊渺若山河展讀此卷神理綿綿不異同學之時夜半快譚水鳥驚起也始知迹像變遷了不可恃尋微㝠契别似有物耳因序而命春薦刻之馮畱􅋖先生詩經時藝序士之不學由專工於時藝也時藝之不工由專讀於時文也故嘉隆以前之士子皆根抵經史時文號爲最盛固未嘗以之流行坊社間也萬曆丁丑馮具區集籍中名士文彚刻二百餘篇名藝海玄珠至癸未具區爲房考刻書一房得士錄此京刻之始也然壬辰尙缺三房乙未缺一房至戊戌而十八房始備婁江王房仲閱藝隨錄此選家之始也辛丑遂有數家自是以後時文充塞宇宙經史之學折而盡入於俗學矣然文之美惡一聽其人故毎科新貴出其揣摩之具示人以甘苦所在選家從之朱墨商量銖黍億測某也名家某也弋獲一科之風氣一科人自成之也今也不然新貴刻稿自揣不厭世目則取其所與之人之文而刻之一卷之中不勝其雜也選家所徵名稿一科不能數人行求於濩落不偶之老生取其火燹墨汚之棄物薰沐之以時貴之名不然則其選冷淡必爲他選所詘故一選之中眞􅎓相半也夫所貴乎時文而誦讀之者先資信貨天下從而趨之之爲風氣也今雜陳於前者於遇不遇葢無與焉則今日所謂風氣者選家之風氣非塲屋之風氣明矣嗟乎學士撫揣應制之資一變爲鬻良雜苦之術使舉世盡蹈於詭紿假譎之途而不覺時文之弊一至此乎慈谿馮黃臣過我欲刻其祖畱仙先生詩經義求序之余之不閱時文三十餘年矣辭之再三黄臣又以其父潔士書來請夫先生之詩義與震川之易義當時並推震川易義行世巳久而先生詩義乃出之五十年之後非復聊爾時文可比余謂黃臣當與先生和陶詩同刻郝楚望制義列於小山草堂集中耿天臺之集亦附制義七首其例可按也此等刻由一洗刻稿選文之習余亦何妨於序哉過黃孚先小樓詩人泠淡作生涯楚楚安排亦自嘉一架小樓無市稅時方征間架甚嚴數編殘袠稱山家宮聲起處從仙呂紅日初來照杏花一曲未終春草綠又擕竹簏採新茶孚先琴有别傳以仙呂爲宮過諸九徵書舎三間矮屋避兵來奉母辛勤迹未灰蟹籪蝦筐分瑣碎尋花捉絮笑嬰孩村中迓鼓喧明月湖上扁舟泊石臺一一都成腸㫁地孤兒垂淚費徘徊進士心友張君墓誌銘心友張君沒於京師其友無不哀之哀其有才而業未就也有志而學未遂也慨自時風衆勢趨於科舉一途苟非卓立千古之士一第進士便意滿志得以爲讀書之事畢矣故流俗之論雖穿穴經傳形灰心死至于老盡者苟不與策名皆謂之無成豈知塲屋之外復大有事古今事物錯落高下不以涯量帝王之所經營聖賢之所授受下而緣情綺靡之功俱屬吾人分內學者窮年矻矻彷彿其涯涘而不可得總溢才命世抗志思古道之未通吾夫子所謂苗而不秀秀而不實在此而不在彼也君天姿朗秀率性聰達年二十四舉於鄕明年登進士第縱横指取無不如意流俗莫不交口羡之爲人得如君則亦巳矣而君獨欿然不自以爲足將暫息乎其巳學者而勤乎其未學者於是親師取友里中有講經會君帖帖坐諸生下恐不卒得聞同邑范氏多藏書余偕同學借抄日計君所手抄過於傭書者君不特抄之而且發之爲詩無僻固狹陋之習使由是而之焉則且渟之爲道德流之爲文章溥之爲事業皆未可知未幾而君卒矣乃僅僅以詩見之於友朋間是其才可惜而志可哀也故論君者不在君之所就于其所未就者君自此遠矣君諱士塤字心友别號雲汀張氏顯于宋宰相知白無子以兄子子思爲後仕至尙書工部侍郞後有籲者自滄州徙鄞籲孫用明遷雲龍溪明永樂間用明之後允肅贅城西靑石橋余氏因家焉允肅生寧寧生泮弘治辛酉鄕進士知豐縣改汀州府學敎授聚徒講學稱爲味芹先生味芹生仕仕生國紀國紀生一相一相生遐勲字振寰治産積居與時逐遂至富厚君其仲子也君應授推官以汰冗員改知縣値銓選壅滯又連丁內外艱需次於家者十餘載讀書之外好古書畵法帖與其友陳䕫獻陳介眉范國雯王文三鄭禹梅之輩相砥礪于古昔乙卯始入京候補行人丙辰卒於寓舍康熙十五年某月某日也距生崇禎十三年庚辰某月某日年三十七葢未沾一命而卒士人白首窮經得貢于天子者固難貢于天子矣得登進士第尤難之難也旣第進士則解褐除官直易易耳君何易其所難而難其所易鄕黨親戚以爲君之不幸君子固未嘗以此置欣戚於其間也娶陳氏卽䕫獻之女弟子二人錫璜縣學生娶徐中書勍女錫璁太學生聘胡知縣文嚳女君將北上預營葬地於吳家斗繪圖賦詩以爲逹豈知其風流將盡志壹之動氣乎錫璜錫璁以國雯之狀來請銘余不得辭銘曰蹙蹙章句錮人性命視一科名以爲究竟正如海師針經錯亂妄認魚背指曰洲岸所以古人舉頭天外些少得志曾不芥蔕此志無窮海怒鵬搴希賢希聖以至希天吁嗟雪汀風雲呼翕如此之人曾不四十答萬充宗論格物書承示格物二義兄以大射儀若丹若墨所畵之物卽格物之物聖人不過乎物卽是盡其性因物付物卽是盡人物之性此是兄讀書自得而先儒巳有言之者瞿汝稷云射有三耦耦凡二人上耦則止于上耦之物中耦則止于中耦之物下耦則止于下耦之物晝地而定三耦應止之所名之物也故大學言物是應止之所也格至也格物也者至于所應止之所也在瞿元立雖創言之然與羅近溪訓格爲式事皆合式爲格物字異而義則仝也葉静遠與兄書其言格物之物當于本末之間得之括以兩言卽本以逹末卽末以透本此雖静遠自得而先儒亦有言之者管東溟云本末物也本者無失其爲本末者無失其爲末格也從本逹末之謂致知得本貫末之謂知至非卽静遠所言乎兄與静遠二義各有攸當若竟以爲大學了義則不能無說以處此夫自來儒者未有不以理歸之天地萬物以明覺歸之一巳岐而二之由是不勝其支離之病陽明謂良知卽天理則天性明覺只是一事故爲有功于聖學今以度尺而午畫物通于物當物及物通于格是以天地萬物公共之理爲畫物以吾心之明覺爲當物及物然後謂之格物與一草一木亦皆有理之說有以異乎大學言物有本末葢以本足以包宋末不足以立本故曰知所先後先本而後末也聖賢工夫一歩歩推入結在愼獨只于本上本立而道生末處更不必照管若静遠言卽本以達末卽末以透本則是中和兼致工夫兩截儒者之弊正坐此耳先師不欲言意爲心之所發離郤意根一歩便是末末未有能透本者也静遠苟明夫意則格物之工夫卽在其中更不必起爐作竈也夫心以意爲體意以知爲體知以物爲體意之爲心體知之爲意體易知也至于物之爲知體則難知矣家國天下固物也吾知亦有離于家國天下之時知不可離物有時離如之何物爲知體乎人自形生神發之後方有此知此知寄于喜怒哀樂之流行是卽所謂物也仁義禮智後起之名故不曰理而曰物格有通之義證得此體分明則四氣之流行誠通誠復不失其序依然造化謂之格物未格之物四氣錯行溢而爲七情之喜怒哀樂此知之所以貿亂也故致知之在格物確乎不易佛者之言曰有物先天地無形本寂寥能爲萬象主不逐四時凋夫無形亦何物之有不誠無物而以之爲萬象主此理能生氣之說也以無爲理理亦非其理矣總縁解物字錯後儒以紛紜應感所交之物纔爲之物佛者離氣以言物宜乎格物之義不明也唯先師獨透其宗此意散見語錄中門弟子知先師之學者甚少故晦而未彰兄試以語静遠不惜批示共尋先師之學脉也黃醒泉府君傳正德丙寅謝文正致政歸與馮雪湖相唱和戲排舊韻別創新詞往復至于八九嘉靖辛酉呂文安憂歸與黃醒泉相唱和當花對酒登山臨水無日無之姚江風雅唯此兩時爲最盛承平士大夫之風流今無復有夢見之者矣醒泉則余五世族祖也諱尙質字子殷醒泉其號也吾始祖寉山十三世孫祖晰父舜卿母邵氏府君生時母有夢筆之祥幼而頴異日誦千言稍長以易爲大師湖守胡君聞其名遣子從學舉嘉靖巳酉科浙江鄕試知息縣事府君吏治以敎化爲先民曾珣兄弟訟產府君手書棠棣章與之曰熟讀後始爲若理越數日詣府君求直府君曰前詩熟否曰熟府君發明詩義慷慨嗚咽珣兄弟感動流涕不待終章相讓而去或怪其速化府君曰人孰無天性批之以法愈見其汩沒耳尋遷景州守景州多盗皆勸其刻深爲治府君曰不然景瀕滄海而麓大行苟如此是驅之爲盗也於是捐鈎距省簿書多所縱舍盜自衰止明年脩董仲舒書院周亞夫祠自爲文記之相觀以經術使民不遊學堂與撻市同時分宜竊柄大官多岀其門下府君激烈抗憤發言無所梗避聞者惡之分宜旣敗分宜之黨未衰廉平之譽無由漸朝廷之耳黽勉六載乃自免歸築室烏膽山讀書賦詩耳目所及分爲十四景片石孤枝題品張皇萬曆丁丑元旦庭誥諸子手書付之二十三日卒年七十四府君與雪湖皆不受人牽挽雪湖母年九十固不欲出府君之在景州呂相氣勢方盛府君􅑬嵼偏州未嘗以尺牘自嗚不平其自重如此府君所最善者楊珂徐渭其詩文書畵齊稱一時而弇洲主盟壇坫士之未捧珠盤者多見詆訶三人崛强不甘於邾莒故徐渭之詩楊珂之字皆有貶辭於府君無稱焉百年以來渭以袁公安顯珂僅有知者府君姓名幾將湮沒族叔子叅謂余曰子之責也因選其詩而爲之傳陳叔大四書述序自離懷抱而入學舍無有不誦四書者然而能知四書者葢亦鮮矣夫四書非可句解而字釋也聖人之言本于無言一言而未嘗不足其千萬言也猶之乎其一言也盤中走丸横斜圓直豈有一定然一定而不可移者丸必不出於盤也故先儒欲解四書者必以心性爲綱領頑隂解剝則條目無滃霧矣西山讀書記北溪字義之類是也然學者工夫未到沉痛只在字義上分疏炙轂淋漓總屬恍惚决不能於江漢源頭酣歌鼓掌耳余講學海昌毎拈四書或五經作講義令司講宣讀讀畢辯難䗬起大抵塲屋之論與世抹摋余曰各人自用得着的方是學問尋行數墨以附㑹一先生之言則聖經賢傳皆是糊心之具朱子所謂譬之燭籠添得一條骨子則障了一路光明是也陳子叔大於其間特有領畧端默静好聖賢微言要語審括內考間以四書述之了無滯法余觀其波瀾正濶必收歸濫觴要自明其所獨得不然自古至今積千萬人之見新義何限叔大亦無容于崑岡烈熖助此爝火耳余生平頗喜讀書一見講章便爾頭痛武林顧隣調曾以所著五經講章餉余余謝不受徐虞求先生在坐詰之曰性所不耐置之高閣恐虛隣調盛意也虞求爲之一笑今讀叔大之述不異一堂問答日征月邁此書卽爲積水矣雖然近來議論廹狹聖伏神徂日益無考人人私其甕天將子之學愈進則彼之繩益急吾子其亦能自信巳乎吏部左侍郞章格菴先生行狀會稽章譽持格菴先生家傳以余爲先生同門友也再拜乞行狀將以上之史舘先生在崇禎間爲一代眉目豈可今其遺事舛駁零洛乎謹以故所聞見狀之先生諱正宸字羽侯別號格菴㑹稽人也爲道虛望族祖父先生爲子劉子內姪從而禀學爲人誠樸近道深爲子劉子之所契許舉崇禎庚午鄕試歸至濟寧聞報同舟有李科者先生師也先生不忍其失意獨歸偕返而後北轅明年登進士第選庻吉士授禮科給事中上求治太急烏程復以功利導之先生言伏見陛下洞照群情有先事爲察之哲鈐束百辟有以力勝殘之威登咸三五有其臣莫及之聖是以合意者爲忠良睿算者無改變以至急賦之開釁錮罪之失情追往之稔惡告密之府奸群心嗟嘆盗賊披猖求治愈急而愈遠矣亦惟是語黙動静之間日求放心以周孔仁義爲必當遵以管商富强爲必當黜以臣隣吁咈爲必不可厭以億兆耳目爲必不可蒙謹喜怒之端灼善惡之别則太平宏業自然各得其所葢先生之言治必本於學術讀者不問而知其爲大儒之弟子也巴縣烏程之衣鉢也癸酉入相先生奏彈應熊剛愎自用縱橫爲習小才足以覆短小辯足以濟貪一旦大用必且芟除異巳驅除善良報復恩仇混淆毀譽且訛言何所不至夤緣左右士論所耻從此薰心㨗足之徒颷馳而起矣疏入下獄馬世奇王邵爲先生過巴縣曰章長科此舉成就老先生爲潞公矣巴縣艴然曰這個皇上某如何做得潞公然上亦不深罪放還田里丙子冬起戸科先生言方今大臣持祿養交刻深難犯揣摩宫府張設爪牙知䕶一官小臣習爲恬黙冀以自完盱豫邀求隨機觀望知䕶一身通國臣僚盡爲聲名利祿無一人爲陛下者陛下以孤危之身居臣民之上受人欺紿釁兆百出臣切傷心大抵爲烏程而發戊寅五月火星示變時田貴妃與中宮不恊上久不見中宮武陵故以田畹進上疏微及后宮爲給事中何楷所駁先生亦言火于五德爲禮陛下未嘗以沽名市恩疑大臣也而大臣揭救鄭三俊錢謙益倡爲是言疑陛下甚矣是謂無禮史􅒇辨疏一曰時局再曰時局理玄黃之說開群枉之門亦無禮也朝廷毎一番令甲卽增一番徑竇張檉芳京察不謹借城工以復銓職亦無禮也灾異頻仍陛下方發罪巳之詔而李鳳鳴稱善言不可退星猶揮戈不可郤日亦無禮也然則熒惑焉得不垂象乎時厰衛橫甚先生又言西厰雖革而西厰之實尙存西厰之任雖虛而昔日把持西厰之人尙在借云陛下不知則宮掖之間肘足之際尙且迷㒺天聽而况於三輔郡縣乎上令中官自行回奏氣勢爲之少衰辛巳賊䧟洛陽福王被害上召對群臣於乾淸宮先生奏闖賊從四川來奏未畢樞臣陳新甲從旁急應曰賊自秦來不從川來言至再督師楊嗣昌奏流賊九股巳撫其八只張獻忠與曹操逃入蜀闖賊在獻忠一股之内今從川來所過地方不見攔截則嗣昌之欺君露矣新甲表裏爲奸故不禁其辭之暴也尋長吏垣先生言治之盛衰由於言路之通塞臣爲六垣之長苟一垣不言一事不言皆臣之責也一日召對上厲聲曰言官須是設身處地奈何苟且塞責先生對設臺諫本以求言寧言不當無使其畏而不言願皇上勿生厭薄宜興再召悉反前政引用正人撤回差璫停止緝事蠲租淸獄行間賞罰朝報夕可天下仰望丰采刻期太平而門多雜賔性少剛節先生故宜興之門人也謂其一時之君子曰吾輩當夾持相公以成就其功名無徒將順以爲臧氏之美疢也㑹推宣大總督宜興欲以門生江禹緒陪之先生不可冡宰承宜興意江爲正推先生劾冡宰私易不道宜興欲起江陵令史調元先生于其名下註一鑚字遂止宜興之起琢州之力也宜興無以報之欲借守琢之功復其冠帶先生與金光辰孫晉固執不可亦中格且上言閣臣先格君而後事功可建亦必先積誠而後君心可格人主菲薄朝士必因外庭無一人一事足稱意㫖苟能不與中官作緣不憑恩怨起見不以寵利居成功不以爵祿私親暱自起皇上敬信矣宜興雖恨先生然終先生在朝形格勢禁亦不至大叚放倒賄賂如後時也先生又舉史可法范景文孫傅庭蔡𢡟德可任司馬以爲國事日壞皆由司馬之不忠賄賂不絕情靣不除推諉不屏欺朦不破恩仇不化軀命不捐以致刑賞倒置功罪混淆臣不知兵安知人之知兵所可信者諸臣夙具肝膽自矢忠義愈於蠹國欺君寡廉鮮耻之陳新甲耳壬午五月㑹推閣員先生與冡宰李日宣河南道張塇共事先推十三人上命再推又列十一人六月辛酉召對中左門上怒狥私濫舉如房可壯宋玫張三謨何故得與日宣對畢先生奏日宣平日游移少執持臣曾有公疏紏之第此番推舉實無狥私卽房可壯三人未必果堪輔弼論其生平頗知自好上怒未解下先生等於獄遣戍均州先是無名子效東林點將錄故智以二十四氣分配朝官達之御前於是閣員兩推所不及者流言以實之上聰明旁寄遂以爲然南渡以原官召先生上疏一曰勤學春秋爲孔氏要典宜選方聞之士朝夕進講高皇帝祖訓備歷艱難尤宜時時省覧一曰辨官易言開國承家小人勿用其乗時射利僥倖顯榮口舌得官者不宜輕開濫門一曰肅綱紀肘腋之間威令不行四海生心今于藩鎭之中忠勇可任觀望不前速宜分別以就鈐鍵一曰正人心天啓之季䘮心媚逆餘孽猶存薰蒸彌甚今茲附賊豈緩刑章又疏陛下宜皜素帥師親臨淮甸聲靈所震人切同仇而乃不稱行在粉飾儀文志在偏安竊恐偏安之業亦未易也馬相將起阮大鋮舉朝爲難銓衡不敢任其責欲假中㫖起之司空缺先以中㫖陞張有譽先生封還詔書不聽上言臣於有譽非争其人争其事也傳陞一途非所以待正人君子有譽賢者未必卽受是用有譽者乃所以斥有譽也魏國公徐弘基公疏薦張㨗有㫖部議先生曰何議爲因言勲臣無薦舉文臣例使其人果賢者必耻受勲臣薦舉巳而以安遠侯柳祚昌疏遂起大鋮先生言朝廷如此舉動邸報流傳第見微臣姓名尙掛仕版必且相顧驚駭謂臣負先帝之經綸負陛下之明詔負銓選之權衡負瑣垣之職掌罪當萬殛穴地難容伏望早賜罷斥以爲不忠之戒葢先生大指以親君子遠小人爲立國根本不以小朝廷而少有阿邑故與羣小争射齗㫁猶冀稍延國命而無如天生妖孽非人力之所能爲乎旋以大理寺左丞歸江上之役以先生爲吏部左侍郞署部事事敗先生溺水不死自罄又不死行脚不知所往吳市抱關曾干封事靈隱續句以避揚觶固先生之高致也先生從子劉子講學最重風節余嘗聞其評品人物曰太守張有譽蔡屏周入覲送監督戸工二部內官文冊長揖不跪天下郡縣只此二公又曰關中一細民與馮少墟講㑹從此口不二價一日過縣治見學㑹中二縉紳入謁縣令愕然曰渠亦爲此耶終身不屑入㑹嗟乎使先生而首丘念重當時何以稱此細民乎余嘗念陽明之學得門人而益彰吾劉夫子之學尙未大行于天下由門人之得其傳者寡也巳而思之彰陽明之學者不在講席遍天下之門人而在孤高絕俗之門人如兩峯念菴之徒是也吾夫子之門人當金石變聲祁彪佳葉廷秀王緐蓍祝淵死爲列星而先生力固首陽又叅錯于其間他日追遡淵源以求其學卽無龍溪心齋一輩庸何傷其過陽明遠矣謹狀子劉子行狀上學人黃宗羲狀本貫浙江紹興府山陰縣水澄里年六十八曾祖槩妣茅氏祖焞妣陳氏父坡妣章氏三代皆歷贈先生諱宗周字起東學者稱爲念臺先生漢長沙定王劉發之後在宋有退翁先生禮徙廬陵四傳而爲揚州别駕廷玉廷玉生文質尉於山陰始爲其縣之人又四傳而生謹故明之孝子也以童子入滇脫父於戍又三傳而爲贈兵部右侍郞鐸以其孫棟之貴也鐸生濟濟生槩槩生焞號兼峰焞生坡號秦臺有名諸生間當其卒時太夫人章氏年二十七越五月而先生生兼峰䘮其嫡子家道䘮失先生依於外家從外祖章公頴受學十二歲章公在壽昌先生徒步從之攣足者數月不顧也凡三上壽昌已學經義於魯念彬念彬令取裁左史授以緃橫變化之法而章公老儒墨守先莗先生從此則失彼徘徊兩岐毎遇私試一題必爲二義以正者呈章公奇者呈念彬交相善也萬曆二十五年舉於鄉先生二十歲又四年舉進士丁章太夫人憂先生於中門之外創爲堊室高廣容膝日哭泣其中陶文簡望齡弔之歎曰敎衰禮壞久矣吾未見善䘮若劉君者也服闋以兼峰年老不欲岀兼峰不可又一年就選授行人司行人當慶元枋國方興楚宗妖書之獄以陷君子先生草疏劾慶元同年生見之曰君亦曾爲老親計乎先生黙然深念者數日遂請終養尋丁兼峰憂毁瘠而病病愈亦不出居家七年孫公丕揚爲太宰聞其名以原官起之充益府册封副使光宗儲位未定先生因報使竣言陛下深居宫禁務與臣下隔絕雖皇太子至親未嘗宣召寢門春秋鼎盛講席不設托之阿保之手豈陛下之所厭者賢士大夫復推之而於皇太子亦厭之也陛下之所狎者宦官宫妾復推之而使皇太子亦狎之也初顧端文憲成高忠憲攀龍講學東林書院其議論是非若秋霜烈日朝野憚之是時崑山顧天埈宣城湯賓尹收召黨與將傳之衣鉢爲小人宗主辛亥京察孫公掌計事皆以不謹坐罷其黨金明時秦聚奎起而訐之禮部郞丁公元薦言太宰是聚奎等排奏丁公往復甚苦太宰旣引咎去舉朝蜩螗沸羮聚族分部以丁公故端文講學之弟子也東林崑宣遂爲黨魁之目未幾而荆熊之爭起湯賓尹之居鄉以媒蝎著有施氏女不受蠱而死其鄕諸生頌之齗齗然賓尹耻之繼梅生者淫徐尚書之女諸生復發其事御史荆養喬以梅生蔽罪熊廷弼督學至宣則盡反其獄出梅生而撲殺諸生之爲首者爰書謂今之公舉皆施湯故智葢廷弼黨賓尹借梅生以灑賓尹耳養喬爭不得而去掌院孫公瑋議廷弼解職聽勘宣黨復大譁謂東林主使之先生上奏曰東林云者先臣顧憲成倡道於其鄕以淑四方之學者也從之游者不乏氣節耿介之士而眞切學問如高攀龍劉永澄其最賢者說者曰東林未嘗無小人固矣乃今之攻人往往不於流品而於其意見以意見分門戸卽以門戸分流品如意見而已高攀龍姜士昌劉元珍望而知其不同量者也儻朝廷一日賜環則人人爭按劒矣然則以于玉立丁元薦爲亂天下者亦豈遂爲定論乎略迹而論心二臣皆較然不欺其志有國士之風且今之發難於廷弼者果何人之報復乎是故摘流品可也爭意見不可也攻東林可也黨崑宣不可也臣聞世之治也君子衷於和及其亂也小人尚同今日和衷之道其可不講乎臣請言憲成之學憲成學朱子者也其言朱子也世日尚奇朱子以平平則一毫播弄不得世日尚圓朱子以方方則一毫假借不得無有假借方之至也無有播弄平之至也合方與平和之至也臣願學東林者反崑宣之戈而卒業於此無遺憲成羞可乎嗚呼學術之難言也王守仁之言良知也無善無惡其弊也必爲老莊頑鈍而無耻顧憲成之學朱子也善善而惡惡其弊也必爲申韓慘刻而不情佛老之害得憲成而救臣懼一變復爲申韓自今日始虞廷授受曰中孔門得之爲傳心要法斯則有進于東林者矣南道御史孫光裕謂先生顚倒是非借東林以袒養喬飛章攻之當是時東浙銓曹衆論屬先生同邑商周祚謂先生曰愼母及時事旦晚吏部矣先生不聽於是浙人僉曰非吾家種草可使之居相厄之地乎先生乃給假歸敎授鄕里門士日進先生曰昔伊川讀易多得之涪州朱子奉祠其道益光吾儕可無自厲乎天啓元年起禮部儀制司添註主事受事九日卽劾奄人魏進忠保姆客氏進忠者大逆魏忠賢未改之名也與客氏爲對食宫衞近侍並所親樹出千朝政威權大震而小人之攻東林者多岀其門下爲舍人故事大婚則保姆岀居民間客氏旣出熹宗涕泣不食復召之臺省倪思輝朱欽相王心一各上疏爭俱降謫先生言頃者奉聖夫人客氏於陛下有阿保之恩不忍遽出至岀而復入夫以大內森嚴恣一宫人岀入不禁非所以閑内外也陛下方以人言及之一舉而逐諫臣三人罰者一人至閣部以下舉朝爭之不得則陛下又以一宫人成拒諫之名矣古者公卿有罪則下廷議而理之不聞以其禁中決也今朝逐一諫官中旨也暮逐一諫官中旨也此中旨者陛下方用之以快一時之喜怒而孰知前後左右又不難乗陛下之喜怒以快其私乎方且日調狗馬鷹犬以蕩陛下之心日進聲色貨利以蠱陛下之志凡可以結人主之歡者無所不至使人主日視此法家弼士如仇讐而後得以指鹿爲馬盗陛下之威福斜封之勑鈎黨之獄生殺予奪惟所自出而國家之大命隨之試問今日得時用事親幸於陛下如左右手者非魏進忠耶然則道陛下逐諫官者魏進忠也并道陛下以優人雜劇射擊走馬者亦魏進忠也陛下淸明在躬方將追邁古先哲王乃爲忠等所誤豈不深可恨哉奉旨罰俸御史董翼請啓聖祠增祀孔子皇祖防叔王父伯夏先生曰自叔梁紇以上宐特立一廟於闕里孟孫氏亦然顏路曾晳伯魚進於孔子之庭居四配上路之長也點之賢也鯉之趨庭也不妨各率其子以傳聖人之道十哲諸賢於顏曾多倍年之長於思孟皆私淑之列降之兩廡使不相壓一舉而父子長幼朋友之義順矣學宫啓聖祠當罷又曰禮葬從死者祭從生者孔子不王誠不當用天子禮樂不知以天子而祀孔子其禮樂豈可降乎在太學從天子在郡邑從諸侯翼出疏辯先生與之往復乃兩報罷光宗升袝議祧憲宗先生曰興獻帝非繼統之君不當入廟稱宗當祧祧憲宗非是并請復建文景泰年號廟號宗廟之禮庶幾無憾不聽廣寧之役先生請先問在內者之罪而後及於在外者其所列崔文昇盧受楊鎬李如楨皆黨人之所庇也焚㑹試錄於孝陵轉光祿寺添註寺丞未至陞尚寶司少卿又陞太僕寺添註少卿先生疏辭不允繼以告病囘籍或謂先生曰令甲無小臣辭官禮先生曰廉耻之在人不因小臣而奪也曰衆君子在位國事可爲何若是其恝耶先生曰進退之義不明而欲正君匡俗未之有聞四年起通政司右通政先生又辭曰世道之衰也士大夫不知禮義爲何物往往知進而不知退及其變也或以退爲進至於以退爲進而下之藏身愈巧上之持世愈無權舉天下貿貿焉奔走於聲利之塲於斯時也廟堂無眞才山林無姱節陸沈之禍何所底止臣方懼以前日之進故惴惴辭太僕之命何意前日之退轉成今日之進將敗壞世道實臣一人爲戎首時朝局已變逆閹明攬大政内批劉某藐視朝廷矯情厭世革職爲民追奪誥命鈎黨之禍蔓延天下楊忠烈漣左忠毅光斗魏忠節大中袁忠愍化中周忠毅朝瑞顧裕愍大章死詔獄先生作賦哀正直暴奸邪悲歌慷慨若旦暮從而遊者高忠憲聞之曰此何異公子無忌約賓客入秦軍乎杜門謝客此是正當道理彼欲殺我豈杜門所能免然卽死是盡道而死非立巖牆而死也大抵道理極平嘗有一毫逃死之心固害道有一毫求死之心亦害道想公於極痛憤時未之思也先生然之輟講遁跡而惠公世揚被逮招辭連染先生有詭行頗僻之劉某狠心辣手之黃某先忠端公諱語先生自分不免以子托之門人陳堯年緹騎入浙家人惶遽先生曰母恐寧今日而知有是乎旣而知其逮先忠端公也先忠端公至郡先生餞之蕭寺危言深論涕泣流連而别謂門人曰吾平生自謂於生死關打得過今利害當前此中怦怦欲動始知事心之功未可以依傍承當也思陵登極黨禁解先生出弔蒙難諸賢無錫則高忠憲吳門則周忠介順昌江陰則繆文貞昌期李忠毅仲達桐城則左忠毅吳江則周忠毅宗建姚江則先忠端公皆爲文哭之拂拭其棺塵而去楊忠烈周忠惠起元俱以瓣香告哀又請建五君子祠於西湖風厲浙人先忠端公與魏忠節忠節之子學洢生於浙周忠毅宦於浙高忠憲講學於浙也崇禎二年起順天府府尹上方綜核名實分別功罪羣臣救過不遑先生曰皇上具大有爲之資未有以二帝三王之道進之故使爲治不得其方於是矢責難之義而上言曰堯舜之道仁義而已矣出乎仁義則爲功利爲刑名其究也爲猜忌壅閉與亂同事以陛下勵精求治宵旰靡寧雖堯舜之憂勤弗切於此矣然程效太急不免見小利而速近功何以效唐虞之治乎夫今日所急急於近功者非兵事乎試得在事之臣以屯守爲上䇿簡卒節餉修其政刑而威信布之需之歲月未有不望風束甲者而陛下方銳意中興刻期以岀塞爲事當此三空四盡之日竭天下之力以奉饑軍而軍愈驕聚天下之軍以搏一戰而戰無日此計之左也夫今日所規規于小利者非理財之事乎陛下留心民寞惻然痌癏而輙以司農告匱一時所講求者皆掊尅聚歛之政正項之不足繼以雜派科罰之不足加以火耗水旱災傷一切不問其他條例紛紛大抵輾轉得之民手爲病甚於加賦以若所爲欲求國家有府庫之財不可得矣功利之見動而廟堂之上有不勝其煩苛者頃者陛下嚴賍吏之誅自宰執以下坐重典者十餘人輔臣劉鴻訓亦蒙嚴譴雖法在不赦臣猶爲揆地惜厰庫諸臣旣發覺其見在矣又勑問旣往積弊相仍事屬曖昧比而置之重典是謂不敎之誅從此深文巧詆習爲頑鈍無耻矯飾外貌以欺陛下亦豈能一一問之且陛下所以焦心勞思而不辭者正以未得賢人君子而用之也聖明天縱諸所擘畫動岀諸臣意表不免有自用之心臣下自以爲不及益務爲謹凛救過讒謟者因而間之猜忌之端遂從此起夫天下可以一人理乎恃一人之聰明而使臣下不得關其忠則陛下之耳目有時而壅矣慿一人之英斷而使諸大夫國人不得衷其是則陛下之意見有時而移矣方且爲內降爲留中不報又何以追喜起之盛乎然則兵陳而不戰財散而不私刑以不殺爲威求天下之賢人以自輔遂可以希法堯舜乎未也堯舜之道堯舜之學爲之也學之大者在執中數語陛下求治之心操之過急不免醖釀而爲功利功利之不已轉而爲刑名刑名之不已流而爲猜忌猜忌之不已積而爲壅蔽正人心之危所潛滋暗長而不自知者於焉黙證此心之岀於道者止此仁義之良而精以擇之一以守之則隨吾心所發自無過不及之差而中道在我矣中者天命之性仁義之極則也仁以育天下義以正天下自朝廷達於邊境舉而措之陛下已一日躋於堯舜矣上見疏不懌批爲迂闊未幾京師戒嚴先生曰吾守土官當以民生爲急請捐門稅以通煤米行保甲法以核奸細發内帑二萬金三分之一食餓者一賚守陴者一給戰士有妻子者出太倉米數千石平糴價遵化難民集京師日以千計議置之郊關先生曰民心一失何恃以守此京兆事無煩諸君過慮也分遣僚佐出城籍其姓名里業給驗以入分處蘭若無失所上自聞警不出視朝章奏皆留中不報中旨辦布囊八百宫奴競獻馬騾又勑大小臣工各進馬一疋先生曰是必有以遷幸邪說動皇上者吾守土官義當與城存亡乃詣午門叩頭奏曰國勢之强弱視人心之安否又必皇上自安其心而後上下之心始安臣請皇上岀御皇極門召見羣臣明言宗廟山陵在此固守之外無有它計一面批發章奏勿輕羣䇿俯伏待報自晨至暮中涓傳旨先生始退復造閣門揖輔臣曰皇上不視朝者二旬訛言繁興宗社臲卼宗周雖竭愚誠不足上悚主聽閣下可不力爲之所輔臣曰公且休矣走也得間圖之已而上收督師袁崇煥於詔獄大學士錢龍錫兵部尚書王洽戎政尚書李邦華工部尚書張鳳翔皆坐煥黨簿問復以他事杖殺郞署數人益疑羣臣謀國不忠廢督師以總兵滿桂爲總理統諸帥召白衣申甫授以副將軍又以奄人提督京營恊理城守一切刑賞皆亂先生諫曰今日第一宐開示誠心爲濟難之本日御便殿延見羣臣相對如家人父子以票擬歸閣臣以庶政歸部院以獻可替否付言官乃者聖謨淵遠悉取獨斷如軍旅重任必用文臣提督定制也今以不信文臣之故付之武臣之手而今使邊將以跋扈逃申甫以睚眦隙其他入援諸將大率視此則桂果能以寡取勝乎夫皇上今日所倚重者莫武臣若矣張鴻功侯世祿皆以援兵潰而與之以戴罪萬一滿桂失事又何以處之至是文武之途盡矣曰吾舍一二内臣無可同患難者於是降提恊之命稍試以城守而閫以外將次第委之乎自古未有宦官典兵不誤國者魚朝恩童貫千古烱鑑皇上幡然感悟以親內臣之心親外臣以重武臣之心重文臣則太平之業一舉而定也書御不報越二日桂甫以敗沒聞自上誅逆奄之後凡由逆奄而至大官者定爲逆案逆案之小人出奇計以翻案行間金數萬於外而後疆場之事起上亦不能無惑志首輔韓爌左都御史曹于汴侍郞胡世賞朱世守次第罷官動以東林爲口實先生言萬曆之季高攀龍講紫陽之學世以東林名卒搆逆璫之禍以死皇上首表遺忠攀龍巳爭光日月而近時言者猶指一二異已者推入攀龍之黨卽如李邦華之振刷朱世守之端方胡世賞之清謹在起廢中有用之才猥以時危見短識者方謂老成不可不惜而立異同之見者無不鼔掌稱快朝處一人焉坐之曰黨暮去一人焉坐之曰黨猶以爲未足特設四靣之網使天下之人不出於假道學則出於假事功不出於假忠義則岀於假氣節人主又安得有用賢之路乎留中滿桂旣敗上岀總兵馬世龍於獄爲總理召張鳳翼爲總督御史吳阿衡爲監軍鳳翼名雖總督不敢節制世龍而諸帥亦不受世龍節制未嘗接一戰先生劾之曰今所稱閫以外將將之任者非張鳳翼乎鳳翼依附奄人朝廷不難以高爵厚祿起之田閒而鳳翼輙曰事在總理朝廷亦何利有此尚方付之坐觀之手乎以馬世龍之總理無能也皇上任之不疑舉朝遂無敢異同者閣部孫承宗亦倡爲不必用文臣之說以佞之御史吳阿衡則監世龍軍者也受命之日與世龍八拜定交通國之人駭之由是而白簡不聞其風采猶足觀乎進而求之廟堂之上諌官不論事中樞不集思宰相不運籌可謂禁中有頗牧乎京師解嚴先生乃進祈天永命之說從前所以治天下者不可不更也曰臣聞皇天無親惟德是輔皇天無德惟好生是德故人主代天而理天下也苟法天心務以元氣長養成就天下而督責朘削之私不設焉法天之大者莫過於重民命則刑罰宐省宐平陛不即位以來勵精振刷不免以重典繩臣下逆黨有誅封疆失事有誅又因及一切詿誤者重者以杖死輕者以謫去紛紛狼籍朝署中半染赭衣而最傷國體者無如詔獄一事卽邇者易應昌之以囘奏獲罪也亦處之以詔獄應昌之罪坐越獄一案過於平反夫以平反爲欺罔則必以鍜鍊爲忠直蒼鷹乳虎之輩接踵於天下矣臣願陛下體上天好生之心首除詔獄自今臣下有罪一槩下法司處分寛應昌以開天下平反之路則祈天永命之一道也法天之大者莫過於厚民生則賦斂宐緩宐輕陛下卽位以來軍興告匱不免以重斂責小民宿逋旣誅見征必盡又督及來年之預征有司有逮司道有罰節節追呼閭閻中旣已不勝繹騷而最爲民厲者無如貪官汚吏卽邇者御史蘇琰之按貴州也一旦以輜重被訐於監司夫以廵方而黷貨又何問下吏之操守釡魚甑塵之風空谷於天下矣臣願陛下體上天好生之心首除新餉俟賦役全書旣定以節省之物力抵之而有餘勘蘓琰贓証示天下以撫字之倡則祈天永命之又一道也雖然陛下天之宗子而輔臣則宗子之家相也尤願閣臣體一人好生之心勿驅除異巳搆朝士以大獄終國家朋黨之禍勿寵利居功阿人主以富强釀天下土崩之勢則所以終奏此祈天永命者相臣實與有責焉周延儒溫體仁方窺伺上意新得相位見而惡之以先生禱旱稱疾激上怒上詰曰除新餉省物力朕所深願但軍興急需何法措應劉宗周必有便計卽明白奏來先生言遼東一鎭原設之兵儘足以固圉遼東一鎭原設之餉儘足以養兵新兵新餉安所用之乎更令沿邊州縣三輔之地各選土兵酌州縣衝僻自三百名以上至千名量給口糧器械以時訓練有事而爲兵備餉之額無事而歸農懸餉之額秋冬而講武備兵之賞春夏而務農懸兵之賞卽不能盡廢新餉又何取於五百餘萬之多臣近於順天一府賦役清出冗員冗役冗費等項約至一萬六千餘金已足凖續派雜項一萬二千三百而有餘推之天下亦猶是也清賦之法清其賦之隱於民者什一清其賦之耗於官者什九清役之法清其役之冒於舊者什一清其役之冒於新者什九而尤在進求之廟堂之上陛下躬修聖德於上而天下化之士大夫孰爲競刀錐者自古未有民貧而君獨富尢未有人心豫附中國乂安而四方不從之賓服者上復以爲迂濶上意在功利先生封章多扞格不入遂請告旨許囘籍先生之治京兆也風裁孤峻其遇豪貴不啻利刃之齒腐朽毎坐堂皇奄人闖入言事先生不應或出語相詬誶先生若爲不聞也者治事自如奄人計塞反笑而謝曰公執抝人吾固知其如是也武清伯奴子與諸生爭道諸生受毆投牒先生使吏入武清家捕之武清及門言狀先生拒不見曰奴辱士而主擁護之是罪在主吾將上告天子武清知不可但已别遣一奴先生心識其僞也令其自理爭道之由奴不能答叱之去乃撲前吏而推捕益急始出之捶撲數十何校武清門外先生厲禁倡優輦轂之下優人服飾有千金以上者一日先生出籠篋纍纍不及避停車何問曰此司禮太監樂器先生曰于禁者卽公侯不汝貸也况宫奴乎焚之通衢單丁下戸則緩其銜轡周其情隱雖兵革匡勷皆有恃而不恐先生出門都人罷市而哭八年温體仁久居政地導上以繁刑厚斂海内盗起臺諌攻之甚力體仁不自安杜門求退上念置相不得其人進大小九卿詹翰於廷親試之復命吏部推在籍堪仕者太宰以孫愼行林釬及先生上上降詔召三臣入長吏催促上道尋擢文文肅震孟直閣起用黃漳浦道周上意頗欲更始而體仁乃大懼亟稱疾愈入直明年正月召對於文華殿孫文介病卒先生與林釬俱入上問曰方今人才匱乏糧餉不敷流㓂猖獗二臣可奏來釬爲支吾之語以逢上先生對曰天下原未嘗乏才自足以供一代之用止因皇上求治太急用法太嚴布令太煩進退天下士太輕遂使在事諸臣相率以畏罪飾非爲事不肯盡心職業所以有人而無人之用有餉而無餉之用有將而不能治兵有兵而不能殺賊臣愚謂今日一一改前日之所爲天下方有太平之望流㓂本朝廷赤子若能撫之有道則㓂還爲吾民今日急務當以收拾人心爲本欲收拾人心當先寛有司之叅罰小民困於加派猶可言轉困於有司叅罰不可言葢叅罰重則吏治壞吏治壞則民生不得其所以致盗賊日起詩云廢爲盗賊莫知其繇臣竊痛之上又問兵事如何處置先生對曰臣聞禦外亦以治內爲本內治旣修則遠人自服帝舜之時苗頑逆命益贊於禹日滿招損謙受益惟德動天無遠勿届卒以干羽舞兩階而有苗格臣願皇上以堯舜之心行堯舜之政則天下太平對畢趨出上顧温體仁曰迂哉宗周之言也兩杖相撞釁鼓輿尸之際于此時而說于羽兩階耶傳旨林釪入閣劉宗周别用陞工部左侍郞先生上封事曰皇上卽位之初銳意太平直欲躋一世而唐虞三代之甚盛心也至於二帝三王所以治天下之道猶未暇一一講求致施爲次第之間多有未得其要領者於是首屬意於出塞而壬人銳口承當已已之役謀國無良朝廷始有積輕士大夫之心自此耳目叅於近侍腹心寄於干城治術劣以刑名政體歸之叢脞天下事遂日底於壞而不可救故自厰衞司機務而告訐之風熾自詔獄及士紳而堂簾之等夷自人人救過不給而欺罔之習轉盛自事事仰成獨斷而諂䛕之風日長自三尺法不伸於司㓂而犯者日衆自詔旨雜治五刑歲躬斷獄以數千計而好生之德意冺自刀筆治絲綸而王言䙝自誅求及瑣屑而政體傷自叅罰在錢糧而官愈貪吏愈橫賦愈逋自𫾣撲繁而民生瘁自嚴刑重斂交困天下而盗賊蜂起自總理任而臣下之功能薄自監紀遣而封疆之責任輕自督撫無權而將日懦自武弁廢法而兵日驕自將懦兵驕而朝廷之威令并窮於督撫自朝廷勒限盡賊而行間日殺良報級以幸無罪使生靈益歸塗炭事亟矣天牖聖衷一旦撤總監之任重守令之選下弓旌之檄收酷吏之威維新之政次第舉行方與二三臣工洗心滌慮以聨泰交而不意君臣相遇之難也得一文震孟之賢而以單辭報罷使大臣失和衷之誼得一陳子壯之忠而又以過戅坐辜使朝宁無吁咈之風此其所關於國體人心又有非淺鮮者夫皇上所恃以治天下者法也而非所以法者也所以法者則道也如以道則必首體上天生物之心以敬天而不徒倚用風雷則必重念祖宗鑑古之統以率祖而不至輕言改作則必法堯舜之恭已無爲以簡要出政令法堯舜之舍巳從人以寛大養人才法堯舜之從欲而治以忠厚培國脉并法三王之發政施仁亟議拊循以收天下泮渙之人心而且還內廷以掃除之役杜後世宦官之釁正懦帥以失律之誅杜後世藩鎭之釁愼宗賢以改職之途杜後世宗藩之釁除此三大釁而國家苞桑之業已在世世今之所以日勤聖慮者亦何有哉皇上但下尺一之詔痛言前日所以致賊之繇與今日不忍輕棄斯民之意遣廷臣賫內帑廵行郡國爲招撫使以招其無罪而流亡者陳師險隘堅壁清野聽其窮而自解來歸誅渠之外猶可不殺一人不損一矢而畢此役自此四海知中國有聖人將聞風慕義之恐後又奚煩於觀兵哉此聖人以道治天下之明効也然有天德而後可以語王道其要在於愼獨故聖人之道非事事而求之也臣願皇上視朝之暇時近儒臣聽政之餘益披經史日講求二帝三王之學求其獨體而愼之則中和位育庶幾不遠於此而得之上覽之大怒命文書官口傳重擬次輔錢士升票擬以進上猶謂其輕也發改票温體仁從重票擬上之每票擬至御前上手先生之疏必繙閱數過起行數匝久之而意解難曰劉宗周素有清名召來亦多直言但大臣論事須體國度時不當效小臣圖占地歩盡咎朝廷如流㓂静聽其窮中原豈堪盤據烽火照於甘泉虗文何以撑拄若封疆甘心棄置貪欺一任所爲宋無三釁終困外國可爲前鑑堯舜事業詎不願慕無乃士風又不及宋總理未任之前有何功能表見以後還宐虗心酌慮母自誤以誤國家先生復言堯舜之所以爲聖者致謹於人心道心之辨求其所謂中者而執之由是以之官人而知人則哲以之治天下而安民則惠皇上已具堯舜之心矣惟是人心道心不能無倚伏之機出於人心而過不及之端授之政事之地卽求治而過不免害治者有之乃時時而提醒之曰得無與亂同事歟又時時而謹凛之卽此一念謹凛爲道心之主爲精一爲執中皇上已一日而堯舜矣皇上但心堯舜之心以撫民不患㓂之不還爲吾民也皇上但心堯舜之心以蒞中國不患四方之不歸我戎索也葢天下之治從本原執要則事不勞而功集自敎化推行則神不役而智周惟皇上深致意焉工作繁與度支告匱上命諸臣捐助温體仁與勲臣朱純臣爲倡又議罷明年朝覲聽其進奉先生諌曰臣聞爲人臣者竭股肱之力濟之以忠貞不聞其出於利也國步囏難孰爲匪躬自効者而瑣瑣進奉何當報稱乃時奉急公之旨此臣所謂利也且夫輯瑞何典而議以捐助罷儻遂行之辱國滋甚上不恱然上意欲大用先生㑹推閣員廷臣一再推俱不及上皆置之三推始以姓名上上將點用而温體仁大懼募㑹稽人許瑚上疏謂先生才諝不足道學有餘上疑瑚同邑知之心眞乃已體仁益修黨人之隙舉動決裂先生三疏請告上允之行至德州念上欲求治而爲體仁所蔽荷上殊絕之知潔身去國所不忍也復上疏曰臣惟皇上勤心遠略夙興夜寐而邦畿震蕩禍至於此臣以爲非一朝一夕之故也往者已已之變坐誤國者袁崇煥一人其他爲法受惡耳有小人者競起而假手於門戸舉朝士之異已者槩坐以煥黨次第置之重典自此小人進而君子退中官用事而外廷浸疎於人主則今日之禍實已已以來釀成之也且夫以丁魁楚等之失事於邊也而與之以戴罪何以服劉䇿之死張鳳翼之溺職中樞也而與之以專征何以服王治之死諸鎭廵勤王之師爭先入衛者幾何人而不聞以逗留蒙詰責何以服耿如杞之死今也幸以二州八縣結一捲土之局則朝臣之纍纍若若可幸無罪者又何以謝韓爌張鳳翔李邦華諸臣之或戍或去豈昔之小人一一爲異已驅除者今不難以同已互相容與乎臣於是而知小人之禍人國無已時也語曰大奸似忠大佞似信頻年以來皇上惡私交而臣下多以告訐進皇上錄淸節而臣下多以曲謹容皇上崇勵精而臣下奔走承順以爲恭皇上尙綜竅而臣下吹求瑣屑以示察凡若此者正似忠似信之類窺其用心無往不岀於身家利祿皇上往往不察而用之則聚天下之小人立於朝而皇上亦有所不覺人才之不兢也非無才之患而無君子之患也今天下卽稱乏才亦何至盡出一二寺人下而皇上毎當緩急之際必倚以大任此在前日已成覆轍方亟亟更絃之不暇乃者三協有遣通津臨德復有遣又重其體統等之總督中官總督將置總督於何地總督無權將置撫按於何地撫按無權將逓置司道守令於何地是率天下而奔走於中官也於疆事必無幸矣且小人與中官氣誼一類毎相爲引重而君子獨岸然有以自異故天下有比中官之小人必無合於君子之小人有用小人之君子終無黨比中官之君子皇上誠欲進君子退小人爲今日決消長理亂之機奈何復用中官以叅之此明示天下以左右袒也當是時有明於治理如御史金光辰者起而爭之亦天下之昌言也卽不遽用其言亦何至并逐其人而光辰遂以言見逐若惟恐傷中官之心者非所以示天下也至於近日刑政之最舛者成德傲吏也而以贓戍何以肅懲貪之令申紹芳十餘年監司也而以莫須有之鑽刺戍何以昭抑競之典鄭鄤雖久干鄕議而杖母之獄欲以無告坐何以示敦倫之化此數事皆爲故輔文震孟引繩披根卽向者驅除異已之故智廷臣無敢言者皇上亦無從而知之嗚呼八年之間誰秉國成而至於是臣不能爲首輔温體仁解矣詩云誰生厲階至今爲梗體仁之謂也仰惟皇上念亂圖存首以進君子退小人爲挽囘世道之根本亟罷三協通津之使責成中外諸臣各修職業不以人國爲僥倖則宗社生靈實式慿之而體仁所以爲桑榆之收者庶幾在此乎内批邊臣一味欺蒙遇警輒至疎虞特遣監守查飭夫豈得巳金光辰姑從輕處乃謂恐傷中官之心是爲何語已已諸臣各有罪案此番失事正在議處有何異同黨比成德等貪酷鑽刺壞法滅倫反指爲刑政之舛牽捏首輔尤屬不倫劉宗周明係比私亂政顚倒是非姑著革職爲民十四年起吏部左侍郞上知先生而温體仁害之體仁去後薛國觀傳其衣鉢國觀以罪死上念先生者久之適㑹推少宰上意不屬臨朝而歎謂大臣如劉宗周清正敢言廷臣莫能及也罷朝遣文書官傳諭吏部而用之再疏請告上不可先生以爲天下治亂決不能舍道而别有手援之法一渉功利皆爲苟且上書明之其一曰明聖學以端治本臣聞天下無無本之治本一端而萬化岀焉人主之心是也虞廷之訓曰人心惟危道心惟微惟精惟一允執厥中此萬世心學之源也臣請陛下求之吾心當其清明在躬獨知之地炯然而不昧者得好惡相近之幾此正所謂道心也致此之知卽是惟精誠此之知卽是惟一精且一則中矣隨吾喜怒哀樂之所發無往非未發之中而中其節矣此愼獨之說也葢上聖猶是此人心下愚不能無道心故雖聖如堯舜卒不廢精一執中之說以此後之學聖人者亦曰愼獨而已矣二曰躬聖學以建治効臣聞天下大矣而以一人理非徒以一人理天下也故曰君職要臣職詳陛下留心治道事事躬親羣臣奔走受成之不暇益相與觀望爲自全之計致一人孤立於上而莫之與豈非知人之道未之或講與仰惟陛下躬親聖學法堯舜之明目達聰而推本於舍已亟舍其聰明而歸之闇非獨舍聰明并舍喜怒舍好惡舍是非至於是非可舍而後以天下之是非爲眞是非斯以天下之聰明爲大聰明廣開言路合衆論之同建用中之極卽讒說殄行亦不至震驚朕師自此陛下端拱無爲而天下治矣三曰崇聖學以需治化天春生萬物而秋以肅之莫非生也王者以仁育天下而義以正之莫非仁也必也求端於聖學以明德化天下乎化天下自朝廷始請自今百僚有犯一切下之法司永除詔獄不至以非刑辱士至廷杖一節原非祖宗故事願與厰衞一體並罷還天下以禮義廉耻之坊由是化羣臣以化兆民乗此中原殘破之餘亟議撫循之法特遣才望大臣宣示德意一面經略農田悉捐天下勦餉金錢改爲牛種廬舍之資聽有司設法招徠聨以保甲進以鄉約仍罷天下督師等官明示與民休息而專責兵事於廵撫陛下但躬修明德於上坐收干羽之化可矣上終以爲迂闊不能施用也先生未至又陞都察院左都御史十五年冬召對於文華殿面辭不允上問都察院職掌安在先生對曰都察院之職在於正已以正百僚必其存諸中者上可以對君父下可以質天下士大夫而後百僚則而象之大臣法小臣廉紀綱振肅職掌庶在是乎由是而求之諸御史端不乏上行下效之機而責成廵方其首務也廵方得人則吏治清吏治清則民生安於以化成天下不難矣上曰卿力行以副朕命先生又辭上曰已有旨了乃謝恩退而列風紀六事以上一曰建道揆請復京師首善書院崇祀馮從吾爲瞽宗昭聖明興道致治之意復天下社學選明德老成者爲之師聚里中彥士敎之一曰貞法守自今一切輕重獄詞聽三法司聽斷不得下詔獄其有不公不法五城御史覺察之廉其情罪之重送刑部究擬一曰崇國體自今著令大臣三品而上有犯罪者先行九卿科道㑹議議詳乃付司㓂司㓂議定坐殊死者始收繫其他卽以其罪行遣一曰清伏奸自今朝紳交結近侍蹤跡顯著者立置典刑此外大小臣僚或借事呈身或假途干進因而勑類斜封官同傳奉者臣衙門以白簡從事一曰懲官邪官之失德由寵賂始其途多自臺省而上自今有輦金入長安者臣單辭檄之立置三尺一曰飭吏治察吏之責專在廵方天下事事宐歸惇大獨於風憲受賍之律毫不可骫且亟罷減俸行取之例行久任之法上雖可之亦不能盡行也御史王孫蕃劾奄人劉元斌縱兵捜牢疏未下而元斌辯入上知爲司禮秉筆奄人王裕民所漏也并下裕民三法司雜治之尋改刑部徐石麒以侍郞署事擬裕民戍仍列院寺姓名於疏上怒三法司故縱召入面詰之先生趨朝而石麒始出爰書入對上首傳先生責以擬律不當先生對曰此事非臣鞫問不敢妄奏上益怒其讕委先生對曰前下法司臣未受事後改刑部臣不得與聞然閱石麒具案已曲盡情事上乃霽顏曰此奴錢神有靈辟如百足之蟲至死不僵先生對曰司㓂所執者三尺法耳法如是而止石麒非有意貸裕民也上曰裕民欺㒺實甚卿等不知耳先生對曰就事論事裕民之罪止於是若內廷有隱微之奸自有聖斷在非臣等所知也越日裕民棄市已又京師戒嚴先生言皇上以一心爲天地神人之主必鎭静以立本而無失之張皇安詳以應變而無失之造次此匡濟時艱第一義也至於施行急務旌血戰死綏之盧象昇以作天下忠義之氣追戮誤國奸臣楊嗣昌以謝九廟之靈逮跋扈悍將左良玉以肅軍紀防關以備反攻防潞以備透渡防通津臨德以備南下上曰責重朕心亦是但旌盧象昇追戮楊嗣昌何遽能退敵乎周延儒之再相也起用正人一反其曩日妒賢嫉能之政而君子亦遂喜其附已深相結納乃獨不能得之於先生毎朝畢士大夫多與延儒接迹屏語先生魁然孤峙士大夫皆慚而止會考選推知多以賑濟建城防河諸名色減俸行取郞署有自行陳乞者皆通賄於延儒先生言禮義廉耻士君子居身之本係焉有廉耻而後有功名有功名而後有事業今不難呈身如彼速化如此一身之廉耻旣不恤又奚有異日立殿廷爭可否其爲植黨營私欺君罔上有必至者延儒不悅授意於兵部尚書張公國維令以邊才錄用其私人國維薦某某等皆知兵請上考定次第太宰鄭公三俊曰考選者部院之事皇上且不得專况樞部乎上疏明職掌宐俟部院考後再請面裁否則爲侵官上怒召吏部都察院出其疏詰之曰大權者人主所自岀朕欲親考諸臣何謂侵官三俊對曰考選之屬部院祖宗舊制也上意未解先生奏曰冡臣之意欲俟部院考後别其居官之稱否品行之純疵議定進之於皇上皇上再廷試而授之官在朝廷固爲總攬大權而在臣等亦得盡職掌若止就面對衡量則一時之語言不足盡終身之梗槩往往有論列明而其人傾邪者有論列庸而其人樸實者以言取人失之宰子皇上何以定其流品乎乞從宰臣請幸甚上不可宣旨召候考官時敏等十二員對畢先生又奏曰聆諸臣奏對岀於勦說居多終祈皇上發臣等再考上默然已俱授兵科給事中中書王育民爲絳州知州孫順行賄先生自劾曰臣忝列風紀此曹不難爲非義之千實臣生平不足取信於人所致大負皇上任使乞賜罷斥上革孫順王育民職法司提問先生又申飭憲綱上讀至言及乗輿則天子改容意不懌先是㑹推閣員一時聲名之士多與焉小人忌之爲無名子書粘之殿壁以當路二十四人分配二十四氣上亦遂疑㑹推之事此二十四人中有把持其間者戍吏部尚書李長庚罷左都御史王道直至是上戒臺省代人規卸爲人出缺給事中姜埰上言皇上何所聞而云然此奸人工爲蜚語以中君子卽二十四氣之故智也然事故非無據者上怒其黨比行人司副熊開元奏劾周廷儒於上前請避左右上許之而延儒獨留開元請并避延儒上曰卽所言機密輔臣豈得不與開元乃奏延儒不足當國狀然延儒在旁開元故氣奪而辭蹇退而𥙷疏又漏奪失次上怒其陰陽反覆乃下姜埰熊開元於詔獄先生曰皇上方開弘政門求直言一日而逮二言官非所以昭聖德也九卿當公疏救之鄭太宰以下皆唯唯閏十一月已未召對羣臣皆候於廷相傳有宻旨授錦衣衞官賜姜埰熊開元死先生曰爵人於朝刑人於市古今通義也惡得私斃諫臣與今日宐空署爭之必得改發司㓂而後已否則何顏立交㦸之下耶衆亦唯唯上御中左門御史楊若僑薦西人湯若望善火器請上召試先生奏曰御史之言非也臣聞用兵之道太上湯武之仁義其次桓文之節制下此非所論矣邇來邊臣於安攘禦侮之䇿戰守屯戍之法槩置不講恃火器爲司命今破城陷邑豈無火器而然哉我用之以制人人得之亦可以制我不見河間反爲火器所破乎先臣戚繼光在塞上謹烽燧嚴斥堠軍法修舉數十年無窺邊者未嘗專恃火器不恃人而恃器國威所以愈頓也湯若望唱邪說以亂大道已不容於堯舜之世今又作爲奇巧以惑君心其罪愈無可逭乞皇上放還本國永絕異敎上曰火器乃中國長技湯若望不過命其監制何必深求若仁義節制之說亦是先生又奏曰火器終無益於成敗之數國家大計當以法紀爲主法紀修則人心肅人心肅則閫外用命如大帥之跋扈援師之逗留實王法所不容如何反從姑息而爲此紛紛無益之舉乎上曰正召卿等議此耳先生奏曰罪有輕重罰有大小今日當先按罪之重者以及其餘叛帥家屬寄居京師彼此潛通禍出叵測乞呈上早正典刑以肅國憲此臣所謂修法紀之大端也上曰朕亦知之姑議督撫去留可也先生對曰如議督撫去留請自督師范志完始志完身督寧薊關門三協皆其責任平時旣忽邊防聽其闌入今又借援南下爲脫卸計從此關門無阻決裂至此志完當首議處分上曰范志完自不能辭咎但入援乃奉旨而行何云脫卸先生對曰十五年來皇上處分未當致有今日敗局乃不追原禍始更絃易轍欲以一切苟且之政補目前罅漏非長治之道也上變色曰從前已不可追今日事後之圖安在先生對曰今日第一義在皇上開誠布公先豁疑關公天下爲好惡合國人爲用舍慨然引爲皇極主於是進賢才以資治理開言路以決壅閉次第與天下更始宗社幸甚上曰目下烽火逼甸如何堵截且國家敗壞巳極如何整頓先生對曰武備必先練兵練兵必先選將選將必先擇賢督撫欲擇賢督撫必先吏兵二部得其人二部得人則庶司莫不稱職而於以制禦邊鄙不難矣然有要焉宋臣有言曰文官不愛錢武官不惜死則天下大平斯言誠今日鍼砭也近來持論者但論才望不論操守不知天下眞才望出於天下眞操守自古未有操守不謹而遇事敢前者亦未有操守不謹而軍士畏威者若徒以議論之捷給舉動之恢張稱曰才望以之取爵位則有餘以之責事功則不足究何益於成敗之數哉上曰濟變之日先才而後守先生對曰正以前人敗壞皆由貪縱使然故以濟變言愈宐先守後才上曰大將别有才局非徒操守可望成功先生對曰他不具論如范志完操守不謹上自大將下至偏裨凡補一官授一職無不得賄數百金所以三軍解體士卒莫肎用命由此觀之豈不信以操守爲主乎上色解曰知道了勑先生起時太宰以病註籍戸部尚書傳淑訓申救姜埰熊開元不能力上拒不納禮部以下無言者先生出班奏曰皇上方下詔求言而二臣遽以言得罪甚有傷於聖政國朝無言官下詔獄者有之自二臣始甚有傷於國體皇上度量卓越如臣宗周累多狂妄幸寛鈇鑕又如詞臣黃道周亦以戅直宥鑒聖明復其原職臣等何幸而蒙皇上使過之典二臣何不幸而不邀皇上法外之恩伏乞聖慈少視同仁上曰黄道周有學有守豈二臣可比先生對曰二臣學守誠不及道周然朝廷待言官有體其言可用則用之不可用則置之卽有應得之罪亦當勑下法司原情定罪遽下詔獄終於國體有傷上怒曰三法司錦衣衞皆朝廷刑官何公何私且朕處一二言官如何遂傷國體假有貪賍壞法欺君罔上俱不可問乎先生對曰掌衞刑者多膏粱子弟未必讀書知禮義者也毎聽寺人之役使勢不容於不私矣卽皇上欲問貪賍壞法欺君罔上者亦不可不付之法司也上大怒曰如此偏黨豈堪憲職候旨處分先生謝罪文武班行各申救上曰開元疏必有主使疑卽宗周僉都御史金光辰奏曰宗周賦性確直與開元並無交與實從君德起見請皇上勿疑且其振揚風紀整飭朝常百僚中所不易得終祈寛宥上曰金光辰也聽議處先生出待罪朝房內降劉宗周愎抝偏迂朕累優容念其新任望之更改今乃藐抗徇私大負委任本當重處輔臣奏其年老姑著革了職金光辰奏對尤屬恣肆姑從輕降三級調外用上雖怒先生亦遂不敢置姜埰熊開元於死而發刑部擬罪部擬不具招上益震怒杖埰開元各百刑部尚書徐石麒奪官先生以未解嚴不忍恝然竟去出止門外之僧舍士大夫問學者交錯於途時李忠文邦華代先生而未至鄭太宰上疏留先生計吏先生遂行其冬東陽亂浙之在朝者公疏請練郷勇浙西徐石麒主之副以在籍監司錢繼登浙東先生主之副以在籍給事中姜應甲制曰可男黃百家校子劉子行狀下北變聞先生徒跣慟哭謂諸生曰旣不能戮力圖君以至於此又不能身先討賊可斬我頭謝先帝君等各守所學無交臂事賊也諸生進曰先生負天下之望一死不足以塞責縞素發䘮檄召四方復君父之讐定社稷之難此今日事也先生乃曰諸生責宗周是也身雖老尚當先驅効死遂荷戈出從者數千人守道王鄘噤不能發一語先生曰此不足與謀乃至行省語廵撫黃鳴俊一面發䘮一面整旅北進鳴俊請少鎭静以安人心先生勃然變色曰君父變岀非常公專閫外義當枕戈泣血以激同讐乃反藉口安民作遜避之計豈忠臣烈士所扼腕而望公者哉鳴俊慚而退明日士民洶洶聚先生所不散鳴俊來先生指而示之曰羣情如此公不欲安人心則已誠欲安人心亦莫若發䘮岀師也鳴俊曰故事發䘮必待哀詔先生曰嘻此言其嘗也今日頒詔者何人安所得哀詔乎夫禮有嘗有變九廟震驚社稷淪䘮臣子無食稻衣錦之理公卽疑凶問亦當行哭廟禮鳴俊不得已從之於五月甲午行禮佑聖觀先生尺布裹頭伏地而號官吏士民和者數萬聲震屋瓦先生問師期鳴俊以甲仗未備對先生曰出師而後甲仗從之向者語公以勤王而不應今再爲觀望計吾儕蹈東海而死耳鳴俊唯唯而使其客以封守言先生太息曰封守者君父之封守君父狥國欲守此千里提封屬之誰氏而吾儕又爲誰氏之民乎先生度鳴俊不能用乃與章公正宸熊公汝霖朱公大典召募義旅將出而福王監國之詔至先生乃解初有說先生入南中定䇿者先生曰在我有赴難討賊而已餘非所知詔起原官先生言一旦遘此鞠凶臣卽不致死於賊亦當歸死司敗席藁以待上批卿忠直清正朕從藩邸知之今憂患相倚無以難進爲辭先生上言今日宗社大計舍討賊復讐無以表陛下渡江之心而苟非陛下毅然決䇿親征亦何以作天下忠臣義士之氣至討賊之次第一曰據形勝以規進取江左非偏安之業請進圖江北鳳陽號稱中都東扼徐淮北控豫州西顧荆襄而南去金陵不遠則請以駐親征之師大小銓除暫稱行在少存臣子負罪引慝之心從此漸進秦晉燕齊必有響應而起者一曰重藩屏以資彈壓淮揚數百里間設有兩節鉞不能禦亂卒南下路振飛坐守淮城久以家屬浮舟遠地是偈之逃也於是鎭臣劉澤淸高傑遂相率有家屬寄江南之說軍法臨陳脫逃者斬臣謂一撫二鎭皆可斬也請自今重撫臣事權以彈壓鎭臣且不多設督臣以滋掣肘一曰愼爵賞以肅軍情請分别各帥封賞孰應孰濫輕則收侯爵重則奪伯爵夫以左帥之恢復而封高劉之敗逃而亦封又誰爲不封者武臣旣封文臣隨之外臣旣封中璫隨之恐天下聞而解體也一曰核舊官以立臣紀燕京旣破有受僞官而叛者有受僞官而逃者有在封守而逃者有奉使命而逃者法皆不赦亟宐分別定罪爲憲將來至於僞命南下徘徊順逆之間實繁有徒必且倡爲曲說以惑人心尤宐誅絕又言賊入秦流晉漸過畿南遠近洶洶獨大江南北晏然而二三督撫不聞遣一騎以壯聲援賊遂得長驅犯闕坐視君父之危亡而不救則封疆諸臣之坐誅者一凶問已確諸臣奮戈而起決一戰以贖前愆又當不俟朝食方且仰聲息於南中爭言固圉之䇿卸兵權於閫外首圖定䇿之功則封疆諸臣之坐誅者又一新朝旣立之後謂且不俟終日首遣北伐之師不然而亟馳一介使間道北進檄燕中之父老起塞上之名王哭九廟措梓宮訪諸王萬無容自諉者更不然而起閩帥鄭芝龍以海師下直沽九邊督鎭合謀急擊事或可幾而諸臣計不出此則舉朝謀國不忠之坐誅者又一罪廢諸臣量從昭雪自應援先帝遺詔及之今乃槩用新恩誅奄定案前後詔書鶻突勢必彪虎之類盡從平反而後已則舉朝謀國不忠之坐誅者又一臣爲今日問罪之師當自中外諸臣不職者始上答曰親統六師光復舊物嚴文武恇怯之大法激臣子忠義之良心愼新爵核舊官朕拜昌言宣付史館弘光帝之立也羣臣意多不屬中樞史公可法以七不可寓書於總督馬士英七不可者言其好色好酒好貨不孝不讀書侵有司近匪人也士英與其客阮大鋮楊文騘謀之大鋮則入而交關于誠意伯劉孔昭吏科李沾以爲內主文騘則出而迎弘光于淮上史公儒緩未定議而四鎭之納弘光者已至江上錯愕迎拜旣登極士英乃以鳳陽總督印印前書宣示中外史公内不自安以政府讓士英而出太宰張公愼言起用吳甡鄭三俊孔昭以爲急黨人緩定䇿遂廷叱之召阮大鋮陛見用奄人治兵調食修援立之報日不暇給方利思陵之禍凡言討賊者詘之先生連疏請告不得遂言天道有陰陽而人事應之其象爲君子小人君子小人之進退則否泰之理也方陛下之龍飛淮甸也天實與之人曷故焉乃有護蹕微勞入內閣晉中樞宮衘世蔭晏然當之不疑者非馬士英乎于是李沾侈言定䇿挑激廷臣矣劉孔昭又以功賞不均發憤冡臣朝端譁然聚訟矣而羣陰且翩翩起矣借知兵之名則逆案可以然灰寛反正之路則逃臣可以汲引而閣部諸臣且次第言去矣中朝之黨論方興何暇圖河北之賊立國之本計已疎何以言匡攘之略高傑一逃將也而奉若驕子浸浸有尾大之憂淮揚失事至不難遣撫臣道臣以謝過安得不長其桀驁則亦恃士英之卯翼也劉黃諸將各有舊信而置若奕棋洶洶爲連雞之勢至分割江北四鎭以慰之安得不競啓其雄心則皆高傑一人有以倡之京營一旅自祖宗以來皆勲臣爲政樞貳佐之陛下立國伊始正可講求祖制而不意又有內臣盧九德之命則士英有不得辭其責者總之兵戈盗賊皆從小人氣類感召而生而小人與奄宦又往往相爲表裏自古未有奄宦用事而閫臣能樹功於方域者惟陛下首辨陰陽消長之幾岀士英仍督鳳陽聯絡諸鎭決用兵之䇿史可法卽不還中樞亦可自淮而北歷河以南别開募府與士英相犄角京營提督獨斷寢之書之史册允爲弘光第一美政宗社幸甚上報曰卿忠言讜論朕所樂聞至于文武將相未盡調劑宮府表裏皆出權宐卿風憲老成望其速入面諮大政當是時奸人雖不利先生然耻其不能致先生以爲天下笑反急先生之一出于是馬士英言先生負海內重名自稱草莾孤臣不書新命明示不臣天子也奸人朱統􅠳言先生請移蹕鳳陽葢謂鳳陽高墻之所欲以罪宗處皇上而與史可法擁立潞王其兵已伏丹陽所當急備四鎭皆言先生欲行定䇿之誅意在廢立先生在丹陽高傑劉澤清遣刺客數軰往先生危坐僧舍終日無惰容刺客亦心折不敢犯天下之惡名皆去不知所之黄鳴俊入覲其兵抵京口與防江兵角殺士英一聞浙兵則以統􅠳之言爲信亦震恐上傳云昔漢宣起于艱難丙魏合志唐肅興于靈武李郭同心今若袒分左右口搆玄黃天下事不堪再壞諸臣各宐和衷集事息競圖功庶幾君臣之間禮全終始先生不得已受命上言董仲舒曰正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方臣願陛下先求之正心之地心正而朝廷從之百官則而象之其爲風紀之地肅如也是故內閣而干六部之事任爲專權六部而承内閣之風㫖爲亂政臺省而依附閣部爲値黨介胄而與議朝政爲要君外官而通賄朝士爲作奸各衙門而交結近侍爲罔上行私臣院皆得過而問之臺省諫厰衞給事中袁彭年謫外先生言厰衞設而宦官從此用事矣宦官用事而外廷因緣爲奸矣言路阻而宵人得志徑竇開而賄賂公行輦轂之下廢官充斥長此不已紹述魏崔之政養成彪虎之奸宗社之禍所不忍言尋以阮大鋮爲兵部右侍郞先生諫曰國家莫大于邪正消長之辨而才次之大鋮而才臣慮其爲黨邪害正之才病世道而有餘其進其退江左之興衰繫焉上批大鋮進退繫江左安危是否確論先生又再疏請告予馳驛歸先生去國無不唏噓感歎老校廬兒亦相聚而語知南都之不能久立也其後左良玉移檄亦以不聽先生罪士英從民望也弘光元年五月南都亡先生語守道于頴爲戰守計不應六月丙寅十五日先生聞浙省降方食推案慟哭曰此余正命之時也遂不食諸生請曰今日繫天下望者先生也先生何遂言死先生曰向者累請于公城守襃如充耳今欲爲於國亡勢去之餘亦已知其難矣在余之自處惟有一死先帝之變宐死今上蒙塵宐死吾越納降又宐死不死尚俟何日世豈有偷生御史大夫乎諸生曰不然夫死非先生所難處死爲難死而有益于天下死之可也死而無益于天下柰何以有用之身輕棄之先生曰吾固知圖事賢于捐生顧余老矣力不能勝子之所言異日不可知之功也余之所守人臣之正也身爲大臣敢舍今日之正而冀異日不可知之功乎吾死矣夫丁卯諸生請先生岀城先生曰國存與存國亡與亡古之制也吾將安之諸生曰古人云擇一塊乾浄土死城降矣卽欲死豈先生死所先生曰然戊辰先生辭祖廟岀居郭外之水心菴癸酉門人王毓蓍自沈于柳橋先生聞之曰王生死吾尚何濡滯哉秦祖軾曰江萬里身爲宰相義難苟免先生則有文山叠山袁閬故事在先生曰北都之變可以死可以無死以身在削籍也而事尚有望于中興南都之變主上自棄其社稷而逃僕在懸車尚曰可以死可以無死以俟繼起者有君也而吾越又降矣區區老臣尚何之乎若曰身不在位不當與城爲存亡獨不當與土爲存亡乎故相江萬里所以死也世無逃死之宰相亦豈有逃死之御史大夫乎若必待疊山之徵聘而後死於義未嘗不可然疊山封疆之吏非大臣也且安仁之敗而不死終爲遺憾宋亡矣然猶不死則以九十三歲老母在戀戀難自決耳我又何戀乎君臣之義本以情決舍情而言義非義也父子之親固不可解于心君臣之義亦不可解于心今謂可以不死而死可以有待而死死爲近名則隨地岀脫終成一貪生畏死之徒而已矣王玄趾毓蓍字赴水而死所謂士死義也玄趾眞可以不死我又非玄趾比也以玄趾之死決我之死萬萬無逃矣繫之辭曰信國不可爲偷生豈能久止水與疊山只争死先後若云袁夏甫時地皆非偶得正而斃焉庶幾全所受丙子辭墓舟過西洋港再拜叩頭曰老臣力不能報國聊以一死明臣誼投洋中顧久不得溺舟子入水扶之而岀㑹聘書至先生口授答曰國破君亡爲人臣子惟有一死七十餘生業已絕食經旬正在彌留之際其敢尚俟遷延遺玷名敎戊寅遷楊枋王毓芝侍先生字呼之曰嗟紫睂當以道義相成勿作兒女子態毓芝曰然語及毓蓍死事先生爲淚下曰吾講學十五年僅得此人又曰始吾不食數日渴甚飲茶覺如甘露因知茶亦能續命也今後勺水不入口矣毓芝問曰先生心境何如先生曰他人生不可以對父母妻子吾死可以對天地祖宗他人求生不得生吾求死得死他人終日憂疑驚恐而吾心泰然如是而已庚辰秦祖軾侍先生口吟絕命辭曰留此旬日死少存匡濟意決此一朝死了我平生事慷慨與從容何難亦何易祖軾欲書之先生曰偶然爾先生謂祖軾曰爲學之要一誠盡之矣而主敬其功也敬則誠誠則天若良知之說鮮有不流於禪者又曰吾日來静坐小庵胷中渾無一事浩然與天地同流葢本來原無一事凡有事皆人欲也若能行其所無事則人而天矣又曰餓死事小失節事大吾今而後知孟子所言人能無以饑渴之害爲心害明乎此者其于道也幾矣嗣子汋請訓先生曰常將此心放在寛蕩蕩地則天理自存人欲自去矣屬之曰死後葬吾于下蔣碑曰有明秦臺先生藏衣冠處子某婦某合塟之墓言訖泫然淚下曰吾平生未嘗言及二親以傷心之甚不忍出諸口也已而曰胷中有萬斛淚半灑之二親半灑之君上祖軾曰先生此苦奈何先生指其心曰孤忠耿耿閏六月辛已朔先生謂毓芝曰吾今日自處合義否毓芝曰甚正雖聖賢處此不過如是先生曰吾豈敢望聖賢哉求不爲亂臣賊子而已矣門士有傳金華建義請先生忍死待之先生曰古人一飯之德必酬我一窮秀才官至御史大夫焉得不死語曰正其誼不謀其利明其道不計其功功利之說倡此國事所以不競也死則死耳何待爲門士固請先生曰吾學問千辛萬苦做得一字汝軰又要我做兩字張應鰲問曰今日先生與高先生丙寅事相類高先生曰心如太虗本無死生先生印合何如先生曰微不同非本無生死君親之念重耳先生謂應鰲曰頻夜夢見朱文公應鰲曰先生固文公後身竊謂先生學問精切入微處當軼文公而上之至其晚年自焚諫草號遯翁先生今日所遭微不同耳先生曰還讓先賢應鰲曰鰲非阿所好先生之學直是去聖不遠先生勃然曰不意汝言狂悖乃爾乙酉先生撫心謂祖軾曰此中甚涼快祖軾問先生自裁不出他途而必以絕食者非但從容就義葢欲爲全歸之孝乎先生微笑不答丁亥祁中丞彪佳投水死王毓芝以告先生已不能言張日舉手者再指几上筆硯至則書一字毓芝曰先生問事乎頷之戊子先生卒前後絕食二十日勺水不入口十三日卒猶不瞑娶章氏贈夫人子一汋字伯繩能傳先生之學學者宗之亞于先生女三壻諸生陳剛王毓芝秦祖軾孫男四茂林士林長林道林而茂林則羲之甥也孫女一適吳善禎先生之學始自外祖章公頴公號南洲陶文簡周寧宇名應中皆出其門喜與門士激揚風節先生心竊慕之長師許敬菴先生孚遠已交劉静之永澄丁長孺元薦而入東林與高忠憲問答首善書院初立鄒忠介元標馮恭定從吾主講席忠介宗解悟恭定重躬行先生爲兩家騎郵通彼我之懷忠憲忠介恭定旣没講學中絕先生始有証人社之㑹南都而後門人問學者先生曰守所聞行所知足矣今乾坤何等時猶堪我軰從容擁皐比而講學論道乎此所謂不識人間羞耻者也先生宗旨爲愼獨始從主敬入門中年專用愼獨工夫愼則敬敬則誠晚年愈精微愈平實從嚴毅清苦之中發爲光風霽月消息動静步歩實歷而見故發先儒之所未發者其大端有四一曰静存之外無動察問愼獨專屬之静存則動時工夫果全無用否先生曰如樹木有根方有枝葉栽培灌漑只在根上用枝葉上如何著得一毫静存不得力纔喜纔怒時便㑹走作此時如何用工夫苟能一如其未發之體而發此時一毫私意著不得無工夫可用若走作後便覺得便與他痛改此時喜怒已過了仍是静存工夫也門人葉潤山廷秀疑誠意不足以攝內外先生曰意誠則心之主宰處止於至善而不遷矣止善之量雖通乎身心家國天下而根據只在意上葢謹其微者而顯者不能外矣知此則動而省察之說可癈省察卽是存養中最得力處不省不察安得所謂常惺惺者存又存个何物養又養个何物今專以存養屬之静一邊安得不流而爲禪又以省寮屬之動一邊安得不流而爲僞不特此也又于二者之間方動未動之際求其所謂幾者而謹之安得不流而爲雜二之已不是况又分而爲三乎潤山曰然則學問之要只是静而存養乎曰道著静便不是潤山日幾者動之微有動則必有静矣曰此所謂動非以動静之動言也復其見天地之心是也心只是一个心常惺而常覺不可以動静言動静者時位也以時位爲本體傳註之訛也雖然時位有動静則性體與之俱動静矣但事心之功動也是常惺惺此時不增毫末增毫末則物于動矣静也是常惺惺此時不減毫末減毫末則物于静矣此心極之妙所以無方無體而愼獨之功必于斯爲至也一曰意爲心之所存非所發傳曰如惡惡臭如好好色言自中之好惡一于善而不二于惡一于善而不二于惡正見意之有善而無惡所謂幾者動之微吉之先見者也正指所存言也如意爲心之所發將孰爲所存者乎如心爲所存意爲所發是所發先于所存豈大學知本之旨乎葢心無體以意爲體意無體以知爲體知無體以物爲體物無用以知爲用如無用以意爲用工夫結在主意中方爲眞工夫如離却意根一步亦更無格致可言問意爲心之所存好善惡惡非以所發言乎曰意之好惡與念之好惡不同意之好惡一幾而互見念之好惡兩在而異情以念爲意何啻千里一曰已發未發以表裏對待言不以前後際言謂程子云喜怒哀樂之未發謂之中此時下不得个静字已是千古卓見却不肯下个動字夫喜怒哀樂非以七情言也一心耳而氣機流行之際自其盎然而起也謂之喜仁之德也自其油然而暢也謂之樂禮之德也自其肅然而歛也謂之怒義之德也自其愀然岑寂而止也謂之哀智之德也乃四時之氣所以循環而不窮者獨賴有中氣存乎其間而發之卽爲太和元氣是以謂之中謂之和性之德也故人有無七情之時而無無四德之時儒者苦于未發前求氣象不已惑乎須知一喜怒哀樂自其存諸中言謂之中卽天道之元亨利貞運於於穆者是也陽之動也自其發於外言謂之和卽天道之元亨利貞呈于化育者是也陰之静也存發總是一機中和渾是一性內有陽舒之心爲喜爲樂外卽有陽舒之色動作態度無不陽舒者内有陰慘之心爲怒爲哀外卽有陰慘之色動作態度無不陰慘者推之一動一静一語一黙莫不皆然一曰太極爲萬物之總名謂子曰易有太極周子則云無極而太極無極則有極之轉語故曰太極本無極葢恐後人執極于有也而後之人又執無于有之上則有是無矣轉云無是無語愈玄而道愈晦矣不知一奇卽太極之象因而偶之卽陰陽兩儀之象兩儀立而太極卽隱于陰陽之中故不另存太極之象于是縱言之道理皆從形氣而立離形無所謂道離氣無所謂理天者萬物之總名非與物爲君也道者萬器之總名非與器爲體也性者萬形之總名非與形爲偶也知此則道心卽人心之本心義理之性卽氣質之性粤自大學中庸散于禮記程朱表章以爲心學之書有功于道術信乎不淺而後之言大學者以把持念慮爲誠意之功道心溷于危殆言中庸者以静觀氣象窺未發之朕中體落于偏枯二書矛盾非先生身體而力行之又何以知未發之中卽誠意之眞體叚而二書相爲表裏也當是時浙河東之學新建一傳而爲王龍溪畿再傳而爲周海門汝登陶文簡則湛然澄之禪入之三傳而爲陶石梁奭齡輔之以姚沍之沈國謨管宗聖史孝咸而密雲悟之禪又入之㑹稽諸生王朝式者又以押闔之術鼓動以行其敎証人之㑹石梁與先生分席而講而又爲㑹于白馬山雜以因果僻經妄說而新建之傳掃地矣石梁言識得本體不用工夫先生曰工夫愈精密則本體愈昭熒今謂旣識後遂一無事事可以縱橫自如六通無碍勢必至爲無忌憚之歸而已其徒甚不然之曰識認卽工夫惡得少之先生曰識認終屬想像邊事卽偶有所得亦一時恍愡之見不可據以爲了徹也其本體只在日用常行之中若舍日用常行以爲别有一物可以兩相凑泊無乃索吾道於虗無影響之間乎先生以謂新建之流弊亦新建之擇焉而不精語焉而不詳有以啓之也其駁天泉証道記曰新建言無善無惡者心之體有善有惡者意之動知善知惡是良知爲善去惡是格物如心體果是無善無惡則有善有惡之意又從何處來知善知惡之知又從何處起爲善去惡之功又從何處用無乃語語絕流斷港乎其駁良知說曰知善知惡從有善有惡而言者也因有善有惡而後知善知惡是知爲意奴也良在何處又反無善無惡而言者也本無善無惡而又知善知惡是知爲心祟也良在何處止因新建將意字認壞故不得不進而求良于知仍將知字認粗故不得不進而求精于心非大學之本旨明矣葢先生于新建之學凡三變始而疑中而信終而辨難不遺餘力而新建之旨復顯先生以禮記雜出漢人之手記中夫子之言皆岀家語有去其問答私爲已有者于是取而考定爲尙書逸經二篇曰夏小正附月令丹書儀禮逸經六篇曰公冠投壺明堂奔䘮諸侯釁廟諸侯遷廟儀禮傳二十三篇曰冠義附深衣考昏義士相見義劉敞𥙷鄉飲酒義燕義射義朝事聘義附見公食大夫義劉敞補䘮記三篇䘮義四篇祭法祭義三篇禮本卽禮二本禮器禮坊附經解餘簡樂記附鍾吕考削者四篇曰緇衣帝繫官人明堂位禮察保傳餘簡還賈誼勸學還荀子其檀弓禮運經解哀公問燕居閒居表記儒行曾子問凡係夫子之言還家語家語正集三十三篇曰相魯王言大昏問禮五儀三恕好生觀周賢君辨政六本顏囘子路初見入官困誓五帝執轡本命論禮觀射郊問五刑刑政禮運冠頌廟制辨樂問玉正論子夏問子貢問公西赤問曾子問家語補集二篇曰表記雜記雜取說苑韓詩外傳孔叢子等書家語外集七篇曰千乗四代虞德誥志少辨用兵少間卽大戴記餘篇家語附集十二篇曰始誅儒行致思辨物楚聘經解五帝德屈節本始終記七十二弟子弟子行皆從削也古學經曰小學曲禮少儀内則玉藻王制大學學記上文王世子合大戴保傳學記下本文四書曰曾子十篇論語孟子子思子中庸取孔孟之言仁者類之曰合璧周程張朱五子之言仁者益之曰連珠附以吃緊三關一曰人已二曰敬肆三曰迷悟言求仁所有事也擇五子書之醇者解之爲聖學宗要周子則太極圖說程伯子則識仁定性書張子則東西銘朱子則答張敬夫中和說及答湖南諸公書陽明子則陸元静良知問答及塞源拔本論先生謂朱子著大學于誠意章反草草平日不知作何解至易簀乃定爲今章句曰實其心之所發不過是就事盟心伎倆于法已疎矣至愼獨二字明是盡性吃緊工夫與中庸無異旨而亦以心之所發言不更疎乎朱子一生學問得力于主敬今不從愼獨二字認取而欲綴敬于愼獨之前所謂握燈而索照也作誠意章章句袁了凡功過册盛行因而有倣爲遷改格者善與過對舉先生曰此意最害道有過非過也過而不改是謂過矣有善非善也有意爲善亦過也此處路頭不清未有不人于邪者故論本體有善無惡論工夫則先事後得無善有惡也作人譜太極圖說謂天以陰陽五行化生萬物物鍾靈爲人人合德爲聖先生獨言人卽天卽地人心其有太極陰陽五行萬化之理作讀易圖說先生在京邸有問太極之說者輙舉易以答遂從而詮次之毎卦首彖辭次爻辭次彖傳大小象一如乾卦位置繫辭以下間有更定太極兩儀四象八卦六十四卦方圓圖皆與先儒不同以發明太極卽在陰陽之中作古文易抄以方文正孝孺從宋潛溪得金華何王金許之脉有明理學當爲第一作遜志正學錄陽明之良知本以救末學之支離姑借大學以明之未盡大學之旨也而後人專以言大學使大學之旨晦又借以通佛氏之玄覺使陽明之旨復晦又何怪其說愈詳而言愈龎也作陽明傳信錄有明學術龎雜先生依名臣言行錄例以次諸儒有特書者有附見者不以成論爲然薛敬軒陳白沙羅整菴王龍溪皆有貶辭而方文正吳康齋人所不屬者先生以正傳歸之又常謂羲陽明之後不失其傳者鄒東廓羅念菴耳作有明道統錄先生自家庭以至宗族朋友鄉黨施之無不各當其節其事太夫人也以筋力致養柴水之事皆躬親之兼峰公病先生俯伏左右抱扶臥起身爲薦席居䘮則歠粥飲水闔門蔬食次女患痢醫用黃雞爲藥先生勿許也三世七䘮尙在淺土先生營立塜墓御史徐縉芳資之百金先生謝曰百金之餽其所取義乎不義乎卽使君有以處僕僕則何以自處也已矣勿汚我先人墓上石僕所未了者固厪有先人一事試將茹荼帶索以畢餘生何至煩故人爲念御史不敢復言事女兄如母女兄病瘵醫藥之資力所不能致者致之先生赴官聞其不豫輕舸徑返卒則養其子子卒又養其孫曰聊以終吾事母之念爾叔母朱氏無子先生迎養于家朱氏欲異居先生輒自艾曰古人數世同居今吾一叔母不能安其心何古今人之不相及耶再從弟宗祐流落閩中先生尋歸冬月製衣家人與之以布先生見而恚曰兄弟一體弟衣布兄能安于帛耶易之初劉氏家廟所行皆世俗之禮先生一一正之置祀田輯宗譜乃立宗長一人總宗敎宗翼二人佐之宗老一人以齒宗幹一人司錢榖宗糾一人司賞罰舉宗之事皆質成于宗長宗長未聽而投牒于官者罪之月朔宗長率宗人而謁廟有善惡皆書之置義田百畝定卹例一䘏賢二卹鰥三卹孤四卹婺五卹䘮六助婚罪人與醮婦不卹先生自終養歸聞許敬菴先生之卒于途中不至家而往哭焉丁長孺劉静之卒後毎過必哭先生不妄交其平生希聲慕義于先生者滿天下所稱性命之友則周寧宇高忠憲丁長孺劉静之魏忠節先忠端公六人而巳崇禎八年十年越郡飢先生募米分遣諸生賑之全活五萬餘人十三年又飢煑粥平糶活者又萬人郡邑下敎毎坊積米二百石爲明年平糶張本先生所居昌安坊卽以所積爲社倉損益舊法行之一坊遂無飢者鄉黨有冤結先生必爲之平理奸吏跼蹐唯恐先生之知也先生通籍四十五年立朝僅四年在家强半敎授敝帷穿榻瓦竈破缶不改儒生之舊士大夫飾其輿服而來者不覺慚阻故見先生者多毁衣以入甲戍乙亥之間先生偶服紫花布衣士大夫從而效之其價爲之頓高先生飯客不過數器而士大夫之享先生者亦遂以乾飯寒漿先生未嘗不心知其僞也㑹稽今趙士諤問疾至先生榻前見其單陋歎曰豈意今日得覩管幼安丁已京察劉廷元韓浚㝷怨于東林士諤時爲考功曰劉大行之清修人所不堪此諤之親見者也乃止給事中徐耀使浙渡江來見先生方閉門掃軌耀曰昔人不得見劉元城以爲如過泗州不得見大聖耀若徒返亦何顏見鄉之父老乎先生乃見之都督劉應國遼東中前所人固請見見輙涕泗再拜自言不遠萬里得見先生不覺喜極而悲也金壇周仲馭鑣謁先生先生留之飯仲馭語人以七箸長短若何杯盤大小若何爲一生未有之榮郞官秦祖襄入京止宿逆旅僕從紛紜主人供應不給周視同旅者一人幅巾危坐童子侍側問之曰劉都御史也祖襄惶恐遁去其爲世所欣慕畏憚如此先生門墻高峻不特小人避其辭色君子亦未嘗不望崖而返周延儒使其客薦誠于先生先生不答其後有爲馬士英言者曰所貴大君子以其能化小人爲君子國事爲重不宐拒絕太深先生亦不答有司馬自附君子先生惡其佞也同朝不交一言司馬毎晨必詣先生言事先生黙坐司馬瀾翻布榖言盡而去黃漳浦祭告禹陵及門者三先生不見曰際此亂朝豈大臣倘佯山水之日漳浦聞之卽行先生德日愼小心日謹微官行人時夣轉衛經歷不樂覺而自責曰此夣從何來終有不忘榮進念頭在乃知平日滿腔子都是聲色貨利不經發覺自不察耳待罪中左門時諸生惲日初欲上書留先生於經筵先生聞之曰僕自反必是名利塲打不過洗不淨盡有一種聲音笑貌爲人所覻及處至使朋友中有迎風而動者益覺闇然一關不易過也世之言先生者無不曰其理學似周元公死節似江古心論諫似胡澹菴鈎黨似李元禮絕俗似范史雲至先生之所以告思陵者歸本德化不宐急急以兵食爲先務學術不明小儒不知治道往往信不能及卒之思陵以爲勦㓂則必强兵强兵則必措餉措餉則必加派竭生靈之膏血以奉軍旅之費豈知驅天下之民而盡歸于㓂餉無所出而愈不足兵無所食而愈不强其無兵無食者皆于務兵食一念始基之也思陵亦時憶先生之言罷而召召而罷終不能用而天下事已去矣然後知先生之言爲思陵對証之藥也其時爲救時之論者以爲朝野屬意于先生先生稍霽其威嚴則前之陽羡後之貴陽不至決裂如是此說在孟子枉尺直㝷之喻也天下人心方趨于假借由假借而至于無所不爲江河日下先生而假借一時之國未必不亡而千古之聖學先亡矣浙中之爲禪學者以爲忠義名節無關干理學而先生清心忌惡終陷黨議是意氣之未融也葢聞之子朱子矣風俗頽弊浙中爲尤甚大率習爲軟美之態依阿之言而以不分是非不辨曲直爲得計不復知有忠義名節之可貴萬曆以來排擯詆辱出而殺君子者多自浙人葢由宋至今沿之爲俗故朝廷之上成之爲黨遂使草野之間講之爲學非先生興先忠端魏忠節三數公振拔汗險之中則亦何以使忠義名節如今日之浙之盛也先儒心與性對先生曰性者心之性性與情對先生日情者性之情心統性情先生曰心之性情分人欲爲人心天理爲道心先生曰心只有人心道心者人心之所以爲心分性爲氣質義理先生曰性只有氣質義理者氣質之所以爲性未發爲静已發爲動先生曰存發一機動静一理推之存心致知聞見德性之知莫不歸之于一然則彼皆非與曰孔子已言之矣吾道一以貫之工夫之與本體有二者便不一也書曰德唯一動罔不吉德二三動罔不凶詩曰士也罔極二三其德易曰天下之動貞夫一者也自有六經以來未之有于萬曆六年正月戊寅享年六十有八卒之城東南二十里下蔣之原海寧吳貞肅麟徵于壬戌榜前夣至古寺有角巾而書碑者所書爲文信公過零丁洋詩問之在旁者曰此隱士劉某也覺而不知爲何如人已而有言之者曰此講學之劉先生也忠節識之忠節死國難甬陸符謂羲曰夣驗于忠節將無驗于先生乎盍以忠節之誌銘請于先生以當之也羲然之先生身殉宇宙關乎晦明嗟乎吾黨之愚也羲幼而孤鄉邑之間多逆奄之黨人推築之無所不至先生從而封殖之曰不佞白安先生先忠端公别號之未亡友也有致難于其家者不佞請以螳臂當之衰門由是得安長授先生敎誨質性下愚亦自謂書本中可以自得痛掌血痕不沾牛革今也稍有所知而瞽說橫流微言將散高天厚地此恨何極因次其始終先生之學術庻幾存其十一而思陵欲治天下之心亦耿然而見之也謹狀男黃百學校學箕𥘉稿卷二起丁已姚江黃百家主一著原名百學贈陳子文北上序余少而失學長而惰慵然年餘三十猶不甘自棄廢者朋友之力不可誣也丙午以前兵火繩承東遷西播幾失足爲狹邪無俚之徒歲丁未家大人始命余從學甬東是時甬上陳子䕫獻陳子介睂萬子公擇兄弟范子國雯等十餘人方爲講經之會日有課月有程分頭誦習以相通會余以愚下得厠其間於是始知有讀書一事其後讀書于越之兩水亭則有萬子季野姜子汝高爲之砥礪于慈之赭山寺則籍鄭子禹梅爲之甄陶葢駘駑之步必資乎簻䇿女蘿之施必附乎松柏也邇年以來諸君子分處離㪚余亦就食靑氊索居離羣莫加督責而學復荒落矣去年春家大人講學海昌得同志者十餘人而陳子子文抗心問學以爲文章不本之經術則學王李者爲勦學歐曾者爲僞學問不本之經術非矜集註爲秘經則援作用爲軻傳于是將與同志創爲經會以崇實學余私心自喜謂得侍家大人至此預其末座則前日之亡羊雖不可追而今此之失晨猶可或補今年館于張子無逸家方冀借翰晨風假足六駁以發伏鼈之雄氣而子文乃忽有薊門之行夫子文年甫壯久矣文高黃絹之辭書長烏絲之價風流爾雅晻映千人氣焰聲光遮葢一世而乃不自滿假慕蕺山之源流務經術爲宗主此其心有未易窺者乃編簡未陳已祖駕于驪黃抑又何耶古人固有以不讀書萬卷不行地千里爲歉者吾聞子文自年十七以來薄游十載溯伊洛涉洞庭陟匡廬登泰岱南越番禺北抵燕山者再其行地寧特千里已哉恐子文之所歉者不必在是也顧子文窮經之志未嘗少懈檢其行囊累累則儀禮與周禮之註疏也其言曰今人講禮往往窒礙則以不熟讀儀禮與周禮故也舟中清寂余將以三千里之程畢此願力余始喟然歎人以游廢學而子文以學兼游其勤且敏誠有以過人愚陋如余何足以知之哉子文往矣余友陳子介睂縱橫經庫酉戌之間課業至三禮余嘗聆其辨論通貫詳瞻今在中秘子文于舟中有所悟而獨得者有所疑而未釋者試與討論焉必能有以相賞而相晰也攘臂西風颿如奔馬子文方洋洋然解䌫行矣獨是余之所以負笈于此者何爲耶王維渭邑指柳色以贈言何遜楊州覩梅花而興感子文其何以處我送定菴姜先生赴任盛京奉天府序康熙丁已孟冬定菴姜先生赴任盛京奉天府將有數千里之别百學辱受知先生特書一言于箑中持以走送于舟次旣而思之先生之行錦屏玉軸組藻煇煌陳堂皇而列序榮者目不遑顧也抽黃對白嚼徴含商獻詩歌而薦詞章者踵不絕戸也當路薦紳門生故吏肆筵奏樂而醆離觴者手不停杯也百學以一草茅賤士布衣芒履面目黒黧語言澁拙持俚鄙之言而厠其間是猶奏韶濩于大庭而介以土鼓睹瑚璉于宗廟而間以汙尊不亦恧乎雖然文生于情者也百學少失學長而惰慵先生不以爲糞朽而敎之誨之噉人一飯夣寐不忘先生解已衣推已食而飲之食之傲骨性成學與時違先生相之牝牡驪黃之外而奬之掖之雖其時命不偶不能仰副先生之望而百學念知已生成之德則今日依依眷戀自有不能已于言者不得謂韶濩爲樂而土鼓非音也瑚璉爲美而汙尊非器也且天下事好之與醜莫識爲首惡之與美莫知爲尾今天下人物之衰亦甚矣先生紹蕺山之傳勤勤懇懇日望于後人者何在耶則百學受先生之顧盻日夜憂思期以不沗先生之知者亦當何在耶今天下之所謂美與好者大抵科第耳然在昔河汾之徒貴顯滿天下而䆒其傳人偏在一布衣之董常艾軒之學世號爲南夫子席下翹楚相望而論次嫡傳則惟在一窮餓之網山如僅以科第而已先生之門牆其爲科第者何限寧必待百學之科第爲先生希有耶百學自料兹生其能得科第歟其不能得科第歟俱未可知顧思先生之有取于百學與百學之圖報于先生知不在此區區也然則鼓土汗尊雖爲世俗耳目之所甚賤而君子推原制器制樂之所自始未必不溯于濩瑚璉之先也臨岐言别區區自陳非敢矜詡亦欲先生知百學之此心耿耿未敢墮流俗以忘先生耳若夫道古今而譽盛德則才畯滿前俱優爲之非百學之敢復贅矣贈吳子升序新安吳子升寓居海昌以畵容貌名三吳三吳士大夫争延之余初至海昌過裝潢肆見子升画壁間累累余所識者一見卽知其爲某某也未識者他日見之卽知其爲壁間之某某也其妍蚩肥痩白黒長短老壯情態無不宛然曲肖余因思文與画不可一缺者也有文以傳神有画以傳貌一人之容貌生平畢見矣故善画者不自爲其画一隨其人以爲画善文者亦不自爲其文一隨其人以爲文故太史公傳刺客卽儼然刺客傳貨殖卽儼然貨殖傳游俠日者卽儼然游俠日者要使我之字句筆墨悉化爲其人之聲響精神不獨傳其神并傳其貌此文之所以更可貴也苟其不然甲頭乙㡌籠統游移惟以美辭取恱是猶画容貌者不問其妍蚩肥痩白黒長短老壯而一惟以角犀豐盈倩盻姣好以爲美是果誰何氏與乃觀今世之人徵啓如蝶無人不欲得文而試問其所謂文惟以甲頭乙㡌籠統游移者是恱一有纎㣲刻肖則便拂然於中吾意子升當求二粉本一子都一西子其爲男子也則以子都應之其爲婦女也則以西子應之已足槩天下而恱當世乃必欲曲肖其人嗟乎子升何紛紛不憚煩以自取憎耶子升名旭上顧寧人先生書百學㓜侍家大人側家大人屈指當世人物必曰八閩李元仲江右黃雷岸天中孫鍾元三吳歸玄恭與先生五人而已學固熟聞心識時切願見之懷顧當是時家大人獨抱遺經屏蹟荒山不與世接學躬耕隴畝朝夕饔飱足跡不踰三十里而五君子者晨星落落天各一方雖仰止徒殷不啻峩睂天半何因得溯洄而從乎癸卯以後家大人始復渡錢塘學得追隨杖屨于是玄恭先生時通音耗鍾元先生以所著理學宗傳曁壽家祖母八十詩見寄學竊念鍾元先生元仲先生年俱九十雷岸先生約亦近八十且俱遙隔數千里旦夕在無不可知此生胡能得見而惟是玄恭先生與先生春秋方富且近在吳會或得從家大人後睹光顔聆緒論以慰生平之願乃未幾而玄恭先生又卽世則是先民遺老中家大人之所推服與學之所願見者惟先生一人而已去年夏先母卽世學軰孽重罪深無可復挽因遍思當世大人能以如椽之筆留其姓氏者止有先生然聞先生踪跡多寄長安且德高望隆學自念賤寒末士何由得通姓名于左右以得先生一言乎因嘆與古人生不同時其不能相遇固無可如何孰知當吾世而有如古人者焉乃因縁蹇淺而其遇之之難亦竟同於古人如此哉冬間忽得先生所寄家大人書曁所著日知錄錢糧論伏而讀之眞見先生之經術文章經濟無一不具此誠子固所謂數百年而有者也今年萬貞一南還又備悉先生近狀且具道殷殷于家大人之意學驚喜自賀向自分以爲必無階以達于先生者今而以家大人之臭味知先生必能推其愛于先母與學也旣又念生平之欣悅仰慕者有五人焉而四人者已不可復追矣何幸猶得遇先生倘先生而肯褒以一言是天特留先生而賜先母以不朽也兹逢徐果亭先生于海昌云先生今在德州許以便翼胡能不呌呼攀援稽首哀籲于先生乎謹撮先母行畧于左先母諱某字寳林餘姚葉氏曾祖諱選嘉靖戊戍進士累官工部郞中祖諱逢春嘉靖乙丑進士累官鄖陽知府父諱憲祖萬曆已未進士累官廣西按察使司年十七歸家大人得奉事先祖忠端公者三月忠端公投獄縣令祁逢吉疑其亡命操兵到門闔族逋逃僮婢駭竄家祖母計無所出悶坐石臼中獨先母一人侍立在旁不離尺寸先祖正命寄家大人遺訓一章中有汝婦賢孝古有用婦言而亡亦有不用婦言而亡者汝須知之早見知于先祖如此思廟誅奄家大人負鑕訴冤得贈蔭祭塟而先母亦遂典衣鬻珥兩封馬鬣不煩官帑崦嵫不返家大人腰絙虞淵挽留寒晷而先母亦遂密藏七首以死自誓絕不以夸父爲迂鯨蠣魚鴻家大人或授指南于張儉或解相印于魏齊而先母亦遂供複壁以飥饘資柳車之行李必不以虞郷爲拙少時畧通經史有詩二帙淸新雅麗時越中閨秀有以詩酒結社者先母聞之蹙然曰此傷風敗俗之尤也卽取已稿焚之不留隻字先母爲先外祖所鍾愛五六歲時雅量過成人凡婢僕之有失誤或盂皿之毁傷或花果之採摘以先母爲對按察公卽置不問先母亦絕不辨明一日有奴夫婦以事懼責亦欲援先母以希免先母怒曰凡汝軰有過誤一委于我而我不與辨明者以在汝可免罰而在我不妨任受也此何事亦委于我乎囑按察公痛杖之按察公益驚異焉子三人百藥娶李氏柳氏次正誼娶孫司農之女繼虞氏次百學聘王司馬之女娶孫氏女三人長適諸生朱林大理守之子次適任子劉茂林都御史忠正公之冡孫次適諸生朱沆孫男三人千頃千子千牛孫女四人先母生于萬曆己酉四月二十四日卒于康熙丙辰六月八日距生春秋六十有八家大人曾以職方兼御史徵例封安人以卒後中陰之盡權厝化安山忠端公禁塋之側嗚呼痛哉總計先母一生所歷始以按察公愛女來作侍御冡婦高門旦開鍾鳴鼎食何其盛也忠端公殉節家難頻仍外侮迭至資產旣已蕩然曁乎滄桑播徙毒矢狂濤飛章搆黨無歲無有兼之兩遭囘祿七經遷徙此時家計益可知矣而先母上奉婺姑之菽水下視諸雛之寒煖外供賔客之巵匜娶五婦嫁三女茹荼吞蓼左撐右拄恐恐焉惟懼堤决瀾頺巢傾卵毁以支持此衰危之門戸故不恤一身之盡瘁勤劬凌夜侵晨諸勞畢殫而學軰頑蠢無知祗以爲滕下之歲月方長冀得一日之伸自可少舒于末景豈知前之日不可留後之日不及待而吾母已逝世矣嗟乎早知如此有子三人傭保街卒亦可以養何至使吾母力敝心枯羽譙翮鎩如此也卒前之二日猶自提携水一瓶火一鑪以供奉家祖母之薰沐嗚呼痛哉思至此尚忍言哉學軰之罪可勝誅哉肺焦肝乾追之不及悔之無從矣獨是先母之賢孝早定評于先祖而所以相家大人又雅知大義不惟備婦人之德實且兼丈夫之風眞不媿爲忠端公之冡婦家大人之妃匹者也今旣幸遇先生使不得先生片辭誌其幽石俾先母一生苦衷付之冷焰則學輩之罪不益深乎伏望先生鍳其思慕之久廹切之誠而哀之憫之干凟嚴威語無倫次不勝惶悚之至上徐果亭先生書承遠賜新刻歸文驚喜不自勝非喜得歸文也喜先生意中存一百學也亦非僅喜百學一人得見知先生也喜愚魯如百學猶不見棄天下之士將得所依歸而人才之可以復振也今天下人才之衰亦甚矣而其弊在不知學術夫古今來雖云三立要無不本於立德者立言不本於德則爲剽竊之詞章立功不本於德則爲僥倖之事業卽如震川之文所以稱爲有明第一者亦因其得莊渠之學而其文始至寧可將三者截然分判乎然非空談本心便可爲學術也必實實窮經通史讀破萬卷識見始高胸襟始闊故孔子敎人必由博而歸約葢不博無所爲約也今之學者非不人人言學矣大都空疎不學剽取陳言便欲詆毀前人而越過之此如趙括言兵談何容易然此風漸以成俗是非得一二大人敦實學鵠聖賢以爲之倡未易挽其茅靡波流也今先生孜孜好學眞如嗜慾守身若處子不敢稍越乎矩範一門之内日與健菴先生立齋先生談經講道與收搆異書爲事而且循循下士實篤緇衣之好卽不肖如百學猶且置之人數之中則凡士之苟挾一長抱一藝者孰不思自奮發於蓬蒿巖穴之中猛自淬礪以願望見顔色而托於門墻也哉將見實學之興士風之振也有日此非百學一人之私幸也且古來人物之興未有不由于倡之者卽以有明而論景濂起于婺川而金華之人才甲天下遜志起于寧海而三台之氣節文獻指不勝屈陽明生于越而有龍溪緒山曰仁之徒宦于江右而有心齋三劉之徒葢有非常特達者出一時英偉才俊磁動針合鍾鳴律應大抵然也玉峯固莊渠震川之里也其風流未墜苟得一人以倡之爲力較易况有先生三巨人爲之領袖左提右挈此倡彼導則斯世之士有不易慮洗心一變其舊習而共趨于正學乎百學㓜失學學拳學劒幾失足爲狹邪無俚之徒年踰二十始思緝亡羊之牢補晨雞之喑而菽水馳騖括帖拘纒雖知塲屋之外大有事在顧瞻家道不能自已兩者揺摇無所終薄徒存耿耿此心而巳邇來見日月如流歲華易邁兹生何事已半古稀此心較前覺漸急毎行一事必自悔其事之非毎出一言旋自恨其言之失而年時長大學業空虗四顧徬徨無有實地所以欲得當世宗工鉅卿以爲依歸庶幾點仙茅於鐵錯加繩削於枉材或稍有成就此百學不自料度願執籧篨以備洒埽之末者也不然而徒以視援亳之青春丐啓齒之丘山卽使太丘道廣來者不拒無異燕雀之受蔭華榱寧不可耻耶伏惟先生哀其愚矜其志而鞭之䇿之唐烈婦傳烈婦曹氏庠生頴洙之女海寧人年十八適唐之坦閱六年而之坦亡烈婦間關求死而不得死備受人生之㦧毒卒不少廻其志以殉其夫方其夫之病也以四月四日其亡也以九月二十八日歷夏經秋烈婦旣奉侍湯藥抱持寢興不少怠及夫病日篤度不可起卽預蓄毒物約與同死夫不食烈婦亦不食母強之曰壻食乃食耳迨至夫亡巳絕食二日矣哀號一慟絕而復甦卽取預蓄之砒霜服之爲娣姒所奪不得死稍間又取灰水以飮不死次日嚙錢數枚碎而吞之又不死中夜飮鹽滷一盂五內焚裂垂死矣巳忽上吐下利竟不死烈婦曰吾服此數物自爲必死豈知猶至今日是時家人防衛嚴甚無從覔死於是又絕食二十二日家人時灌以米飮終不卽死伺人定熟睡濳啓牖泅河逮覺而急救烈婦巳氣絕矣未幾又復甦至十二月望復絕食者十五日卒以除夕自經死總計烈婦前後所歷絕食灰水錢滷泅水雉經其身嘗乎殺人之方者凡六前後絕食者三其身嘗乎殺人之楚痛者凡八益之以砒雖未嘗服而其求死之數凡九自除夕上溯去其夫之亡凡九十八日始得一死夫一死耳凡此數者隨舉一事殺人何限乃烈婦自夫之亡無日不求乎死之途而必遍嘗毒慘如此其多閱歷日月之數如此其久豈求死之果不易得耶抑天之故難其死以益顯其烈耶嗟乎天地之不崩騫惟此綱常倫紀之維耳道䘮民散風俗偷漓卽以夫婦而論自古來逝梁發笱鷕雉奔鶉何可勝道烈婦乃岸然以一身爲斯倫堤表死而復生生而復死旁觀者莫不爲魄悸神驚而烈婦曽無動其秋毫顧慮此其有關風敎誠今世之祥麟威鳳也昔震川傳王烈婦自烈婦入王土門枯竹更青三年三生芝皆雙莖然則彜常倫類間至性之所存固天地瑞氣之所鍾乎雖然事無兩可成仁害仁决判俄頃則奮然一往猶可勉之烈婦無是也當其屢死不死設便茍延殘喘永稱未亡抱痛終身亦不失其爲堅貞之苦節然而烈婦必行已志斷不以他途之可托援引以自恕故寧受此蜿蜒慘絕之毒痛乃至九死而不廻倘其一生一死出此入彼人獸攸關與夫據義而行或不至死卽雖死而亦不至九死者更且何如乎聞烈婦之風當亦思所共勵矣黃子曰去冬十一月家大人在海昌聞烈婦泅河死率同人二十餘人往拜之未幾歸姚傳聞烈婦又生矣爲爽然者久之非謂婦之於夫必當從死也然烈婦於此巳經七死且無子年少以彼其志固不如速死之爲玉成也今余至海昌乃知烈婦又絕食自經狀不覺驚且嘆世固有秉志之斬斬如是者哉邑之中自許侯至薦紳士子莫不爲詩文祭弔且將爲立祠旌表烈婦可以無憾矣獨念余㓜時家大人嘗爲聘王司馬女司馬殉難女遂被掠時年十三其大帥愛之肓爲已女閱二年有武弁劉姓者将娶之女卽號呼絕粒強舁之去遂奪劒自刎武弁亦烈之爲塟於臨平而以劒殉焉年來余往返海昌禦水毎過瓶山赤岸之間未嘗不惆悵徘徊欲求遺劒就塟之所而疇從訪問而烈婦顧爲人咨嗟傳仰如是然則節烈之事其亦有遭際乎張待軒先生詩記跋家大人甞謂海昌有遺老而窮經者二人張待軒先生朱罍菴先生罍菴言貌樸訥于世故不能作一㝷常語談及經術長河東㵼待軒心存經世滄桑變徙活埋土室衝霄志氣一屏蠧魚余心焉識之思經學之亡已久士子固無論卽先民耆老大都廬舎田園不則白椎撾鼓于一邑而得二人何其盛也癸卯罍菴以五經發凡遙寄家大人亦一至其家與討論焉斯時余以他故不及從去年隨杖屨至海昌罍菴雖逝意必得拜待軒先生于床下又失之俄頃今年得讀書先生家而先生已不可作小子因緣蹇淺一至此哉雖然先生之聞孫無逸無日不以先生之著作爲事手鈔校勘孜孜屹屹因得遍觀先生之笥篋五經諸史各有成書余雖不得見先生登其堂而像肖儼若入其室而琴瑟依然且得讀手述之遺言聞公孫之緒論則余于先生不異親承音㫖也諸書次第將出詩記梓成無逸俾余附名其間遂志之書王孝女碑後慈溪王孝女年十五母棺失火以身殉之家大人旣爲作碑銘矣而碑中所引十六人姓氏有九人者事屬於母學旣集之銜恤錄中不孝自先母逝世授經海昌不克終守苫塊讀書所及凡遇母事偶爲摘出自穎考叔至孝女得若干則名之曰銜恤錄因復爲考其七人之事共詮之于後蔡順鄰失火抱母棺哀號火滅古𥘉長沙人匍匐柩上以身扞火火卽滅時號長沙孝子何琦母櫬在堂爲鄰火所逼煙焰已交撫棺慟哭忽止賈恩諸曁人火逼母櫬與妻柏氏號泣奔救鄰近助之櫬免而恩與柏氏俱燒死傅琰母䘮火及琰伏柩不動鄰人競救得全而琰股髀間已着烟焰徐普濟守棺不去焚炙已悶絕會救得出累日方甦李孝子鄰火驟至慟哭慿棺死余丙守殯古山下牧童遺火延殯廬丙與子慈撲擊不止欲投身以殉俄暴雨至祝公榮竈突失火力不能救乃伏母櫬悲哭火自滅郭通遭火呼天訴曰身孤力薄柩不能移寧與俱焚竟得全陳汝楫火及舍汝楫與妻徐氏相對伏柩上矢誓同殉無何風反焰息楊敬母殁西鄰不戒於火將及柩敬仰天一號火應聲滅祝大昌㑹火起勢烈莫能救大昌伏棺以待火不至鄧翰火及繼母柩翰以身蔽翼火旋止陳倫夜失火撫棺號曰親若有靈黙相吾力卽與妻舁出之後數人莫能舉唐治始會旱久祝融甚熾治始盡出裝資募人出柩無應者遂趨入伏棺巳而火息治始以薰炙死曁孝女則爲十七人余旣詮此不覺喟然有感傳曰惟送死可以當大事又曰附身附棺必誠必信勿致有悔誠以親魄所在不容苟焉者也故夏父弗忌犯不祥者四展禽知其雖得壽終亦必有殃巳旣葬而焚烟徹上誠不可謂非殃也故兹十七人者雖災降自天出於無奈然且以身殉之其不免者身雖死而猶有餘痛葢以身死爲輕而親殃爲重也又胡有非天所爲自作其孽而以親骸付之一炬乎然三吳之區習以成俗名曰火葬自數家巨族外未有不出於此者眞大惑不解也雖然三吳自明大祖以張士誠之故特重其賦相沿至今有增無損故一畞之輸盡身力竭地財不足以供上又安有隙地焉以自藏其軀骼乎是故朝生爲人暮死爲燼豈其性與人殊哉勢不得不然也嗟乎養生送死人道之大觀於十七人之事而三吳之民益可悲矣雞冠花記戊午葵之種類甚繁鷄冠其一也春苗初放絕類莧陸七月間吐葩於頂如雞冠然故名嘗日所見本草所載止有紫白黃三色高者五六尺矮者三四寸者而已花葉頑蠢無媚人之致卉中之賤者也邇年來于友朋園亭見所謂暹羅新種者高者丈㝷嬌艶特異然總會其數亦僅五六而止天空秋老荒齋寂莫友人李仁如曰聞東鄰鄷氏雞冠異絕盍往觀乎余諾之未暇也越數日値花主子道問無恙外卽自誇雞冠之異邀余往焉夾道盈廷周遭林立區其類紫如芝英赤如猩血綠如嫩林黃如蒸栗或紺或茜或蒼或白或一色而淡濃殊種或異類而一葩竝列玩其狀有如毬者胄者層臺者纓絡者佛指者禽似人形者恍惚變幻效竒呈譎殘照登墻晚風拂袂霞蒸錦燦意奪神銷自有兹花以來攷之書徴之見聞未有如斯之竒特也鄷子因請文爲記余惟天地變化草木日蕃其自昔無今有者不可殫數卽如一菊見之古者僅有黃花今之爲菊至以百數王之槐姚之黃魏之紫方陳之荔亦非以始于數氏哉造化之生生日新物類之日出無已然生之自天始必由人而顯故誌物之異者往往附以姓氏由是而例則今兹花之異雖謂鄷氏之鷄冠無不可也雖然余嘗擬爲布賦矣欲攷木綿之始而無從夫木綿一物衣被天下其功偉矣晦于古顯于今斯亦異矣假令得傳其人未必不足髣髴乎先𧖟始穡而九畹之蘭東籬之菊濂溪之蓮孤山之梅兹四物者其來已久何所甚異而炳灼千古則又果在物之異不異耶雖然以四君子之卓犖天壤而寄情一物此固不當相爲援說武陵有桃實賴柴桑之文而顯自昭有芷必資須溪之記而彰三槐之傳于坡叟芝閣之著自臨川人固足以傳物而物亦足以傳人者則又在乎藝林之表揚也余也有地餘十畝寄雙瀑之下思欲廣捜竒卉環蒔其間兵聲撼動饑火驅馳入鄷子之廬嘆羡何已而文辭澁拙氣力卑微又不足爲兹花重聊以應鄷子耳送查夏重遊燕京序已未余自丙辰春隨家大人至海昌已卽授經于元岵張先生家于今已四閱年矣其間同志諸君子推家大人之誼不余鄙棄者多有其人要皆得之四年中其爲家大人之故交而其後人復講世好與余相親愛者則惟陳乾初先生之子敬之查逸遠先生之子夏重與德尹敬之愚巾岸額寛褐襜如高視廣步少可一世以豪傑自許夏重德尹風儀爾雅才華駿逸與人處恂恂謙退而鋒􅉭四射與余交相善也去年冬海門孫先生以書見招余將適館餘杭敬之計無所出黯然泣下夏重德尹號于同志募金而援止之余亦甚依依于此間朋友忍而不能舎也遂樂得而止焉今年至海昌欲有所商質于夏重兄弟者不少乃德尹旣奪于司空陳公而夏重亦忽有薊門之行噫乎夏重此行果不得已耶夏重少時制舉文己超越時軰旣棄而學詩直逼遺山缶嗚之閫數年來更思務爲實學閉門掃軌兀坐一編城市中或至數月不出余甚敬憚之家大人嘗謂以夏重之明敏再加以沉篤數年之功莫之與京也何忽有是行乎豈其劍鼎淪埋豊城泗水不能長掩精氣耶抑且憤懣未銷姑欲借河山之巨麗以吐舒其壯志耶將或丘園無賁饔飱寒暑有不能甘其冷落耶夫以夏重之才所至公卿躧屨藝林推轂固所必然然夏重兄弟俱精于鬻時之技而業已甘自放廢則蓬蒿掩脛土室藏頭己久矣自拚也且近聞齊魯河淮凶荒無際行李艱阻景物蕭條無足發人之意志而夏重有魚一池有桑數畝節其衣飮尚足自遂稽古閉戸之懷吾語夏重得已則吾欲已然夏重此意已决而辛齋陸先生夏重之外舅也方在京師延佇夏重之至夏重此行其勢不容以或已顧吾有一語語于夏重夏重年方冨志甚勤吾知夏重道途閱歷周覽慿弔固必有以益昌其詩京師爲人物藪又値公車計偕之時而且當博學諸公之畢集吾知夏重徧訪而物色之某也經濟某也文章某也經史與藝術固必有以益長其材與學而余之所語者不在此夏重至京師見辛齋爲余道其三年之契濶且爲言京師去此水陸三千里大江大河爲之限冨貴者之所居而非貧賤者之所宐久留也亟整奚囊同賦曰歸是則余之所望于夏重者耳余與夏重兩世交情不敢爲泛然之言以相贈如以爲迂吾與質之敬之復陳言揚論句股書己未自客冬大雪偕世兄痛飮占鰲塔顚醉語瀾翻慿欄四顧見海南夏葢山糢糊雲霧中偶談及句股以爲此得表矩測量卽可得其高下逺近不爽累黍此時兄聽之甚爲創聞今年春仲來至貴邑忽以所著句股述一本見寄其言句股弦之和較相求與夫容圓容方測高測逺前設假如以定法中立論以闡理後綴圖以明象剖析毫芒窮源極委旣又示以矩測一本凡夫直景倒景變景莫不直原其所以然之故而得其一定之理此眞絕世之頴敏絕世之細心弟讀之駭嘆無已乃兄謬以弟曾發端必能通曉連賜三書命其指正且欲得荒蕪之文以序之愧赧何極葢弟非能明此家大人于三十年前空山推步百凡數學俱有成書弟不過因家大人書中竊演成法知天地間有此一種學問耳今見兄書因自嘆昏愚惰頑以家大人爲之父不能得萬分之一而兄偶一聞家大人之緒論于弟之口卽能闡揚剔抉通極微渺君才過丕奚啻十倍其能爲兄贊一詞哉顧思學問之事必以相商而愈出屢承兄命亦欲刻意求瑕以爲請敎之地乃再三伏讀無間可入葢兄于理數之源旣握肯綮從橫前後皆迎刃也獨是兄于矩測中有云置矩度以代小股置權線以代小句一語弟終不能無疑聊欲借此爲相質之端惟兄明教之夫句股云者橫直之謂也雖周髀以表屬股以景屬句然其時止有直表而無橫表故股修句廣得判然以分屬焉自後世復添設橫表立直表地上日自東而上景向西自西而下景向東景皆在平地是名直景其表爲股其景爲句設横表東西墻上日在東則測西表在西則測東表景皆自上而下是名倒景其景爲股其表爲句句股之名不得以表景分也其在矩度上方爲直表右方爲直影左方爲横表下方爲倒景其横直之方位悉易者葢地上之直表墻上之横表日景自爲弦其句股易辨矩度以兩耳承日而以權線之垂下代日以爲弦則兩表兩景皆其反面也故股長句短者權線必截直景而使之短葢直景句也股短句長者權線必截倒景而使之短葢倒景股也故其分度直景自一而至十二引而逺之句漸長也倒景自十二而至一引而逺之股漸短也是何得以矩度之兩表竟屬股權線之兩景竟屬句乎顧以兄之極深研慮悟出人先夫豈不明于此其所以不直斷倒景爲股横表爲句者原兄之意以因有變景也葢重矩測高股短句長權線逾直景之句而至倒景則此倒景當變直景同屬句也而弟則以爲因有變景益見倒景爲股不可爲句何則葢矩度止爲十二度之平方十二之外須相通易今直影旣窮權線侵股而入在倒景十一度于直景則當爲十三度又一十一分度之一在倒景十度于直景則當爲十四度又一十分度之四倒景度漸少直景度愈多以至倒景一度于直景則當爲一百四十四度此正由倒景爲股不可爲句而直景旣逺無度可切特借股以爲句之凖故必變之而始合也如果可爲句則所得本度卽可入算又奚庸必變乎且重矩測逺亦有當變直爲倒者不得以直景亦可爲股也又兄于前後倒景者其後一則有云前矩在倒景十度變直景爲一百四十四度後矩在倒景四度變直景爲三十六度景較得一百八度亦似有誤兄前論云視差之理後表之小句必多于前表之小句故重矩倒景必變直景始合于小句之近少逺多又云矩愈逺則愈平愈平則景愈多此固不易之理也今以前矩爲一百四十四度後矩爲三十六度則是前景多而後景反少不與前論相拂乎且倒景一度旣爲直景一百四十四度而十度又復如是是兩度相重十度與一度無别也葢十度之變爲一四四乃一十四度又一十分度之四如欲細分則後景之度亦當照分分之不得以分渾于度也嗟乎六藝之數其微渺足以貫三才而句股則數中之津梁也自畫天經野以至陣壘興作莫不相須科舉是尚實學之不講已久藝林之士不知句股矩度之名爲何物又焉復知此中之理弟嘗有志數學而質魯思鈍兼之就食四方身非已有安得有頓叚工夫以一一究心乎兄才質境地逺非弟比願從此而并西術之所謂三角八線者供次第及之弟當擔簦褁糒向武原而請教焉則弟之所以區區質此者誠欲以豚蹄盂酒而望汙邪之滿車也首本有十數亥豕弟已將紅楮拈出惟兄改正之作序弟非其人付刻時得列賤名于校讐足矣無已尚容少遲也矩測弟亦有杜撰一本因無副本不及附寄當于晤時請政也不宣宋安化王祠碑安陽許侯蒞海昌之五年飭廢釐弊之餘進一邑之士民與切磨聖訓掲揚倫紀蓋無不蒸蒸向風而其于爲子孝爲臣忠根源于性天所固結而不可解者尤諄諄懇摯焉邑中舊有安化王祠爲宋都統王禀于靖康元年與子荀城守太原兵殫力竭太守張孝純議降王叱之列兵死守城陷王父子相隨入原廟負太宗御容同赴汾水以殉國難父死忠子死孝烈矣高宗駐蹕臨安追封爲安化郡王謚忠壯子荀贈右武大夫恩州刺史召其孫沆赴行在賜第海昌縣治之北號安化坊恩賫甚渥天篤其胤在宋在明代有興者而王氏至今爲鉅族王父子因得廟食海昌祠倡始于明弘治間嘉靖壬子燬于火隆慶辛未又重建故在三管墩去縣五十里天啓甲子前任鮑侯觀光移之邑治之東偏浸淫歳月有飄揺風雨之感許侯欽王父子有關風敎之大防是不特王氏一姓之祠亦闔邑士民無不宜尸而祝之者也遂因王裔孫某某之請鳩工庀材捐俸資以樂成其美今日者廟貌聿新子孫邑人瞻拜其下千百年後恍然如始祔時焉而屬其碑詞于余余維王父子之在當日臣爲君死子爲父死一身以外寧復計料所及而身死之後蒸嘗不替子孫實繁于兹土抑且科第簪纓之弗絕忠孝之獲報于天如此哉海昌于臨安爲屬縣臨安故宋都今求當時南渡宫殿遺址茫然趙氏血胤㒺有存者漸江以東六陵風雨松楸麥飯亦有過而問焉者乎而王父子何以獨得此于海昌乎豈非孤忠壯烈耿光百世有不與時代爲廢興也歟嗚呼使當時列城之將盡能如王父子則汴城可不破河北可不棄使當時宋三宗亦盡能如王父子則徽欽可不北高宗可不南一時風靡逃死爲幸臣忘其君子忘其父而中原之禍遂以不救非由夫不忠不孝以至此耶王父子以隻手障狂瀾一木支大厦其亦謂之何哉嗚呼疾風板蕩所從來非一日矣後之君子觀于安化王祠爲臣思忠爲子思孝激頑立懦斯其爲許侯新之之意云爾銘曰大海蕩潏環城南趾尖山東鎖赭山西峙正氣扶輿人靈鍾此在昔有唐曰顏與許雙廟巍然配食千祀厥惟在宋有王父子血守孤城援絕蚍蟻弓弩㸑盡力竭城圮乃負御容而赴汾水臣爲君殉子爲父死宋社可遷此心不徙桓桓許侯王邦蒞止治民事神百廢具起追感王家忠孝兩美聿新廟貌以飭風紀有覺其楹有亷其戺香燈熒熒牷酒腯旨眷爾後人福爾桑梓朝朝東奔夕汐西駛靈旗倐閃萬鼓鞫耳又解或康熈某年當宁亶恩憫黌官之途隘爰大汙於絲綸百金捐納便同四人大縣人學四人士子慶幸普天欣欣謂一生攻苦欲上進而無門今得逢兹曠典庶懷抱之可伸于是富者出其餘緒貧者貸之親鄰如川赴壑惟恐後辰或又見于黃子曰昔聞子言拜敎無巳今復有云非爲一巳愛國私心爰質之子學官一席斯文所倚培養多士端于是始此敎化之所關非他途之可比縱軍興之需急亦何至悉索至是昔也雖有有司之暮夜猶忌三尺之或指而今竟公然懸之象魏出之宸㫖獨不惜夫朝廷之體耶至于皂隷之子黃口之孩之無未調戈晝未排佻達揚揚儼列宫齋靑衿環佩多于蒿萊而老成㝛耉積學懷才不飽半菽曾不得與之儕則又爲朝廷甚惜夫人材也黃子曰咄哉豎儒汝何能識三代異尚各有因革樂不相沿禮不相襲時文一道閱年七百久而必弊于今巳極貴上反下盈虚消息立國有規思所變易然其聲光歴久赫奕積重之勢莫可與敵惟有金錢無不辟易借此勝之庿謨神䇿此其微權詎易窺測不然堂堂天朝萬方玉帛貢賦積丘山豈賴此涓滴子乃以爲恐傷國體是何異眼如蟣􆁮乎且夫人材之生無之不有何從刀筆蒯起屠狗尚釣渭濱亮耕南畞自古以來不勝某某自限于科舉之一途而才始阨于陽九其不出是者卽學貫三才目窮二酉止堪老死于溝壑而無由進取其偶得是者卽胸如昏童目如矇瞍俱可從容王路驕人以筲斗聖人知蟉龍之不育于池沼松栢之不生于培摟用是旁捜博採不拘一窠曰則夫時文中所謂老成㝛耉亦何殊磨蟻窓蜂奚所于用而掛于口獨是子更有惜殊不子然奈非臯鶴得聞于天鄕會兩試世所盱䀽亦定以價畫一若干杜其私營使得共緣上足利國下不妨賢理財用人于此乎兼遺此大利實足惜焉曰子言得母過激耶曰噫子未之思也所貴兩㥬入官必自進則君圖出則民蒞今闢門之典旣廣惟急公者之是視內而部屬淸華外而縣敎佐貳任人意之所向可朝捐而夕卑咸一體而無分固无拘乎方地試觀進士豈便得仕㨗者廿年不則沒世欲自試而熱中亦須緣乎新例故科甲之虗號徒存而科甲之精靈莫寄猶震矜乎其名葢士子之熟睡是何足爲重輕乃牽拘而粘滯乗舉世之猶美正多金之可致而子以予言爲激眞蒙昧乎朝三暮四者也殱虎記甲寅之亂越城岌岌幾不保鄉聚多被􅋊毒乙卯賊平流亡稍集虎災異甚會稽東南黃廟湯浦之間廣袤數十里山阜綿錯榛篁杳深虎盤據其間白晝攫摶倚人爲糧出則結隊成群蟬聯魚貫其中一虎灰質黑章狀獨小而喙鋭者爲之魁群虎聽命二虎翼之湯浦南連新􅌘東西達金台往來者不絕魁臥叢薄中俾二虎迭探短垣伺行人過卽告魁魁奮起突噬其二從而瓜食之日以爲常行旅斷絕則走曠野以覔種耨之夫一日魁臥河干其二蹲侍有數客航來前舟子負纜行岸上見一人疾走狂呼曰前有三虎時日方中過客邨民環聚且千人鳴金呼噪魁始徐起欠伸左右顧盻頃之人立而吼前爪翼張雄風夾輔河水掀蕩林木動揺衆皆相視膽䘮巳入人居室門閉則毁垣破戸攫人而去某家午炊娣㸑姒飪娣聞突上有聲急起視之則見虎攫姒踰垣出矣至有一日傷十六人者總計自丙辰以後爲其所啖食者至二千一百餘人村有土穀神祠村之父老欲醵金召募獵子卜之于神不許累卜累不許有合衆力捕者果愈罹毒於是父老咸曰此天遣神虎其奈之何肆虐四年郡司馬童使君來臨吾越方下車蹙然曰此蒞民者之責也齋㝛七日爲文以祭告于城隍土榖諸神禦災捍患明有吏而幽有神鷙獸爲虐噉人婦子白晝公行此雖吏之過亦神之耻也自今以後不能共爲翦除者吏不得受祿神不得血食瀝酒誓之居民聞使君之誓神也復卜之神神亦許之居數日某邨兄弟三人見野豕群食其禾各執鳥銃往驅至則虎也魁虎直前啣兄兄急發火火彈直衝魁㗋應手而斃二虎見魁死咆哮奔逸自是而虎患頓除虎旣斃刳其腹得指爪八合銀釧數枚焉夫所殺止一虎耳而虎患爲之頓除何也唐書補言斐旻一日射三十一虎父老曰此皆彪也將軍未遇眞虎耳最後一虎騰出於諸虎特小一吼而人馬辟易弓矢皆墜今之虎小而銳與書言符合眞虎也則謂之神虎也亦宜東漢不其令童恢殺伏罪之虎前史以爲美談使君之姓適與相合然恢之所殺凡虎也寧與使君所殺之眞虎比乎其後守令焚牒驅虎如使君之爲者有周郁于梓人張昺皆以其精誠能動神也然諸公由此知名爲大官而使君左遷以去蘓子瞻爲韓公廟碑云公之精誠能馴鱷魚之暴而不能弭皇甫鎛李逢吉之謗葢自古傷之矣雖然皇李終不能抹摋文公天定故也使君其勉之以待天之定乎使君名綏世善政多有可書而殱虎一事感格幽明信耳信目因某某之請爲記之冐雨看桂記癸亥虎林山水旣勝離城塢聚復多樹花木以鼓吹四時西谿之梅臯亭之桃滿家衖之桂其最著也萼舒蕾放舲舫梭流輿馬塡壓盃盤歌吹纓笄傾城余心艶久矣頻年往返城中天時人事毎相齟齬今年春孟始得買小舟偕萬子公擇訪施贊伯觀梅于河渚之俞家埭寒食次日分司山左王桐菴又偕余觀桃于乾墩邨雪滿千林霞明萬疊西谿臯亭之勝俞埭乾墩其尤最也七月旣杪余自崑山歸省未抵家適以誌事隨家大人至會城殘暑初闌金風未肅小兒鬻桂滿街芳連鼻觀唐翁在湘曰桂花盛開滿衖游者如堵先生盍徃觀乎明日晦雨至午頗漏霽色翁具酒肴傋肩輿曰過此花益壞於是出淸波門天氣黯淡嶺雲滃渤緣堤敗沼猶有殘荷數朶嫣然嫵媚過净慈越邵王墳甬水張司馬墓在焉恐日暮不及拜謁路旁多紅蘭草花俱似菊販游歸者挿持擔負挨肩絡繹香氣襲人如入寳山來無徒手者歩登石屋嶺南高峯雲益駛石屋寺中游女盡有倉皇色巳而谷風漸急林木震揺山雨坌注踉蹌假坐一小樓樓當山脇慿檻皆木樨翁呼僮行酌雨聲花氣淸沁心脾似阻游之雨更爲游者增一景色也家大人因憶乙丑秋曾陪先大父忠端公至止陵谷貿遷河山數易屈指於今再至蓋五十九年矣然思來時日巳逾午而兹地去城十里有餘往返近三十里風雨泥其前閽闥恐其後向非翁之勇决再至之期焉知不又幾經年歲乎入城街頭已瞑色矣余於今年竟得畢覧虎林之三勝焉天花仁術序癸亥痘疹不知起自何時相傳在晉宋之間數千年來毒痡極矣天道好生物極必返邇乃有種豆之仁術康熈戊申余讀書甬上有曁陽某者挾此術至吾友陳䕫獻篤奉之號於同志余時卽欲學焉而未暇也歲辛酉余以試事在省家大人以帖諭云痘疫盛行余方日夜恐恐適浦陽有傅啇霖者以種痘術抵吾里孫軰七人俱得安全其未信者鄰里同舍多罹此厄余益感而願得之今年夏啇霖過訪余與之促膝連床啇霖亦不惜盡傾底藴余時適往崑山未得竟業政初啇霖之兄也文譽斐然本其家授兼以此術濟世葢自明初其遠祖竇繼先生從戴原禮遊卽精於醫傳至其曽祖思川祖岐山始以種痘術聞逺近父希成叔希美爲格等繼之而政初集其大成余於武林遇之得觀其綈帙且爲余細辨痘情痘理痘色痘症有在筆墨之外者所謂口訣也余問痘自先天何以能爲人力之所挽政初云痘本胎毒相火伏於命門人身五臟經絡俱係背骨左右肺係於背骨第三椎心係第五椎肝第七椎脾第十一椎腎第十四椎腎之中卽命門也謂左腎右命門者非相火在下由腎上炎而脾而肝而心而肺其毒輕者不卽發徐歷諸經其毒已透則其勢緩而吉其毒重者卽腎或脾而發則其勢急而凶故相痘肺爲上心次之肝又次之脾腎爲最下今種痘之法愼選良苗種干鼻孔鼻孔爲肺之竅又督脉所係由上而下直貫命門引毒而出使無伏裏豈非至妙之理歟其爲符咒可廢乎曰不可痘疫時行實有邪祟且忌諸犯觸非此無以發人之誠信耳故古有祝由科非無謂也因與政初詮次増定其家傳之本爲天花仁術一書總種痘時痘爲十卷公之同好所謂父不哭子其利漙哉政初更善鍼術其經絡補瀉悉本靈素與今所行世者逈異此其一端云
