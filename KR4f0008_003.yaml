  text: 南雷文案卷三
  hash: sha256:ced1b606f7bc7b3ac68da50171905ee18ddbcd68cdfa9288ab6d4fbf86cfdc88
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0008_SBCK_003-1a}
body:
  text: 姚江黃宗羲著答董吳仲論學書丁未承示劉子質疑弟衰遲失學望先師之門墻而不得又何足以知其微意之所在則自疑之不暇而能解老兄之疑雖然昔人云小疑則小悟大疑則大悟不疑則不悟老兄之疑固將以求其深信也彼泛然而輕信之者非能信也乃是不能疑也異日者接先師之傳方于老兄是賴弟亦焉敢不以所聞者相質乎觀質疑中所言雖廣然其大指則主張陽明先生無善無惡心之體有善有惡意之動知善知惡是良知為善去惡是格物四句而疑先師意為心之所存未為得也弟推尋其故由老兄未達陽明始終宗旨所在因而疑先師之言若徒執此四句則先當疑陽明之言自相出入而後其疑可及於先師也夫此四句無論與大學本文不合而先與致良知宗旨不合其與大學本文不合者知善知惡而後為善去惡是為善去惡之工夫在知善知惡則大學營云格物在致知矣若大學非倒句則是先為善去惡而後求知夫善惡也豈可通乎然此在文義之間猶可無論也陽明提致良知為宗一洗俗學之弊可謂不遺餘力矣若必守此四句為教法則是以知覺為良知推行為致知從其心之所發驗其孰為善孰為惡而後善者從而達之惡者從而塞之則方寸之間巳不勝其憧憧之往來矣夫良知之體剛健中正純粹精者也今所發之意不能有善而無惡則此知尚未光明不可謂良也何所藉以為為善去惡之本乎豈動者一心知者又一心不妨並行乎考亭晚年自悔云向來講究思索直以心為巳發而止以察識端倪為格物致知實下手處以故闕却平日涵養一假工夫至於發言處事輕揚飛躁無復聖賢雍容深厚氣象所見一差其病一至於此不可以不審也今以意之動處從而加功有以異于考亭之所云乎吾不意陽明開千聖之絶學而究竟蹈考亭之所巳悔也四句之弊不言可知故陽明曰良知是未發之中則已明言意是未發苐習熟于意者心之所發之舊詁未曾道破耳不然意既動而有善有惡巳發者也則知亦是巳發如之何知獨未發此一時也意則巳發知則未發無乃錯雜將安所施功乎龍溪亦知此四句非師門教人定本故以四無之説救之陽明不言四無之非而堅主四句蓋亦自知于致良知宗旨不能盡合也然則先師意為心之所存與陽明良知是未發之中其宗旨正相印合也老兄所謂各標宗旨究竟打迸一路在此處耳若謂先師不言意為心之所存愼獨之旨端的無弊不知一為心之所發則必於發處用功有善有惡便巳不獨總做得十分完美只屬枝葉一邊原憲之不行克伐怨欲告子之義襲皆可謂之愼獨矣故欲全陽明宗旨非先師之言意不可如以陽明之四句定陽明之宗旨則反失之矣然先師此言固不專為陽明而發也從來儒者之得失此是一大節目無人説到此處老兄之疑真善讀書者也透此一關則其餘儒者之言真假不難立辨耳中庸言致中和考亭以存養為致中省察為致和雖中和兼致而未免分動靜為兩截至工夫有二用其後王龍溪從日用倫物之感應以致其明察歐陽南野以感應變化為良知則是致和而不致中聶雙江羅念菴之歸寂守靜則是致中而不致和諸儒之言無不曰前後內外渾然一體然或攝感以歸寂或緣寂以起感終是有所偏倚則以意者心之所發一言為祟致中者以意為不足慿而越過乎意致和者以動為意之本然而逐乎意中和兼致者有前乎意之工夫有後乎意之工夫而意攔截其間使早知意為心之所存則操功只有一意破除攔截方可言前後內外渾然一體也願老兄于此用力知先師此言導濂洛血路者也其餘文義之異同凍解霧散尚俟弟爝火之喋喋哉與友人論學書潘用微議論某曾駁之於薑定庵書或某執成見惡其詆毁先賢未畢其説便逆而拒之陳君采云譬猶明月之珠失之二千年上自王公下至氓隸無不倀倀日索之終不可致牧豎乃獲于大澤之濵豈可以人賤而並珠弗貴乎某之於用微焉知其不出于此也平懷降志反覆用微之指要而後知前書之終不為謬也用微之言不過數句而盡而重見疊出唯恐其不多此是兔園老生於文義不能甚解固無足怪試撮其要言以為渾然天地萬物一體者性也觸物而渾然一體者吾性之良知也吾儒講明此學必須知耻發憤立必欲明明德于天下之志故其功夫在致其觸物一體之知以格通身家國天下之物使渾然而為一體謂之復于性善未有舍家國天下見在事使交從之實地而懸空致我一體之知者此數言亦從朱注中本體之明則有未嘗息者故學者當因其所發而遂明之以復其初脫換出來然而其謬有不可勝言者夫性固渾然天地萬物一體而言性者必以善言性決不以渾然天地萬物一體言性一體可以見善而善之非一體明矣且如以惻隱言一體可也以辭讓言一體亦可也使羞惡是非歷然吾獨知之中未交人物與渾然一體何與則性于四端有所槩有所不槩矣大學言知是明有一知在人不因觸不觸為有無也則所以致之者亦不因觸不觸為功夫也今干知之上既贅以渾然天地萬物一體之名而于致之時又必待夫觸物而動之頃是豈大學之指耶其曰未有舍家國天下見在事使交從之實地而懸空致我一體之知者則中庸所謂喜怒哀樂未發之為中中也者天下之大本也豈亦家國天下見在事使交從之地耶孟子所謂日夜之所息養心莫善於寡欲者豈亦家國天下見在事使交從之地耶將無子思孟子俱有懸空致知之失耶信斯言也舍家國天下無從為致則中庸何不言位天地育萬物以致中和何不言盡人之性盡物之性而後為能盡其性子思無乃倒行而逆施乎夫吾心之知規矩也以之齊家治國平天下猶規矩以為方圓也必欲從家國天下以致知是猶以方圓求規矩也學者將從事于規矩乎抑從事于方圓乎可以不再計矣古之欲明明德于天下者一句所以興起下文歸重格物則欲字之無功夫稍識文義者亦不難辨用微乃以欲為立志而言齊家治國平天下渾然吾身之事自不得不汲汲皇皇憂世憂民堯舜禹稷湯武伊周孔孟莫不皆然至云陽明之學覺無擔當天下之力其門人多喜山林無栖皇為世之心即見其學之病處亦思堯舜禹稷湯武伊周所當之任何任孔孟之周流歷説欲以得君行道亦是經生私意以窺聖人孟子之言可證也顔子當亂世居于陋巷一簞食一瓢飮人不堪其憂顔子不改其樂孔子賢之鄉鄰有鬭者被髮纓冠而往救之則惑也雖閉戶可也顔子未嘗汲汲皇皇憂世憂民將謂顔子未嘗立志乎使舉一世之人舍其時位而皆汲汲皇皇以治平為事又何異于中風狂走即充其願力亦是摩頂放踵利天下為之之事也孟子曰中天下而立定四海之民君子樂之所性不存焉則復性之功其不在家國天下亦明矣凡用微之蔽于大原者有三其一滅氣夫大化之流行只有一氣充周無間時而為和謂之春和升而溫謂之夏溫降而涼謂之秋涼升而寒謂之冬寒降而復為和循環無端所謂生生之為易也聖人即從升降之不失其序者名之為理其在人而為側隱羞惡恭敬是非之心同此一氣之流行也聖人亦即從此秩然而不變者名之為性故理是有形見之于事之性性是無形之理先儒性即理也之言真千聖之血脈也而要皆一氣為之易傳曰一隂一陽之為道蓋舍隂陽之氣亦無從見道矣用微言性自性氣自氣氣本非性不足言也用微既主張天地萬物一體矣亦思天地萬物以何者為一體乎苟非是氣則天地萬物之為異體也決然矣離氣言性則四端者何物為之仍墮于佛氏之性空四端非氣而指剛柔善惡始可言氣一人之心有從氣而行者有不從氣而行者且岐為兩又何能體天地萬物而一之也用微認金木水火土五行為氣以為性豈有五故必離氣以言性不知自氣而至五行則質也而非氣也氣無始終而質有始終質不相通而氣無不通先儒何嘗以質言性其言氣質之性者指其性之偏者耳此孟子有命焉君子不謂性之性又何嘗竟指此為性乎用微又言先儒云虗即是理理生氣豈非老莊虗無生氣之説乎故凡先儒之言氣者必曰本乎老虗即是理固未聞先儒有此言也獨不觀張子曰知虗空即氣則有無隱顯神化性命通一無二若謂虗能生氣則入老氏有生于無自然之論不識所謂有無混一之常則虗無生氣之説正先儒之所呵者顧牽連而矯誣之乎用微又言性與天道有分夫在人為性在天為天道故曰天命之謂性言其一也若謂天道不可以言性無論背于中庸則又何以曰渾然天地萬物一體也亦自背其説矣其二滅心先儒以靈明知覺為心蓋本之乾知而有所謂南海北海千載上下無有不同者也儒者未常有識神之論佛氏始有之即以是例之儒者心有所向之為欲識神之謂也苟無欲則此靈明知覺者即是真心矣用微以靈明知覺歸于識神無欲而靜尤為識神之盤據引佛氏之繩以批儒者之根吾惡乎受之其三滅體心無分于內外故無分于體用大學之所謂先後本末是合外于內也歸用于體也故儒者以主敬為要有治心之學無應變之方用微必欲合內于外歸醴于用以為敬在于事始為實地若操持涵養則盤桓于腔子而巳夫萬感紛紜頭緒雜亂易之所謂憧憧往來是也豈復能敬子思之戒愼不睹恐懼不聞不睹不聞亦指事而言乎仲弓居敬而行簡其所居者亦在事乎且在中庸者不一言而足夫微之顯不動而敬不言而信溥博淵泉而時出之君子之所不可及者其惟人之所不見乎其功夫皆在心體不在事為境地用微每不喜稱引中庸亦以此也用微又言今之言體者豈非性乎今之言性者豈不遺天地萬物乎舍天地萬物而言性非性也孟子云萬物皆備于我而其要在反身如用微之不得操持涵養則反身便為遺天地萬物矣是我備于萬物不是萬物備于我也豈不成戲論乎用微有此三蔽故其放而為淫詖之辭有無故而自為張皇者有矯誣先儒之意而就巳議論者夫人性之善也堯舜之道孝弟也當入小學之日熟讀而習聞之矣乃用微咕咕以為獨得之心傳此無故而自為張皇者也陽明先生無善無惡心之體亦猶中庸言上天之載無聲無臭恐人于形象求之非謂并其體而無之也其曰老氏説虗聖人豈能于虗上加得一毫實佛氏説無聖人豈能于無上加得一毫有言良知無有精魂之可弄非竟同老氏之虗佛氏之無也用微云陽明之知當體本空者也是佛氏真空之知慧可謂癡人前説不得夢矣又云陽明之學與程朱主敬窮理之學不同夫致良知非主敬窮理何以致之其言不同者無乃妄分界限乎白沙云心之萬感萬應可睹可聞者皆實也其為應感所從出不可以睹聞及則虗而巳此兼費隱而為言也用微以為有生于無老氏之學豈子思子亦老氏之學乎又不明程朱之言理氣而以虗無生氣亂之此皆矯誣先儒之意而就巳議論者也用微言程朱以心屬氣是本乎老則何不言孟子之養氣亦本乎老又言陸王之虗靈知覺是本乎佛則何不言舜之道心惟微亦本乎佛又言為程朱之學者據性理以詆陸王是以老攻佛為陸王之學者據靈知以詆程朱是以佛攻老自周程朱陸楊陳王羅之説漸染斯民之耳目而後聖學失傳可不為病狂喪心之言與蓋用微學佛氏之學既借之以攻儒久假而不歸忘其所自來遂即借之以攻佛自有攻佛之名而攻儒之説始益堅佛氏之學有如來禪祖師禪之異然皆以空有不二為底藴如來禪言心性祖師禪惡言心性如來禪言體祖師禪言用如來禪談空祖師禪論實事如來禪稿木死灰祖師禪縱橫權術為祖師禪者之言曰不怕甕中走却鱉故只在事為上立腳心之存亡邪正一切不足計也兩禪之不同如此而如來禪自真空而妙有祖師禪自妙有而真空其歸則一也凡程朱諸儒之所闢者皆如來禪其于祖師禪曾未之及也故昔之為其道者不愛官不爭能樂山水而嗜安間者為多今之為其道者力任奔競一變而為功利雖老氏之流為申韓亦其教有以使之然也試觀用微所言有一不與祖師禪相合者乎用微自言參禪從死了燒了何處安身立命公案悟入夫焚如死如棄如則為生氣之所不到而靈明知覺亦無所寄此其真區處也故亦遂疑一隂一陽非道之所在凡有靈明知覺皆凝滯不能真空屬之識神用事以此裁量先儒程朱則落于隂陽陸王則墮于識神在諸儒則尚不敢望如來邊事何况祖師在用微則如來禪尚是所闢何况諸儒而井蛙之所藏身者復鏟滅其迹不示人以利器嗚呼亦巧矣用微強坐先儒以性空而以性善為實事然用微之説真性空也何以言之繼之者善也成之者性也以一隂一陽之道為之根抵用微必欲去之則性空矣攻取百塗豈能實之也故用徵之訾毀先儒呵佛罵祖是天上天下惟我獨尊之故智也所遇之人急出所説求其信向信向者便以聖賢許之即釋氏以信心為第一義之故智也用微以人師自命不難置先賢于堂下供其叱吒某於先賢不能為役用微乃退而自列於學人欲借某以行其教亦釋氏作用見性之故智也是故用微而不諱禪宗以一棒號令天下無論兩廡諸賢蹂􅏳而甘之浸假而及于廟庭道不同不相為謀某又何説唯是口口闢佛口口自言聖學世人耳目易欺以為釋氏言空彼言實事釋氏外人倫彼言孝弟釋氏言明心見性彼掃除心性釋氏獨善其身彼言家國天下決然謂非禪學反以諸儒字腳間有出入于二氏者不可分别寧不增一重鶻突乎且諸儒之書繭絲牛毛自六經以外不比史傳之粗心易讀學者窮年于此便如鼠入牛角橫身苦趣今曰皆邪説也竟可撥置不道省却多少氣力而又有不讀非聖之書之言可以自文奈何不樂從之乎雖然用微亦何常不自認禪學其言曰三代以後聖人之道幾絶佛雖異端其為神人欽仰有故也親證真空一切聲色名利世情俗見無不銷滅豈不為神人欽仰耶世情俗見一空性善種子發見而慈悲度世豈不暗合孔孟當為神人欽仰耶用微既自認之而世人反不認其認者惡在其信用微也宋人有學者三年反而名其母母曰子之于學者將盡行之乎願子之有以易名母也子之于學也將有所不行也願子之且以名母為後也夫用微之訾毀先儒名母之學也將盡行之乎願勿訾毀先儒也將有所不行也願且以訾毀先儒為後也與陳乾初論學書丙辰自丙午奉教函丈以來不相聞問蓋十有一年矣老兄病如故時而弟流離遷播即有病亦不能安居也况得專心于學問乎唯先師之及門凋謝將盡存者既少知其學者尤少弟所屬望者惲仲升與兄兩人而巳此真絶續之會也今歲因緣得至貴地竊謂得拜床下劇談數日夜以破索居之惑而事與願違尚在有待幸從令子敬之得見性解諸篇皆發其自得之言絶無倚傍絶無瞻顧可謂理學中之别傳矣弟尋繹再三其心之所安者不以其異于先儒而隨聲為一閧之辨其心之所不安者亦不敢茍為附和也老兄云人性無不善于擴充盡才後見之如五穀之性不藝植不耘耔何以知其種之美惻隱之心仁之端也雖然未可以為善也從而繼之有惻隱隨有羞惡有辭讓有是非之心焉且無念非惻隱無念非羞惡辭讓是非而時出靡窮焉斯善矣夫性之為善合下如是到底如是擴充盡才而非有所增也即不加擴充盡才而非有所減也不為堯存不為桀亡到得牿亡之後石火電光未嘗不露才見其善確不可移故孟子以孺子入井呼爾蹴爾明之正為是也若必擴充盡才始見其善不擴充盡才未可為善焉知不是荀子之性惡全慿矯揉之力而後至于善乎老兄雖言惟其為善而無不能此以知其性之無不善也然亦可白惟其為不善而無不能此以知其性之有不善也是老兄之言性善反得半而失半矣老兄云周子無欲之教不禪而禪吾儒只言寡欲耳人心本無所謂天理天理正從人欲中見人欲恰好處即天理也向無人欲則亦無天理之可言矣老兄此言從先師道心即人心之本心義理之性即氣質之本性離氣質無所謂性而來然以之言氣質言人心則可以之言人欲則不可氣質人心是渾然流行之體公共之物也人欲是落在方所一人之私也天理人欲正是相反此盈則彼細彼盈則此絀故寡之又寡至于無欲而後純乎天理若人心氣質惡可言寡耶棖也欲焉得剛子言之謂何無欲故靜孔安國注論語仁者靜句不自濓溪始也以此而禪濂溪濂溪不受也必從人欲恰好處求天理則終身擾擾不出世情所見為天理者恐是人欲之改頭換靣耳大抵老兄不喜言未發故于宋儒所言近于未發者一切抹去以為禪障獨于居敬存餋不黜為非夫既離却未發而為居敬存養則所從事者當在發用處矣于本源全體不加涵餋之功也老兄與伯繩書引朱子初由察識端倪入久之無所得終歸涵養一路以證察識端倪之非弟細觀之老兄之居敬存養正是朱子之察識端倪也無乃自相矛盾乎則知未發中和之體不可謂之禪而老兄之一切從事為立腳者反是佛家作用見性之旨也老兄之學可謂安且成矣弟之所言未必有當然以同門之誼稍呈管見當不與隨聲者一例拒之也與李杲堂陳介睂書辛亥萬充宗傳論以高旦中志銘中有兩語欲弟易之稍就圓融其一謂旦中之醫行世未必純以其術其一謂身名就剝之句弟文不足傳世亦何難遷就其説但念杲堂介睂方以古文起浙河芟除黃茅白葦之習此等處未嘗熟講將來為名文之纍不少故略言之蓋不因鄙文也夫銘者史之類也史有褒貶銘則應其子孫之請不主褒貶而其人行應銘法則銘之其人行不應銘法則不銘是亦褒貶寓于其間後世不能槩拒所請銘法既亡猶幸一二大人先生一掌以堙江河之下言有裁量毀譽不淆如昌黎銘王適言其謾婦翁銘李虗中衛之玄李于言其燒丹致死雖至善若柳子厚亦言其少年勇于為人不自貴重豈不欲為之諱哉以為不若是則其人之生平不見也其人之生平不見則吾之所銘者亦不知誰何氏也將焉用之大凡古文傳世主于載道而不在區區之工拙故賢子孫之欲不死其親者一則曰宜得直而不華者銘傳于後再則曰某言可信以銘屬之苟欲誣其親而巳又何取直與信哉亦以誣則不可傳傳亦非其親矣是皆不可為道今夫旦中之醫弟與晦木標榜而起貴邑中不乏肩背相望苐旦中多一番議論緣飾耳若曰其術足以蓋世而躋之和扁不應貴邑中擾擾多和扁也曩者旦中亦曾以高下見質弟應之曰以秀才等第之君差可三等旦中欲稍軒之弟未之許也生前之論如此死後而忽更之不特欺世人且欺旦中矣説者必欲高擡其術非為旦中也學旦中之醫旦中死起而代之下旦中之品則代者之品亦與之俱下故不得不爭其鬻術之媒是利旦中之死也弟焉得膏唇販舌媚死及生周旋其刻薄之心乎且銘中之意不欲置旦中于醫人之列其待之貴重亦巳至矣如説者之言乃所以薄待旦中也至于身名就剝之言更之尤不可解古人立德立功立言三者旦中有一于是乎自有宇宙不少賢達勝士當時為人宗物望所歸者高岸深谷忽然湮滅是身後之名生前著聞者尚不可必况欲以一藝見長而未得者乎弟即全無心肝謂旦中德如曾史功如禹稷言如遷固有肯信之者乎是于旦中無秋毫之益也惟是旦中生平之志不安于九品之下中故銘言日短心長身名就剝所以哀之者至矣不觀歐公之銘張堯夫乎其有莫施其為不伐充而不光遂以昧滅後孰知也堯夫為歐公好友哀之至故言之切也今日古文一道幾于墜地所幸浙河以東二三君子得其正路而由之豈宜復徇流俗依違其説弟欲杲堂介睂是是非非一以古人為法寧不喜于今人毋貽議于後人耳若鄙文不滿高氏子弟之意則如范家神刻其子擅自增損尹氏銘文其家别為墓表在歐公且不免而况于弟乎此不足道也辭張郡侯請修郡志書辛亥伏蒙以修志見召草堂猿鳥沾𬒳光榮某獨何心不思報稱然而不敢冒昧者則亦有故蓋文章之道臺閣山林其體濶絶臺閣之文撥斸治本縆幅道義非山龍黼黻不以設色非王霸損益不以措辭而卒歸于和平神聽不為矯激山林之文流連光景雕鏤酸苦其色不出于退紅沈緑其辭不離于嘆老嗟卑而高張絶絃不識忌諱故使臺閣者而與山林之事萬石之鍾不為細響與韋布里閭憔悴專一之士較其毫釐分寸必有不合者矣使山林者而與臺閣之事蚓竅蠅鳴豈諧韶頀脫粟寒漿不登鼎鼐蓋典章文物禮樂刑政小致不能殫孤懷不能述也某岩下鄙人少逢患難長藐流離遂抱幽憂之疾與世相棄牧雞圈豕自安賤貧時于農瑣餘隙竊弄𥿄筆戚話鄰談無關大道不料好事者標以能文之目使之記生卒飾吊賀根孤伎薄發露醜老然終不敢自與于當世作者之列蓋歌虞頌魯潤色鴻業自是名公巨卿之事而欲以一鬱之懷枯稿之容規其百一豈不虞有畫虎之敗哉今夫越郡之志地逾千里時將百年所謂臺閣之文也既有明府名公巨卿以為之主當世之詞人才子孰不欲附名末簡分榮後祀而猥蒙召役枯楊寒炭亦起煙華便當袛奉恩命自比幕下反覆思之終于不可某聞梓人之造室也大匠中處衆工環立向之大匠右顧曰斧則執斧者奔而右左指曰鋸則執鋸者趨而左其不勝任者怒而退之某自視不知斧鋸安在明府右顧則某將空手而奔左明府左指則某將空手而趨右又何待環立而知其不勝任哉小儒山林之手其無當于臺閣也明矣使其退之于既怒之後何如退之于未怒之前耶伏望明府哀其弗及收回成命謹以召啓再拜上繳本欲泥首郡朝謝此知遇而先王之制士不傳贄為臣則不見于王公某區區守禮不敢隕越亦知明府之所責者不以流俗也不勝感荷屏營之情再辭張郡侯修志書辛亥蒙明府以志事見委其不敢當者已見于前書但前書以某而言之也今以事而言之亦有所甚難從來稱志之善者楊升菴之四川趙浚谷之平涼為最其餘不過苟且充賦將操筆者之非其人耶抑不名一手而取才猥雜耶或以體格一定無所見長而忽之耶不然則見聞固陋所謂考索者别是一家之學耶更不然則鄉邦之恩怨是非無人肯任之耶嗟乎蓋皆有之矣是故公志每不如私志宋景濂之浦陽人物記文章爾雅程敏政之新安文獻志考核精詳其他如襄陽耆舊荆楚歲時吳地華陽不可枚舉以其無五者之纍也明府固今之升菴浚谷也然而所委之人寧必其無五者之纍乎今謂舊志不煩更張只續此數十年以來之事似矣某讀明府之例為類十八則八縣皆當稟此規範方可合為一書今各縣舊志分類不同或多或寡若復因仍則是可分而不可合也一代有一代之制作革命之際每多忌諱隱語闌入豈可不愼是又不得不改者也某讀諸家文集及于雜史間或考之正史則多同異考之志乘則多錯謬以志乘之手未必如作史者之出自名家也其相去遠矣今若見其謬誤遺漏而一一聽之恐既經纂修之後則明眼所照遺議不專在前人矣吳縝紏繆于唐書許浩闡幽于元史在史且然而况于志乎此舊志之所當論者也志與史例其不同者史則美惡俱載以示褒貶志則存美而去惡有褒而無貶然其所去是亦貶之之例也越中數十年來人物炳然在人耳目者可屈指而畢一時冨貴為鄉里小兒所咨嗟艷慕者其姓氏巳為狐貉噉盡今若以子孫姻婭之故探之狐貉口中而復留之雖罄會稽之竹箭剡溪之古藤有所不足矣其間亦有高位久宦干涉國史者而或為公論所排清議所譏此正當去之以明貶者試出其家傳讀之莫不各有一篇粧點文字老成凋謝二三措大其耳目見聞有限試有人與之分别源流證明實録彼在甕天者反以為一人之愛憎斯時也起而抗言爭執則叢為怨府何苦而嘗身于市虎乎若骫骳將順不特為明府之謀不忠而魯衛之士有以薄其心胸矣此續筆之所當論者也語有之量而後入毋入而後量某竊于今量之故曰難也伏惟上裁辭祝年書頃見萬貞一鄭禹梅以某年滿六十徵文相寵某不勝愕然如昏沈夢中忽然搖醒記憶此身方才痛哭某十七失父斯時先忠端公年袛四十三耳某亦何忍自比先公而以四十三年私為已有乃不意頑鈍歲月遂贏先公之十七某之贏一年是先公之縮一年也何痛如之人子之壽其父母大約在六十以後最蚤則五十耳某不得遇先公之五十申其一日之愛又何敢自有其五十六十乎先公就逮之日題詩驛壁云中官弟姪皆遺蔭孤孽何曾敢有兒齒髮易銷斯哀難滅是馬醫夏畦皆得為壽惟某有所不可也即使假先生長者之寵靈然難乎其為立言也自最生平無一善狀仇刃冤贓鉤黨飛章圍城獄戶柳車變姓積尸蹀血虎穴鯨波數十年野葛之味豈止一尺蓋獨有危苦可書耳夫文章之傳世以其信也弇洲太函陳言套括移前掇後不論何人可以通用鼓其矯誣之言蕩我穢疾是不信也不然而憐其顚覆拾之以當歌哭將無憂能傷人不復永年某以頑鈍而忘之者先生辰者以描畫而醒之所以促其餘生也又為所不忍矣某展轉不得其説在某之不宜壽如此在作者之難于為壽又如此昔念菴先生六十有書謝祝某引例而為之非敢自許亦曰念菴且然而况于某乎苟其不然是念菴之罪人也與陳介睂庶常書戊午吾兄與國雯書見及言都下諸公欲以不肖姓名塵之薦牘葉訒菴先生且於經筵御前面奏其後訒菴移文吏部吾兄力止始聞之而駭已喟然而歎且喜兄之知我也某幼離黨禍廢書者五年二十一歲始學為科舉思欲以章句揚于當時委棄方幅典誥之書而不視年近四十暮逢喪亂負母流離退棲陋室與百姓雜處又焉得有竒聞異見下逮于農瑣哉是空疏不學未有甚于某者也今朝廷命舉博學宏儒以備顧問此為何等謂之博學吾意臨平石鼓靑州墓刻有一事之不知即其罪矣謂之宏儒愼墨得進其談惠鄧敢竄其察即其罪矣故非萬人之英不能居此至美之名也即以前代博學宏辭科而論以真德秀處之尚曰宏而不博以留元剛處之尚曰博而不宏王應麟欲舉是科乃于制度典故考索殆遍今之玉海其藁本也見成玉海其尚未一過况玉海所本館閣萬卷纂要鈎玄取諸胸懷乎乃如之人而欲當是選是引里母田婦而坐之于平王之孫衛侯之妻之列也胡能不駭從來士之求知者多矣往往覿面而無所遇合以昌黎之賢光範門下三上書而不報故投行卷展坐席者非危苦之詞不道非誇大之論不陳揖洗割肉破琴持帚穿屨而行雪中百方以搏巨公一日之知然且有得有不得某於訒菴未嘗有一靣之雅尺素之通前歲觀海于海鹽遇彭駿孫言訒菴使之問學去歲正月讀所贈董在中詩其間稱許過當今又云云其何以得此于訒菴哉夫訒菴之留心人物如此向若得道弸藝襮之士而與之則可以為天下賀矣無如某僅一愆餱之細民也孤負訒菴此某之所以歎也某年近七十不學而衰稍涉人事便如行霧露中老母年登九十子婦死喪略盡家近山海兵聲不時撼動塵起鏑鳴則扶持遁命二十年以來不敢妄渡錢塘渡亦不敢一月留也母子相依以延漏刻若復使之待詔金馬魏野所謂斷送老頭皮也嗟乎人之相知貴相知心王陽在位貢禹彈冠戴逵逃吳張玄止召古人或出或處未嘗不藉友朋之力不然則山嵇魏謝徒以富貴為市耳非兄知我何以有是乎訒菴先生處意欲通書然草野而通書朝貴非分所宜陳履常云公他日成功謝事幅巾東歸某當御欵假乘下澤候公於上東門外此其例也此四月所寄書也其後見掌院魏庸齋先生與許海昌書云黃先生學貫天人諸公物色之者頗衆因其年高未敢輕動泉石蕭介石先生往見李鄴園制臺泛論其中人物制臺云初意欲舉黃先生渠母老不可出故不強之某於諸公皆未嘗一面而見知如此所謂君子愛人以德也附記於此以志感激南雷文案卷三終南雷詩曆卷三方外本晝天嶽批點門人施敬勝吉較刻贈百歲翁陳賡卿庚申後詩見吾悔集以下壬戌渾風久緬沒相創在魂魄魁然號長者而生不滿百越城陳賡卿年今百歲積六十舉孝亷四十仍講席時為小艷詩風花繞几格小雪山隂路狂花禹廟石處處繫釣舟不記幾回適念此百年內鍾石纍變革一窖少壯塵堆來千百尺道旁與溝中何地非枕席君若不知者似與天地隔生平百歲人不能三四炙慈水劉伯淵名位著宦籍曾憶向余言江陵嘗歎息定宇鄧文中豪念庭酒無敵伯淵號念庭西人湯若望曆算稱開闢為吾發其凡由此識阡陌近者潘老人牛衣從賤役此皆元氣成人力無所藉吾聞九十者天子就其宅陳翁猶苦貧養老稱西伯賡卿名針言生於萬曆癸未舉崇禎壬午鄊科至今壬戍壽百歲青藤歌文長曾自號青藤青藤今在城隅處離奇輪菌歲月長猶見當年讀書意憶昔元美主文盟一捧珠盤同受記七子五子廣且續不放他人一頭地踽踽窮巷一老生崛強不肻從世議破帽青衫拜孝陵科名藝苑皆失位叔考院本供排場史槃字叔考以院本行世伯良紅閨咏麗事伯良名驥德紅閨詩和者甚衆弟子亦可長黃池不救師門之憔顙豈知文章有定價未及百年見真偽光􅉭夜半驚鬼神即無中郎豈肻墜余嘗山行人深谷如此青藤亦纍纍此藤苟不遇文長籬落糞土誰人視斯世乃忍棄文長文長不忍一藤棄吾友勝吉加護持還見文章如昔比陳賡卿以所用拄杖見贈老人百歲字賡卿贈我茶條金石形杖國杖朝姑舍是且隨劉樊拾青􅎉劉阮遺蹤在四窗白公弟子更無雙一枝拄杖蓑衣社不署官階向石矼曾相陳翁四十年花時多泊鏡湖船青鞋我即無拘束不向紅塵十丈邊聞太宰笻杖高元發所贈石塘太宰笻州杖到我流傳百草年猶帶華堂脂粉氣還須一洗化安泉化安泉最清烈平陽寺觀舍利平陽茶話後登樓觀舍利推窗邀日光微風捲空翠小幢烏思藏內纍錦綘地瀉出白磁盆銀匙聊撥刺或如粟米大或如芥子細半紅或半白細大同一致此名為瑟瑟注自白居易見集中琵琶行將無以寶石而為舍利偽抑亦舍利者原與瑟瑟類譸張不可知考索姑且置即如阿育王銅塔慈聖賜塔中方篋盛篋中金鐘寄故故為遮闌無非昡人視遂有庸妄人哆口所見異吾友寒泉子不作此兒戲腐草化為螢老蚌明珠媚何况於人身總是尋常事蔣萬為陸鉁俟洪暉吉在越城有壬戍七月既望之作余亦同賦壬戌之秋七月望赤壁一賦留高唱所經壬戍十一番不計治亂與興喪即今年月日俱同越城古寺棲逰杖魚螺聒耳中元會飢鬼蓁蓁啼盆盎娑羅兩樹月明中悲風激切影磨蕩高山斷岸雖不見此景亦足供酣畼人言蘇子遊赤鼻姑取赤壁以相况清風明月何在無何地為真何地妄天壤名氏亦偶然始歎文人筆何壯遂使洞簫揚世昌賦中客有吹洞簫者乃綿竹道士楊世昌見吳匏菴詩能與孟德相頡頏我生之前且莫論我生之後壬戌兩前者余年方十三亦在越城看月上六十年來城市非唯有中天月無恙越城七月偶見梨花盛開花開六月玉山梨海內何人不賦詩今日越城花滿樹空園惟有曉風吹壬戌八月八日初度今年初度亦何堪五十年前二十三小女新詩如濯錦門生土物自呼𧖟甘肅水名自擕百歲陳翁杖去聽千尋樊榭潭危苦此生成過去不須重復理間談中秋無月示女徽音準擬千山一夜明其如叢桂濕三更穿雲鴻雁無心到弔月莎雞分外鳴天意似憐秋思苦人間好罷斷腸聲明朝還向樓頭坐應慰詩人一假情朱淑貞中秋聞笛有斷腸聲之句十六夜次前韻洗出蟾光分外明月華難定是何更霓裳久矣煙雲散清話悠然環珮鳴信是慘凄秋裏月又堪淅瀝樹間聲即今風雅何人主偏是紅閨得性情題徽音詩稿溶溶露氣滿空浮樹響泉聲一例收明月似聞此嘆賞不曾移過別山頭絶代佳人空谷中梅花為骨雪為容豈知自是關天意恰好開窗玉女峯薄命生來不自由性情偏是愛深秋落花衰柳關何事每見無端輒淚流夢自九天玄女來一生長把白羅裁嫣紅淺緑都淸淨一樹停停月下梅放翁片石在江隈古渡人喧返照回一自夷光家住後有人題作浣紗來有餉余菊二本者荒村九月盡始見菊花開亦了東籬事方傾重九杯黃柑初脫蒂紅葉看成堆莫道秋容淡晚香續續來東坡吾嶺南以十一月望與家人泛菊作重九寄周子佩不到姑蘇十九年魯靈光殿喜巍然難銷字腳糢糊血打破支那籠統禪千里未成虎阜約幾番垂問浙江船剪燈聽雨西窗話雖老猶須一勉旃寄周子潔與君當日上靈巖鐘鼓聲中夜話儳過去年華方轉瞬同遊伴侶巳多芟三杯酒量應如舊兩鬢吳霜亦大凡落月屋梁長入夢未知何日遂征帆後赤壁賦有是歲十月之望余家居逢是日因賦壬戌重遊十月望於今此日復相同寒臯人影棲紅葉平野江流過塞鴻四顧依然留寂寞雨文偶爾破虛空無肴無酒且無客信足孤藤掠水東紅葉本事詩昔年曾上鳳凰臺紅葉紛紛撲面摧多少名流齊作賦司空品定始歸來庚午閩何匪莪為南司空集名士于鳯凰臺重九南都看葉紅留將好句廣場中雨花臺上詩雖少壓倒清涼數十通辛巳江右戴初士為主人于淸涼山余與林古度梅朗三獨在雨花臺賦詩大街月色爛如銀共上酒樓四五人不道霜花猶抱樹瞥然重見病中身余與梅朗三蔡大美同看書畫賞紅葉歸巳二鼓復上酒樓小窗風味絶塵囂未畫幽蘭香在毫一𥿄風波投綘燭只因曾與共登高陶英人座上吳次尾馮躋仲出一𥿄欲拘顧媚余引濁燒之煙光初合舉蘭橈消息傳來過斷橋伺候酒人分散去坐看紅葉盡今宵癸酉徐慧孺訪沈睂生于孤山九日他鄊紅葉稠旗亭且泊葉村舟聞歌不用詢名姓小字分明在扇頭庚子與范吉生飮瑞虹孤笻無意到山􅖭半道重將好友期日暮各沿紅葉路綵霞不散女郎祠壬戌九月盡與沈文斗道傳飮獅林旁有三女廟有感老去風光似擲梭浮沉聊且樂天和三家村店同僧醉鮑老筵前逐隊過笻杖偶隨牛社去新詩其奈玉臺多不妨一一無遮蔽欲淨理還注腳磨黃泰泉有醉擁如花歌落梅之句注為欲淨理還可憐世路每相違謗既無根譽亦非豈有草衣能絶俗又無高論解重圍姓名誤落女兒口魑魅因爭綘燭輝一槩深文來伺我海鷗未必便驚飛與道傳間遊因至江北終年無伴侶今日喜君間天意假遊子晴光照老頑寒鴉欲語雪野火正燒山欲向詩人問可曾拾得還山厨留一飯酒正下糟床案上無書卷胸中有石倉汝雖生慧業天却賤文章日暮悲風起暗然各自傷歸路人爭渡前村數里寬暮煙分聚落月色見辛酸細數生平事都來逆水灘唯君能悉我相與共艱難歲暮望兩兒歸老去雖眠食艱難欲仗兒如何臘月雨不見夜航維落葉驚孱犬風燈罷釣絲幾回開戶視空做一畨疑老病相隨至無人能服勞未曾經事父豈忍責兒曹血路看雙足家聲繫一毫苦言誠藐藐遺恨我蓬蒿門士查夏仲自黔中還以棕竹杖為壽水西棕竹杖將送自門生猶帶蠻煙色來親錦瑟聲獨行無界路不問世間程老去時防垤誰言撒手行苦雨以下癸亥一冬寒日照枯枝隂雨偏留花草時怪道爭傳懊惱曲古今何事不參差靑靑百尺自長拖新曲誰翻折柳歌一樹寒煙吹不散怪他性格喜風波答陳介睂太史五十韻弱冠弄柔翰經史無根柢勉為場屋學亦復趨靡靡業既不精專所以兩墮矣自從喪亂來讀書瀑布底苦身四十年略諳文首尾先秦兩漢下沿流近代止煙海浮萬卷但苦記性否其間亦自思詞章鄙事耳蠛蠓處甕中詎知九萬里夙生所結集難圖八識藟因文以見道或者其庶幾此心固旦旦知者唯吾子故欲子序之廢疾從之起非如因皇甫聊以杜譏訾近者子書來為言其所以人豈不自知放筆敢輕擬積雨謝塵劇以待靈光啓此乃子謙言其實不如是在昔爛程文名為館閣體其言不雅馴千篇等一𥿄時風撼石渠銜璧向王李瓦盆辛臼間安得耀雷洗翰林無文章此言固非毀焦淡園陶石簣黃平倩後出腆然懷此耻刻意為古文欲摩韓歐壘成家雖僅僅後進露涯涘猶如客羅剎一朝覩桑梓遙集有倪鴻寶黃石齋振奇繼斯美年來久寂寥啞鐘亡宮微子昔示吾文館課乃有此不度蹄涔微直欲觸鯨鯉且耐松柏寒不肯採芳芷陋哉何人言修辭寧失理行當霸斯文豈獨邁舊史子祖后岡公掎托李何始荆川既虎帥蘇門亦挼指發源自崑崙到海難為水曾聞子建言述諸丁敬禮文之有佳惡吾自得之巳後世誰相知定吾於既死嘆兹為名談不受流俗喜子何所疑難而欲他人委方今文章家多不下茅葦隨人撇其門皆可作者比無與文章事僅可充筐篚願子敦古道幸勿諱瘡痏不學老而衰尚當竭餘晷待彼潦水盡寒潭留淸泚不然郝楚望自題亦甚偉著書百萬言不假夫巳氏懷金陵舊遊寄兒正誼記得城南路登高木末亭淸風瞻畫像余𥘉至見方正學先生畫像面目孤峭再至已易塑像畫像不可復問舊景挂岩屏太自有賦詩留岩屏句藉地皆芳草淸歌指妙伶因懷松柏下苦雨出荒螢右雨花臺金碧琉璃塔曾登至九重詩人同蹀􅞃吳人林若撫開士亦從容春樹旗亭雨孤鴻江上鐘至今猶夢寐詩草落寒茸右報恩寺當年舉社會高座問精藍有晉風流在聊容制義參名流十五國夏課一千函投老牽前事祗堪作笑談右高座寺河房曾挂榻不異蕊珠宮數里朱欄日千家白奈風渡煩桃葉淚舟賽角燈紅昔日繁華事依稀在夢中右秦淮河臺傾鳳去久猶自護寒雲玉像銷叉釧詞人記錦裙南皮絲竹盛北海姓名紛司空何匪峩九日聚詞人於此當日吾年少翩翩自逸羣右鳳凰臺鍾山多古迹強半入園陵天仗曾陪入同魏國徐六嶽入祭芒鞋幾斷繩銅牌逢老鹿落日訪居僧但説山中景應無及廢興右鍾山斷岸觀音閣同人四五遊長宵喧水鳥落照集漁舟詩法空江冷時梅朗三苦吟逺山睂黛愁白楊風獵獵皓首獨登樓右燕子磯曾寓雞鳴麓岧嶤纍自攀功臣肅像貌僧塔鎖刀環秋氣生羅縠晴光出黛鬟自從採菊後此景不相關右雞鳴山西北烏龍窟幽棲讀易堂何天玉於此著易余常過此潭中見塔影隔水聽風篁載酒蓮花筏吹笙茉莉旁宴遊今歷歷腹痛在山陽右烏龍潭南中遊學日猶及盛明時朝入時文社暮拈分韻詩酒樓登月下祕笈訪山雌勝事真難數汝今試問之右總序江村江水繞孤村芳菲在何處春從啼鳥來啼是春歸去抱病南􅑵下孤吟苦雨題往來詞客少次韻有紅閨女音次鄭禹梅春暮韻浸尋衰病異他年詩瘦三分賈浪仙花到棠梨成鬼節村寒楊柳過餳天春光巳入離亭笛燕子猶銜細雨田不是病中多感慨此生豈易至華顚五月二十八日書詩人壁不識山村路縱橫但隨流水小橋行一春尚未聞黃鳥玉女峯前第一聲水晶宮殿玉雕闌絲竹叢中墨未乾却道詩情多富貴故教村落寫荒寒不鈎簾幕晝沉沉難向庸醫話病深不識詩人容易病一春花鳥總關心鄭平子贈詩次韻得覲高風巳有年山川𬋩領屬神仙幅巾笻路何須廣鄭玄谷口蓑衣别有天鄭子真鷺入靑秧煙漠漠雨來紅藕葉田田眼前景物都收盡真是詩家百尺顚生平無事不屯邅呵壁重來欲問天方伎如台真百碎筮人假爾只三連數奇頭顱不信髐然老伴侶何人世亦傳陽五伴侶雖是先生多假借終慚楊子十三篇同輪菴飮虞咨牧陽和書院拄杖丁丁躡石梯快風忽至竹痕齊主人情重鞭歌妓咨牧以家樂緩笞歌者佛法無多漏木樨巳視興亡如院本故翻黨錮作新題時唱阮大鋮詞其詞多刺東林舊人此日唯君在話到當年日巳西弔姪女印月禪師喜師投老得祗林叢竹小樓禪影深但覺病中同姓好豈知沒後隔年臨猶留弟子能談舊為述機緣志塔隂每入郡中茶話久此來能不淚沾襟同董無休何伯興施勝吉觀徐文長題壁次韻文彩猶留敗壁泥百年多少日沉西不將紅袖偕來拂唯有籠􅑵樹影低尋禹穴昔者太史公萬里探禹穴余為會稽人至老遊尚缺久息風塵慕何故違淸轍茫茫問禹迹居人且未決多言窆石是更無他曲折又言三百里不為一隅説稽古按唐碑陽明洞為核吾㕛董無休門人施勝吉共坐黑箬篷十里如電滅稍憩宗鏡菴放步迷煙霓攀蘿遲遙響不顧行縢裂窺刋崩石下恍然玉堂設題名唐宋年被彼怪藤齧摩娑手眼勞方讀忽又輟幸哉一字通勝拾古環玦聞昔有洞門今巳遭闌截金簡玉字文護持有鬼孽惟有人間書聊為太史竊我來三嘆息欲撞錮門鐵洞中風颼颼天空飛綘雪宋六陵一片荒煙地云是昔攢宮秋墳巳罷唱隧火不吹紅古迹今何處落落幾株松歷代祭告文頑石堆西東千年龍穴移此地原荒叢鬒髮縈香煙孟后髮枯木齧寒蟲徽宗柩唯有頂骨碑哀怨訴蒼穹唐林義士祠久矣委蒿蓬亡國何代無此恨真無窮靑天白日淡幽谷多悲風更無雜鳥來杜宇哭朦朧與唐翼修廣文論文人物由來稱婺女百年冷落繼前修至文不過家書寫藝苑還從理學求君巳遍參新作手吾方屈指舊源流秋香習習山隂道時有書聲出畫樓題顧端文往還書札無人此日思元祐忽見遺編鬼護持翰墨無非道命録姓名都在黨人碑冷風熱血留亡社大義微言助九師今日是非猶未定尚將淮撫話支離九月八日顧郡守雅集霜天黃菊設賔筵投老猶能一暢然酒自惠泉欺菊水郡守無錫人以家釀見飮詩成廣坐盡瑶篇相酬恰似交花藥梓州藥市以九月八日好論非時發杜鵑殷七七隺林開杜鵑花亦九月八日坐久蕭蕭木葉下巳看新月學弓弦王九公邀集湖舫同毛會侯許霜巖王獻廷祝兒慘淡湖光亦自妍煙中紅葉雨中船數聲新雁難分字一曲吳騷纍折絃坐上巳多遷謫意遊情不似太平年雪泥鴻爪知無定相對那能不黯然張晴峰雷琴篇次韻古聲埋滅南風隱掩抑凄淸纏徽軫木性未盡聲易訛總有長絃亦痺窘製琴姓氏夫誰何誰諧二十一章歌有唐路氏及沈蚪好奇直欲登雲和蜀中雷氏按故事腹中藏得陽冰字當時朝市不可見瞥然至寶多僧寺千年變衰新聲起世眼何曾辨朱紫即有鬼神勤護持亦偕斷木沉泥水莫言伯牙無知音孤桐夜夜哭篋底好事求材長足胼對面不能知其然晴峰先生世宗工玉林繁露董學全一物不如儒者恥古器殘破求其緣忽然古道照顔色遂覺宇宙不逼仄神物自慶得主人時有光芒吐瑟瑟一彈枯淡契慧能再彈漂渺追無名霜空月出音調苦孤鶴飛來江上橫嗚咽似聽興亡注至情更在無聲處若用此琴配笙簧黃鐘真聲庶可遇琴笙相調是求黃鐘一法從來志士嘗悲秋植杖只將雞豚收總使夔龍亦糞土撒沙江海同星漚古來多少不得志梁父白石鳴鐘璆日月大抵多朓朏流落寧止一琴棄先生憐才如李韓此琴之來豈無意綢繆宮陛汲猿鶴大鈞造物轉風氣雜咏少年飾卷趂槐黃燈火呼名入號房昨夢巳隨風絮盡豈期南面至公堂瑟瑟西風遠黛靑幽窗梧葉自飄零西湖多少間花草一槩都來插膽瓶方沈溫韓閔蔡唐魔君降下豈尋常徐神翁對蔡京之言可憐碧浪湖中水一代銷沉在此方江上才人亦自妍篋中聞説有遺篇平泉移得瓊花種不管春風到麥田懷陳令升扁舟不向鹽官去夢寐猶留在轉塘但覺世人多勦説始知此老有鋒鋩墨翻紅燭三更雨賔集草亭萬樹香却與明山老措大殷勤五載共書堂過法相寺甲子不到名藍數十年重來風景覺蕭然山中幸喜存長曆劫冷能留不壞煙書事初晴泥路覺槃跚聽徹松濤骨亦寒莫恨西風多凛烈黃花偏奈苦中看論文不苦病相磨剪燭山􅑵夜巳過記得填詞三百本緣來最苦是情多昨夕松風對短檠病中無語不酸情月光今夜偏無賴江北山頭分外明童王兩校書乞詩崎嶇山路出天台猶帶桃花日影來一曲琵琶山市裏頓教紅葉滿蒼苔舞榭村村紅燭明徐娘髮薄尚多情一天風露侵條脫唱到陽關字字淸拍板紅牙子夜天烏啼枯樹欲生煙知音誰賚纏頭錦踏破紅氍八百錢送二校書還天台十二月初六日杯酒殷勤宛轉聲老來白璧賦間情應知此後重逢少莫任金叉墮燭檠藍橋再到望雲英未必江潮信有程吾只重攀淸逺例三郎祠下咒吳迎湯若士詩云暗向淸源祠下免教迎啼徹杜鵑聲題獅林壁乙丑緑暗紅稀社鼓闐子規啼徹酒壚邊饒他多少堂頭老爭似村僧白晝眠小菴恰在女峰邊躑躅花開一徑穿酒債尋常君莫問一春自有賣茶錢吾悔集卷之三南雷續文案男百家較張元岵先生墓志銘海昌有窮經之士二人曰朱康流張元岵短簷破屋皆拚數十年之力曉風夜雨沉冥其中兩人每相攻難故其成書彼此援引用張其説以余所見兩先生詩易言之康流但究旨要諸家聽其散殊不為收拾元岵錯綜積玉忘懷彼我康流於易研尋圖象盡拔趙幟元岵宗主王程以玩辭為本至于指歸日用不離當下因孔子而求文周因文周而求羲易則兩家一也康流於詩美刺如霜雪元岵纏綿悽愴有流離世故之感至取序首一語推原詩前之意則兩家一也兩人皆遭喪亂而皆能以經術顯則人力信乎可與天爭矣先生諱次仲字元岵别號待軒曲江之裔七傳至光翰光翰子用忠事吳越王屢立戰功歸老海寧之棗林河大德末仲山為其邑許村場鹽課司子思賢徙居城東其族始大祖父先生七歲就外傅遂授易八歲母密儒人疾病割股而愈十八歲為諸生郡邑聞其事旌表之既而撫按欲具奏先生辭曰童幼無知思之猶有餘愧可復以此沽名耶父與亭戶訟直指聼之先生偕父坐獄於庭父不勝直指曰何與諸生事先生曰父子至情非明府之法可移直指視其瞻對慷慨為之罷訟舉天啓辛酉浙江鄉薦虞山處之若畏友當是時坊社正盛先生所選擬古淸裁刋落浮華多發天然為世所貴韓求仲周介生選家巨擘亦以為不如然先生矜貴自喜未嘗標榜以樹聲名一時名流視為別調先生喜親前輩得其一言終身奉為藥石許淮安同生初見先生語之曰為官自居鄉始子其愼諸先生由此一生無竿摩郡邑之事章給事格菴邂逅先生謂曰近名事愼勿為之選政其一也先生憬然從此斷手先生楷模前輩風範其與人言亦不肯作一熟軟語同學以御史行部先生送之問今日從何處做起御史曰吾安能為乎惟搪塞過去耳先生怫然曰天下事皆搪塞二事壞之不意足下亦有是言禜雨士大夫皆集先生倡言諸公亦知之乎一月以來無日不雲無日不雷而雨終不至上天之意視斯民之困若若不得不雨視士大夫之驕奢若不可雨其徘徊于兩岐之間乎聞者愕然先生雖苦力著書然未嘗忘世學雙劍學長鎗皆精其技久之棄去先世充亭戶共業者苦於官課先生置義田一百七十畝以除其害邑令以淸丁致擾而難於驟改先生曰明府志在利民不利則巳非無執持也令然之房師吳以時上疏請定胥吏稅役以寬民賦先生論其不可惡胥吏而稅之亦抑末之意也既稅其役則胥吏有辭於偷矣邑故有黃生絹役前令革之姦民謀復以便乾沒先生言於石守乃巳先生以人利害為身苦樂故興利除害之際必毅然當之不讓然以五十餘年老孝廉八科下第不當纎芥之任天下搖搖如覆舟袖手旁觀欷歔嘆息其設施之可見者鄉邦一二細事耳豈不可惜哉余嘗疑世風浮薄狂子僇民群起糞掃六經溢言曼辭而外豈有巖穴之士為當世所不指名者而先生孤燈欵對意通響象别有寒餓相與綢繆沈繼震字子起武林人矮几折足俯首以注六經婦抱女孩徙倚四壁寒風凛然不知世間富貴為何物先生云孤苦四十餘年天心來復賜以子起又云世人皆飽死而子起獨餓死子起即捧此枵腹可見列聖于地下若輩飽死更何益胡廷試字玉呂餘姚人嘗為弇洲孰師崛強不肯伏弇洲臨卒欲聞炮聲散其鬱結終夜不徹乃瞑一生知巳先生一人而巳然則世非無其人能知其人之人少也先生既知其人矣得無以死後餘力引而齊之使子起玉呂亦從先生而傳乎余故序之先生志後猶昔葉木心之例也先生以康熙丙辰四月某日卒年八十八娶徐氏子三人昻貢生晟庠生昶國學生皆先卒孫一人訒諸生曾孫三人貞觀正觀永觀皆余兒百家之門人也卒後幾年葬於某原訒鑨墓石再拜求銘銘曰我於先生把臂語溪高冠岌岌長佩陸離又後十年訪於海涯一樽相對祈死為辭曾不十日臯復隨之維此十日留以待羲宋之遺民經之大師書帶環墳千載如斯孝廉子孟卓君墓志銘君諱麟異字子孟明讓皇帝遜位成祖誅朝臣之不附者以忠貞卓敬為首夷三族忠貞之弟哲匿於塘西宋氏始為仁和人哲生景復景復生養默養默生澄澄生廷俊廷俊而後始敢出仕故君之高祖賢光祿寺典簿曾祖文炎鴻臚寺鳴贊祖禺太學生封祕書院編修考諱彝登順治丁亥進士第仕至左春坊左庶子兼侍讀妣潘恭人年十五入武康縣學舉順治甲午順天鄉試君早慧淸朗開達稍長益貫研古今出其英華皆有新意是時侍讀方在講筵君又得志于科目聲生勢長人以貴公子目之而君退然自下齒寒士中不見異晝夜惟筆硯相親近高吟長嘯性情王孟花卉之炫麗風露之凄爽收拾填詞非時文腐敗粗澀之士所得聞也傑才偉工無不師友亂離才定人有憂生之嗟北場南館絲竹無聲君不以富貴適巳四方知名之士閭巷一介之善輻湊其門支坐熟語觴酌流行必極雅意盡歡情人人皆以為近來之盛事也西湖虎阜之會集者于人風雅寂寥頓返舊觀君以年少捧銅盤而宿艾駭服者則翩翩之風入人深矣侍讀卒官丹旐南還君厭寇瘁容哭泣備禮復至闕下陳情哀榮之典得踰常制其入而事恭人旦暮上食飮扶侍左右情結笑言一聞嗟嘆百方宛轉夜漏乙丙君猶寢門語刺刺未敢離側也恭人有孤姪恭人哀其孤露君為之授田迎婦重立門戶女弟適毗陵莊氏恭人念之君為之築室塘西不異同居兩弟早孤衣食受一錢以上必均出就外傳親課其勤惰而欲使之急就凡所以推行恭人之意者無不盡其情也嗚呼難矣君既為富室亦好行其德一方纎悉以至緩急無不依君以辦無名子以新安程氏上變牽連數十人下吏名捕君知之私其吏曰匿名書法不得行行之於汝有害無利吏悟事遂得寢富子以婦死訟婦家巳解鄉人之有力者各脅其資富子亦以百金投君君曰吾力不足以庇子忍復受子賂乎郤之甲乙相誣為盜甲以君與觀察契家致千金為壽君曰汝本非盜而致人於盜是亦盜矣吾受汝賄是盜所隱器與盜同罪可乎卒解兩家之紛而去丙申歲飢發粟千餘石賑之活者無算最其大略如此至於猝需冗求趣具曲應固莫得而數也亡何大盜入室發其黃金大珠以去豪吏猾民利其所有哃喝更番方當告訏風盛君亦緣手散之不與齟齬而金幾盡矣論者以財為君纍夫契疏鞅掌歌兒舞女勞攘於汙惑之中此以財為纍者也君快心開物以劫孤寒之淚甕牗何足以驕人乎又謂其文弱不能撑持外侮夫財者流通天下之物也豪奪與哀乞無異彼能籠吾之糞土不能燬吾之孝友詩書無恙門第不改用財自衛元相之鍾乳胡椒悅生之蘭亭方斯蔑如矣君生于崇禎巳巳後四月三十日卒于康熙戊申十二月二日年四十娶錢氏丁丑進士句容知縣錢朝彥之女其言行詳余別志子四人曰長齡太學生曰松齡庠生曰鶴齡曰錫齡女四人長適太學生陳奕昌次適太學生項灝餘未字孫三人孫女三人某年某月某日合葬于望雒山之原長齡等價余門人奕昌請銘銘曰閨門之內和氣氤氳鄉黨之間急難解紛以交天下欣賞奇文如斯之人其視富貴過眼煙雲吳處士墓碣銘德淸吳卜雄介吾友陳子棨求表其父之墓余以吳君有狀有志何庸復言子棨曰卜雄才士每諷采夫子所著形之嗟嘆是欲以其所貴者事其親也辭之則孤孝子之志君諱興或字質生姓吳氏宋相履齋之後履齋生尚書璞家湖州之新市因為德淸人父仲羽母嵇氏君少與群兒遨戲母怒嚙其臂母殁每視嚙痕思慕涕泣見者哀之父與蔡眉梁為亞稽蔡皆富室君家貧依舅氏從母以活眉梁之父故總兵也與夫巳氏為怨家夫巳氏監司吳郡修怨於其子眉梁亡命捕其妻迹之君時年十九扁舟脫其從母徐步詣獄監司問眉梁匿處君以從母未遠恐其見及紿曰遲之十日眉梁可獲也及期監司理前語問之對曰某實不知其處姑免迫促耳監司大怒以死恐之君乃慷慨仰天曰某之此來自分一死眉梁伏匿知固不言也今又不知明府枉殺無辜不忌其不祥乎監司默然幽囚考掠五毒參至終不易辭監司免官始解械君由此知名閭里之間急難密謀其計畫無復之者必從君得其要領遲明戶外之屨巳滿君亦攝衣偕出矣從弟坐獄非數百金不能降免其家貧甚待死而巳君以私財為弟解對吳甲亦從弟也與君不相得後以事下獄心知君能救之而不敢言君曰吾豈以小忿而棄懿親乎卒出之盜欲劫嵇氏而礙君思殺君以逞一日為盜所得其僕昏夜乘盜熟睡負君而逃間行至家嵇氏卒得保全甲辰大水邑民陳狀者數千人皆不報故事告荒有定限過限者不訾省君涕泣入陳邑令為之感動即以君言上之趙中丞中丞召君應對激切於是荒田得勿收責君不當事任故所施亦狹其為人所傳誦者巳如此夫以天下之廣好義者豈復一人蓋可傳而不得傳者疑不為少也然余觀之縉紳士大夫類皆局促自營一遇利害如毛髮則振動悼栗推之惟恐不遠其視窮閭厄巷宛轉之死亡未嘗肯效一蚉一虻之勞也君奮桑樞褐塞之下而急人之急至於骨肉拒扞壯節凛然東漢獨行傳十四人其四人所載與君同然則在古人亦少也世悲陳同父所志不過逸民里姥如君者設與高爵之徒原情比迹孰為應銘法乎康熙巳酉正月卒年四十九君未殯有二人入哭甚哀家無識之者問之則曰君昔活我我未之能報也不告姓名而出以此知君之隱德多矣娶俞氏簉孫氏子一人即卜雄諸生女三人諸生潘錫祉某甲其壻也一朱字銘曰君之葬父會者千人履齋之祠壞而復新匹夫有此夫豈凡民敬槐諸君墓志銘歲甲寅群盜滿山余奉老母避兵於第四門寓諸來聘書室室容一几三几之內寢竈雞犬圖書皆在焉上雨旁風細碎罄竭來聘之父敬槐傷其落魄時過慰藉每遇嘉慶則與家人父子錯互杯盤笑語余有二女孫方離襁褓君袖棗栗餈餳止其啼頰風和日美余掉短䒀老母揭女孫泛汝仇湖歷牛屯謝文正園泊九龍亭觀石壁鑿像汝湖依岩高下作列仙象置身其中彈琴進東山寺略臨山以觀海余海濵半載忘其羈旅之憂者由君以為之主人也乙卯五月值君八十誕辰余舉觴為夀後月盜平余奉老母還家舟行君老淚縱橫徙倚河渚余遙望凄然不忍仰視更三年君卒余不及再靣也君名允遴字賔所敬槐其號也曾祖伯祖改父城母周氏君少讀書巳棄去為賈然意度濶略在航船中有客擕兒兒向鄰船􅈱􅈱而泣君問之客欷歔對曰其母賣與他客在鄰船者是也君問受值若干如數贖回夫婦感謝而去東浙無白糧而南糧解戶往往破家君與族人通融為義役之法一方無困君所居最為僻陋甲戍乙亥間來聘與符士龍諸如錦魏周肇修諸士奇之徒立昌古社出而交遊四方來聘之名因而驟起倪鴻寶陳臥子皆以國士待之然聞見未廣窺竊書史一二振奇之事遂以為天下治亂數著可了大語無顧忌君數戒之江于師起來聘益痛憤思欲有所發舒乘馬出入諸營意所不可輒曰某日吾當上書劾某人某日吾當上書言某事酒酣耳熱初未嘗有意為之也聞者以為實然方國安令其將俞玉收置水獄將以釁炮君行賂得免來聘驟經摧勒發為狂疾君柴門墐戶以待其愈康熙成午八月十九日年八十三卒娶黃氏年五十八先君二十四年卒九月十八日合葬東山鄉赤嶺之原子四人長來聘貢生次來贊先卒來聰來職孫四人栻駿栻鳳栻杰栻麃孫女三人曾孫七人來聘求余志墓余初辭之念小時意氣奔放離別都不在心亂後瘁於哀傷吳霞舟先生舟中别我余行二十里先生復掉三板送之嗚咽濤中沈眉生書尺往來𥿄有淚痕舟發虞山鄧起西立忠烈祠邉涕淚交下陳錫公來學去之日手巾拭靣而淚不能比其臨水黯然者不在此數淸風朗月思之不可為懷君河渚之淚如何消破因援筆為之銘曰在昔景濂避施子里主人陳堂西軒舍止景濂志堂其情八髓東里武昌隱溪蔣氏東山一遊夫亦偶耳桃開索我序之痛死竊比二者君情尤美我銘其藏薄夫敦只腳氣詩十首天地鼓槖籥遷流自成運吁嗟運中人逐浪隨波進猶如魚噞喁終不離濕潤試觀春秋時根抵于忠信未嘗無姦穴怪蟲嚙樹舋其時賢大夫檢押過霜刃當其淫亂中此理仍雷震逮至七國時利害為宗印未嘗無賢者舉頭天外認僅使利與害時與義相磷汩沒利害瀾固巳在千仞漢唐學術雜宋室頗謹愼雖然函雅故孱力不能振求彼春秋才尚為天所吝于中命曰儒天地所依仗鴻濛一氣內錯互非一狀所貴于儒者開物費劑量主宰苟不移眼前路須放一擊而遠去處子之耿抗有如泛大海卒遇黑風浪舟師認針經守柁侯無恙惡可袖手觀聊以杜譏謗後來本領薄汨入身名障呼吸乏奇謀議論空慨慷吾學固如此非常豈所望是以言儒者無關于得喪自宋失其傳降為逸民諒束髮于是非不異辨菽粟投老轉糊塗霧布十里毒俗學好誇大放意極雕琢欲以人之負而為我之卓叱咜先先賢以下始破竹吾意此等陋不可欺孱僕斯世多機巧于此獨誠朴所以縱惡聲日夜如布榖古讒讒當世今讒讒往躅廟庭且臲臲何况我空谷淸議在當世元氣之所祕散之輿人誦斂之鄉校刺不霜雪而寒不斧鉞而悸萬馬方奔騰冷風颯然至志士寧殺身枯骨恐留祟奈何近年來此道久廢棄宿素巳衰落其權無所寄瑣瑣將無同所爭只鼠臂遂使獝狂徒雄張無顧忌鬼袖事渺茫衮鉞復滯膩天上天下間何物可牽掣後生無根柢一閧憑市肆吾友陳乾初曾立死節門合義斯為節不然終酸魂試觀甲申來勃窣多煩冤幽經費收拾留此培天根亦有賢智過求名而名存殺身良不易不復吹毛煩乃有莫大羽冗徒忠義資舌言假為乾沒路舐刃樂餘潘不辨何人血用之搏朝飱偷驢摸犢輩日夜相攀援不待教而誅斯案誰為翻豈真煩豺虎整頓此乾坤嘗讀封禪書文成與五利其人敢大言大言猶未至決河塞可就黃金成可餌不死藥可得仙人亦可致所以錮主心區區此四事入海求其師不出方士類界絶而不鄰未嘗牽洙泗妖人何高張不丐佛老庇揮手中都宰爾汝將把臂駝口出陳言千金無易字世眼豈盡塗白日走魑魅志士傷世變開口談權術抱薪而救火其勢當愈疾幽運吹流蠱淳風竟蕭瑟纎兒粉子輩狡獪破心出前者苦未工後來緯更密詐之復見詐未知誰第一庶幾以真誠灰轉黃鐘律嗟彼百色妖天空自消失不解解連環古語豈草率譬如纍丸家業以纍至七欲以纍勝之迸散斯可必席上非腐談忠信有十室丹書藏故府不以一人刋天啓甲子事夫誰發難端崇禎戊寅對讀之猶霜寒兩朝關興滅千載留譏彈豈以耆舊盡穴見亂朱丹近觀何人言衣飾古瘡瘢槩以黨一字削平無賢姦夫苟持異説直可譽京韓亦有賢子孫見之摧心肝但可以哀情稍為祖父寬紹述仇君子無異劉親棺舉世共疾貧天地亦逼仄天地養萬民原各有分職農以耕致年工以巧收直牽車而服賈日夕不惶息士以科舉養或又不可得其智兼九流亦可佐其扐量力守故蹊計口免轉側非不嘆辛勤廉恥有方域何人決其藩狂象遭火逼妄想非分來一意工克賊掘井及九仞魍魎斯充塞昔人不言貧惟恐鄰匍匐此意竟何如寒潭水湜湜儒家有堂奧牛毛不足譬冥契苟未深出語即乖戾凡子張空虛良楉亂市肆土硃點四書朱陸急同異近來學人少誰何識真偽遂以科舉學劫人之聽視括帖上下文原無真實義推之入理窟塗車可略地有明三百年人物多憔悴何怪時厭薄艱難得委質此曹愈紛紜棄婦等標致光祿大夫太子太保吏部尚書諡忠襄徐公神道碑銘崇禎末大臣為海內所屬望以其進退卜天下之安危者劉蕺山黃漳海范吳橋李吉水倪始寧徐􅖿里屈指六人北都之變范李倪三公攀龍髯上升則君亡與亡蕺山漳海􅖿里在林下不與其難而次第致命蕺山以餓死漳海以兵死􅖿里以自磬死則國亡與亡所謂一代之斗極也􅖿里徐公諱石麒字寶摩號虞求家本秦川宋南渡始遷嘉興之畫水高祖端曾祖向上祖養蒙父聞韶自向上以下皆贈宮保尚書妣錢氏封太安人贈一品夫人公少好學有淸才強記博覽年十七補其邑諸生以家難棄去再補靑浦諸生則年三十餘矣天啓戊午先忠端公分房南闈始舉公賢書壬戍登進士第授工部營繕司主事管節愼庫庫與中人惜薪司交關逆奄專權有所調發主者奉行惟謹猶恐不得其歡心公在事多格之以令甲逆奄不悅中人冬衣靴料初不過三萬金內操增至十二萬前司空鍾羽正以稽留去官至是逆奄欲預支巳得請于上公又以故事持之逆奄大怒會先忠端公下詔獄公納槖饘募金抵誣贓思所以出之逆奄知之恨愈甚遂以新城侯王升博平侯郭振明之發葬價罪公削籍烈皇登極誅逆奄起南京禮部郎中改吏部文選司崇禎乙亥改考功司冡宰鄭三俊掌院范景文主南計公佐之奏免七十八人是時主北計者謝升烏程私人無不庇之而南計反是烏程無以難也轉尚寶司卿應天府丞署尹事其地為民患苦者無如僉報馬戶一事應天九驛使命徵發無時出農里以役衙前無不立困而又奉旨裁減驛遞縮食縮馬本足相當當事者不權輕重食縮而馬如故時民益困公以為救之莫如召募且句其胥吏之所乾沒者其資有餘積年之患一日而除戊寅入賀元旦鄭司寇以輕比失上意下獄黃少詹道周黃庶子景昉言之于經筵上怒未回公言皇上御極以來麗丹書者多大臣朝士即使盡皆情法允協巳是幽隂景色而况威嚴之下株連蔓引九死一生今皇上以輕擬之故深督三俊恐將來必有承順風旨以斷錬為能事以鉤棘為精神非復皇上愼獄之本意矣疏上三日上御門口傳出三俊國家典故未有御門之日有宣諭者即上所攝逮大臣亦未有六日即釋之者非公忠誠悟主何以有此公起廢籍歷官南京十二年至是始入為左通政轉光祿寺卿晉通政使天子治尚綜核棄子斥臣莫不造作端末妄生首尾萃于納言主者幾若承行之吏不然則絞訐相摩呌呼巳及之矣公廋情匿姦懸見立剖必使之詞窮意竭而後冰駭風散自公作納言告訐之風少息尋升刑部右侍郎會推閣員冡宰李日宣先後推至二十餘人公與焉上召對與推諸臣于中極殿公稱疾不至時上巳入陳演之譛越翼日下日宣于理及與推三人始服公之先幾也轉左侍郎署部事旋即真為尚書公言邇年以來刑官擅背條律嚴文剋剝遂使各司上下其手胥吏因緣為姦刑獄繁興干和召愆僥幸苟免之徒關節賄營之盛雖日誅之而不能止矣因紏近日附會律文之謬者數十事時貫城滯獄不下萬人重文橫入多窮怒之所遷及淸獄之議發自宜興而宜興簠簋人不見信公理問端其冤嫌久訟莫不曲盡情詐壓塞群疑即被罪而去者亦緣道謳吟然公未嘗盡主姑息一時關係大案俄傾而定陳新甲下獄政府六卿無不為之營救公言俺答闌入而丁汝夔伏誅沈惟敬盟敗而石星論死國法炳如後此綱紀陵夷淪開陷瀋覆遼蹙廣僅誅一二督撫以應故事中樞率置不問故新甲一則曰有例再則曰有例者此也不知親藩膏刃百城流血夔星之罪若是烈乎春秋之義人臣無境外之交戰欵二策古來通用然未有身在朝廷不告君父而專擅便宜者辱國啓侮莫此為甚上覽疏心動宜興靣奏國法大司馬兵不臨城不斬上曰他邉疆即勿論僇辱我親藩七不甚于薄城乎即日棄市中人劉元斌監軍詩賊御史王孫蕃劾其淫掠逮問司禮王𥙿民漏泄疏未抄而元斌辨至上并下𥙿民于獄言𥙿民職任提督禁旅殺掠代為欺隱法難輕縱公上爰書言隱人之惡與身自為惡者有間終不可以元斌為首而𥙿民為從律內奏事詐不以實條止擬一配注以其欺君也然則繩欺之法亦止此矣加等至煙瘴巳極過此以往非守法之臣所敢擅入也上召公靣諭而始決之洪督救錦州之圍束馬未動職方張若麒以司馬私人出關督戰洪督不得已從之進而兵潰若麒從漁舟遁還關外精鋭喪失俱盡若麒就理而有奧援司官遷延不讞時本司韓一臣出守公批此案未結竟不聽新除爰書以本案為例王朴倡逃誅矣倡倡逃者豈可緩誅陳新甲誤國辟矣誤誤國者胡能延辟欲彰軍政宜赴藁街上寬秋後他如刋定丁督許帥不假借以溫筆或從或不從而公之不為燥濕輕重則一也最後而有熊薑之獄卒以執法去位當是時宜興當國興化後起而風價稍高一時臺省各相依附為反覆憸滑之術以搆兩相于是附宜興者為南黨附興化者為北黨章疏詭紿激訐莫不有謂上亦心知言官之橫而惡之有無名子疏二十四氣逹之御前上益信手敕申戒給事中薑埰言上中謠言單辭厭薄言官行人熊開元屏人密奏宜興過失上皆疑為押合故智下之詔獄且欲賜死獄底蕺山于召對犯顔救之蕺山革職公言皇上欲求變通趨時之臣舉朝不乏若欲求廉頑立懦維風易俗之臣舍宗周無與歸矣不聽然上亦凛于公論收回密詔改下刑部公輕擬不徇上意奉旨間住公去而國事益急倣徨一旅冀赴賊俱死而北變巳至江右嗣興起公為右都御史未至改吏部尚書大業草創人心未附聞公與蕺山漳海之出天下始無寡弱之憂公以國家之敗由官邪也方欲條品人物簡落狐狸易危亡之轍而馬阮傳通姦賂毀裂恩仇孽勳扞將宮奴市獪時相為帝中旨賢于部推私門熱于廟堂黔首囂然公猶以祖宗之法汰彼巳甚不因流極之運刓其方圓也馬士英希心列侯中人韓贊周請加恩定策五等延世公覆世宗以外藩入繼擬封輔臣楊廷和蔣冕伯爵皆謙讓不遑方今國恥未雪扼腕拊心諸臣豈肯裂土自榮俟神京克復大統告定之後議之未晚又言福王徇難先帝尚遣一勛臣一黃門一內侍驗讅含斂今先帝梓宮何處封樹若何僅遣一健兒應故事則群臣之悲思大行祗具文耳士英苦其折讓凡公所上考年例少所稱可御史黃耳鼎恨公例轉蹄尾紛然謂公殺樞臣以敗欵局公歷敘和議始末從前小人閃揄賣國情狀始露公與蕺山先後去國黃童白叟皆知南都不能立矣乙酉四月余過嘉興勸公避地四明山公曰不可吾東向一步則馬阮謂我擁立潞王西向一步則馬阮謂我與臥子將興晉陽惟有死此一塊土耳别後三月干戈滿地嘉興城守將破公在城外至城下呼曰吾大臣不可野死當與城存亡城上人譁曰我公來矣開門納之越宿而城陷公朝服自縊死閏六月二十六日也僧真實藏之匱中踰二旬收斂顔色如生其時蕺山在越城餓經七日曰此降城非我死所乃出城外而死兩公死相反而其義則一海內為作降城嘆我公來樂府以美之烈皇撥亂反正之才有明諸帝皆所不及承熹宗蕪穢之後鋭于有為向若始事即得公等六七人而輔之開誠布公君臣一體全不隄防其于致治也何有自蒲州出而失望見制于小人所謂君子者往往自開破綻烈皇遂疑天下之士莫不貪欺頗用術輔其資好以耳目隱發為明陸敬輿曰馭之以智則人詐示之以疑則人偷然後上下交戰于影響鬼魅之途烈皇之視其臣工一如盜賊欲不亡也得乎故蕺山進告先欲救其心術公隨事消息歸于忠厚雖纍逢投杼而過後思之不置蓋其性原不與小人合也烏程韓城陵井研能亡烈皇之天下而不能使猜忌刻薄之名加于烈皇者觀兩公之遇合而可以解于後世矣南渡沸鼎斗筲而叨天業苟非公等數人虛名潤色詎能免于閏位亦猶文山之存德祐也公淸修絶俗造次布素官物貯庫苞苴戒門通籍二十餘載位至冡宰所餘不過談扇歌鐘而巳弘長後進士有纎芥之長依以成名尤急人之患難雖側踵焦原不忘援手竹亭敗後籍沒公力言當事止沒其田産而握握之物不與讐竹亭者又欲竄其子弟于許都叛黨之內公復理而出之孝廉祝淵上書頌蕺山緹騎逮問公囑吳金吾勿殺義士淵得生出獄戶一門之內孝友濡染義盡情至兄弟三人惟伯兄一子相埋者言當遷公曰有兄在吾不敢為主也母黨式微公折契田廬曰俾無忘太夫人之德公初以疏屬爾榖為子巳二十六年甲申始立柱臣為後或問後與子異乎曰然子可私也後不可私也子惟父之所愛即子之後非薦于祖禰而祖禰用馨告于宗族而宗族不疑不敢後也故詩曰螟蛉有子蜾螺負之即人皆可為子之證也傳曰鬼不馨非類神不馨非族是人不可皆後之證也其議禮之精如此公條貫經史而猶熟于朝章國紀故其章奏尺牘見聞周洽鑿然皆可施行非經生是古非今之腐談也而又旁通九流之學嘗推施公子祿命謂人曰施四明佳人奈何此郎不任香火巳而果絶公生于萬曆戊寅殁于弘光乙酉年六十八娶顧氏繼馮氏俱贈一品夫人子爾榖柱臣女五人唐堯臣潘焕張守虞景堯祝文琯其壻也孫二人功燮申余覆巢孤露公以稚弟畜之所不至隕越于溝壑者繄公是賴且少不知學泛濫無根公每訓之曰學不可雜雜則無成無亦將兵農禮樂以至天時地利人情物理凡可佐廟謨裨掌故者隨其性之所近併當一路以為用世張本此猶蘇子瞻教秦太虛多著實用之書之意也公死生師友之誼過于彭宣余感傷舊恩不能及李燮之于王成能無愧乎公葬海寧園花鎮之龍山余兩過墓下豐碑未立但有腹痛辛酉距公之殁巳三十七年矣功燮來求銘白髮靑燈回理前緒尚可倣佛其六七也銘曰國之興亡豈以事功曰誠曰術何途之從吁嗟烈皇求治太急一念刑名僉壬斯集公亦有言王道平平至誠透露即是機權行其所學以匡烈皇帝雖曰俞舉國若狂南渡爝火專樹叨餮公于其間六月霜雪大厦將傾猶抽梁棟泛泛溝中以俟一閧禦兒鴛水黑雲壓城蓑城毅魄耿耿孤誠血碧龍山魂騎箕尾千秋萬歲光芒斧扆高古處府君墓表府君諱克臨字敬可別號古處蒙城高氏武烈王瓊之裔陪扈南渡或居永嘉或居臨安明初有榮者始遷仁和之興忠里世為右姓祖汝梅嘉靖辛酉舉人仕至福寧太守父時亮萬曆巳酉舉人母鍾孺人君甫晬而喪母叩和啼呼哀動觀者福寧絶憐愛之曰天以是兒錫我孰謂廉吏可為而不可為也出就外傅五行俱下既而怒長突起語出奇崛時師不敢以為弟子慈溪沈沖吾老儒也君因師之質以性命理氣之辨及天外何所作何究竟沖吾心異之恐其妨於舉業教之實地用工自有領會處君矻矻窮年不事口耳沖吾所著經書講義為之疏通證明而向所欲質問者亦渙然冰釋尋補諸生有聲於場屋時四方文社最盛武林讀書社多通經學古之士如張秀初江道暗鄭玄子虞大赤仲皓君皆從之上下其議論經生之學不過訓故熟爛口角聖經賢史古今治亂邪正之大端漫不省為何物君讀書橫山與密友孫武書之所考索者皆經生之不講者也間發為詩文心精辭綺小言大言皆稟尺度而君不以此自汰名曰小窗筆屑視之如草木之榮華耳學成而世變秀初道暗剃染為僧玄子變姓名去大赤仲皓亦齎志以沒輩行將盡名理幾熄君把茅河渚與鄒孝直劉雪符兄弟結碾祿社逍遙琴樽杖席之間名談勢語終夕不及永興寺有古梅數樹一日大雪君衝寒獨往坐其下語刺刺不能休不知所語云何也山中盜起移居北墅孫武書亦遷家相就花晨月夕野航共載尋山水僻處洞簫隱隱聞者方知二老之所之君至性天植事後母朱孺人致養無方孺人卒居喪幾於滅性兄弟友愛甚摯群從之間廩假進退婚嫁有無君顧省周詳畛域不立族之貧不能葬者棺盈數十君置新阡積年白骨始沾黃土其生平與君久故者則别開蓬窠會亡者之客歌薤露以送之伶仃弱小猝需急難收視溫恤不可一二件繫也辛亥飢疫僵餓載道君約里人設厰二所經理饘粥兵興以來閩俘之至杭者無虛日呼聲入冥君惻然贖數人以始事後遂踵而行之君嘗曰眼前好事做不盡吾力有限吾心無窮嘗存真實心隨所可行行之余謂此言最為近道自袁了凡功過格行有志之士或倣而行之然不勝其計功之念行一好事便欲與鬼神交手為市此富貴福澤之所盤結與吾心有何干涉其甚者呫呫於禽蟲膜拜之習流轉極惡恃其功過相折放手無忌者有之矣使其知心量之無窮黽勉一生事事不敢放過而亦何功之有當君之時武林程元如以卜著吳茂先以醫名兩人皆與君交有所疑者待君而決君亦間應握粟之求無不奇驗其藥籠常畜善藥以起貧子滿腔子是惻隱之心於君不可見乎生于萬曆辛丑正月三十日卒于康熙庚申九月十日年八十娶周孺人子女各一鳳岐增廣生壻馮圖獻孫男四人湛遠朝瓔皆廩生弘遠士遠皆庠生孫女一人壻劉曾矩庠生曾孫五人景儀景屺景星景福景榖曾孫女一人將葬湛遠朝瓔以顧侍御季蔚所著行狀乞表其墓曰君嘗為動説以為動者太行之獶也是以寧守吾拙然觀君濟世利物之志如江河行地而不絶君固妙巳而粗物存真而毀轍者耶
