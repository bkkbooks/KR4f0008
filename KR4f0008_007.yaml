  text: 南雷文案卷七
  hash: sha256:45de05f3bcb7c55f15703bc01a88cf42d4056323d3e127ff8f57ac6ebf547b29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0008_SBCK_007-1a}
body:
  text: 姚江黃宗羲著高旦中墓志銘庚戊啓禎間甬上人倫之望歸于吾友陸文虎萬履安文虎巳亡履安隻輪孤翼引後來之秀以自助而得旦中旦中有志讀書履安語以讀書之法當取道姚江子交姚江而後知吾言之不誣耳姚江者指余兄弟而言也慈溪劉瑞當亦言甬上有少年黑而髯者近以長詩投贈其人似可與語己丑余遇之履安座上明年遂偕履安而來當是時旦中新棄場屋彩飾字句以竟陵為鴻賓出而遇其鄉先生長者則又以余君房屠長卿之寱語告之余乃與之言讀書當從六經而後史漢而後韓歐諸大家浸灌之久由是而發為詩文始為正路舍是則旁蹊曲徑矣有明之得其路者潛溪正學以下毗陵晉江玉峰蓋不滿十人耳文雖小伎必由道而後至毗陵非聞陽明之學晉江非聞虛齋之學玉峰非聞莊渠之學則亦莫之能工也旦中鋭甚聞余之言即遍求其書而讀之汲深解惑盡改其紈褲餘習衣大布之衣欲傲岸頺俗與之久故者皆見而駭焉余自喪亂以來江湖之音塵不屬未幾瑞當履安相繼物故旦中敻然出于震蕩殘缺之後與之驚離吊往一泄吾心之所甚痛蓋得之而喜甚自甬上抵余舍往來皆候潮汐疾風暴雨泥深夜黑旦中不以為苦一歲常三四至一日病蹶不知人久之而蘇謂吾魂魄棲遲成山車廄之間大約入黃竹浦路也黃竹浦余之所居其疾病瞑眩猶不置之旦中之于余如此旦中家世以醫名梅孤先生針炙聚英志齋先生靈樞摘注皆為醫家軌範旦中又從趙養葵得其指要每談醫藥非肆人之為方書者比余亟稱之庚子遂以其醫行世時陸麗京避身為醫人巳十年吳中謂之陸講山謁病者如市旦中出而講山之門驟衰蓋旦中既有授受又工揣測人情于容動色理之間巧發竒中亦未必純以其術也所至之處蝸爭蟻附千里拏舟踰月而不能得其一診孝子慈父苟能致旦中便為心力畢盡含旦中之藥而死亦安之若命矣嗟乎旦中何不幸而有此一時簧鼓醫學為之一閧醫貫類經家有其書皆旦中之所變也旦中醫道既廣其為人也過多其自為也過少雖讀書之志未忘欲俟草堂資具而後可以併當一路近歲觀其里中志士蔚起橫經講道文章之事將有所寄旦中惕然謂吾交姚江二十餘年姑息半途將以桑榆之影收其末照豈意諸君先我絶塵耶傍惶慨嘆不能自巳而君病矣是可哀也旦中美髯玉立議論傾動雖復流品分途而能繾綣齊契三吳翕然以風槩相與其過金閶徐昭法必招之入山信宿話言蠡城劉伯繩少所容接每遇旦中不惜披布胸懷旦中亦以此兩人自重所過之地喜拾淸流佚事不啻珠玉蓋履安之餘教也少喜任俠五君子之禍連其內子旦中走各家告之勸以自裁華夫人曰諾請得褒衣以見先夫于地下旦中即以其內子之服應之殯殮如禮家勢中落藥囊所入有餘亦緣手散盡故比死而懸磬也旦中姓高氏諱斗魁别號鼓峰韓國武烈王瓊之後建炎南渡王之五世孫修職郎世殖自汴徙鄞始為鄞人修職生元之字端叔學者稱為萬竹先生樓宣獻公鑰志其墓萬竹之四世孫明善洪武初亦以隱德稱安敬先生安敬之四世孫士有文名嘗摘注靈樞稱志齋先生贈刑部山東司郎中旦中之曾祖也祖萃萬曆甲戌進士知廣東肇慶府贈右副都御史父􅙆光祿寺署丞致仕封右副都御史母黃氏贈太淑人且中則馬氏孺人所生也光祿五子長斗樞崇禎戊辰進士巡撫陜西右副都御史旦中行在第三娶朱氏生子五人宇靖宇厚宇豐宇皥宇調側室趙氏生子二人宇祝宇胥女三人孫男幾人去年十月旦中疾亟余過問之旦中自述夢至一院落鎖鐈甚嚴有童子告曰邢和璞丹室也去此四十七年今將返矣某適四十有七非前定乎臥室暗甚旦中燒燭自照曰先生其視我平生音容盡于此日先生以筆力留之先生之惠也余曰雖然從此以往待子四十七年而後落筆未為晚也明年過哭旦中其兄辰四出其絶筆有明月岡頭人不見靑松樹下影相親之句余改不見為共見夫可沒者形也不可滅者神也形寄松下神留明月神不可見則墮鬼趣矣旦中其尚聞之辰四理其埀殁之言以請銘余不得辭生於某年癸亥九月二十五日卒于某年庚戌五月十六日以其年十一月十一日葬于烏石山銘曰吾語旦中佐王之學發明大體擊去疵駁小試方書亦足表襮淳于件繫丹溪纍牘始願何如而方伎齷齪草堂未成鼓峰矗矗日短心長身名就剝千秋萬世恃此幽斷陜西巡撫都察院右副都御史玄若高公墓志銘庚戌余於李庭芝守楊之事蓋未嘗不為之流涕也宋巳亡矣猶能死守半載庭芝一日在楊則楊一日不速飛不能乘其席卷之勢以下楊而必待之易守之後然則興亡之故雖曰天運固未常不由於人矣世徒曰宋之亡也兵力人心一無可恃夫楊之兵力非有加於天下也朱煥之代庭芝所用者亦即楊之民也觀庭芝能用楊於亡國之餘知古今無不可為之時耳有明之亡高公守鄖之事何其與之相類也崇禎十四年襄陽既陷閣部楊嗣昌自裁鄖陽以要地推擇高公為分守荆南道按察使時全楚郡縣流賊殘破略盡濠平城墮蓬顆千里鄖治孤懸戶口不盈四千公至隱度城郭西南緑漢水東北據山麓漢水來去之所皆劣容一丈築樓櫓其上東北兩面為虎落以接之具藺石布渠答料兵得三千分處其間三月而戰守之事備亡何獻賊道經城下總兵左良玉尾之城中大恐蓋左兵之暴過賊異甚公為之乞哀於左帥得不入明年李自成來攻公將士卒搏戰城外賊不得傅城而退十六年三月賊從漢江上流將下搜括民舟公曰我失漢江之險則坐困矣乃乘其未集使水哨馬之服奪之賊遂從陸來薄以破均州所得靜樂宮門板竹笮聯為木城公命投以火罐斧其竹笮木城遂拔雲梯衝車攻具齊列我師奮勇壞其機牙賊乃乘夜運作莫知所謂平明視之敵臺矗矗三十六所逼陴高出俯施飛炮公率衆攻臺三日而盡墮之公以羸卒四千當賊三萬甲馬二千攻圍一月餘賊喪失精鋭過半卒不得志以去由是鄖兵之名著於天下李賊憤甚復發兵至鄖公使禦之於楊溪賊扺龍門夜聞漢江水石相搏有驚而呼者曰鄖兵至矣師遂潰其畏鄖兵如此賊據均州鄖之伏聽者不能東出公發卒攻之賊望風遁自成營都襄陽督師孫傳庭秦中刻期大舉自成移軍入襄城郟縣之間待之公出師以應督師降光化穀城至襄陽聞督師敗績引兵保均已而自成入關公復出師一戰而馘賊二百餘級自成以鄖陽一青梗其全楚乃發賊三萬使襄陽路應標將之滅此朝食而鄖陽城糧盡公使溯漢糴稗實以給兵不足則雜牛皮麴蘖以給之士無離心賊以公之降丁王光恩為可動也發使招之光恩猶豫未決公乃大會將士於城頭而告之曰事巳至此諸君可斬吾頭降之母為徒死諸將痛哭願隨死公曰賊使為光恩而來光恩云何光恩迫於大義亦遂手刃賊使以示不回公與諸將痛飮相勉以古來忠義之事勇氣百倍明日開城決戰賊倉卒不意大駭而潰得級千餘公又謂其將校曰賊倚糧於均我方救死不暇均中之賊必不虞其往襲也使裨將楊明起夜以千人渡漢遲明破之燒其積聚鄖圍始解當是時闖賊已據全秦河洛荆襄設宫分治廟堂以鄖陽久陷罷撫臣不推忽得公請救蠟書鄖人之在都者莫不痛哭擊登聞鼓曰鄖陽不食半載猶為朝廷死守奈何棄之翌日上召閣部大臣於平臺議推鄖陽巡撫廷臣皆屬公大學士丘瑜曰全楚督撫皆逃不如一道臣猶能張楚上然之大學士陳演曰道臣雖能守然巡撫非其所長於是以鄖陽知府徐起元為巡撫加公太僕寺卿仍署道事初公備兵長沙長沙守為演私人屬公庇之公舉案其贓演恨之故以起元先公越數日冡宰李遇知言陜西與川北相連宜守漢中興安以固蜀門戶上授公右副都御史巡撫陜西兼制川北國解而後聞廷授則十七年之四月矣公遂謝事養病又數月而聞北變公慟哭曰老臣以一隅為挈瓶之守豈知其無益於天下之大數也秋七月路應標又至公復登陴助起元城守十二月闖賊敗圍鄖者殺應標而去公謂先帝以秦中屬我豈可寒此末命得秦帥孫守法家丁數十人借鄖師苗時化之兵以佐之遂下興安未幾而大兵南下公還鄖鄖已內附竄處不歸浙河失守遠宦於故國者例簿録其赤口以上公有老父年八十餘事聞公曰疉山安仁之敗以母老不死矧我在事外耶歸而奉父以天年終自流寇起討賊之師一盛於楊嗣昌再盛於孫傳庭皆竭天下之力以奉之劒客竒才輻輳戲下而襄雒之陷潼關之敗中原由此陸沉左良玉之兵號數十萬自開封潰後翺翔樊城避賊於荆州再避武昌三避九江其視一戰如以肉委餓虎區區鄖陽飢卒不滿半萬重圍援濶兩京陷沒魁然而峙必待公解任而後速飛然後知兵不在強弱城不在堅脆顧用之之人何如耳守楊守鄖亡國之際豈繄無人君子所以痛恨於廟堂之倒置也公諱斗樞字象先别號玄若韓國武烈正高瓊之後王之五世孫修職郎世殖南渡始為鄞人修職生元之字端叔宋之名儒又七世而為公之高祖文福建驛丞曾祖士亦以儒學名贈刑部郎中祖萃萬曆甲戌進士知肇慶府贈右副都御史父􅙆光祿寺署丞致仕封右副都御史母黃氏誥贈太淑人公五歲即能屬文年十九而舉於鄉登崇禎戊辰進士第授刑部廣西司主事是時逆案新定逆奄之黨人出竒計欲以疆場之事翻案晉撫耿如𣏌勤正兵潰黨人以如𣏌故逆奄之所欲殺者使上必欲殺晉撫則逆奄之誅賞未必不當上心亂矣乃彌縫上之所寄耳目者晉撫下獄尚書韓繼思擇司官五人以讞之公與焉坐總兵張鴻功死晉撫戍上閲爰書大怒悉置讞者於詔獄晉撫論死講官文震孟講呂刑肄業及之公得復職慮囚湖廣尋出守荆州府江陵獲盜連染遼宗知縣史元調以收考宗室受逮攝遼宗置對恐其敗露漫言溺之公遂實其漫言謂遼宗果非盜正合聽其湔雪溺之則其為盜也信元調得從末減鄭奄蠱惠王請以王官行部履畝而稅公曰王賦多無實田加派充額耳王官繭絲民弗堪也故迂其文書以聽臺難久之報寢鎮筸參將楊世芳奉檄守陵道荆公留不遣巡撫唐暉聞之大怒曰誰任承天之咎者公曰賊必不敢越荆以入承天守荆所以守承天也賊某西行世芳襲之以俘馘告慶於唐撫唐撫乃服升湖廣按察司副使備兵長沙長沙有江湖之限不知兵革武備久弛公謂江北雲擾江南豈得晏然增城數版調兵策軍食用戒不虞未幾而臨藍山賊起賊船數百順流破湘潭乘勝遂攻長沙闕地濡褐積土蒙櫓賊既盡其機巧而縱礧焚衝應之者嘗若有餘潛遣守備韓鴻發閭左子弟以資夾擊賊聞夜遁當郡城烽燧湘鄉煤丁煽動聚衆亦至數千出犯安化沅撫陳睿謨有事於臨藍公謂煤丁新起易於撲滅煤丁授首則臨藍破竹矣請以為始事分道蹙之及於桃花江公已先去其津筏皆潰而就溺繼討臨藍公獨當一面寇平上賜銀幣長沙江流五百餘里寇盜出沒邏舟三隻公增為十六又造戰艦六隻傳籌出哨行旅貼然屬邑城垣十二尺以上皆增八尺無城者五既城攸縣積羡金以待其四守樓土堡相望離鄉聚間公之設施不啻田舍翁品量家事千里如在庭內其在鄖陽南都召其回京巳改楚撫已又以王驥代之皆公所未聞也公雖奉父家居而白首兵間人情所注風波震撼無日無之一對獄吏再連嗣子故浮沉閭里不敢自異晚又目盲租吏債家時見娖搦豈知其為先朝萬里城也生平一無嗜好秃筆頑石時為選體詩寄興亦不必以示人與人言意滿口重至於兵事則心開余之交公在己丑慷慨失職時相過從猶為使公建大將之旗鼓必有可觀豈知其悶悶以老哉生於某年甲午八月二十五日卒於某年庚戌五月二十一日以某年某月某日葬於某所配范氏贈淑人繼徐氏封淑人簉施氏嗣子宇泰兵部武選司員外次曰宇啓壻沈延綸庠生戴石臣朱濂孫男四人奕宣奕襄皆廩膳生奕修奕學曾孫景乾景曄宇泰以公之明德史所取裁須得舊事粗見首尾者為之科條因授公所撰宦歷漫記守麇記略俾李鄴嗣為狀余為銘志銘曰崇禎紀元盜起延綏長蛇出穴封豕偕來相望金湯不異培塿金鼓動地心膽寒灰或降或竄百爾崇階山河破碎宗廟蒿萊鄖陽蕞爾漢水之隈高公􅊩止千里風霾投鞭斷流聚骨成臺窮城就死日影不回羊坽未拙雲梯又排慨慨高公解帶指揮五百血戰羸卒半埋待其圍解鍾石已乖移忠作孝非意所諧截指請救哭滿天街相演猶曰公非將才廟算不勝千古同哀陳母沈孺人墓志銘庚戌余友陳同亮改葬其生母為之稅服三年夫稅服者過時而服其日月亦近耳顧二十餘年之遠則與生不及者同例同亮不行改葬之緦而服巳絶之服率意違禮無乃蹈子路當除不除之過伯魚既除猶哭之失歟巳而陳子介眉狀其事乞銘于余而後知其不忍哀愴之情始出于此也孺人姓沈氏杭州人年十八歸於侍御平若陳公公故鄞人未有子嗣遂買屋武林以處孺人明年同亮生又四年嫡母周恭人歸同亮而子之孺人仍處武林思子不置踰年而卒年二十四侍御為文哭之權厝湖上當是時同亮壓於嫡母於孺人之喪不能親焉又二十餘年侍御恭人相繼謝世同亮始迎喪武林歸葬於鄞詩云欲報之德昊天罔極此凡為人子者之言也孺人亡以思子為之子者又獨何心宜乎同亮之哀於凡為人子者加一等矣梁沈崇傃以母死喪禮不備復於葬後更行服三年武帝據禮敕斷崇傃終不得行其志檀弓兩卷皆言物始三年稅服自同亮而始何必有例乎同亮方與諸子修講經之會肄業及三禮諸子之論其亦有同異否耶嗟乎先王制禮以斬齊功緦為其文以不飲酒食肉處內為其實昔之居喪者雖文實未必相稱然猶勉強為之不敢廢也二十年以來所謂喪服者率加玄絲於首蒙黑繒於身是孔子之不以弔者而以之待其父母蓋三年之喪從是而廢矣夫於天下之所共行者莫或行之况能行天下之所不行乎吾欲以同亮之事書之為天下諷也孺人生於萬曆丙辰正月二十日卒於崇禎己卯五月草五日己酉十二月十六日葬於千丈鏡之原子一自舜字同亮庠生女一適周徵泰孫男一憲淇孫女二銘曰西陵風雨下有安宅潮東來兮兒無飢渴汐東去兮兒無寒熱雖有安宅其如潮汐越山甬水生來未識生遊尚苦何况死陟丹旐白雞有兒在側有兒在側便為樂國劉瑞當先生墓志銘壬子崇禎間吳中倡為復社以網羅天下之士高才宿學多出其間主之者張受先張天如東浙馮留仙鄴仙與之枹鼓相應皆喜容接後進標榜聲價人士奔走輻輳其門蓬蓽小生苟能分句讀習字義者挾行卷西棹婁江東放慈水則其名成矣其間模楷之人文章足以追古作議論足以衛名教裁量人物譏刺得失執政聞而意忌之以為東林之似續也當是時慈水才彥霧會薑專愚劉瑞當馮玄度馮正則馮簟溪諸子莫不為物望所歸而又引旁近縣以自助甬上則陸文虎萬履安姚江則余兄弟晦木澤望蓋無月無四方之客亦無會不諸子相徵遂也嗚呼盛矣瑞當於諸子中芒寒色正諸子皆引為畏友初與專愚齊名坊刻行世稱為薑劉及專愚登第又與玄度並稱為劉馮亦猶香山之在唐初稱劉白繼稱元白矣交道雖廣而所至情契不過數人入閩則友曾弗人林守一之宛則結沈眉生麻孟璿梅朗三過檇李則投夏彛仲其激揚題拂之流望瑞當娥眉天半不可得而親也諸從遊先後成進士至為天子元老侍從其下者亦且為二千石郡縣長吏獨瑞當蹭蹬老諸生布衣揖讓于博士前晚乃以貢待一儒官胸中不能無芥蒂友朋高會瑞當恆坐席端文虎次之酒酣耳熱兩人輒離席長歌蔓聲相和唾壺盡闕澤望以盛名為之壻瑞當喟然曰吾為同輩架纍置身爐鞲之上無乃益彰其老醜耶未幾而南北橫潰聲實陸沉交遊事息返顧閭里則專愚玄度以疾死留仙鄴仙以憂死文虎以刺死簟溪以兵死所在情契鯨鯢相望瑞當之風波亦為里中指名即場屋放言悲歌流涕亦不可復得乃為潔供疏告於嘗所往來者求法書名畫古器竒花勉強差排悴然不知有生之樂發為詩文僻思拙句絶似圭峯積久所得嗚呼何其衰也於是一歲之中東走訪履安西走訪余兄弟必且再三潦倒以泄其耿耿之未下戊子夏瑞當挾其季子一平頭奴刺小航浮江而上颶風失楫隨波蕩潏而至余家未幾適甬越月而以訪黃太沖萬履安兩記來余頗怪之瑞當之往來多矣獨記此何歟再越月訃至始知其記之為永訣也瑞當深沉有識嘗與之謁劉先生時瑞當北上先生傳語留仙寇深事急當為扈從計先生不輕談機事蓋信瑞當之深也簟溪受禍親戚不敢過其門瑞當見其夫人而謂之曰今日之事夫人唯有自盡吾待命於此夫人死瑞當始出瑞當諱應期亦字遂當生於某年某月某日卒於某年某月某日世為慈溪人六世祖煒廣東參政高祖鍇封山東道監察御史曾祖士逢上海丞祖廷褎父志冠封文林郎妣某氏封太孺人娶應氏繼向氏子三長甲庠生次有壬次有丁女二長適鄉進士黃宗會即澤望也次適秦某孫男二洙濂孫女一溱瑞當卒後二十四年十一月二十五日葬於鄮山飛鳬之原甲來速銘曰先子心言之托止有姚江余固瑞當之未亡㕛也身歷其盛衰使余不言溪上之厨流後來無有知之者矣第瑞當去盛時不遠尚且精神殞喪風味轉墜逮今一世余皓首而談往事叨叨不巳聞者得無厭其頑鈍乎汝甲其深藏之也銘曰汝南月旦自昔重之不有君子孰與主持唯瑞當甫遭逢盛時引繩按墨不為詭隨窮島諸生清議自司坎壈而死邪正逆施斯世何樂而為君悲慈水嗚咽鄖嶺參差墜言汙履莫使君知左副都御史贈太子少保諡忠介四明施公神道碑銘壬子餘姚四明施公當流賊之變為左副都御史在東長安門聞烈皇帝既殉社稷慟哭而書曰慙無半策匡時難唯有一死報君恩遂投繯死僕遽解之少蘇厲聲曰汝輩安知大義是時賊滿街巷不可返寓公望門求縊居人皆麾出之乃以砒霜投燒酒飮九竅血裂而逝初冦警日亟公屢促司馬厲兵固守飛檄勤王司馬落落如承平時公叱罵而去自度必死遺書於家人曰吾身報國母哀吾死亡何而有三月十九日之事公登萬曆己未進士第授工部主事值奄人逆賢用事𦦨脅諸曹公獨不就為其所怒有詔拆北堂限五日以窘公俄而暴風拔屋公得脫然又詔依嘉靖舊式作獸吻其式茫然公方勾稽匠氏神以夢告明日發地得之則嘉靖間所用之餘也稍遷屯田司郎中會凃文輔以中官監督二部公耻為之屈請降俸出知漳州五百里民隱如在庭內每有盜發輒曰此必某也其里貫姓名無不知之者李魁竒亂援往例請撫公謂若然又為閩封殖一蠹也與巡撫鄒公維璉悉力定之劉香橫海外公縶其母誘之海隅香卒授首島寇時入犯皆有內主公破其墻壁銷其厝火欲使全閩兵力不歸一氏蓋其所慮者深也纍轉至布政司皆在福建入為光祿寺卿通政司使學士黃公以直言觸上怒諸生凃仲吉上書頌之公批只可存此一段議論不為封進仲吉劾公阻言路公繳原疏上見其批大怒間住回藉逾年再召為南京通政司陛辭公以學術吏治兵事財用四者入告上為之動容出京三日遣中使召還面諭曰南京無事留此為朕幹些要務吏部會推刑部右侍郎上曰施某淸執可左副都御史其去殉難之時止二月也公諱邦曜字爾韜别號四明其先師點以刺史居烏程孫宿慶元間為餘姚令因家焉高祖信漳平令祖龍雲父承雲皆以公貴贈大中大夫福建參政元配虞氏贈淑人繼金氏封淑人子欽邑諸生公之學得力於文成鈎深纂要以理學文章經濟三分其集心光證明章句者所不得而窺也蕺山講學公又以其自得者參請皆歸實際蕺山亦深契之公起自孤童身至大僚不改寒窶之習勇於為義同年生魯時升卒京邸公為之含殮又以女妻其子嘗買一婢掃灑廳事至於東隅凝視擁篲而泣公見而怪之曰此先人任御史之宅也兒時曾墮環茲地憶之不覺凄愴公閔然即分嫁女之資擇士人而歸之此在常人所不能者於公則為餘事也公卒未十年嗣子亦殁夫人寄食壻家晨炊不繼淺土一壞蒸嘗閴然嗟乎公之忠義行遠有耀豈以一家之存亡為絶續乎銘曰姚江九折出海門英靈磅礴正氣存三忠之名孰不聞施公繼之血化碧朝不為潮夕不汐帝座風雷通咫尺大厦欲焚煙糢糊幕燕啁噍畢逋鳥誰其聞之大聲呼乘龍冉冉帝上升前無疑弼後無丞公獨攀髯執綏繩虞淵不返寒日晷為王作蓐御螻蟻自盡者心東流水國既破兮家亦亡蕭蕭殯宮對野棠下馬無人拜夕陽道旁亦自有童叟為公培土深且厚石爛海枯銘不朽三忠毛忠襄孫忠烈先忠端也旌表節孝馮母鄭太安人墓志銘壬子具官馮元䬞言臣父若蒙以諸生有聲場屋當時與臣世父太嘗寺卿若愚同稱世父遭遇致身卿二而臣父連蹇以終當其卒時臣母鄭氏年才二十五臣四歲臣姊五歲彾㣔相依以至成立臣父生前不治産業婚嫁有無男耕女織細碎皆臣母經營使臣得自力於學二十年如一日臣母之旌表久合與禮臣妄希有司一日之知而後入告今幸從扈隸分榮半級是臣孤露得以發舒之日也嚴霜自盡何心烏頭雙表之名仁問式昭豈遺白首孤笻之婦伏乞章下所司按之往例禮部具覆馮元䬞母鄭氏守節三十年年滿五十以外謹依會典下詔褒異其門閭封太安人制曰可又二十七年歲在辛亥而太安人卒年七十有八元䬞銜哀貢誠謂其友曰近日文學宗老俱盡子如不言不特湮沒吾母之大節亦將委君命於草莾也始豫至溪上二馮先生為人倫盟主天下談士倚以揚聲况在子弟此時元䬞字徴遠與從兄沛祖坐同席行疊迹所謂翠竹碧梧鸞鵠停峙者也顧指取功業譟動公卿乃其分內沛祖以五經第進士徵遠解褐風塵之際太安人彤管之譽於是得以上聞豈意公卿皂隸俄頃易位沛祖死於海外徵遠困於柴水長吟悲歌無所投足太安人食貧孤燈敗帷之間不得邀一日之祿養宜乎徵遠之無所寄其哀也雖然國可滅央不可滅後之君子而推尋桑海餘事知橫流在辰猶以風教為急務也祖潤鄉進士同知鳳陽府父元燝諸生銘曰從來貞婦表者百一既有令子復有顯秩足慰母心子道可畢太史遁荒石渠蕭瑟茫茫來者誰稽故實藉此銘章有如皎日前翰林院庶吉士韋菴魯先生墓銘丙辰歲辛亥余邂逅魯韋菴先生於越城之公所率爾談文有契先生即過古小學索觀鄙文每奏一篇先生嘆嗟良久曰二川以後百年無此作矣自是余至越城必相過從言談盡日史漢之機軸歐曾之神理近時作者寱語流傳千門萬戶其所以得所以失先生無不詳其首尾如數一二於掌中余謂今日古文之法亡矣錢牧齋椅托當世之疵瑕欲還先民之矩剃而所得在排比鋪張之間却是不能入情艾千子論文之書亦儘有到處而所作摸擬太過只與摸擬王李者爭一頭面先生固閉戶讀書然非有所授受亦不應至是也先生曰此先父與先伯父之教也先祖之任山陽也徐文長嘗來與二父讀書二父聆其緒論以私後人耳余象數論成欲先生敘之先生曰不可某於象數未之能學也夫胸中未明了而徒文之辭者此今日之文也先生讀書三十年越中之人無有名其能文者其不肯為今日之文之所致乎自余與先生遇後始稍稍傳之同志蓋未五年而先生不可作矣先生諱栗字季栗别號韋菴魯氏為宋肅簡公之裔建炎間南渡遂家會稽元末敬之官提領提領生彥名彥名生原珍原珍生瓛瓛生二子長城成化進士官至南京刑部郎中次瓚再傳為先生之高祖大中曾祖宗程祖錦萬曆丁丑進士亦官南京刑部郎中考湘太學生與徐文長讀書於山陽者也妣陳安人先生幼有至性太學殁時方十三歲居喪即能盡哀安人之殁幾至滅性登崇禎癸未進士第選為庶吉士一時多盛名之士而以先生與魏子一周介生王茂遠為稱首然諸君雅好標榜自喜故後來皆中刻薄之論為人所咀嚼唯先生沖然不盈人亦莫得而致難也李賊之變子一謂先生曰吾輩居此圍城之中死固分也然死有三節目先帝上升之日一也李賊登極之日二也先帝發喪之日三也過此三節目無庸死矣已而大行發引先生得先期拔身而子一死先生念從死之不能如三良也復仇之不能如包胥也事乖志負息機摧撞閉室不出出其書觀之門屏之間落然不聞人聲其所與往來談經問字者亦不過數人而巳花晨月夕歡娛少而愁嘆多余觀今世之為遺老退士者大抵齷齪治生其次丐貸江湖又其次拈香嗣法科舉場屋之心胸原無耿耿治亂存亡之故事亦且憒憒如先生者日抱亡國之戚以終其身是可哀也先生風度峻整望而知為先朝之人物造次發語亦皆玄遠所謂不在能言之流而言者莫之能過也生於某年丁未十一月初八日卒於某年乙卯九月二十六日年六十有九娶王氏子五人長熯先廪生次烶先庠生次炯先巳酉舉人次熺先次炠先今存者唯熺先而巳孫七人長誠候選儒學教授次基受基仁基雍基德基泰基謙曾孫一錫祚熺先謂知先生者無過余乞銘其幽石余何敢辭銘曰文章之名昔歸翰苑步冒鐵爐名存實遠於爍魯公為誥為典追蹤往烈裁正狂簡館課程文一洗其短豈期遁野蓬蒿偃蹇石渠水涸山龍色淺以俟君子灰飛律管唐烈婦曹氏墓志銘烈婦曹氏諸生頴洙之女海寧之翟墩里人年十九歸同邑唐之坦之坦之父煥亦諸生也歸六年而之坦病烈婦悉賣其簮珥裝奩以佐醫藥衣不解帶者半載疾革謂其夫曰君死我不獨生乃營砒霜以待丙辰歲九月二十八日之坦卒烈婦治喪衣衾必有副家人阻之不得因斥去其砒霜烈婦瀝桑灰為汁飲之腹痛而不死明日夫將殮恐死之不及是時也碎錢為屑吞以速之又不死夫既殮而防之者愈虔烈婦曰頃欲與夫同殮既失此期何日不可死而必以今夜乎家人信之人定烈婦潛起飲滷升餘號呼宛轉毒裂經時復吐下而解烈婦曰我求死不得計惟有絶食耳不食二十二日而容貌如故神理炯然夜半啓戶出投於傍舍池中久之而家人始覺出之池巳死覆以衾而復活烈婦謂其舅姑及母曰大人非愛我徒苦我也我志已決遲速總一死耳於是復飲食起而操作如常尋剪其機軸製衣一稱餘布七尺有小婢乞之不與家人竊議曰尺布尚惜其不死明矣其時庭中蠟梅方開烈婦視而歎曰昔董節婦有菊花詩美其不落也此花亦不落吾試咏之添得氷霜枝葉無此花自與衆花殊共知秋菊貞心在尚有黃梅抱樹枯十二月望起而嚴籹於天地影堂靈座舅姑舅之姊各設四拜曰婦從此别矣孝養之願以俟來生家人皆哀慟烈婦從容自若從此又不食除夕得間取其七尺之餘布自經夫柩之旁始知不與小婢之故也及殮目瞑口闔不同乎世之為縊者此固獨行其願之一徵矣年二十五許邑侯詣廬祭之聚觀者數千人莫不為之歎息泣下嗟乎古今死節者多矣曾未有如烈婦之死而生生而死人世痛苦之事備嘗殆遍者文文山服腦子二兩不死絶食八日又不死何意身親見之此如黃河一㵼千里非積石龍門呂梁之險不足以見其竒一番求死一番於爍天若故遲其死以極正氣之磅礴或疑守節為經烈婦所為似乎賢智之過夫溧陽女子一言而沉身王凝之妻倉卒而斷臂古人於生死之際處之至精今人見其為輕耳承流襲敝隨地可以解免名節蕩然不獨在女婦也當烈婦絶食之久余在講堂范文園傳其屬纊臯復仇滄柱謂吾黨盍及是時為武閭之事庶幾死者一聞之也余與同學二十餘人為之一往已聞其入水不死余恐其因吾黨而激之以不得不死乃與范國雯薑西溟致語其舅言貞之未嘗劣於烈也是後余返姚江竟不相聞今年二月至武林陳子棨子文迎謂曰烈婦死矣將死烈婦謂其舅曰吾願見黃先生一拜而死今已矣嗟乎風雷雨雪作於除夕烈婦之志可以激天豈待人激是則余之陋也某年某月某日與其夫合葬於某所其舅請銘余不得辭銘曰培之厚藏之密三尺墳千年室記城塜愼勿逸王孝女碑丁巳王孝女者慈溪王孜之女也居城之東偏歲丁巳七月十八日夜二鼓失火孝女母卒停柩于中堂孝女處樓上趨至中堂疾呼舁柩無應者已而火至孝女伏棺上不肯去其父從火光中遙見之抱之而出則已死灌以􅈨水稍蘇聲出喉間僅絲髮問母棺出否家人不答遂哽咽氣絶時年十五也先是四月之盡城中菊花盛開觀者絡驛不知其為何祥也至是而有孝女之事孝女顧委巷中紅女纖兒耳天地不以其渺末而氣候為之密移則夫今日之撑駕天地者其不在通都大邑之貴人亦明矣古來火逼親棺守死勿去者東漢之蔡順古初晉之何琦齊之傅琰梁之徐普濟元之余丙祝公榮郭通陳汝楫明之楊敬祝大昌鄧翰陳倫然皆幸而得免其不免者則宋賈恩隋李孝子明唐治始三人耳然皆男子以女弱而殉身者僅一孝女而巳誄曰天地晦冥正氣滿讕忽然發作在于單寒有如奔流壅塞勢不能函決口而出動魄摧顔伊惟孝女幼而窈窕萱草霜披帷堂月暴粉書識魄鏡臺留照所以孝女米鹽必告未火之先家中細事孝女必告柩前而後行嘻匕出匕夜半融風火如狂濤煙焰蔽空孝女不見煙焰而見母容豈忍絶裾離此簾櫳舉室奔迸而少一人有伏棺者電光繞身詩負而出已絶呻吟􅈨水三咽一絲氤氲母棺出否旁無答者恨此一身不與同赭形為父留魂不母舍闔然而瞑哀動城野曹娥投水王女赴火水火死形死仁不可百里千年雙碑翠鎖吾作讔語江流不墮終
